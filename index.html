{
id:"2.2", name:"Compare and contrast common networking hardware",
notes:`
<h2>Core devices</h2>
<ul>
<li><b>Router</b> — connects <b>different networks</b> together and forwards traffic between them based on IP addresses. Your gateway to the internet.</li>
<li><b>Switch</b> — connects devices <b>within</b> a network; forwards frames intelligently by learning MAC addresses per port. <b>Unmanaged</b> = plug and play; <b>managed</b> = configurable (VLANs, port security, monitoring, SNMP).</li>
<li><b>Hub</b> — legacy repeater that blasts every frame out of every port. Half-duplex, collision-prone, obsolete — only appears on the exam as the wrong answer or a troubleshooting relic.</li>
<li><b>Access point (AP)</b> — bridges wireless clients onto the wired LAN. In SOHO kit the "router" is really router + switch + AP in one box.</li>
<li><b>Firewall</b> — filters traffic between network segments based on rules (ports, addresses, applications). Network perimeter security.</li>
<li><b>Patch panel</b> — passive termination point where building cable runs end; patch leads then connect panel ports to switch ports. No electronics — pure organisation.</li>
</ul>

<h2>Power over Ethernet (PoE)</h2>
<ul>
<li>Delivers DC power over the data cable — ideal for APs, IP cameras and VoIP phones where no socket is nearby.</li>
<li><b>802.3af</b> (PoE, ~15 W) → <b>802.3at</b> (PoE+, ~30 W) → <b>802.3bt</b> (PoE++, up to ~90 W).</li>
<li>Supplied by a <b>PoE switch</b> (power built into the ports) or a <b>PoE injector</b> (adds power to a single run from a non-PoE switch).</li>
</ul>

<h2>WAN-side boxes</h2>
<ul>
<li><b>Cable modem</b> — terminates the cable/DOCSIS broadband connection.</li>
<li><b>DSL modem</b> — terminates broadband over the telephone line.</li>
<li><b>ONT (Optical Network Terminal)</b> — converts the fibre-optic line to Ethernet at the premises. Fibre's equivalent of a modem.</li>
<li><b>NIC (network interface card)</b> — the endpoint's own wired/wireless adapter, identified by its MAC address.</li>
</ul>

<h2>Software-defined networking (SDN)</h2>
<p>Separates the <b>control plane</b> (decisions about where traffic goes) from the <b>data plane</b> (the forwarding itself), centralising network intelligence in software controllers. Underpins cloud and virtualised networking.</p>

<h2>Router vs switch vs AP — layer at a glance</h2>
<table>
<tr><th>Device</th><th>Layer</th><th>Decides using</th><th>Connects</th></tr>
<tr><td><b>Switch</b></td><td>2</td><td>MAC address</td><td>Devices within one network</td></tr>
<tr><td><b>Router</b></td><td>3</td><td>IP address</td><td>Different networks/subnets</td></tr>
<tr><td><b>AP</b></td><td>2 (bridge)</td><td>MAC (wireless ↔ wired)</td><td>WiFi clients to LAN</td></tr>
<tr><td><b>Firewall</b></td><td>3–7</td><td>Rules (IP, port, app)</td><td>Segments / perimeter</td></tr>
</table>

<h2>Media converter and modem roles</h2>
<ul>
<li><b>Media converter</b> — translates between cable types (e.g. fibre ↔ copper Ethernet) at layer 1/2; extends a link, not a router.</li>
<li><b>Modem</b> — modulates/demodulates the ISP signal (cable DOCSIS, DSL, fibre ONT) to Ethernet for your router.</li>
<li><b>SOHO combo unit</b> — often modem + router + switch + AP in one box; exam questions still test each function separately.</li>
</ul>
<div class="keyfact"><b>Hub trap:</b> if the answer is "sends every frame to all ports" or "causes collisions" — that's a hub, never the right modern choice.</div>

<h2>Scenario pick-list</h2>
<ul>
<li><b>Segment LAN into Staff/Guest/IoT</b> → managed switch + VLANs.</li>
<li><b>IP camera, no power socket</b> → PoE switch or PoE injector.</li>
<li><b>Connect office LAN to internet</b> → router (default gateway).</li>
<li><b>Organise wall ports to switch ports</b> → patch panel (passive).</li>
<li><b>Wireless clients join wired network</b> → access point.</li>
</ul>
`,
quiz:[
{q:"Which device makes forwarding decisions based on MAC addresses learned per port?", o:["Router","Hub","Switch","ONT"], a:2, e:"Switches build a MAC address table mapping addresses to ports, forwarding frames only where needed. Routers work on IP addresses; hubs forward blindly to all ports."},
{q:"A company needs VLANs, port monitoring, and SNMP management on its LAN switching. What should they buy?", o:["An unmanaged switch","A managed switch","A hub with SNMP module","A patch panel"], a:1, e:"Only managed switches offer configuration features — VLANs, port security, mirroring, SNMP. Unmanaged switches are plug-and-play with no interface."},
{q:"An IP camera must be mounted where no power socket exists. The existing switch has no power capability. What is the simplest solution?", o:["Replace the camera with a battery model","Use a PoE injector on that cable run","Run new mains wiring","Use a hub, which supplies power natively"], a:1, e:"A PoE injector inserts power into a single Ethernet run between a non-PoE switch and the powered device — far cheaper than replacing the switch or running mains."},
{q:"Which PoE standard is known as PoE+ and delivers roughly 30 W?", o:["802.3af","802.3at","802.3bt","802.11ax"], a:1, e:"802.3af ≈ 15 W (PoE), 802.3at ≈ 30 W (PoE+), 802.3bt up to ~90 W (PoE++). 802.11ax is WiFi 6, not PoE."},
{q:"A new fibre-to-the-premises installation includes a box converting the optical line to an Ethernet handoff. What is this device?", o:["Cable modem","DSL modem","ONT","Media converter switch"], a:2, e:"The Optical Network Terminal terminates the fibre and presents Ethernet to the customer's router — the fibre equivalent of a modem."},
{q:"What is the function of a patch panel?", o:["It amplifies signals on long cable runs","It provides a passive, organised termination point linking building cabling to switch ports","It routes traffic between VLANs","It supplies PoE to wall ports"], a:1, e:"Patch panels are passive — structured cable runs terminate on the back; short patch leads connect the front to switch ports. Organisation and serviceability, no electronics."},
{q:"Which device connects two different networks and forwards packets between them using IP addresses?", o:["Switch","Bridge","Router","Access point"], a:2, e:"Routing between networks (e.g. your LAN and the internet) is the router's job, operating at the IP layer. Switches operate within one network at the MAC layer."},
{q:"Why are hubs considered obsolete?", o:["They only support fibre","They repeat every frame to all ports, causing collisions and wasting bandwidth","They cannot pass DHCP traffic","They require PoE"], a:1, e:"Hubs are dumb repeaters — every frame goes everywhere, all devices share one collision domain at half duplex. Switches solved this decades ago."},
{q:"What does SDN separate?", o:["Wired traffic from wireless traffic","The control plane (forwarding decisions) from the data plane (forwarding itself)","LAN routing from WAN routing","Layer 2 from layer 1"], a:1, e:"Software-defined networking centralises decision-making in software controllers (control plane) while devices simply forward (data plane) — enabling programmable, virtualised networks."},
{q:"A wireless access point's role is BEST described as:", o:["Assigning IP addresses to wireless clients","Bridging wireless clients onto the wired network","Routing between the LAN and the internet","Filtering traffic by port number"], a:1, e:"An AP is a layer-2 bridge between the WiFi radio and the wired LAN. DHCP, routing, and firewalling are separate functions — even if a SOHO combo box happens to do all of them."}
]
},

{
id:"2.3", name:"Compare and contrast protocols for wireless networking",
notes:`
<h2>Frequencies: 2.4 GHz vs 5 GHz</h2>
<ul>
<li><b>2.4 GHz</b> — longer range, better wall penetration, but crowded (microwaves, Bluetooth, neighbours) and only <b>three non-overlapping channels: 1, 6, 11</b>.</li>
<li><b>5 GHz</b> — faster, many more non-overlapping channels, less interference, but shorter range and weaker penetration.</li>
<li><b>Channel width:</b> 20 MHz standard; 40/80/160 MHz bond channels for more throughput — practical mainly on 5/6 GHz where spectrum is available. Wider = faster but more interference exposure; on crowded 2.4 GHz, stick to 20 MHz.</li>
<li>Channel widths and permitted channels are set by <b>regulatory bodies per country</b> — kit must match its region.</li>
</ul>

<h2>802.11 standards</h2>
<table>
<tr><th>Standard</th><th>Band</th><th>Max (theoretical)</th><th>Notes</th></tr>
<tr><td>802.11a</td><td>5 GHz</td><td>54 Mbps</td><td>Early 5 GHz outlier</td></tr>
<tr><td>802.11b</td><td>2.4 GHz</td><td>11 Mbps</td><td>Slowest legacy</td></tr>
<tr><td>802.11g</td><td>2.4 GHz</td><td>54 Mbps</td><td>b-compatible</td></tr>
<tr><td>802.11n (WiFi 4)</td><td>2.4 <i>and</i> 5 GHz</td><td>600 Mbps</td><td>First dual-band; introduced MIMO</td></tr>
<tr><td>802.11ac (WiFi 5)</td><td>5 GHz only</td><td>~gigabit+</td><td>MU-MIMO downstream</td></tr>
<tr><td>802.11ax (WiFi 6/6E)</td><td>2.4 + 5 (+6 GHz for 6E)</td><td>~9.6 Gbps</td><td>OFDMA, efficiency in dense environments</td></tr>
</table>
<div class="callout"><b>Exam angle:</b> know which bands each standard uses. "ac" = 5 GHz only. "n" and "ax" = dual-band. a=5, b/g=2.4.</div>

<h2>Other wireless</h2>
<ul>
<li><b>Bluetooth</b> — 2.4 GHz PAN, ~10 m (class 2), pairing-based. Peripherals and audio.</li>
<li><b>NFC</b> — ~4 cm. Payments, badges, pairing bootstrap.</li>
<li><b>RFID</b> — radio tags read at short-to-medium range; passive tags are powered by the reader's field. Inventory, access badges, asset tracking.</li>
<li><b>Long-range fixed wireless</b> — point-to-point directional links between buildings/sites, licensed (regulated frequencies, guaranteed) or unlicensed (2.4/5 GHz, cheap, contention risk). Power limits are regulated.</li>
</ul>

<h2>WiFi features — MIMO, MU-MIMO, OFDMA</h2>
<ul>
<li><b>MIMO</b> — multiple antennas send/receive streams for higher throughput (802.11n onward).</li>
<li><b>MU-MIMO</b> — AP talks to several clients at once (802.11ac/ax).</li>
<li><b>OFDMA</b> (WiFi 6) — splits channels for many small devices efficiently — better in crowded offices.</li>
</ul>

<h2>Channel planning quick guide</h2>
<ul>
<li><b>2.4 GHz</b> — use only channels <b>1, 6, 11</b>; avoid 40 MHz bonding in dense areas.</li>
<li><b>5 GHz</b> — many non-overlapping channels; preferred for speed when range allows.</li>
<li><b>6 GHz (WiFi 6E)</b> — wide clean spectrum; shorter range, needs compatible clients.</li>
</ul>

<h2>Wireless security — know the order (weak → strong)</h2>
<table>
<tr><th>Standard</th><th>Status</th></tr>
<tr><td>WEP</td><td>Broken — never use</td></tr>
<tr><td>WPA</td><td>Legacy — replaced</td></tr>
<tr><td>WPA2 (PSK or Enterprise)</td><td>Current baseline — PSK = pre-shared key at home; Enterprise = RADIUS/802.1X at office</td></tr>
<tr><td>WPA3</td><td>Latest — stronger handshake, preferred on new kit</td></tr>
</table>
<div class="keyfact"><b>Range vs speed:</b> user far from router through walls → 2.4 GHz. Close line-of-sight speed test → 5 GHz. ac-only client won't see a 2.4-only SSID.</div>
`,
quiz:[
{q:"Which are the only non-overlapping 2.4 GHz WiFi channels?", o:["1, 5, 9","1, 6, 11","2, 7, 12","36, 40, 44"], a:1, e:"2.4 GHz channels overlap heavily; only 1, 6, and 11 stay clear of each other. 36/40/44 are 5 GHz channels."},
{q:"Which 802.11 standard operates on 5 GHz ONLY?", o:["802.11n","802.11g","802.11ac","802.11ax"], a:2, e:"802.11ac (WiFi 5) is 5 GHz-only. n and ax are dual-band; g is 2.4 GHz-only."},
{q:"A user two rooms and several walls away from the router should generally connect on which band, and why?", o:["5 GHz — higher frequency penetrates better","2.4 GHz — longer range and better penetration through walls","6 GHz — dedicated long-range band","Either; bands are identical in range"], a:1, e:"Lower frequencies travel further and penetrate obstacles better. 2.4 GHz trades speed for reach; 5/6 GHz trade reach for speed."},
{q:"Which standard introduced dual-band operation and MIMO, with speeds up to 600 Mbps?", o:["802.11a","802.11g","802.11n","802.11b"], a:2, e:"802.11n (WiFi 4) was the first to run on both 2.4 and 5 GHz and introduced MIMO multi-antenna streams."},
{q:"WiFi 6E extends 802.11ax into which additional band?", o:["900 MHz","3.5 GHz","6 GHz","60 GHz"], a:2, e:"6E adds the 6 GHz band to WiFi 6, providing wide, uncongested channels for high-density environments."},
{q:"A warehouse tracks stock using passive tags energised by the reader's own radio field. Which technology is this?", o:["NFC","Bluetooth LE beacons","RFID","Zigbee"], a:2, e:"Passive RFID tags have no battery — they harvest power from the reader's field and reply with their ID. Standard inventory/asset-tracking tech."},
{q:"Two office buildings 3 km apart need a permanent high-bandwidth link without trenching fibre. Which option fits?", o:["A long-range fixed wireless point-to-point link","A Bluetooth class 1 bridge","An NFC relay chain","802.11b with high-gain antennas"], a:0, e:"Fixed wireless uses directional antennas for building-to-building links over km distances — available as licensed (guaranteed spectrum) or unlicensed deployments."},
{q:"What is the trade-off between licensed and unlicensed fixed wireless?", o:["Licensed is free but slower","Licensed guarantees exclusive spectrum at a cost; unlicensed is free but risks interference/contention","Unlicensed requires government approval per link","There is no difference"], a:1, e:"Licensed spectrum is purchased and protected from interference. Unlicensed (2.4/5 GHz) is free to use but shared — anyone nearby can degrade it. Transmit power is regulated in both."},
{q:"Which legacy standards both max out at 54 Mbps?", o:["802.11b and 802.11g","802.11a and 802.11g","802.11a and 802.11n","802.11b and 802.11a"], a:1, e:"802.11a (5 GHz) and 802.11g (2.4 GHz) both top out at 54 Mbps. 802.11b is 11 Mbps; n reaches 600 Mbps."},
{q:"Why must WiFi equipment be configured for the correct country/region?", o:["To set the correct language","Regulatory bodies define permitted channels and power limits per region","To enable roaming agreements","DNS servers differ per region"], a:1, e:"Spectrum regulators (e.g. Ofcom, FCC) define which channels and transmit powers are legal — equipment region settings enforce this."}
]
},

{
id:"2.4", name:"Summarize services provided by networked hosts",
notes:`
<h2>Server roles</h2>
<table>
<tr><th>Server</th><th>Provides</th></tr>
<tr><td><b>DNS</b></td><td>Resolves names ↔ IP addresses</td></tr>
<tr><td><b>DHCP</b></td><td>Automatic IP configuration (address, mask, gateway, DNS)</td></tr>
<tr><td><b>File share</b></td><td>Central file storage (SMB/NFS)</td></tr>
<tr><td><b>Print server</b></td><td>Shares and queues printers centrally</td></tr>
<tr><td><b>Mail</b></td><td>Sends/stores email (SMTP in, IMAP/POP3 out to clients)</td></tr>
<tr><td><b>Syslog</b></td><td>Central collection point for device/system log messages</td></tr>
<tr><td><b>Web</b></td><td>Serves sites/apps over HTTP/HTTPS</td></tr>
<tr><td><b>AAA</b></td><td>Authentication, Authorization, Accounting — e.g. RADIUS/TACACS+ for network logins</td></tr>
</table>

<h2>Internet appliances</h2>
<ul>
<li><b>Spam gateway</b> — filters inbound email before it reaches the mail server.</li>
<li><b>UTM (Unified Threat Management)</b> — all-in-one security box: firewall + IDS/IPS + antivirus + content filtering + more.</li>
<li><b>Load balancer</b> — distributes incoming traffic across multiple servers for capacity and failover.</li>
<li><b>Proxy server</b> — intermediary for client requests: caching, content filtering, hiding internal clients.</li>
</ul>

<h2>Legacy, embedded, SCADA, IoT</h2>
<ul>
<li><b>Legacy systems</b> — old OS/hardware kept because critical software depends on it. Often unpatchable → isolate/segment them.</li>
<li><b>Embedded systems</b> — computers inside other equipment (tills, medical devices, controllers); fixed-function, infrequent updates.</li>
<li><b>SCADA / ICS</b> — supervisory control and data acquisition for industrial plant (utilities, factories). High-value targets; keep off the general network.</li>
<li><b>IoT devices</b> — smart speakers, thermostats, cameras, doorbells. Notoriously weakly secured — best practice is a separate VLAN/guest network.</li>
</ul>
<div class="callout"><b>Exam angle:</b> match the scenario to the box: "one appliance doing firewall, IPS and antivirus" → UTM. "Distribute web traffic across servers" → load balancer. "Cache and filter employee browsing" → proxy. "Central log collection" → syslog.</div>

<h2>NAS vs SAN vs file share</h2>
<table>
<tr><th>Type</th><th>Access</th><th>Typical use</th></tr>
<tr><td><b>File share (SMB/NFS)</b></td><td>File level over the LAN</td><td>Department folders, mapped drives</td></tr>
<tr><td><b>NAS</b></td><td>File level — dedicated appliance</td><td>Small office backups, media storage</td></tr>
<tr><td><b>SAN</b></td><td>Block level — separate network fabric</td><td>Servers see raw disks; datacentre</td></tr>
</table>

<h2>RADIUS and network login</h2>
<ul>
<li><b>RADIUS</b> — central authentication for WiFi (802.1X/WPA2-Enterprise), VPN, and some switch port auth.</li>
<li>User connects to WiFi → AP forwards credentials to RADIUS → access granted or denied centrally.</li>
</ul>

<h2>Scenario pick-list</h2>
<ul>
<li><b>One box: firewall + IPS + AV + web filter</b> → UTM.</li>
<li><b>Spread web traffic across six identical servers</b> → load balancer.</li>
<li><b>Filter spam before Exchange</b> → spam gateway.</li>
<li><b>Smart thermostat on corporate LAN</b> → IoT VLAN/segmentation.</li>
<li><b>Factory PLC control network</b> → SCADA/ICS isolation.</li>
<li><b>Collect router and switch logs centrally</b> → syslog server.</li>
</ul>
`,
quiz:[
{q:"Which server centrally collects log messages from routers, switches, and servers?", o:["SNMP manager","Syslog server","AAA server","Proxy server"], a:1, e:"Syslog is the standard protocol/service for centralised log collection. SNMP monitors device metrics; it's related but distinct."},
{q:"A business wants one appliance providing firewall, intrusion prevention, antivirus scanning, and content filtering. What is this?", o:["A load balancer","A UTM appliance","A spam gateway","A managed switch"], a:1, e:"Unified Threat Management combines multiple security functions in a single box — the classic all-in-one perimeter answer."},
{q:"What does a load balancer do?", o:["Caches web pages for faster access","Distributes incoming requests across multiple servers","Filters spam before the mail server","Assigns IP addresses"], a:1, e:"Load balancers spread traffic across a pool of servers, increasing capacity and providing failover if one server dies."},
{q:"Which service authenticates users, authorises what they can do, and accounts for what they did — often via RADIUS?", o:["DHCP","AAA","DNS","Syslog"], a:1, e:"Authentication, Authorization, Accounting — AAA — is the framework behind centralised network login control, implemented by protocols like RADIUS and TACACS+."},
{q:"An employee's browser requests pass through a company server that caches pages and blocks prohibited sites. What is this server?", o:["A DNS forwarder","A proxy server","A UTM","A syslog collector"], a:1, e:"A proxy sits between clients and the internet — caching content, filtering access, and masking internal clients. It's request-level intermediation, not a full security suite."},
{q:"Why should SCADA/industrial control systems be isolated from the general corporate network?", o:["They generate too much broadcast traffic","They control physical plant, are hard to patch, and are high-value attack targets","They only support IPv6","They interfere with WiFi"], a:1, e:"SCADA controls real-world machinery (power, water, manufacturing). Compromise has physical consequences, and these systems often can't be patched — so segment them away from everything else."},
{q:"Which BEST describes an embedded system?", o:["Any server in a rack enclosure","A fixed-function computer built into another device, such as a till or medical instrument","A VM running on a hypervisor","A NAS appliance"], a:1, e:"Embedded systems are purpose-built computers inside other equipment — limited function, long lifespans, infrequent updates."},
{q:"What is the recommended network practice for consumer IoT devices such as smart cameras and speakers?", o:["Give them static public IPs","Place them on a separate VLAN or guest network away from trusted devices","Disable DHCP for them","Connect them only via Bluetooth"], a:1, e:"IoT devices are frequently insecure and rarely patched. Segmenting them limits what an attacker can reach if one is compromised."},
{q:"Inbound email is checked by a dedicated device before it ever reaches the Exchange server. What is this device?", o:["A mail relay on port 110","A spam gateway","An IMAP proxy","A DKIM signer"], a:1, e:"A spam gateway filters inbound mail (spam, phishing, malware) in front of the mail server, reducing load and risk."},
{q:"A company keeps a Windows XP machine running because a critical manufacturing application only runs on it. What is this an example of, and what is the correct handling?", o:["An embedded system; connect it normally","A legacy system; isolate/segment it from the network","An IoT device; put it on the guest WiFi","A SCADA master; expose it for remote support"], a:1, e:"Unsupported-but-critical systems are legacy systems. They can't be patched, so the mitigation is network isolation and strict access control."}
]
},
/* ---------------- 2.5 ---------------- */
{
id:"2.5", name:"Install and configure basic wired/wireless SOHO networks (IP addressing)",
notes:`
<h2>IPv4 fundamentals</h2>
<ul>
<li>32-bit addresses in dotted decimal (e.g. 192.168.1.10) with a <b>subnet mask</b> splitting network from host portion (e.g. 255.255.255.0 = /24).</li>
<li><b>Default gateway</b> — the router's LAN address; where traffic goes when the destination is outside the local network.</li>
</ul>

<h2>Private vs public addresses — memorise the ranges</h2>
<table>
<tr><th>Range</th><th>Class letter</th><th>Notes</th></tr>
<tr><td>10.0.0.0 – 10.255.255.255</td><td>A</td><td>Huge private space (/8)</td></tr>
<tr><td>172.16.0.0 – 172.31.255.255</td><td>B</td><td>The one people forget — 172.<b>16–31</b> only</td></tr>
<tr><td>192.168.0.0 – 192.168.255.255</td><td>C</td><td>Standard home/SOHO space</td></tr>
</table>
<ul>
<li>Private addresses are not routable on the internet — <b>NAT</b> on the router translates them to the public address.</li>
<li>Everything else (bar reserved ranges) is <b>public</b>, globally unique and internet-routable.</li>
</ul>

<h2>APIPA — the diagnostic clue</h2>
<div class="callout"><b>169.254.x.x</b> means the client asked DHCP for an address and got no answer, so it self-assigned an APIPA/link-local address. Local-only connectivity, no internet. Translation on the exam: <b>"the DHCP server is unreachable or down."</b></div>

<h2>Static vs dynamic assignment</h2>
<ul>
<li><b>Dynamic (DHCP)</b> — automatic; right answer for clients. Servers/printers can use <b>DHCP reservations</b> to keep a fixed address while staying centrally managed.</li>
<li><b>Static</b> — manually configured; used for infrastructure (routers, servers, printers). Risk: typos and duplicate-address conflicts.</li>
</ul>

<h2>IPv6 basics</h2>
<ul>
<li>128-bit hex addresses, e.g. <code>2001:0db8::1</code>. Rules: leading zeros drop; one run of zero groups can compress to <code>::</code> (once only).</li>
<li><b>Link-local</b> addresses start <b>fe80::</b> — auto-configured on every interface, valid only on the local segment (IPv6's APIPA-alike, but always present).</li>
<li>Global unicast (internet-routable) currently allocated from <b>2000::/3</b> (addresses starting 2 or 3).</li>
<li>No NAT needed — address space is vast; SLAAC lets hosts self-configure from router advertisements.</li>
</ul>

<h2>Loopback and link-local — don't confuse them</h2>
<table>
<tr><th>Address</th><th>Protocol</th><th>Meaning</th></tr>
<tr><td>127.0.0.1</td><td>IPv4</td><td>Loopback — test local TCP/IP stack</td></tr>
<tr><td>169.254.x.x</td><td>IPv4</td><td>APIPA — DHCP failed, local segment only</td></tr>
<tr><td>::1</td><td>IPv6</td><td>Loopback</td></tr>
<tr><td>fe80::</td><td>IPv6</td><td>Link-local — always present, local segment only</td></tr>
</table>

<h2>SOHO setup — typical order</h2>
<ol style="margin:0 0 14px 20px">
<li>Connect modem/ONT → router WAN port.</li>
<li>Configure WAN (often DHCP from ISP automatically).</li>
<li>Set LAN subnet (commonly 192.168.0.x or 192.168.1.x /24).</li>
<li>Enable DHCP server on LAN — scope, gateway (router LAN IP), DNS (router or ISP/public).</li>
<li>Configure WiFi SSID, WPA2/WPA3 security, separate guest network if needed.</li>
<li>Reserve IPs for printer/server if required.</li>
</ol>

<h2>Subnet quick reference</h2>
<table>
<tr><th>Mask</th><th>Prefix</th><th>Usable hosts (/24 style)</th></tr>
<tr><td>255.255.255.0</td><td>/24</td><td>254</td></tr>
<tr><td>255.255.0.0</td><td>/16</td><td>65,534</td></tr>
<tr><td>255.0.0.0</td><td>/8</td><td>16,777,214</td></tr>
</table>
<div class="keyfact"><b>172.16–172.31 only:</b> 172.32.x.x is public — a favourite trick question alongside 10.x and 192.168.x.</div>
`,
quiz:[
{q:"A workstation has the address 169.254.31.7 and cannot reach the internet. What does this indicate?", o:["It has a static misconfiguration","It failed to contact a DHCP server and self-assigned an APIPA address","It was assigned by the ISP","Its NIC has failed"], a:1, e:"169.254.x.x is APIPA — the automatic fallback when DHCP doesn't respond. The machine can only talk to the local segment. Check the DHCP server/connectivity."},
{q:"Which of these is a PRIVATE IPv4 address?", o:["172.32.10.5","172.20.14.9","11.0.0.5","192.169.1.1"], a:1, e:"Private class B space is 172.16.0.0–172.31.255.255, so 172.20.x.x qualifies. 172.32 is outside it, 11.x is public (10.x is the private /8), and 192.169 is not 192.168."},
{q:"What is the role of the default gateway setting on a client?", o:["It resolves hostnames","It is the address traffic is sent to when the destination is outside the local subnet","It assigns the client its IP address","It provides time synchronisation"], a:1, e:"The default gateway is the local router. Anything not on the client's own subnet gets forwarded there."},
{q:"Why can a private 192.168.1.0/24 network still reach the internet?", o:["The ISP routes private addresses directly","The router performs NAT, translating private addresses to its public address","DNS converts the addresses","APIPA bridges the two"], a:1, e:"Network Address Translation rewrites outbound traffic to use the router's public IP, mapping replies back to the right internal host. Private addresses never appear on the internet."},
{q:"A network printer must always keep the same IP address, but the admin wants all addressing managed centrally. What is the BEST approach?", o:["APIPA","A static address configured on the printer","A DHCP reservation tied to the printer's MAC address","A shorter DHCP lease"], a:2, e:"A reservation gives the printer the same address every lease, while keeping configuration central and typo-free. Pure static config works but is decentralised — 'best' here is the reservation."},
{q:"Which IPv6 address is link-local?", o:["2001:db8::44","fe80::1c2a:9f00:11","::1","2000::5"], a:1, e:"Link-local IPv6 addresses begin fe80:: and exist automatically on every interface, valid only on the local link. ::1 is loopback; 2000::/3 addresses are global unicast."},
{q:"How is the IPv6 address 2001:0db8:0000:0000:0000:0000:0000:0001 correctly compressed?", o:["2001:db8::1","2001:db8:::1","2001:0db8::0001","2001:db8::0::1"], a:0, e:"Drop leading zeros in each group and compress the single longest run of zero groups to '::' (used once): 2001:db8::1."},
{q:"Which addressing method carries the highest risk of duplicate-IP conflicts?", o:["DHCP dynamic assignment","DHCP reservations","Manual static assignment","SLAAC"], a:2, e:"Static assignment relies on humans keeping records — two devices manually given the same address will conflict. DHCP tracks its own leases."},
{q:"A subnet mask of 255.255.255.0 corresponds to which prefix length?", o:["/8","/16","/24","/32"], a:2, e:"255.255.255.0 sets the first 24 bits as network — /24, giving 254 usable host addresses."},
{q:"What is true of IPv6 that eliminates the main reason IPv4 needs NAT?", o:["IPv6 encrypts all traffic","IPv6's vast address space allows every device a globally unique address","IPv6 uses MAC addresses directly on the internet","IPv6 requires proxies instead"], a:1, e:"IPv4 uses NAT largely because public addresses ran out. IPv6's 128-bit space is effectively inexhaustible, so hosts can have globally routable addresses."}
]
},
/* ---------------- 2.6 ---------------- */
{
id:"2.6", name:"Compare and contrast common network configuration concepts",
notes:`
<h2>DNS in depth — record types</h2>
<table>
<tr><th>Record</th><th>Maps</th></tr>
<tr><td><b>A</b></td><td>Hostname → IPv4 address</td></tr>
<tr><td><b>AAAA</b></td><td>Hostname → IPv6 address</td></tr>
<tr><td><b>MX</b></td><td>Domain → its mail server(s)</td></tr>
<tr><td><b>TXT</b></td><td>Arbitrary text — carries SPF, DKIM, DMARC policies</td></tr>
</table>
<h2>Email anti-spoofing (all live in TXT records)</h2>
<ul>
<li><b>SPF</b> — lists which servers are <b>allowed to send</b> mail for the domain.</li>
<li><b>DKIM</b> — cryptographically <b>signs</b> outgoing mail; receivers verify with the public key in DNS.</li>
<li><b>DMARC</b> — the <b>policy layer</b>: tells receivers what to do when SPF/DKIM fail (none/quarantine/reject) and where to send reports.</li>
</ul>
<div class="callout"><b>Memory hook:</b> SPF = <i>who</i> may send. DKIM = <i>proof</i> it wasn't altered. DMARC = <i>what to do</i> about failures.</div>

<h2>DHCP in depth</h2>
<ul>
<li><b>Scope</b> — the pool of addresses a DHCP server hands out for a subnet.</li>
<li><b>Lease</b> — an assignment is temporary; clients renew at intervals (typically at 50% of lease time).</li>
<li><b>Reservation</b> — a fixed address bound to a specific MAC, always granted to that device.</li>
<li>The classic <b>DORA</b> exchange: Discover → Offer → Request → Acknowledge.</li>
</ul>

<h2>VLANs</h2>
<ul>
<li>A <b>VLAN</b> logically splits one physical switch into multiple isolated broadcast domains — e.g. Staff, VoIP, Guest, IoT on the same hardware.</li>
<li>Traffic between VLANs must pass through a <b>router/layer-3 switch</b> — that's where policy is enforced.</li>
<li>Requires managed switches.</li>
</ul>

<h2>VPNs</h2>
<ul>
<li>A <b>VPN</b> creates an encrypted tunnel across an untrusted network (the internet), making the remote device behave as if on the private LAN.</li>
<li>Types: <b>remote access</b> (client → office) and <b>site-to-site</b> (office ↔ office, router-to-router, always on).</li>
<li>Standard answer for remote workers and for protecting traffic on public WiFi.</li>
</ul>

<h2>NAT, PAT, and port forwarding</h2>
<ul>
<li><b>NAT</b> — router translates private internal addresses to its public IP for internet access.</li>
<li><b>PAT (NAT overload)</b> — many internal hosts share one public IP using different source ports.</li>
<li><b>Port forwarding</b> — inbound traffic on a specific public port (e.g. 443) maps to one internal server — needed to host services behind NAT.</li>
</ul>

<h2>More DNS records</h2>
<table>
<tr><th>Record</th><th>Purpose</th></tr>
<tr><td><b>CNAME</b></td><td>Alias — one name points to another hostname</td></tr>
<tr><td><b>PTR</b></td><td>Reverse lookup — IP → hostname (often mail anti-spam checks)</td></tr>
</table>

<h2>QoS — when voice and video matter</h2>
<ul>
<li><b>Quality of Service</b> — prioritises time-sensitive traffic (VoIP, video) over bulk downloads on congested links.</li>
<li>Often configured on routers and managed switches; wrong QoS hurts call quality before raw bandwidth looks full.</li>
</ul>

<h2>Scenario pick-list</h2>
<ul>
<li><b>Guest WiFi isolated from staff</b> → VLANs on managed switch/AP.</li>
<li><b>Remote worker on café WiFi needs file server</b> → remote-access VPN.</li>
<li><b>Two offices always connected</b> → site-to-site VPN between routers.</li>
<li><b>Mail rejected as spoofed</b> → check SPF/DKIM/DMARC TXT records.</li>
<li><b>Home server behind router needs HTTPS from internet</b> → port forward 443 to server IP (prefer DHCP reservation).</li>
<li><b>Printer always same IP, central control</b> → DHCP reservation by MAC.</li>
</ul>
`,
quiz:[
{q:"Which DNS record directs email delivery for a domain?", o:["A","AAAA","MX","TXT"], a:2, e:"MX (mail exchange) records name the servers that accept mail for the domain, with priority values. A/AAAA map names to IPs; TXT holds text data."},
{q:"Which DNS-based mechanism specifies which servers are AUTHORISED to send mail on behalf of a domain?", o:["DKIM","SPF","DMARC","PTR"], a:1, e:"SPF (Sender Policy Framework) is the authorised-senders list, published in a TXT record. DKIM signs messages; DMARC sets failure policy."},
{q:"What does a DMARC record add on top of SPF and DKIM?", o:["Encryption of message bodies","A policy telling receivers how to treat failures (none/quarantine/reject) and reporting","Faster DNS resolution for mail","Reverse lookup of sending IPs"], a:1, e:"DMARC is the policy and reporting layer — it instructs receiving servers what to do when SPF/DKIM checks fail and where to send aggregate reports."},
{q:"In DHCP, what is a scope?", o:["The duration of an address assignment","The pool of addresses the server can hand out for a subnet","A MAC-bound fixed address","The broadcast domain size"], a:1, e:"The scope is the configured address range (plus options like gateway/DNS) for a subnet. Lease = duration; reservation = MAC-bound address."},
{q:"What is the correct order of the DHCP address acquisition process?", o:["Offer, Discover, Request, Acknowledge","Discover, Offer, Request, Acknowledge","Request, Offer, Discover, Acknowledge","Discover, Request, Offer, Acknowledge"], a:1, e:"DORA: the client Discovers, servers Offer, the client Requests one offer, the server Acknowledges."},
{q:"A company wants guest WiFi users completely separated from staff systems while using the same switches and APs. What should be implemented?", o:["A second DHCP scope only","VLANs","A proxy server","MAC filtering"], a:1, e:"VLANs logically segment one physical network into isolated broadcast domains — guest traffic can't reach staff systems except through controlled routing."},
{q:"For two VLANs on the same switch to communicate, what is required?", o:["Nothing — VLANs communicate by default","A layer-3 device (router or L3 switch) to route between them","A hub connecting both VLANs","APIPA addressing"], a:1, e:"VLANs are separate layer-2 domains; inter-VLAN traffic must be routed. That routing point is where firewall policy between segments is applied."},
{q:"A remote employee on hotel WiFi needs secure access to the office file server. What is the standard solution?", o:["RDP directly over the internet","A remote-access VPN","Port forwarding SMB through the office router","An SPF record"], a:1, e:"A remote-access VPN builds an encrypted tunnel to the office network, protecting traffic on the untrusted hotel network and placing the client 'inside' the LAN."},
{q:"Two branch offices need their networks permanently connected over the internet, with no client software on user machines. Which fits?", o:["Remote-access VPN per user","A site-to-site VPN between the routers","A VLAN trunk over the internet","SSH tunnelling from each PC"], a:1, e:"Site-to-site VPNs run router-to-router, always on, transparently joining the two LANs. Users need nothing installed."},
{q:"Which DNS record resolves a hostname to an IPv6 address?", o:["A","AAAA","MX","CNAME"], a:1, e:"AAAA ('quad-A') records hold IPv6 addresses — four times the 32 bits of an A record's IPv4 address."}
]
},
/* ---------------- 2.7 ---------------- */
{
id:"2.7", name:"Compare and contrast internet connection types and network types",
notes:`
<h2>Internet connection types</h2>
<table>
<tr><th>Type</th><th>Medium</th><th>Key traits</th></tr>
<tr><td><b>Fibre</b></td><td>Optical</td><td>Fastest, symmetric speeds possible, terminated by an ONT</td></tr>
<tr><td><b>Cable</b></td><td>Coax (DOCSIS)</td><td>Fast; bandwidth shared with the neighbourhood segment</td></tr>
<tr><td><b>DSL</b></td><td>Telephone line</td><td>Speed degrades with distance from the exchange/cabinet</td></tr>
<tr><td><b>Satellite</b></td><td>Radio to orbit</td><td>Available anywhere; <b>high latency</b>; weather-affected (rain fade)</td></tr>
<tr><td><b>Cellular</b></td><td>4G/5G radio</td><td>Mobile or fixed-wireless broadband via SIM router</td></tr>
<tr><td><b>WISP</b></td><td>Fixed wireless</td><td>Wireless ISP — antenna on the property to a local mast; rural broadband option</td></tr>
</table>
<div class="callout"><b>Exam angle:</b> remote farm, no cables, needs internet → satellite or WISP. Latency-sensitive (gaming/VoIP) → satellite is the WRONG answer. "Speed depends on distance from exchange" → DSL. "Shared with neighbours" → cable.</div>

<h2>Symmetric vs asymmetric — and why it matters</h2>
<ul>
<li><b>Asymmetric</b> — faster download than upload (typical home cable/DSL). Fine for browsing and streaming.</li>
<li><b>Symmetric</b> — equal up/down (common on fibre and business leased lines). Needed for hosting, video conferencing uplink, VPN-heavy work.</li>
<li>Satellite may advertise high download Mbps but still fails real-time apps due to <b>latency</b>, not bandwidth alone.</li>
</ul>

<h2>Fibre delivery methods</h2>
<table>
<tr><th>Type</th><th>What it means</th><th>Speed note</th></tr>
<tr><td><b>FTTP / FTTH</b></td><td>Fibre all the way to the premises</td><td>Fastest, most consistent</td></tr>
<tr><td><b>FTTC</b></td><td>Fibre to the cabinet, copper last mile</td><td>Good; speed drops with copper length</td></tr>
<tr><td><b>FTTN</b></td><td>Fibre to the node/neighbourhood</td><td>More variable than FTTP</td></tr>
</table>

<h2>Pick the connection — scenario cheat sheet</h2>
<ul>
<li><b>Rural property, no wires</b> — WISP antenna or satellite; WISP if a local mast exists.</li>
<li><b>Temporary shop / event</b> — cellular 4G/5G router (fastest deploy).</li>
<li><b>Business needs symmetric 1 Gbps</b> — fibre leased line / FTTP business circuit.</li>
<li><b>Home user far from exchange, copper phone line only</b> — DSL (speed limited by distance).</li>
</ul>

<h2>Network types</h2>
<ul>
<li><b>PAN</b> — personal area network: Bluetooth-scale, around one person.</li>
<li><b>LAN</b> — local area network: one building/site.</li>
<li><b>WLAN</b> — a LAN delivered wirelessly (WiFi).</li>
<li><b>MAN</b> — metropolitan: city-scale, linking sites across a metro area.</li>
<li><b>WAN</b> — wide area: country/global scale; the internet is the biggest WAN.</li>
<li><b>SAN</b> — storage area network: dedicated high-speed network giving servers block-level access to storage arrays.</li>
</ul>
<div class="keyfact"><b>PAN vs LAN vs MAN vs WAN:</b> Bluetooth around you = PAN · one site = LAN · city = MAN · internet/global = WAN. SAN is storage fabric, not general office LAN.</div>
`,

{q:"Which internet connection's speed degrades with the customer's distance from the exchange or street cabinet?", o:["Cable","DSL","Satellite","Fibre"], a:1, e:"DSL runs over copper phone lines; signal attenuation over distance directly limits attainable speed."},

{
id:"2.8", name:"Given a scenario, use networking tools",
notes:`
<h2>The toolkit — match tool to job</h2>
<table>
<tr><th>Tool</th><th>Use it when…</th></tr>
<tr><td><b>Cable stripper</b></td><td>Removing the outer jacket before terminating a cable</td></tr>
<tr><td><b>Crimper</b></td><td>Attaching an RJ45 plug to the end of a cable (patch lead making)</td></tr>
<tr><td><b>Punchdown tool</b></td><td>Terminating wires into a patch panel or keystone jack (110 block) — cuts and seats in one press</td></tr>
<tr><td><b>Cable tester</b></td><td>Verifying a terminated run: continuity, wiring order/wire map, opens, shorts, split pairs</td></tr>
<tr><td><b>Toner probe</b> (tone generator + probe)</td><td>Identifying/tracing which cable is which among many — find the unlabeled run in the comms cabinet</td></tr>
<tr><td><b>Loopback plug</b></td><td>Testing a network PORT (NIC or switch port) by looping its transmit back to receive</td></tr>
<tr><td><b>Network tap</b></td><td>Passively copying traffic on a link for monitoring/analysis without interrupting it</td></tr>
<tr><td><b>WiFi analyzer</b></td><td>Surveying wireless: signal strength, channel usage/overlap, finding interference and dead spots</td></tr>
</table>
<div class="callout"><b>Exam angle:</b> the scenario wording maps directly: "which cable in the bundle is it?" → toner probe. "Is this cable wired correctly?" → cable tester. "Is the NIC faulty?" → loopback plug. "Terminate into the patch panel" → punchdown. "Make a patch lead" → stripper + crimper. "Neighbouring WiFi interfering?" → WiFi analyzer. "Capture traffic for analysis" → tap.</div>

<h2>Software diagnostics — the command-line toolkit</h2>
<table>
<tr><th>Tool</th><th>Platform</th><th>Use it when…</th></tr>
<tr><td><b>ping</b></td><td>All</td><td>Test basic IP reachability to a host (ICMP)</td></tr>
<tr><td><b>tracert / traceroute</b></td><td>Win / Linux</td><td>See each hop a packet takes — locate where routing breaks</td></tr>
<tr><td><b>ipconfig / ifconfig / ip a</b></td><td>Win / Linux</td><td>View IP address, mask, gateway, DNS — spot APIPA 169.254.x.x</td></tr>
<tr><td><b>nslookup / dig</b></td><td>Win / Linux</td><td>Test DNS resolution directly — ping IP works but names fail</td></tr>
<tr><td><b>netstat</b></td><td>All</td><td>List open ports and active connections on the local machine</td></tr>
<tr><td><b>arp -a</b></td><td>All</td><td>View the ARP cache — IP-to-MAC mappings on the LAN</td></tr>
</table>
<div class="keyfact"><b>Classic pattern:</b> ping 8.8.8.8 works, ping google.com fails → DNS problem (nslookup), not the gateway or NIC.</div>

<h2>Cable tester vs certifier</h2>
<ul>
<li><b>Basic cable tester</b> — continuity, wire map, opens/shorts. Enough for most field work.</li>
<li><b>Cable certifier</b> — measures performance to Cat 5e/6/6a standards (length, crosstalk, attenuation). Required for warranty installs and datacentre work.</li>
</ul>

<h2>Termination standards</h2>
<ul>
<li><b>T568A and T568B</b> wiring orders — use the same standard at both ends for a straight-through cable. Mixed A/B ends make a (legacy) crossover cable. B is the common commercial default.</li>
</ul>

<h2>Protocol analyzer and advanced CLI</h2>
<ul>
<li><b>Protocol analyzer / packet sniffer</b> (Wireshark) — captures and decodes frames/packets on a link; used for deep troubleshooting and security analysis. Often fed by a SPAN/mirror port or network tap.</li>
<li><b>pathping / mtr</b> — combines ping and traceroute with per-hop loss stats — find flaky routes.</li>
</ul>

<h2>Diagnostic workflow — symptom to tool</h2>
<table>
<tr><th>Symptom</th><th>Tool / command first</th></tr>
<tr><td>No IP / 169.254.x.x</td><td>ipconfig — check DHCP; verify scope/server</td></tr>
<tr><td>IP works, names fail</td><td>nslookup / dig — DNS</td></tr>
<tr><td>Can't reach any external IP</td><td>ping gateway, then ping 8.8.8.8 — local vs ISP</td></tr>
<tr><td>Intermittent drops on one cable run</td><td>Cable tester — opens/shorts</td></tr>
<tr><td>Which cable in the bundle?</td><td>Toner probe</td></tr>
<tr><td>Suspect NIC port hardware</td><td>Loopback plug</td></tr>
<tr><td>WiFi slow / dead zones</td><td>WiFi analyzer — channel overlap, signal</td></tr>
<tr><td>Need to inspect packet contents</td><td>Protocol analyzer + tap or mirror port</td></tr>
</table>

<h2>Scenario pick-list</h2>
<ul>
<li><b>Made patch cable, verify wire map</b> → cable tester after crimper.</li>
<li><b>Terminate to patch panel</b> → punchdown tool.</li>
<li><b>Monitor link between switches secretly</b> → network tap.</li>
<li><b>Neighbours on channel 6, office also on 6, overlapping 4 and 8</b> → move to 1 or 11.</li>
<li><b>ping google.com fails, ping 8.8.8.8 works</b> → nslookup DNS, not replace NIC.</li>
</ul>
`,
quiz:[
{q:"A technician must find which of forty unlabeled cables in a patch cabinet runs to a specific wall socket. Which tool?", o:["Cable tester","Toner probe","Loopback plug","Crimper"], a:1, e:"Attach the tone generator at the wall socket and sweep the probe across the bundle — the cable carrying the tone sings out. Tracing/identification is the toner probe's whole job."},
{q:"Which tool terminates individual wires into a patch panel's 110 block?", o:["Crimper","Punchdown tool","Cable stripper","Multimeter"], a:1, e:"The punchdown tool presses each conductor into the insulation-displacement contact and trims the excess. Crimpers are for RJ45 plugs, not panels."},
{q:"After making a patch lead, the technician wants to confirm all eight conductors are connected in the right order with no shorts. Which tool?", o:["Toner probe","Cable tester","WiFi analyzer","Loopback plug"], a:1, e:"A cable tester checks continuity and wire map — revealing opens, shorts, miswires, and split pairs across the terminated cable."},
{q:"A NIC is suspected of being faulty. Which tool lets the technician test the port by routing its transmitted signal back into its receiver?", o:["Network tap","Loopback plug","Tone generator","Punchdown tool"], a:1, e:"A loopback plug wires TX to RX so the interface hears its own transmissions — diagnostics can then verify the port hardware in isolation."},
{q:"Security needs to monitor all traffic on a link between two switches without interrupting or altering it. Which device fits?", o:["A hub inserted inline","A network tap","A proxy server","An SNMP trap"], a:1, e:"A network tap passively copies link traffic to a monitoring port. (Hubs were the old hack; taps are purpose-built and don't degrade the link.)"},
{q:"Users report dead spots and slow WiFi. The technician walks the floor viewing per-channel signal strength and neighbouring networks. What are they using?", o:["A toner probe","A WiFi analyzer","A spectrum-managed switch","A loopback survey"], a:1, e:"WiFi analyzers survey signal strength, channel occupancy, and interference — the data needed to reposition APs and pick clear channels."},
{q:"Which two tools, in order, are used to make a custom-length Ethernet patch cable?", o:["Punchdown tool, then tester","Cable stripper, then crimper","Crimper, then punchdown tool","Toner, then stripper"], a:1, e:"Strip the jacket, arrange conductors to the standard, then crimp the RJ45 plug on. (Then, sensibly, verify with a tester.)"},
{q:"Both ends of a cable are terminated to T568B. What kind of cable is this?", o:["Crossover","Straight-through","Rollover","Split pair"], a:1, e:"Same standard both ends = straight-through, the normal cable. A-one-end/B-other = legacy crossover."},
{q:"A wall port stopped working after office refurbishment. The tester shows pin 3 open at the panel end. What is the MOST likely fix?", o:["Replace the switch","Re-punch the conductors at the patch panel","Replace the PC's NIC","Change the WiFi channel"], a:1, e:"An open on one pin at the panel end points at a disturbed punchdown termination — re-seating the conductors with the punchdown tool is the targeted fix."},
{q:"On a WiFi analyzer, three neighbouring 2.4 GHz networks are on channels 3, 7, and 9, causing overlap with the office AP on channel 6. What should the technician ideally do?", o:["Move the office AP to channel 8","Keep 1/6/11 discipline — pick whichever of 1, 6, or 11 is least occupied","Enable 40 MHz width to power through","Switch the AP to channel 13 permanently"], a:1, e:"Channels 1, 6, and 11 are the only non-overlapping 2.4 GHz choices; picking the cleanest of the three minimises adjacent-channel interference even in a messy environment."}
]
}
]
,mock:[
{q:"A firewall rule must permit secure web traffic and secure remote shell administration only. Which ports are opened?", o:["80 and 23","443 and 22","443 and 23","8080 and 3389"], a:1, e:"Secure web = HTTPS 443; secure shell = SSH 22. 80 and 23 are their insecure counterparts."},
{q:"Users cannot browse by name but can ping 8.8.8.8 successfully. Traffic on which port is MOST likely being blocked?", o:["443","53","67","445"], a:1, e:"Reaching an IP directly but failing name lookups points at DNS — port 53. Connectivity is fine; resolution is broken."},
{q:"Which protocol/port would appear in a capture of a Windows PC saving a file to a departmental share?", o:["FTP/21","SMB/445","IMAP/143","RDP/3389"], a:1, e:"Windows file sharing rides SMB on TCP 445. FTP is generic file transfer, not Windows share access."},
{q:"Why would a network engineer choose TCP rather than UDP for a file transfer protocol?", o:["Lower latency","Guaranteed, ordered, retransmitted delivery so the file arrives intact","Smaller headers","Native encryption"], a:1, e:"Files must arrive complete and correct — TCP's acknowledgements, ordering, and retransmission guarantee that. UDP would happily drop chunks."},
{q:"A VoIP phone, an IP camera, and a wireless AP all draw power through their data cables from the switch. Which standard family enables this?", o:["802.11","802.3af/at/bt","802.1Q","DOCSIS"], a:1, e:"Power over Ethernet is standardised as 802.3af (15 W), at (30 W), and bt (up to ~90 W). 802.1Q is VLAN tagging; DOCSIS is cable broadband."},
{q:"An office suffers frequent 2.4 GHz interference and needs maximum wireless performance in a dense environment of many clients. Which standard is designed for this?", o:["802.11g","802.11ac","802.11ax","802.11b"], a:2, e:"802.11ax (WiFi 6) targets efficiency in dense, congested environments with OFDMA and works across 2.4/5 (and 6 GHz for 6E). ac is 5 GHz-only and older."},
{q:"A client on 802.11ac cannot see a network broadcast at 2.4 GHz only. Why?", o:["ac devices need WPA3","802.11ac operates on 5 GHz only","The SSID must be uppercase","ac requires PoE"], a:1, e:"802.11ac is a 5 GHz-only standard — a 2.4 GHz-only SSID is invisible to a radio operating purely in ac mode."},
{q:"Which technology lets a shop terminal accept a payment from a phone held against it?", o:["RFID at UHF","NFC","Bluetooth pairing","IR"], a:1, e:"Contactless payment uses NFC's few-centimetre range. RFID is the related tagging technology used for inventory and badges."},
{q:"An organisation needs incoming web requests spread across six identical web servers with automatic removal of failed ones. What provides this?", o:["A proxy server","A load balancer","A UTM","Round-robin DNS alone"], a:1, e:"A load balancer distributes requests across a pool and health-checks members, dropping dead servers from rotation — beyond what plain DNS round-robin can do."},
{q:"Which server would a switch be configured to send its event messages to?", o:["A syslog server","An AAA server","A DHCP server","A print server"], a:0, e:"Network devices export logs to a central syslog collector for retention and analysis."},
{q:"When a user connects to office WiFi, their username and password are checked against a central RADIUS server. Which service model is in use?", o:["SCADA","AAA","SDN","NAT"], a:1, e:"RADIUS implements Authentication, Authorization, and Accounting — centralised network access control."},
{q:"A PC shows IP 169.254.100.20, subnet 255.255.0.0. Which is the FIRST thing to investigate?", o:["The PC's DNS settings","Whether the DHCP server is reachable/functioning","The default gateway address","Whether IPv6 is enabled"], a:1, e:"An APIPA address means DHCP never answered — check the DHCP service and the path to it before anything else."},
{q:"Which address is usable as a PUBLIC internet address?", o:["10.44.2.9","172.30.1.5","192.168.200.1","172.32.1.5"], a:3, e:"Private ranges are 10/8, 172.16–172.31, and 192.168/16. 172.32.x.x falls just outside the class B private block, so it's public."},
{q:"A technician configuring a server manually sets IP, mask, gateway, and DNS. Which risk does this method carry that DHCP avoids?", o:["Longer lease times","Duplicate address conflicts from human error","APIPA fallback","Slower network speeds"], a:1, e:"Static assignment depends on accurate human record-keeping; assigning an in-use address causes a conflict. DHCP tracks leases automatically."},
{q:"Which IPv6 address type is automatically present on every interface and only valid on the local segment?", o:["Global unicast","Link-local (fe80::)","Loopback","Anycast"], a:1, e:"Every IPv6 interface self-configures an fe80:: link-local address used for neighbour communication on that segment only."},
{q:"A company's outbound mail is being spoofed. They publish DNS records so receivers can verify a cryptographic signature on genuine messages. Which mechanism is this?", o:["SPF","DKIM","DMARC","MX priority"], a:1, e:"DKIM signs outgoing mail; the public key sits in DNS. SPF lists permitted senders; DMARC sets the failure policy."},
{q:"After implementing SPF and DKIM, what should be published so receiving servers REJECT failing mail and send reports?", o:["A PTR record","A DMARC policy record","A second MX record","An AAAA record"], a:1, e:"DMARC (in a TXT record) instructs receivers what action to take on failures — p=reject — and where to send aggregate reports."},
{q:"Accounts, VoIP phones, and guest devices must be isolated from each other on shared switches, with firewalling between them. Which two things are needed?", o:["Unmanaged switches and a hub","VLANs on managed switches, routed through a layer-3 device","Three separate ISPs","APIPA and NAT"], a:1, e:"VLANs create the isolated segments; a router/L3 switch carries (and polices) traffic between them. Unmanaged switches can't do VLANs."},
{q:"Which DHCP feature ensures the CEO's desk phone always receives 10.0.20.50 without configuring the phone itself?", o:["A shorter lease","A reservation bound to the phone's MAC","A larger scope","An exclusion range"], a:1, e:"Reservations map a MAC address to a fixed IP within DHCP — device untouched, address guaranteed."},
{q:"Employees working from home appear 'inside' the office network, with all traffic encrypted across the internet. What is providing this?", o:["A proxy","A remote-access VPN","Port forwarding","A WISP"], a:1, e:"Remote-access VPN tunnels encrypt the client's traffic to the office and assign it presence on the private network."},
{q:"An online gamer on satellite broadband complains of constant lag despite good download speeds. What explains this?", o:["Satellite is half-duplex","Geostationary round-trip distance imposes high latency","DNS is slower over satellite","Their VPN is misconfigured"], a:1, e:"Signals travelling to geostationary orbit and back add hundreds of milliseconds regardless of bandwidth — fatal for real-time gaming, irrelevant for downloads."},
{q:"Which pairing of network type to scale is CORRECT?", o:["PAN — city-wide","MAN — around one person","SAN — dedicated storage network for servers","WAN — single office floor"], a:2, e:"SAN = storage area network giving servers block-level storage access. PAN is personal-scale, MAN is metropolitan, WAN is wide/global."},
{q:"A technician terminates a new run into a keystone jack, then must confirm the wiring order end-to-end. Which tools, in order, are used?", o:["Crimper, then toner probe","Punchdown tool, then cable tester","Cable stripper, then loopback plug","Toner probe, then crimper"], a:1, e:"Keystone jacks and panels are terminated with a punchdown tool; a cable tester then verifies the wire map and continuity."},
{q:"During a wireless survey, the technician needs to know which 5 GHz channels neighbouring networks occupy before choosing the AP's channel. Which tool provides this?", o:["Network tap","Cable certifier","WiFi analyzer","Loopback plug"], a:2, e:"A WiFi analyzer displays surrounding SSIDs, their channels, and signal strengths — exactly the data channel planning needs."},

/* ---------------- 3.1 ---------------- */
{
id:"3.1", name:"Explain basic cable types and their connectors, features, and purposes",
notes:`
<h2>Network cable — twisted pair</h2>
<table>
<tr><th>Category</th><th>Rated speed</th><th>Notes</th></tr>
<tr><td>Cat 5</td><td>100 Mbps</td><td>Legacy</td></tr>
<tr><td>Cat 5e</td><td>1 Gbps</td><td>Minimum modern standard</td></tr>
<tr><td>Cat 6</td><td>10 Gbps to 55 m (1 Gbps to 100 m)</td><td>Tighter twists, often a spline</td></tr>
<tr><td>Cat 6a</td><td>10 Gbps to full 100 m</td><td>The 10-gig answer</td></tr>
</table>
<ul>
<li><b>UTP vs STP:</b> unshielded (standard) vs shielded twisted pair — shielding for electrically noisy environments (factories, near motors/fluorescents).</li>
<li><b>Plenum-rated</b> cable has a fire-retardant, low-smoke jacket — <b>required in air-handling spaces</b> (above suspended ceilings, ducts). Non-plenum = PVC/riser.</li>
<li><b>Direct burial</b> — gel-filled/armoured jacket for underground outdoor runs.</li>
<li>Twisted pair connectors: <b>RJ45</b> (8P8C, Ethernet), <b>RJ11</b> (6P2C/4C, telephone/DSL). Terminated to <b>T568A/B</b>.</li>
<li>Copper Ethernet distance limit: <b>100 m</b> per run.</li>
</ul>

<h2>Coaxial</h2>
<ul>
<li><b>RG-6</b> coax with a screw-on <b>F-type connector</b> — cable broadband and TV. (BNC = legacy/CCTV bayonet connector.)</li>
</ul>

<h2>Fibre optic</h2>
<ul>
<li><b>Single-mode</b> — laser, tiny core, very long distance (km–tens of km). <b>Multimode</b> — LED, wider core, shorter runs (building/campus).</li>
<li>Immune to EMI; the answer for long distance or electrically hostile paths.</li>
<li>Connectors: <b>SC</b> (square, push-pull — "stick and click"), <b>ST</b> (round bayonet — "stick and twist"), <b>LC</b> (small, "little connector", common on SFP modules).</li>
</ul>

<h2>Storage cables</h2>
<ul>
<li><b>SATA</b> — thin 7-pin data cable + 15-pin power; one drive per port; SATA III ≈ 6 Gb/s. <b>eSATA</b> — external variant.</li>
<li><b>IDE/PATA</b> — legacy 40/80-wire ribbon, two drives per cable (master/slave jumpers), Molex power.</li>
<li><b>SCSI</b> — legacy server bus supporting chains of devices with IDs and termination; lives on conceptually in SAS (serial attached SCSI).</li>
</ul>

<h2>Video cables</h2>
<table>
<tr><th>Cable</th><th>Signal</th><th>Notes</th></tr>
<tr><td><b>VGA</b></td><td>Analogue</td><td>Blue DE-15; degrades over distance; legacy</td></tr>
<tr><td><b>DVI</b></td><td>Digital (DVI-D) / +analogue (DVI-I)</td><td>Video only, no audio</td></tr>
<tr><td><b>HDMI</b></td><td>Digital</td><td>Video + audio; TVs and monitors</td></tr>
<tr><td><b>DisplayPort</b></td><td>Digital</td><td>Video + audio; PC-oriented, locking tab, daisy-chaining (MST)</td></tr>
</table>

<h2>USB and adapters</h2>
<table>
<tr><th>Standard</th><th>Marketing name</th><th>Max speed</th></tr>
<tr><td>USB 2.0</td><td>Hi-Speed</td><td>480 Mbps</td></tr>
<tr><td>USB 3.0 / 3.1 Gen 1 / 3.2 Gen 1</td><td>SuperSpeed</td><td>5 Gbps</td></tr>
<tr><td>USB 3.1 Gen 2 / 3.2 Gen 2</td><td>SuperSpeed+ (10 Gbps)</td><td>10 Gbps</td></tr>
<tr><td>USB 3.2 Gen 2x2</td><td>SuperSpeed 20 Gbps</td><td>20 Gbps</td></tr>
<tr><td>USB4 / Thunderbolt 3+4</td><td>—</td><td>40 Gbps (USB-C connector; Thunderbolt also tunnels PCIe/DisplayPort)</td></tr>
</table>
<ul>
<li>USB 2.0 cable length limit ~5 m; USB 3.x ~3 m. Blue ports/connectors indicate USB 3.x.</li>
<li>Passive adapters convert compatible signals: DVI↔HDMI (both digital). VGA↔digital requires an <b>active</b> converter.</li>
<li><b>Serial DB9 (RS-232)</b> — legacy console/management connector.</li>
</ul>

<h2>Connector roundup — the full objectives list</h2>
<ul>
<li><b>RJ45</b> Ethernet · <b>RJ11</b> phone/DSL · <b>F-type</b> coax · <b>ST/SC/LC</b> fibre · <b>punchdown block</b> (110 panel/keystone terminations — tool in 2.8) · <b>USB-C / microUSB / miniUSB</b> · <b>Lightning</b> · <b>Molex</b> (legacy 4-pin peripheral power) · <b>DB9</b> serial.</li>
</ul>

<h2>Scenario pick-list — match cable to the job</h2>
<table>
<tr><th>Scenario</th><th>Best choice</th><th>Why</th></tr>
<tr><td>10 Gbps to full 100 m in a drop ceiling (air-handling)</td><td>Cat 6a plenum</td><td>Full copper distance + fire code for plenum spaces</td></tr>
<tr><td>Factory floor with welders and motors</td><td>STP or fibre</td><td>EMI shielding or immunity</td></tr>
<tr><td>5 km between buildings</td><td>Single-mode fibre (LC/SC)</td><td>Copper stops at 100 m</td></tr>
<tr><td>Cable modem in a home</td><td>RG-6 with F-type</td><td>Coax broadband standard</td></tr>
<tr><td>Laptop HDMI to legacy VGA projector</td><td>Active HDMI→VGA converter</td><td>Analogue/digital conversion needs electronics</td></tr>
<tr><td>Two monitors from one PC DisplayPort output</td><td>DisplayPort daisy-chain (MST)</td><td>HDMI cannot chain monitors the same way</td></tr>
<tr><td>External SSD on a phone/laptop</td><td>USB-C (check USB 3.x/Thunderbolt)</td><td>Same connector shape ≠ same speed/features</td></tr>
</table>
<div class="keyfact"><b>Passive vs active:</b> DVI-D ↔ HDMI = passive OK (both digital video). VGA ↔ anything digital = active converter required. Exam loves "cheap passive cable didn't work" → wrong signal type.</div>
`,
quiz:[
{q:"A cable run must pass through the air-handling space above a suspended ceiling. Which cable is required?", o:["Direct burial Cat 6","Plenum-rated Cat 6","Standard PVC Cat 5e","Shielded riser cable"], a:1, e:"Plenum spaces carry breathable air, so fire code requires plenum-rated jackets that resist burning and emit minimal toxic smoke."},

{
id:"3.2", name:"Given a scenario, install the appropriate RAM",
notes:`
<h2>Form factors and generations</h2>
<ul>
<li><b>DIMM</b> (desktop) vs <b>SODIMM</b> (laptop/small form factor). Same generations, different sizes.</li>
<li><b>DDR3 → DDR4 → DDR5:</b> each generation raises speed and lowers voltage; each is <b>keyed differently and incompatible</b> with other generations' slots.</li>
<li>Module speed labels: e.g. DDR4-3200 = 3200 MT/s. Mixed speeds run at the slowest module's speed.</li>
</ul>

<h2>Channels</h2>
<ul>
<li><b>Single / dual / triple / quad channel:</b> the memory controller reads multiple modules in parallel, multiplying bandwidth.</li>
<li>To enable dual channel: install matched modules in the <b>correct paired slots</b> (usually colour-coded / slots 2+4 — check the board manual).</li>
<li>Classic scenario: two sticks installed side-by-side in slots 1+2 run single channel — move one for the free performance.</li>
</ul>

<h2>ECC and registered memory</h2>
<ul>
<li><b>ECC (error-correcting code)</b> RAM detects and corrects single-bit memory errors — used in <b>servers and workstations</b> where corruption is unacceptable. Requires CPU/board support.</li>
<li>Non-ECC is standard for desktops/laptops. (Registered/buffered modules are the server variant that eases load on the controller.)</li>
</ul>

<h2>Virtual memory / swap</h2>
<ul>
<li>When physical RAM fills, the OS pages less-used data to a <b>page file/swap partition</b> on disk.</li>
<li>Disk is orders of magnitude slower than RAM — heavy paging = system-wide crawl and constant disk activity. The hardware fix is <b>more RAM</b>.</li>
</ul>

<h2>Installation procedure — do not skip steps</h2>
<ol>
<li><b>Power off</b> and unplug; discharge static (wrist strap or touch grounded metal).</li>
<li>Confirm <b>form factor</b> (DIMM vs SODIMM) and <b>DDR generation</b> match the board manual.</li>
<li>Open retention clips; align the module's <b>key notch</b> with the slot — it fits one way only.</li>
<li>Insert at ~30° angle, press down until clips <b>snap closed</b> on both ends.</li>
<li>For dual/quad channel: populate <b>matched pairs/sets</b> in the slots the manual specifies — not "any free slots".</li>
<li>First boot: verify total capacity in BIOS/UEFI and OS; run a memory test if POST fails or capacity is wrong.</li>
</ol>

<h2>Dual-channel pairing — typical four-slot desktop board</h2>
<table>
<tr><th>Goal</th><th>Two modules (8 GB × 2)</th><th>Four modules (8 GB × 4)</th></tr>
<tr><td>Enable dual channel</td><td>Slots <b>A2 + B2</b> (often 2 and 4 — check manual; colour pairs)</td><td>All four slots with matched kit → dual channel</td></tr>
<tr><td>Common mistake</td><td>Slots 1 + 2 adjacent → often <b>single channel</b></td><td>Mixing unmatched sizes → flex mode, runs at slowest speed</td></tr>
<tr><td>Bandwidth result</td><td>~2× memory bandwidth vs one stick</td><td>Quad-channel boards (HEDT/server) need four matched sticks in designated slots</td></tr>
</table>

<h2>Capacity planning — how much RAM?</h2>
<ul>
<li><b>4 GB</b> — bare minimum (Windows 11 floor); constant paging on modern workloads.</li>
<li><b>8 GB</b> — light office/web; struggles with many tabs + video calls.</li>
<li><b>16 GB</b> — mainstream desktop/laptop sweet spot for most users.</li>
<li><b>32 GB+</b> — VMs, video editing, CAD, development, servers.</li>
<li>32-bit OS caps at ~4 GB usable regardless of installed RAM — always match OS bitness to workload.</li>
</ul>

<div class="keyfact"><b>Three RAM traps:</b> (1) DDR generations are keyed differently — won't seat = wrong generation. (2) Two sticks in wrong slots = single-channel bandwidth. (3) "Disk light always on, PC crawls" = paging → add RAM, not faster disk first.</div>
<div class="callout"><b>Exam angle:</b> "system slows dramatically with many apps open, disk light constantly on" → RAM exhausted, paging to disk → add RAM. "Server must detect and correct memory errors" → ECC. "Two modules but bandwidth of one" → wrong slots for dual channel.</div>
`,
quiz:[
{q:"A financial database server must detect and automatically correct single-bit memory errors. Which RAM is required?", o:["DDR5 non-ECC","ECC memory","SODIMM","Dual-channel gaming RAM"], a:1, e:"ECC RAM adds error-correcting circuitry to detect and fix single-bit errors on the fly — the server-grade requirement where silent corruption is unacceptable."},
{q:"A user fits a DDR4 DIMM into a DDR3 motherboard slot and it will not seat. Why?", o:["The module needs to go in backwards","DDR generations use different key notch positions and are incompatible","The slot needs its retention clips replaced","DDR4 only comes as SODIMM"], a:1, e:"Each DDR generation is physically keyed differently, preventing electrically incompatible modules being forced in. The board dictates the generation."},
{q:"Two identical 8 GB modules are installed in adjacent slots 1 and 2 of a four-slot board, and memory bandwidth tests at single-channel speed. What should the technician do?", o:["Update the BIOS","Move one module to the paired slot per the motherboard manual (typically 2 and 4)","Replace both modules with one 16 GB stick","Enable channel mode in Windows"], a:1, e:"Dual channel requires modules in the correct paired slots (usually matching colours). Adjacent slots are often on the same channel."},
{q:"A PC with 8 GB RAM slows to a crawl with constant disk activity when the user opens many applications. What is happening and what is the hardware fix?", o:["The CPU is thermal throttling; add a fan","RAM is exhausted and the OS is paging to disk; add more RAM","The SSD has failed; replace it","The page file is disabled; enable it"], a:1, e:"When physical memory fills, the OS swaps pages to the much slower disk — grinding performance with heavy disk I/O. More RAM removes the pressure."},
{q:"What happens if a DDR4-3200 module and a DDR4-2400 module are installed together?", o:["The system will not POST","Both run at 2400 — the slowest module's speed","Both run at 3200","Each runs at its own speed"], a:1, e:"Mixed-speed modules of the same generation typically work, but the memory clock drops to the slowest module."},
{q:"Which memory form factor is installed in a mini-ITX desktop that uses laptop-style memory to save space?", o:["Full DIMM","SODIMM","SIMM","CAMM"], a:1, e:"Compact systems (some mini-ITX boards, NUCs, all-in-ones) frequently use SODIMM slots to save board space — same DDR generation, smaller module."},
{q:"Compared with DDR4, DDR5 generally offers what?", o:["Higher speeds at lower voltage","Lower speeds but ECC as standard on desktops","Compatibility with DDR4 slots","Analogue signalling"], a:0, e:"Each DDR generation raises transfer rates and reduces operating voltage. Slots remain incompatible across generations."},
{q:"Where does the operating system place data when physical RAM is full?", o:["In the CPU cache","In the page file / swap space on storage","In VRAM","In the BIOS chip"], a:1, e:"Virtual memory extends RAM onto disk via the page file (Windows) or swap (Linux) — functional but drastically slower."},
{q:"A technician wants maximum memory bandwidth on a workstation board supporting quad channel. What should they install?", o:["One large module","Two modules in slots 1 and 2","Four matched modules in the designated slots","Any modules; channels configure automatically"], a:2, e:"Quad channel needs four (ideally matched) modules populated per the board manual so the controller can interleave across all channels."},
{q:"Which statement about ECC memory is TRUE?", o:["It works in any desktop board","It requires platform (CPU/motherboard) support","It is faster than non-ECC RAM","It is only available as SODIMM"], a:1, e:"ECC needs support from the memory controller and board — typically server/workstation platforms. It trades a little speed for integrity."}
]
},
