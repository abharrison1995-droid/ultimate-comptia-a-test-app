{
id:"1.6", name:"Configure Microsoft Windows networking features on a client/desktop",
notes:`
<h2>Workgroup vs domain setup</h2>
<ul>
<li><b>Shared resources:</b> file shares (<code>\\\\server\\share</code>), network printers, file servers. Map drives via File Explorer or <code>net use</code>; <b>mapped drives</b> give a letter to a share.</li>
<li>Domain networks centralise shares/printers via servers and Group Policy deployment; workgroups share peer-to-peer with local accounts.</li>
</ul>

<h2>Public vs private network profiles</h2>
<ul>
<li><b>Private</b> — trusted (home/office): device is discoverable, file/printer sharing allowed.</li>
<li><b>Public</b> — untrusted (café/airport): discovery and sharing OFF, firewall at its strictest. The first-choice for any unknown network. Classic symptom: "can't see other machines on the LAN" → profile set to Public.</li>
</ul>

<h2>Local firewall settings</h2>
<ul>
<li>Windows Defender Firewall filters per profile (domain/private/public). Configure <b>app exceptions</b> ("allow an app through") and port rules (Advanced Security for inbound/outbound rules). Disable only for diagnosis, then re-enable.</li>
</ul>

<h2>Client IP configuration</h2>
<ul>
<li>Per adapter: IP address, <b>subnet mask</b>, <b>gateway</b>, <b>DNS</b> — dynamic (DHCP, the default) or static (servers/printers/special cases). Set in adapter Properties → IPv4, or Settings → Network.</li>
<li>Wrong gateway → local LAN works, internet doesn't. Wrong DNS → IPs work, names don't. Wrong mask → some hosts unreachable.</li>
</ul>

<h2>Establishing connections</h2>
<ul>
<li><b>Wired</b> — plug in; auto-negotiates. <b>Wireless</b> — select SSID, authenticate (WPA2/3). <b>WWAN</b> — cellular modem/SIM built into the laptop.</li>
<li><b>VPN</b> — add via Settings → Network & Internet → VPN (built-in client) or vendor software; encrypts traffic to the corporate network.</li>
<li><b>Proxy</b> — Settings → Network & Internet → Proxy (or Internet Options): route web traffic via an intermediary server; wrong proxy = "browser can't reach anything though the network is fine".</li>
<li><b>Metered connections</b> — flag a network as pay-per-use to defer big downloads.</li>
</ul>

<h2>Client network triage</h2>
<table>
<tr><th>Symptom</th><th>Likely client setting</th></tr>
<tr><td>Can't see other PCs / share on home WiFi shown as Public</td><td>Switch profile to <b>Private</b></td></tr>
<tr><td>Café / airport WiFi</td><td>Keep <b>Public</b></td></tr>
<tr><td>LAN works; internet dead; blank gateway</td><td>Fix default gateway / DHCP</td></tr>
<tr><td>IP works; names fail</td><td>DNS servers</td></tr>
<tr><td>Browser only fails; "proxy refused"</td><td>Proxy settings</td></tr>
<tr><td>Local service unreachable from LAN</td><td>Firewall inbound exception</td></tr>
<tr><td>Need encrypted tunnel to HQ</td><td>VPN connection</td></tr>
<tr><td>Map S: permanently</td><td>Map drive / <code>net use … /persistent:yes</code></td></tr>
</table>
<div class="keyfact"><b>Public vs Private:</b> Public = no discovery/sharing (untrusted). Private = discoverable/shareable (trusted home/office). Wrong profile is the classic "I can't see the printer" fix.</div>
`,
quiz:[
{q:"A user at home cannot see any other devices under Network in File Explorer, and nobody can reach their shares. Their WiFi shows 'Public network'. What is the fix?", o:["Reinstall the NIC driver","Change the network profile to Private","Disable the firewall permanently","Enable DHCP"], a:1, e:"The Public profile disables discovery and sharing by design. Switching the trusted home network to Private restores visibility and sharing."},
{q:"Which profile should a laptop use on airport WiFi, and why?", o:["Private, for speed","Public — discovery and sharing off, strictest firewall stance","Domain — for authentication","Metered — for security"], a:1, e:"Unknown networks are untrusted: Public hides the device from the local network and locks sharing down."},
{q:"A PC can print and reach local file servers but cannot access any website by name OR IP. Local IP config shows a blank default gateway. What is wrong?", o:["DNS failure","The gateway is missing, so no traffic can leave the subnet","The proxy is misconfigured","The firewall blocks port 80"], a:1, e:"No default gateway means no route off the local subnet — local resources fine, everything beyond unreachable. Fix the gateway entry (or DHCP)."},
{q:"Websites fail by name but load by IP address. Which client setting is the culprit?", o:["Subnet mask","DNS server configuration","Gateway","WINS"], a:1, e:"Name resolution failing while IP connectivity works isolates DNS — verify the adapter's DNS servers."},
{q:"The browser reports 'proxy server refusing connections' on every site, though ping and other apps work. Where does the technician look?", o:["The hosts file","Proxy settings (Settings → Network & Internet → Proxy / Internet Options)","The default gateway","Airplane mode"], a:1, e:"Web-only failure with a proxy error means a wrong/stale proxy configuration — often left over from malware or a departed network."},
{q:"A user needs the S: drive to point at \\\\finance\\reports permanently. Which TWO methods work?", o:["ipconfig /assign and gpresult","Map network drive in File Explorer, or net use S: \\\\finance\\reports /persistent:yes","robocopy and diskpart","Both must be done on the server"], a:1, e:"Drive mapping is done via File Explorer's Map network drive or the net use command (persistent flag survives reboots); domains often push it via Group Policy."},

id:"1.7", name:"Apply application installation and configuration concepts",
notes:`
<h2>System requirements to check BEFORE installing</h2>
<ul>
<li><b>32-bit vs 64-bit app:</b> a <b>64-bit OS runs both</b> 32-bit and 64-bit applications (32-bit apps go to <code>Program Files (x86)</code>); a <b>32-bit OS cannot run 64-bit apps</b> — and can't use more than ~4 GB RAM.</li>
<li><b>Graphics:</b> dedicated GPU vs integrated; minimum <b>VRAM</b> for CAD/video/games.</li>
<li><b>RAM and CPU</b> minimums; <b>storage</b> for install + working space.</li>
<li><b>External hardware tokens</b> — some pro software licenses via a USB dongle that must be present to run.</li>
</ul>

<h2>OS requirements</h2>
<ul>
<li>Application-to-OS compatibility: supported OS versions/builds; check the vendor matrix before upgrading Windows too — the app must support the destination OS.</li>
</ul>

<h2>Distribution methods</h2>
<ul>
<li><b>Physical media</b> (USB/optical) vs <b>downloadable</b> installers.</li>
<li><b>ISO mountable</b> — Windows mounts ISO images natively (double-click) as a virtual drive; no burning needed.</li>
</ul>

<h2>Other considerations — the "think before you install" list</h2>
<ul>
<li><b>Impact to device:</b> resource drain, conflicts, attack surface.</li>
<li><b>Impact to network:</b> bandwidth for downloads/updates (multiply by seat count), licensing servers, chatty apps.</li>
<li><b>Impact to operation:</b> downtime during installation, retraining, workflow changes.</li>
<li><b>Impact to business:</b> licensing costs and compliance, support burden, security/compliance implications. Unlicensed installs = legal risk.</li>
</ul>

<h2>Pre-install checklist</h2>
<ol>
<li>Confirm <b>OS bitness</b> — 32-bit OS cannot run 64-bit apps; 64-bit OS runs both.</li>
<li>Check vendor matrix for <b>OS version</b> support (don't upgrade Windows under unsupported LOB apps).</li>
<li>Size <b>RAM / CPU / GPU+VRAM / storage</b> against minimums.</li>
<li>Note any <b>hardware token/dongle</b> licence requirement.</li>
<li>Plan <b>network</b> impact (bandwidth × seats, licence servers) and <b>operation</b> downtime.</li>
<li>Confirm <b>licensing</b> / business compliance before mass rollout.</li>
</ol>
<div class="keyfact"><b>64↔32 rule:</b> 64-bit Windows runs 32-bit apps (Program Files (x86)). 32-bit Windows never runs 64-bit apps — and can't use more than ~4 GB RAM.</div>
`,
quiz:[
{q:"Can a 32-bit application run on 64-bit Windows?", o:["No, never","Yes — 64-bit Windows runs 32-bit apps (installed to Program Files (x86))","Only in a VM","Only if recompiled"], a:1, e:"64-bit Windows includes WOW64 compatibility for 32-bit applications. The reverse — 64-bit apps on a 32-bit OS — is impossible."},
{q:"A user with 32-bit Windows tries to install a 64-bit-only application. What happens?", o:["It runs slower","It cannot install or run — a 32-bit OS can't execute 64-bit code","It installs to Program Files (x86)","Windows converts it automatically"], a:1, e:"32-bit operating systems cannot run 64-bit binaries at all — the fix is a 64-bit OS (clean install, per 1.1)."},
{q:"Professional audio software requires a USB dongle plugged in to launch. What is this?", o:["A driver loader","An external hardware token used for licensing","A hardware firewall","A TPM extension"], a:1, e:"Hardware tokens/dongles are physical licence keys — the software checks their presence at launch. Lose the dongle, lose the licence."},
{q:"A downloaded application arrives as an .iso file. What is the modern Windows procedure?", o:["Burn it to DVD first","Double-click to mount it as a virtual drive and run the installer","Rename it to .exe","Extract with regedit"], a:1, e:"Windows mounts ISOs natively as virtual optical drives — no burning or third-party tools required."},
{q:"Before rolling one application out to 500 machines, which NETWORK consideration matters most?", o:["Desktop wallpaper policy","Download/update bandwidth at scale and any licence-server traffic","The colour of the installer","Local admin passwords"], a:1, e:"One 2 GB installer times 500 seats is a WAN event; deployment planning (caching, scheduling, licence servers) is the network impact assessment."},
{q:"A department wants to upgrade to Windows 11, but their core line-of-business app's vendor only supports Windows 10. What is the correct call?", o:["Upgrade anyway; it'll probably work","Delay the OS upgrade until the app supports the destination OS (or plan a replacement)","Run the app from an ISO","Install the app twice"], a:1, e:"Application-to-OS compatibility drives upgrade timing — an unsupported critical app means blocked workflows and no vendor support."},
{q:"Which requirement is MOST relevant when assessing a video-editing suite for a laptop?", o:["Sound card brand","Dedicated GPU and sufficient VRAM (plus RAM and fast storage)","Optical drive speed","NFC support"], a:1, e:"Video work is GPU/VRAM- and memory-hungry; integrated graphics below the requirement means the app crawls or won't run."},
{q:"Installing an unlicensed copy of commercial software on company PCs creates which category of impact?", o:["Device impact only","Business impact — legal/compliance exposure and audit risk","Network impact","No impact if it works"], a:1, e:"Licence compliance is a business/legal consideration — software audits and penalties are real; the exam expects licensing under 'impact to business'."},
{q:"Why can't a 32-bit OS make use of 16 GB of installed RAM?", o:["The RAM must be ECC","32-bit addressing caps usable memory at roughly 4 GB","The page file blocks it","BIOS limits it to 8 GB"], a:1, e:"32-bit address space is 2^32 ≈ 4 GB total. More physical RAM is invisible to it — one more reason 64-bit is the default."},
{q:"An installation is planned for a busy reception PC used continuously through the day. Which consideration does scheduling it out-of-hours address?", o:["Impact to network","Impact to operation (downtime disrupting the business function)","Impact to licensing","Impact to VRAM"], a:1, e:"Installation downtime on an operationally critical machine is an 'impact to operation' concern — schedule around the business."}
]
},
/* ---------------- 1.8 ---------------- */
{
id:"1.8", name:"Explain common OS types and their purposes",
notes:`
<h2>Workstation operating systems</h2>
<ul>
<li><b>Windows</b> — dominant business/consumer desktop; broadest app/hardware support.</li>
<li><b>macOS</b> — Apple hardware only; Unix-based; creative/design strongholds.</li>
<li><b>Linux</b> — open-source; many distributions; servers, development, technical desktops.</li>
<li><b>ChromeOS</b> — Google's browser-centric OS on Chromebooks; web/Android apps; cheap, easily managed (education).</li>
</ul>

<h2>Mobile operating systems</h2>
<ul>
<li><b>iOS</b> (iPhone) / <b>iPadOS</b> (iPad — adds tablet multitasking): closed ecosystem, App Store only (traditionally).</li>
<li><b>Android</b> — Google's open-source-based mobile OS; multiple stores/sideloading; heavily customised by vendors.</li>
</ul>

<h2>Filesystem types — memorise the mapping</h2>
<table>
<tr><th>Filesystem</th><th>Used by / for</th><th>Key facts</th></tr>
<tr><td><b>NTFS</b></td><td>Windows system drives</td><td>Permissions, encryption (EFS), compression, journaling, huge files</td></tr>
<tr><td><b>FAT32</b></td><td>Legacy/universal removable</td><td>Max <b>4 GB per file</b>, 32 GB volume (Windows format); no permissions; read everywhere</td></tr>
<tr><td><b>exFAT</b></td><td>Modern flash drives/SD cards</td><td>FAT32 without the size limits; cross-platform; no permissions</td></tr>
<tr><td><b>ext3/ext4</b></td><td>Linux</td><td>Standard Linux journaling filesystems (ext4 current)</td></tr>
<tr><td><b>APFS</b></td><td>macOS</td><td>Apple File System — snapshots, encryption, SSD-optimised</td></tr>
</table>
<div class="callout"><b>Exam tells:</b> "file over 4 GB won't copy to the USB stick" → FAT32 limit → reformat exFAT. "drive needs permissions and encryption" → NTFS. Linux → ext4. Mac → APFS.</div>

<h2>Filesystem pick-list</h2>
<table>
<tr><th>Scenario</th><th>Filesystem</th></tr>
<tr><td>Windows system / boot drive</td><td>NTFS</td></tr>
<tr><td>USB for Win + Mac + camera, large videos</td><td>exFAT</td></tr>
<tr><td>6 GB file won't copy; stick has free space</td><td>Was FAT32 → reformat exFAT</td></tr>
<tr><td>Linux install default</td><td>ext4</td></tr>
<tr><td>Modern Mac system volume</td><td>APFS</td></tr>
<tr><td>Cheap school Chromebook fleet</td><td>ChromeOS</td></tr>
<tr><td>Unpatched forever after vendor drops support</td><td>EOL OS — migrate or isolate</td></tr>
</table>
<div class="keyfact"><b>FAT32 4 GB trap:</b> free space does not matter — a single file over 4 GB fails. Removable media for big files → exFAT.</div>

<h2>Vendor life-cycle and compatibility</h2>
<ul>
<li><b>EOL (end of life):</b> no more security updates → rising risk; plan migration before EOL, isolate anything that must stay (ties to legacy systems, Core 1 2.4).</li>
<li><b>Update limitations:</b> hardware too old for the next version (e.g. Windows 11's TPM floor) strands devices on ageing OSs.</li>
<li><b>Compatibility concerns between OSs:</b> applications are built per-OS; filesystems differ (NTFS is read-only on macOS by default); document formats and network protocols (SMB) are the bridges.</li>
</ul>
`,
quiz:[
{q:"A user cannot copy a 6 GB video file onto a 64 GB USB stick which has plenty of free space. What is the cause and fix?", o:["The stick is fake","FAT32's 4 GB per-file limit — reformat the stick as exFAT (or NTFS)","USB 2.0 is too slow","The file is corrupt"], a:1, e:"FAT32 caps individual files at 4 GB regardless of free space. exFAT removes the limit while staying cross-platform friendly."},
{q:"Which filesystem does Windows require for its system drive, providing permissions, journaling, and encryption support?", o:["FAT32","exFAT","NTFS","ext4"], a:2, e:"NTFS is the Windows system filesystem — security permissions, EFS encryption, compression, journaling."},
{q:"Which filesystem is the current standard on Linux installations?", o:["APFS","ext4","NTFS","ReFS"], a:1, e:"ext4 is the default journaling filesystem on most Linux distributions (successor to ext3)."},
{q:"A school deploys cheap laptops that boot a browser-centric OS managed from the cloud and run web and Android apps. Which OS?", o:["Linux Mint","ChromeOS","iPadOS","Windows SE"], a:1, e:"ChromeOS Chromebooks are the education staple: inexpensive, centrally managed, browser-first with Android app support."},
{q:"What distinguishes iPadOS from iOS?", o:["iPadOS is open source","iPadOS adds tablet-oriented multitasking and features on iPads","iOS supports mice; iPadOS doesn't","They are unrelated codebases"], a:1, e:"iPadOS forked from iOS to add tablet features — multitasking, windowing, better peripheral support — while sharing the ecosystem."},
{q:"Which mobile OS allows installation from multiple app stores and sideloading by design?", o:["iOS","iPadOS","Android","ChromeOS"], a:2, e:"Android permits third-party stores and sideloading; Apple's ecosystem is traditionally locked to the App Store."},
{q:"An organisation still runs Windows 7 on lab machines controlling instruments. What is the primary risk and standard mitigation?", o:["Slow boot; add SSDs","No security updates post-EOL; isolate/segment the machines and plan migration","Licence expiry; rebuy","Driver bloat; clean install"], a:1, e:"Past end-of-life, vulnerabilities go unpatched forever. Until replacement is possible, network isolation limits the exposure."},
{q:"Why might a perfectly healthy PC be unable to move to the next Windows version?", o:["Its licence forbids it","Hardware falls below the new version's requirements (e.g. no TPM 2.0)","Windows only upgrades twice","Its filesystem is NTFS"], a:1, e:"Update limitations strand capable-but-old hardware — Windows 11's TPM/CPU floor is the current example."},
{q:"A drive formatted on a Mac with its native filesystem won't mount on Windows. Which filesystem is it likely using?", o:["exFAT","APFS","FAT32","ext4"], a:1, e:"APFS is Apple's native filesystem and unreadable by Windows without third-party tools. exFAT is the cross-platform choice."},
{q:"Which filesystem should a camera SD card use to work in Windows, macOS, and the camera, with support for large video files?", o:["NTFS","exFAT","ext4","APFS"], a:1, e:"exFAT is the cross-platform flash standard — readable everywhere that matters, without FAT32's 4 GB ceiling."}
]
},

{
id:"1.9", name:"Perform OS installations and upgrades in a diverse OS environment",
notes:`
<h2>Boot methods</h2>
<ul>
<li><b>USB</b> — the modern default (bootable installer stick). <b>Optical</b> — legacy DVD. <b>External/hot-swappable drive</b>.</li>
<li><b>Network / PXE boot</b> — the NIC boots from a deployment server: mass rollouts without media.</li>
<li><b>Internet-based</b> — e.g. macOS Internet Recovery, cloud OS recovery downloads.</li>
<li><b>Internal drive/partition</b> — booting the recovery partition.</li>
<li>Set the boot device via UEFI boot order / one-time boot menu (Core 1 3.4 crossover).</li>
</ul>

<h2>Installation types</h2>
<table>
<tr><th>Type</th><th>What it does</th></tr>
<tr><td><b>Clean install</b></td><td>Wipe and install fresh — no old apps/settings; needed for edition-down or bitness changes</td></tr>
<tr><td><b>In-place upgrade</b></td><td>New version over old, keeping files/apps/settings</td></tr>
<tr><td><b>Repair installation</b></td><td>Reinstall OS files over a broken system, preserving apps/data</td></tr>
<tr><td><b>Recovery partition</b></td><td>Restore from the hidden factory partition — back to factory state</td></tr>
<tr><td><b>Image deployment</b></td><td>Clone a prepared "golden image" to many machines (with PXE for scale)</td></tr>
<tr><td><b>Remote network installation</b></td><td>Install from a network share/deployment server</td></tr>
<tr><td><b>Third-party drivers</b></td><td>Supply storage/RAID drivers during setup when the installer can't see the disk</td></tr>
</table>

<h2>Partitioning — GPT vs MBR</h2>
<table>
<tr><th></th><th>MBR</th><th>GPT</th></tr>
<tr><td>Max disk size</td><td><b>2 TB</b></td><td>Effectively unlimited (9+ ZB)</td></tr>
<tr><td>Partitions</td><td>4 primary (or 3 + extended)</td><td>128</td></tr>
<tr><td>Firmware</td><td>BIOS/legacy</td><td><b>UEFI</b> (required for UEFI boot)</td></tr>
<tr><td>Resilience</td><td>Single partition table</td><td>Backup table + CRC checks</td></tr>
</table>
<div class="callout"><b>Exam tells:</b> "3 TB drive only shows 2 TB usable" → it's MBR; convert to GPT. "UEFI + Secure Boot install" → GPT. "needs more than 4 primary partitions" → GPT.</div>

<h2>Install / partition pick-list</h2>
<table>
<tr><th>Scenario</th><th>Choice</th></tr>
<tr><td>200 identical new PCs</td><td>PXE + golden image</td></tr>
<tr><td>Setup sees no disks on RAID box</td><td>Load third-party storage driver</td></tr>
<tr><td>4 TB disk shows only 2 TB</td><td>Was MBR → convert to GPT</td></tr>
<tr><td>UEFI + Secure Boot Windows 11</td><td>GPT required</td></tr>
<tr><td>OS broken; keep apps and data</td><td>Repair installation</td></tr>
<tr><td>Back to factory day-one state</td><td>Recovery partition restore</td></tr>
<tr><td>Pro → Home or 32↔64-bit</td><td>Clean install (not in-place)</td></tr>
<tr><td>Before any upgrade</td><td>Backup + app/driver + hardware checks</td></tr>
</table>
<div class="keyfact"><b>MBR limits:</b> 2 TB max disk · 4 primary partitions. Bigger disks / UEFI boot → GPT.</div>

<h2>Upgrade considerations</h2>
<ul>
<li><b>Back up files and user preferences first.</b> Verify <b>application and driver support</b> on the target OS, and <b>hardware compatibility</b> (requirements floor).</li>
<li><b>Feature updates</b> — the periodic version releases of Windows (vs monthly quality patches); each has its own <b>product life-cycle</b>/support window — staying in support requires taking feature updates.</li>
</ul>
`,
quiz:[
{q:"An organisation must install Windows on 200 identical new PCs. Which approach scales best?", o:["USB stick on each machine in turn","PXE network boot deploying a prepared golden image","DVD installs overnight","In-place upgrades from the shipped OS"], a:1, e:"Image deployment over PXE is built for mass rollout: machines boot from the NIC, pull the standard image, and configure — no per-seat media."},
{q:"During Windows setup on a hardware RAID system, no drives are listed to install to. What is the standard fix?", o:["Format the array first","Load the third-party storage/RAID driver within setup","Switch to MBR","Use a DVD instead of USB"], a:1, e:"When the installer lacks a controller driver it can't see the disks — the Load driver option accepts the vendor's storage driver during setup."},
{q:"A new 4 TB drive initialised with the default legacy option only shows 2 TB usable. What is wrong?", o:["The drive is faulty","It was initialised as MBR, which caps at 2 TB — convert to GPT","exFAT limits it","The SATA port is 3 Gb/s"], a:1, e:"MBR's 32-bit sector addressing tops out at 2 TB. GPT removes the limit (and is required for UEFI booting anyway)."},
{q:"Which partition scheme is REQUIRED to boot Windows in native UEFI mode with Secure Boot?", o:["MBR","GPT","Extended","Dynamic"], a:1, e:"UEFI boots from GPT disks; Secure Boot rides on UEFI. Legacy BIOS/CSM boots from MBR."},
{q:"Windows is badly corrupted but the user's applications and files must be preserved. Which installation type fits?", o:["Clean install","Repair installation (in-place reinstall keeping apps/data)","Recovery partition restore","Image deployment"], a:1, e:"A repair install lays fresh OS files over the broken system while preserving applications, settings, and data. Factory recovery would wipe apps."},
{q:"A laptop must go back to its exact out-of-the-box factory state. Which method achieves this?", o:["sfc /scannow","Booting the recovery partition and restoring the factory image","gpupdate /force","An in-place upgrade"], a:1, e:"The hidden recovery partition holds the factory image — restoring it returns the machine to day-one state (destroying current data, so back up first)."},
{q:"Before an OS upgrade, which THREE checks does the exam expect?", o:["Wallpaper, theme, and icon layout","Backups taken; application/driver support on the target OS; hardware meets requirements","RGB sync, fan curves, and BIOS passwords","Antivirus brand, browser choice, and homepage"], a:1, e:"The upgrade-considerations triad: back up first, confirm apps and drivers support the destination, confirm the hardware clears the requirements floor."},
{q:"What is a Windows 'feature update'?", o:["A monthly security patch","A periodic version release with new capabilities and its own support life-cycle","A driver rollup","An optional codec pack"], a:1, e:"Feature updates are the version releases (with new features); monthly quality updates are the security/bug patches. Each feature update carries its own support window."},
{q:"A Mac with a failed internal drive boots to a globe icon and downloads recovery tools over WiFi. Which boot method is this?", o:["PXE","Internet-based recovery","Optical","Recovery partition"], a:1, e:"macOS Internet Recovery boots the recovery environment from Apple's servers — the internet-based boot method on the objectives."},
{q:"Why can a technician NOT use an in-place upgrade to move a machine from Windows 11 Pro back down to Windows 11 Home?", o:["Home doesn't exist for 11","Edition downgrades require a clean install","gpedit blocks it","The TPM prevents it"], a:1, e:"In-place upgrades only move up (version or edition). Downgrading edition — like changing bitness — means wiping and clean-installing."}
]
},

{
id:"1.10", name:"Identify common features and tools of the macOS/desktop OS",
notes:`
<h2>Applications — install and remove</h2>
<ul>
<li><b>.dmg</b> — disk image: mounts like a drive; drag the <b>.app</b> bundle into Applications. <b>.pkg</b> — guided installer package (for apps needing system-level setup). <b>.app</b> — the application bundle itself.</li>
<li><b>App Store</b> — Apple's managed distribution with automatic updates.</li>
<li><b>Uninstall:</b> typically drag the .app to the Trash (leftover support files may remain; pkg-installed apps may include uninstallers).</li>
<li><b>Apple ID</b> — ties purchases, iCloud, and sync; <b>corporate restrictions</b> can limit which Apple ID features/apps are allowed on managed Macs (MDM).</li>
</ul>

<h2>Best practices</h2>
<ul>
<li><b>Time Machine</b> — built-in backup to an external/network drive: hourly/daily/weekly rotating snapshots; restore files or whole systems.</li>
<li><b>Antivirus</b> — Macs are not immune; endpoint protection is still best practice.</li>
<li><b>Updates/patches</b> — System Settings → Software Update; keep OS and apps current.</li>
</ul>

<h2>System features — name → job</h2>
<table>
<tr><th>Feature</th><th>Job</th></tr>
<tr><td><b>Mission Control / Multiple desktops (Spaces)</b></td><td>Overview of open windows; virtual desktops</td></tr>
<tr><td><b>Keychain</b></td><td>Built-in password/certificate manager</td></tr>
<tr><td><b>Spotlight</b></td><td>System-wide search (Cmd+Space)</td></tr>
<tr><td><b>iCloud</b></td><td>Apple's sync/backup cloud: files, photos, keychain</td></tr>
<tr><td><b>Gestures</b></td><td>Trackpad multi-touch actions</td></tr>
<tr><td><b>Finder</b></td><td>The file manager (Explorer equivalent)</td></tr>
<tr><td><b>Remote Disc</b></td><td>Use another computer's optical drive over the network</td></tr>
<tr><td><b>Dock</b></td><td>App launcher/switcher bar</td></tr>
</table>

<h2>Management tools</h2>
<table>
<tr><th>Tool</th><th>Job</th></tr>
<tr><td><b>Disk Utility</b></td><td>Manage/erase/partition drives, First Aid repairs</td></tr>
<tr><td><b>FileVault</b></td><td>Full-disk encryption (BitLocker equivalent)</td></tr>
<tr><td><b>Terminal</b></td><td>Unix command line</td></tr>
<tr><td><b>Force Quit</b> (Cmd+Option+Esc)</td><td>Kill unresponsive apps (Task Manager's End task equivalent)</td></tr>
<tr><td><b>System Preferences/Settings</b></td><td>Displays, Networks, Printers &amp; Scanners, Privacy, Accessibility, Time Machine panes</td></tr>
</table>

<h2>macOS ↔ Windows equivalents</h2>
<table>
<tr><th>Need</th><th>macOS</th><th>Windows cousin</th></tr>
<tr><td>Full-disk encryption</td><td>FileVault</td><td>BitLocker</td></tr>
<tr><td>File manager</td><td>Finder</td><td>File Explorer</td></tr>
<tr><td>Kill frozen app</td><td>Force Quit</td><td>Task Manager → End task</td></tr>
<tr><td>Password vault</td><td>Keychain</td><td>Credential Manager</td></tr>
<tr><td>System search</td><td>Spotlight</td><td>Windows Search</td></tr>
<tr><td>Versioned backups</td><td>Time Machine</td><td>File History / backup tools</td></tr>
<tr><td>Disk repair/partition</td><td>Disk Utility</td><td>Disk Management</td></tr>
</table>
<div class="keyfact"><b>.dmg install:</b> mount → drag <code>.app</code> into Applications. Drag-to-Trash uninstall often leaves preference files behind.</div>
`,
quiz:[
{q:"A downloaded Mac app arrives as a .dmg file. What is the standard installation procedure?", o:["Run it like an .exe","Mount the .dmg and drag the .app bundle into the Applications folder","Extract it with Disk Utility","Convert it to .pkg first"], a:1, e:".dmg files mount as virtual disks; drag-and-drop of the .app into Applications is the classic Mac install."},
{q:"Which macOS feature provides full-disk encryption?", o:["Keychain","FileVault","Gatekeeper","Time Machine"], a:1, e:"FileVault encrypts the entire drive — macOS's BitLocker equivalent. Keychain stores passwords; Time Machine is backup."},
{q:"A Mac user needs automatic, versioned backups to an external drive with easy file restoration. Which built-in tool?", o:["iCloud Drive only","Time Machine","Disk Utility","Spotlight"], a:1, e:"Time Machine keeps rotating hourly/daily/weekly snapshots and restores individual files or whole systems."},
{q:"An application on macOS has frozen completely. Which is the equivalent of Windows' 'End task'?", o:["Disk Utility First Aid","Force Quit (Cmd+Option+Esc)","Mission Control","Terminal 'reboot'"], a:1, e:"Force Quit kills unresponsive applications — reachable from the Apple menu or Cmd+Option+Esc."},
{q:"Where are a Mac user's saved website passwords and certificates stored?", o:["FileVault","Keychain","Finder","The Dock"], a:1, e:"Keychain is macOS's credential manager for passwords, keys, and certificates (syncable via iCloud Keychain)."},
{q:"Which tool searches the entire Mac — apps, files, mail — from one keystroke?", o:["Finder","Spotlight (Cmd+Space)","Mission Control","Remote Disc"], a:1, e:"Spotlight is the system-wide search. Finder is the file manager for browsing."},
{q:"A Mac's external drive is misbehaving. Which built-in utility runs repairs and manages partitions?", o:["FileVault","Disk Utility (First Aid)","Time Machine","Keychain Access"], a:1, e:"Disk Utility handles erasing, partitioning, imaging, and First Aid filesystem repairs."},
{q:"A user wants several virtual desktops and a bird's-eye view of every open window. Which macOS features?", o:["Dock and Finder","Spaces (multiple desktops) and Mission Control","Spotlight and Siri","Remote Disc and AirDrop"], a:1, e:"Mission Control shows all windows/desktops at a glance; Spaces provides the multiple virtual desktops."},
{q:"On a company-managed Mac, a user cannot sign into a personal Apple ID for the App Store. Why?", o:["The Mac is broken","Corporate MDM restrictions limit Apple ID/App Store use on managed devices","Apple IDs are Windows-only","FileVault blocks it"], a:1, e:"Managed Macs can enforce restrictions on Apple ID sign-in, App Store access, and app installation — corporate policy via MDM."},
{q:"A MacBook with no optical drive must read a DVD using the office iMac's drive over the network. Which feature enables this?", o:["AirDrop","Remote Disc","Target Disk Mode","iCloud Drive"], a:1, e:"Remote Disc shares another computer's optical drive across the network — the objectives' listed answer for exactly this scenario."}

id:"1.11", name:"Identify common features and tools of the Linux client/desktop OS",
notes:`
<h2>The command table — memorise cold</h2>
<table>
<tr><th>Command</th><th>Does</th></tr>
<tr><td><code>ls</code></td><td>List directory contents (<code>-l</code> long, <code>-a</code> hidden)</td></tr>
<tr><td><code>pwd</code></td><td>Print working directory (where am I?)</td></tr>
<tr><td><code>cp</code> / <code>mv</code> / <code>rm</code></td><td>Copy / move-rename / delete (<code>rm -r</code> recursive — careful)</td></tr>
<tr><td><code>cat</code></td><td>Print a file's contents</td></tr>
<tr><td><code>nano</code></td><td>Simple terminal text editor</td></tr>
<tr><td><code>find</code></td><td>Search for files by name/attributes</td></tr>
<tr><td><code>grep</code></td><td>Search text for patterns (<code>grep error log.txt</code>)</td></tr>
<tr><td><code>man</code></td><td>Manual page for any command</td></tr>
<tr><td><code>chmod</code></td><td>Change file permissions (rwx for owner/group/other; e.g. <code>chmod 755</code>)</td></tr>
<tr><td><code>chown</code></td><td>Change file owner/group</td></tr>
<tr><td><code>su</code> / <code>sudo</code></td><td>Switch user / run one command as root (admin)</td></tr>
<tr><td><code>apt-get</code></td><td>Package management, Debian/Ubuntu family (<code>apt-get install</code>/<code>update</code>/<code>upgrade</code>)</td></tr>
<tr><td><code>yum</code> (dnf)</td><td>Package management, Red Hat/Fedora family</td></tr>
<tr><td><code>ip</code></td><td>Network interface config/addresses (<code>ip a</code>) — successor to ifconfig</td></tr>
<tr><td><code>dig</code></td><td>DNS lookups (Linux's nslookup)</td></tr>
<tr><td><code>df</code></td><td>Disk free space per filesystem (<code>-h</code> human units)</td></tr>
<tr><td><code>ps</code></td><td>Snapshot of running processes (<code>ps aux</code>)</td></tr>
<tr><td><code>top</code></td><td>Live process/resource monitor (Task Manager-ish)</td></tr>
</table>
<div class="callout"><b>Exam pairings:</b> "install software on Ubuntu" → <code>apt-get</code>. "on Red Hat" → <code>yum</code>. "run as admin" → <code>sudo</code>. "what's eating the CPU right now" → <code>top</code>. "how full are the disks" → <code>df -h</code>. "find the word 'error' in a log" → <code>grep</code>. "change who owns a file" → <code>chown</code>; "what they can do with it" → <code>chmod</code>. "DNS test" → <code>dig</code>. "IP address" → <code>ip a</code>.</div>

<h2>Linux scenario → command</h2>
<table>
<tr><th>Scenario</th><th>Command</th></tr>
<tr><td>Install package on Ubuntu</td><td><code>apt-get install</code></td></tr>
<tr><td>Update packages on Red Hat</td><td><code>yum update</code> / <code>dnf</code></td></tr>
<tr><td>One admin command</td><td><code>sudo …</code></td></tr>
<tr><td>Live CPU hog</td><td><code>top</code></td></tr>
<tr><td>Disk free space</td><td><code>df -h</code></td></tr>
<tr><td>Search log for "failed"</td><td><code>grep failed logfile</code></td></tr>
<tr><td>Owner execute on a script</td><td><code>chmod u+x script.sh</code></td></tr>
<tr><td>Change file owner</td><td><code>chown user file</code></td></tr>
<tr><td>DNS lookup</td><td><code>dig</code></td></tr>
<tr><td>Show IP addresses</td><td><code>ip a</code></td></tr>
<tr><td>Windows file shares from Linux</td><td>Samba</td></tr>
</table>
<div class="keyfact"><b>apt vs yum:</b> Ubuntu/Debian → apt. Red Hat/Fedora → yum/dnf. <b>chmod vs chown:</b> permissions vs ownership.</div>

<h2>Best practices and tools</h2>
<ul>
<li><b>Backups</b> — same discipline as anywhere (rsync/tar/dedicated tools); <b>antivirus</b> — available and sensible, especially on file servers serving Windows clients; <b>updates/patches</b> — via the package manager (<code>apt-get update && apt-get upgrade</code>), which updates the OS <i>and</i> installed software together.</li>
<li><b>Shell/terminal</b> — the primary admin interface (bash and friends).</li>
<li><b>Samba</b> — implements SMB on Linux: lets Linux serve/join Windows file and print sharing — the interoperability answer.</li>
</ul>
`,
quiz:[
{q:"On Ubuntu, which command installs a new package?", o:["yum install package","apt-get install package","pkg add package","rpm -i package"], a:1, e:"Debian-family distros (Ubuntu, Mint) use apt/apt-get. yum/dnf belongs to the Red Hat family — the standard exam contrast."},
{q:"A technician needs to run a single administrative command on Linux without switching to a root session. Which prefix?", o:["su -","sudo","admin","chmod +x"], a:1, e:"sudo elevates one command with the user's own password (if authorised). su switches to the root account entirely."},
{q:"Which command shows a live, continuously updating view of processes and CPU/memory usage?", o:["ps aux","top","df -h","cat /proc"], a:1, e:"top is the live monitor; ps is a one-shot snapshot. Both matter — 'live' vs 'snapshot' is the discriminator."},
{q:"A log file must be searched for every line containing 'failed'. Which command?", o:["find failed log.txt","grep failed log.txt","cat -s failed","ls | failed"], a:1, e:"grep searches text for patterns. find locates files by name/attributes — the classic mix-up pair."},
{q:"Which command reports how much free space each mounted filesystem has, in human-readable units?", o:["du -a","df -h","ls -l","top -d"], a:1, e:"df -h shows filesystem capacity and free space. (du measures directory usage — related but different.)"},
{q:"A script won't run until its permissions allow execution. Which command grants the owner execute rights?", o:["chown +x script.sh","chmod u+x script.sh","sudo script.sh","attrib +x script.sh"], a:1, e:"chmod changes permission bits (u+x = owner execute). chown changes ownership, not permissions."},
{q:"Which command changes the owner of /srv/share to user 'alex'?", o:["chmod alex /srv/share","chown alex /srv/share","su alex /srv/share","usermod /srv/share alex"], a:1, e:"chown sets file/directory ownership. chmod adjusts what the owner/group/others may do."},
{q:"A Linux file server must appear as a normal Windows share to the office's Windows PCs. Which software provides this?", o:["NFS only","Samba (SMB on Linux)","FTP daemon","WINE"], a:1, e:"Samba implements the SMB protocol on Linux — Windows machines see standard file/print shares. The interoperability answer on the objectives."},
{q:"Which command performs a DNS lookup on Linux, equivalent to Windows' nslookup?", o:["ip dns","dig","ping -d","host -w"], a:1, e:"dig queries DNS records in detail — the standard Linux DNS troubleshooting tool on the objectives list."},
{q:"A technician is lost in a deep directory tree. Which command prints the current location, and which lists what's here including hidden files?", o:["pwd, then ls -a","cd, then dir /a","whereami, then list","path, then show"], a:0, e:"pwd prints the working directory; ls -a lists contents including dotfiles. cd changes directory rather than reporting it."}
]
}

{q:"A user needs BitLocker, domain join, and to host Remote Desktop sessions. They run Windows Home. What single change satisfies all three?", o:["Install gpedit","In-place upgrade to Windows Pro","Enable the TPM","Join a workgroup"], a:1, e:"All three are the classic Pro discriminators — one edition upgrade with a Pro key delivers the lot, in place."},

{q:"Setup must install Windows onto a machine with no OS, wiping everything, booted from a stick. Which boot method and installation type?", o:["PXE; repair install","USB boot; clean install","Optical; in-place upgrade","Recovery partition; image"], a:1, e:"Bootable USB media running a clean installation is the standard single-machine, blank-disk scenario."},
{q:"Why does a UEFI/Secure Boot Windows 11 deployment require GPT disks?", o:["GPT is faster","UEFI firmware boots from GPT partition tables; MBR belongs to legacy BIOS boot","GPT enables BitLocker","MBR can't hold NTFS"], a:1, e:"The boot mode dictates the partition scheme: UEFI↔GPT, legacy BIOS↔MBR. Windows 11 requires UEFI, hence GPT."},
{q:"A technician needs FOUR OS partitions plus recovery and EFI partitions on one disk. Why is MBR unsuitable?", o:["MBR caps disks at 4 TB","MBR allows only 4 primary partitions; GPT allows 128","MBR can't hold recovery images","MBR is Linux-only"], a:1, e:"MBR's four-primary-partition limit (or 3+extended) is the constraint; GPT supports 128 and is the modern default."},
{q:"Which macOS tool is the direct equivalent of Windows' BitLocker, and which is the equivalent of File Explorer?", o:["Keychain; Dock","FileVault; Finder","Time Machine; Spotlight","Gatekeeper; Mission Control"], a:1, e:"FileVault = full-disk encryption; Finder = the file manager. Cross-OS equivalence questions are an exam staple."},
{q:"A Mac user deletes an app by dragging it from Applications to the Trash. What is a limitation of this method?", o:["It requires Terminal","Support/preference files may remain scattered on the disk","It breaks FileVault","It only works for App Store apps"], a:1, e:"Drag-to-Trash removes the .app bundle but often leaves preference and support files behind — pkg-based apps may provide proper uninstallers."},

{
id:"2.1", name:"Summarize various security measures and their purposes",
notes:`
<h2>Physical security</h2>
<table>
<tr><th>Measure</th><th>Purpose</th></tr>
<tr><td><b>Bollards</b></td><td>Stop vehicles reaching the building</td></tr>
<tr><td><b>Access control vestibule</b> (mantrap)</td><td>Two-door airlock: one person authenticates at a time — defeats tailgating</td></tr>
<tr><td><b>Badge reader</b></td><td>Authenticates staff cards/fobs at doors</td></tr>
<tr><td><b>Video surveillance</b></td><td>Deterrence + evidence/monitoring</td></tr>
<tr><td><b>Alarm systems / motion sensors</b></td><td>Detect intrusion, especially out of hours</td></tr>
<tr><td><b>Door locks / equipment locks</b></td><td>Physical access control; cable (Kensington) locks stop kit walking</td></tr>
<tr><td><b>Guards / fences / lighting</b></td><td>Human judgement; perimeter; deny concealment</td></tr>
<tr><td><b>Magnetometers</b></td><td>Metal detection at entry points</td></tr>
</table>
<ul>
<li><b>Staff authentication factors:</b> key fobs, smart cards, keys, and <b>biometrics</b> — retina, fingerprint, palmprint scanners.</li>
</ul>

<h2>Logical security</h2>
<ul>
<li><b>Principle of least privilege</b> — everyone gets the MINIMUM access needed to do their job, nothing more. The exam's favourite principle.</li>
<li><b>ACLs (access control lists)</b> — rule lists defining who/what may access a resource (files, firewall rules).</li>
<li><b>MFA (multifactor authentication)</b> — two+ of: something you <b>know</b> (password/PIN), <b>have</b> (phone, token, smart card), <b>are</b> (biometric). Two passwords ≠ MFA (same factor!).</li>
<li><b>MDM</b> — mobile device management (ties to Core 1 1.4).</li>
</ul>

<h2>Active Directory — the vocabulary</h2>
<table>
<tr><th>Term</th><th>Meaning</th></tr>
<tr><td><b>Domain</b></td><td>The centrally managed security boundary (domain controllers authenticate everyone)</td></tr>
<tr><td><b>OU (organizational unit)</b></td><td>Container for organising users/computers (e.g. by department) so policy can target them</td></tr>
<tr><td><b>Group Policy</b></td><td>Centrally pushed settings/restrictions/updates to users and computers</td></tr>
<tr><td><b>Login script</b></td><td>Runs at sign-in — maps drives, connects printers</td></tr>
<tr><td><b>Home folder</b></td><td>Per-user personal storage on a server</td></tr>
<tr><td><b>Folder redirection</b></td><td>Points local folders (Documents/Desktop) at server storage — roams and gets backed up</td></tr>
<tr><td><b>Security groups</b></td><td>Assign permissions to groups, put users in groups — never permission users one by one</td></tr>
</table>

<h2>MFA factors — know ↔ have ↔ are</h2>
<table>
<tr><th>Factor type</th><th>Examples</th></tr>
<tr><td><b>Something you know</b></td><td>Password, PIN, security question</td></tr>
<tr><td><b>Something you have</b></td><td>Phone authenticator, smart card, key fob, hardware token</td></tr>
<tr><td><b>Something you are</b></td><td>Fingerprint, face, retina, palmprint</td></tr>
</table>
<div class="keyfact"><b>Trap:</b> password + security question is NOT MFA — both are "know". Password + authenticator app = true MFA (know + have).</div>

<h2>Scenario pick-list — which control?</h2>
<table>
<tr><th>Scenario</th><th>Best control</th></tr>
<tr><td>Stop vehicles at the entrance</td><td>Bollards</td></tr>
<tr><td>Prevent tailgating at the server-room door</td><td>Access control vestibule (mantrap)</td></tr>
<tr><td>Shoulder surfing at reception</td><td>Privacy screen filter</td></tr>
<tr><td>New starter gets only the access their job needs</td><td>Least privilege (+ security group)</td></tr>
<tr><td>Apply password policy to all Sales PCs</td><td>Sales OU + linked Group Policy</td></tr>
<tr><td>Documents follow the user between PCs and get backed up</td><td>Folder redirection</td></tr>
<tr><td>Map drives/printers at every domain sign-in</td><td>Login script / GPO preferences</td></tr>
</table>
`,
quiz:[
{q:"A data centre entrance uses two interlocking doors where only one person can pass per authentication. What is this, and what attack does it defeat?", o:["A bollard; ram raids","An access control vestibule; tailgating","A magnetometer; weapons","A turnstile; badge cloning"], a:1, e:"The vestibule (mantrap) forces one-at-a-time authenticated entry, physically preventing someone slipping through behind an authorised person."},
{q:"Which measure specifically prevents vehicles from being driven into a building's entrance?", o:["Fencing","Bollards","Motion sensors","Guards"], a:1, e:"Bollards are vehicle barriers. Fences deter pedestrians; sensors and guards detect and respond."},
{q:"A new starter in accounts receives access to accounting systems only — not HR, not engineering shares. Which principle is applied?", o:["Zero trust","Least privilege","Separation of networks","Implicit deny"], a:1, e:"Least privilege grants the minimum access required for the role. It's the single most-tested security principle."},
{q:"A user signs in with a password and then a code from an authenticator app. Which factors are these?", o:["Know + know","Know + have","Have + are","Are + know"], a:1, e:"Password = something you know; the app on your phone = something you have. Two different factor types make it true MFA."},
{q:"Why is 'password plus security question' NOT true multifactor authentication?", o:["Questions are too short","Both are 'something you know' — the same factor twice","MFA requires biometrics","It is MFA"], a:1, e:"MFA needs different factor TYPES. Two knowledge factors are still single-factor — a favourite exam trap."},
{q:"In Active Directory, the Sales department's 200 users need a specific set of restrictions. What is the standard structure?", o:["Edit each user individually","Place them in a Sales OU and link Group Policy to it","Email them the settings","Add them all as local admins"], a:1, e:"OUs organise objects so Group Policy can target them collectively — the whole point of the OU/GPO design."},
{q:"Users' Documents folders should live on a server so they follow users between PCs and get backed up centrally. Which AD feature?", o:["Login scripts","Folder redirection","Security groups","Home directory quotas"], a:1, e:"Folder redirection points local profile folders at server storage — transparent to the user, centralised for IT."},
{q:"What is the best-practice way to grant 30 users access to a project share in a domain?", o:["Add each user to the share's ACL","Create a security group, permission the group on the share, add users to the group","Give everyone Full Control","Share the admin credentials"], a:1, e:"Group-based permissioning scales and audits cleanly; per-user ACL entries become unmanageable. Users→groups→permissions."},
{q:"Which of these is a BIOMETRIC authentication method listed on the objectives?", o:["Smart card","Palmprint scanner","Key fob","PIN"], a:1, e:"Biometrics are 'something you are': retina, fingerprint, palmprint. Cards, fobs, and keys are possession factors; PINs are knowledge."},
{q:"Drives are mapped and printers connected automatically the moment a domain user signs in. Which mechanism typically does this?", o:["Folder redirection","A login script (or Group Policy preferences)","The home folder","MDM"], a:1, e:"Login scripts execute at sign-in to map drives and printers — classic AD plumbing (modern equivalents use GPO preferences)."}
]
},

{
id:"2.2", name:"Compare and contrast wireless security protocols and authentication methods",
notes:`
<h2>Wireless encryption — the progression</h2>
<table>
<tr><th>Protocol</th><th>Cipher</th><th>Verdict</th></tr>
<tr><td>WEP</td><td>RC4</td><td>Broken — never use (not even on the objectives any more, but know it's the "wrong answer")</td></tr>
<tr><td>WPA</td><td><b>TKIP</b></td><td>Stopgap that wrapped RC4; deprecated</td></tr>
<tr><td><b>WPA2</b></td><td><b>AES (CCMP)</b></td><td>The long-serving standard; strong when AES is used (TKIP mode exists for legacy compat — avoid)</td></tr>
<tr><td><b>WPA3</b></td><td>AES (GCMP) + <b>SAE</b> handshake</td><td>Current best: SAE (simultaneous authentication of equals) resists offline dictionary attacks on the handshake; adds forward secrecy</td></tr>
</table>
<div class="callout"><b>Exam tells:</b> "most secure available" → WPA3. "WPA2 should use which cipher" → AES, never TKIP. TKIP↔WPA (old), AES↔WPA2/3.</div>

<h2>Authentication methods and servers</h2>
<ul>
<li><b>Personal vs Enterprise:</b> WPA2/3-<b>Personal</b> = one pre-shared key for everyone. WPA2/3-<b>Enterprise</b> = each user authenticates with their own credentials against a server (802.1X).</li>
<li><b>RADIUS</b> — the standard AAA server used by WPA Enterprise/802.1X: per-user authentication, authorization, accounting (UDP-based; encrypts only passwords).</li>
<li><b>TACACS+</b> — Cisco-originated AAA, mainly for <b>network device administration</b>; TCP-based, encrypts the whole session, separates authentication/authorization/accounting.</li>
<li><b>Kerberos</b> — the ticket-based authentication protocol used inside <b>Windows domains/Active Directory</b>: authenticate once to the KDC, receive tickets, enjoy <b>SSO</b> without resending passwords.</li>
<li><b>Multifactor</b> — layering a second factor on any of the above.</li>
</ul>

<h2>AAA / protocol pick-list</h2>
<table>
<tr><th>Need</th><th>Protocol</th></tr>
<tr><td>Per-user WiFi join with own credentials</td><td>WPA2/3-<b>Enterprise</b> + 802.1X + <b>RADIUS</b></td></tr>
<tr><td>Home/SOHO one shared passphrase</td><td>WPA2/3-<b>Personal</b> (PSK)</td></tr>
<tr><td>Most secure WiFi today / resist offline handshake crack</td><td><b>WPA3</b> (SAE)</td></tr>
<tr><td>SSO tickets inside an AD domain</td><td><b>Kerberos</b></td></tr>
<tr><td>Admin logins to routers/switches, full-session encrypt, command authZ</td><td><b>TACACS+</b></td></tr>
<tr><td>WPA2 cipher to choose</td><td><b>AES</b> (not TKIP)</td></tr>
</table>
<div class="keyfact"><b>Leaver trap:</b> WPA-Personal = change the shared key on every device when someone leaves. Enterprise = disable that one user account.</div>
`,
quiz:[
{q:"Which wireless security protocol is the most secure currently available?", o:["WPA2-AES","WPA3","WPA-TKIP","WEP-128"], a:1, e:"WPA3 with SAE resists offline dictionary attacks on captured handshakes and adds forward secrecy — the current best practice."},
{q:"A WPA2 network offers TKIP and AES modes. Which should be selected and why?", o:["TKIP — newer","AES — TKIP is a deprecated legacy cipher with known weaknesses","Both together","Neither; use WEP"], a:1, e:"TKIP was a stopgap wrapping the broken RC4 approach for old hardware. WPA2's strength is AES/CCMP."},
{q:"What advantage does WPA3's SAE handshake provide over WPA2's?", o:["Faster roaming","Resistance to offline dictionary attacks against captured handshakes","Longer SSIDs","Backwards compatibility with WEP"], a:1, e:"WPA2 handshake captures can be brute-forced offline; SAE's design means each guess requires a live exchange — captured traffic can't be ground through a dictionary."},
{q:"An office wants each employee to join WiFi with their own username and password rather than a shared key. What is required?", o:["WPA3-Personal with a long passphrase","WPA2/3-Enterprise with 802.1X and a RADIUS server","MAC filtering","A hidden SSID"], a:1, e:"Per-user wireless authentication is Enterprise mode: 802.1X passes each user's credentials to a RADIUS server for AAA."},
{q:"Which protocol provides ticket-based single sign-on inside a Windows Active Directory domain?", o:["RADIUS","TACACS+","Kerberos","SAML"], a:2, e:"Kerberos issues tickets after one authentication to the KDC (domain controller), granting access to domain resources without re-entering passwords — AD's native authentication."},
{q:"A network team wants centralised admin authentication for managing routers and switches, with the whole session encrypted and command-level authorization. Which fits BEST?", o:["RADIUS","TACACS+","Kerberos","WPA3-Enterprise"], a:1, e:"TACACS+ is designed for network device administration: full-session encryption, TCP, and separated authentication/authorization for per-command control. RADIUS suits network ACCESS."},
{q:"Which pairing is CORRECT?", o:["WPA — AES","WPA2 — TKIP only","WPA — TKIP; WPA2 — AES","WPA3 — RC4"], a:2, e:"The classic mapping: WPA introduced TKIP; WPA2 brought AES/CCMP; WPA3 uses AES-GCMP with SAE."},
{q:"What differentiates WPA2-Personal from WPA2-Enterprise?", o:["Encryption strength","Personal uses one shared passphrase; Enterprise authenticates each user individually via a server","Enterprise is WiFi 6 only","Personal supports more clients"], a:1, e:"Same encryption; different authentication. Personal = pre-shared key (fine for homes), Enterprise = per-user 802.1X/RADIUS (needed for organisations, enables revoking one leaver's access)."},
{q:"When an employee leaves a company using WPA2-Personal WiFi, what must be done, and what does Enterprise mode do better here?", o:["Nothing; the key expires","The shared passphrase must be changed everywhere; Enterprise would simply disable that one user's account","Rotate the SSID","Enable WPS"], a:1, e:"Shared-key departures mean rekeying every device. Enterprise ties access to individual accounts — disable the account, done. A classic justification question."},
{q:"RADIUS provides which three services (the AAA)?", o:["Access, Addressing, Accounting","Authentication, Authorization, Accounting","Auditing, Aliasing, Access","Authentication, Availability, Assurance"], a:1, e:"AAA = who are you (authentication), what may you do (authorization), what did you do (accounting)."}
]
},
/* ---------------- 2.3 ---------------- */
{
id:"2.3", name:"Detect, remove, and prevent malware using appropriate tools and methods",
notes:`
<h2>Malware types — definition table</h2>
<table>
<tr><th>Type</th><th>Signature behaviour</th></tr>
<tr><td><b>Virus</b></td><td>Attaches to files/programs; spreads when the host is executed</td></tr>
<tr><td><b>Boot sector virus</b></td><td>Infects the drive's boot code — loads before the OS; needs boot-time/offline scanning to remove</td></tr>
<tr><td><b>Trojan</b></td><td>Malware disguised as legitimate software — you install it yourself</td></tr>
<tr><td><b>Rootkit</b></td><td>Hides deep (kernel/boot level) concealing itself and other malware from the OS and AV — often invisible to scans from inside the running system</td></tr>
<tr><td><b>Spyware</b></td><td>Covertly collects information/activity</td></tr>
<tr><td><b>Keylogger</b></td><td>Records keystrokes to steal credentials (software or hardware inline device)</td></tr>
<tr><td><b>Ransomware</b></td><td>Encrypts files, demands payment; defence = offline/tested <b>backups</b></td></tr>
<tr><td><b>Cryptominer</b></td><td>Steals CPU/GPU to mine cryptocurrency — symptom: constant high utilisation, heat, slowness</td></tr>
</table>

<h2>Detection symptoms</h2>
<ul>
<li>Slowness, popups, browser redirects, disabled AV/updates, unknown processes/startup items, network spikes, files renamed/encrypted, security tools that won't open.</li>
</ul>

<h2>Tools and methods</h2>
<ul>
<li><b>Antivirus / anti-malware</b> — keep definitions current; scheduled + on-access scanning.</li>
<li><b>Recovery mode / preinstallation environments</b> — scan from OUTSIDE the infected OS: essential against rootkits and boot sector viruses that hide from live scans.</li>
<li><b>Software firewalls</b> — block malicious inbound/outbound connections.</li>
<li><b>Anti-phishing training / user education</b> — humans are the top infection vector; recognising phishing regularly beats every technical control.</li>
<li><b>OS reinstallation</b> — the nuclear option when trust can't be re-established (deep rootkits): wipe and reinstall from known-good media, restore data from clean backups.</li>
</ul>
<div class="callout"><b>Exam tells:</b> "files encrypted + payment demand" → ransomware → restore from backup, don't pay. "AV finds nothing but behaviour persists" → rootkit → boot-time/offline scan or reinstall. "installed a 'free game' then trouble started" → trojan. "fans roaring, CPU pegged at 100% constantly" → cryptominer.</div>

<h2>Symptom → malware type</h2>
<table>
<tr><th>Symptom</th><th>Likely type</th><th>First response</th></tr>
<tr><td>Files renamed/locked + ransom note</td><td>Ransomware</td><td>Isolate; restore from offline backups (don't pay)</td></tr>
<tr><td>Installed "free" app; then popups/unknown software</td><td>Trojan</td><td>Remove app; full AV scan</td></tr>
<tr><td>CPU/GPU pegged overnight; heat/fans</td><td>Cryptominer</td><td>Find process; scan/rebuild</td></tr>
<tr><td>AV finds nothing from inside Windows; symptoms remain</td><td>Rootkit</td><td>Boot-time / WinRE scan or wipe+reinstall</td></tr>
<tr><td>Infects before OS; returns after in-OS clean</td><td>Boot sector virus</td><td>Offline / recovery media scan</td></tr>
<tr><td>Passwords leaking; odd typing capture</td><td>Keylogger</td><td>Scan; check for inline hardware dongle</td></tr>
<tr><td>AV/Update mysteriously disabled</td><td>Self-defending malware</td><td>Treat as infection indicator; remediate offline</td></tr>
</table>
<div class="keyfact"><b>Trust lost → rebuild:</b> when deep infection persists despite scans, wipe from known-good media and restore only clean backups. System Restore points can be infected too.</div>
`,
quiz:[
{q:"Every document on a PC has a strange extension and a note demands Bitcoin for the decryption key. What is this, and what is the correct recovery?", o:["Spyware; run adware removal","Ransomware; wipe and restore from known-good backups","A virus; pay to be safe","A rootkit; reboot"], a:1, e:"Ransomware's answer is clean restoration from offline backups. Paying funds crime and doesn't guarantee decryption."},
{q:"A user installed a 'free video converter'; afterwards their homepage changed and unknown software appeared. What did they install?", o:["A worm","A trojan","A boot sector virus","A logic bomb"], a:1, e:"Malware disguised as desirable software that the user installs themselves is the definition of a trojan."},
{q:"Malware symptoms persist but repeated full antivirus scans from within Windows find nothing. What does this pattern suggest, and what is the right move?", o:["No malware exists","A rootkit hiding from the running OS; scan from recovery/boot-time media or rebuild","The AV needs reinstalling","A cryptominer"], a:1, e:"Rootkits subvert the OS layer AV relies on. Scanning from outside the infected OS (WinRE/boot-time scan) — or reinstalling — is the standard counter."},
{q:"A PC runs its fans constantly with CPU pegged near 100% even when idle, and electricity-hungry GPU usage appears overnight. Which infection fits?", o:["Keylogger","Cryptominer","Boot sector virus","Spyware"], a:1, e:"Cryptominers steal compute to mine currency — the tell is sustained maximum utilisation, heat, and slowness without visible cause."},
{q:"Which malware type records everything typed, targeting credentials, and can exist as a small hardware device inline with the keyboard?", o:["Spyware generally","A keylogger","A rootkit","Adware"], a:1, e:"Keyloggers capture keystrokes in software or as physical inline devices — worth checking ports during physical inspections."},
{q:"Malware loads before Windows itself and reinfects the system after in-OS cleaning. Which type, and which removal approach?", o:["Trojan; uninstall it","Boot sector virus; boot-time/offline scanning from clean media","Spyware; clear cookies","Cryptominer; kill the process"], a:1, e:"Boot sector infections execute before the OS — they must be removed from outside the infected boot chain (recovery environment, bootable AV media)."},
{q:"What is the single MOST effective defence against phishing-delivered malware according to the objectives' toolset?", o:["Bigger firewalls","Regular user education / anti-phishing training","Longer passwords","Disabling email"], a:1, e:"Users are the entry point; training them to recognise and report phishing addresses the vector every technical control misses."},
{q:"After a severe infection, IT cannot be confident the system is clean despite scans. What is the definitive remediation?", o:["Run three different AV products","Reinstall the OS from known-good media and restore data from clean backups","System Restore to yesterday","Rename the infected files"], a:1, e:"When trust can't be re-established, rebuild: wipe, reinstall from trusted media, restore only verified-clean data. Restore points can themselves be infected."},
{q:"Which malware classification covertly gathers user activity and information and sends it to a third party?", o:["Ransomware","Spyware","Bollardware","A worm"], a:1, e:"Spyware's defining trait is covert surveillance/collection — keyloggers are a specialised subtype."},
{q:"A machine's antivirus was silently disabled and Windows Update no longer runs. What do these symptoms indicate?", o:["Licence expiry","Malware defending itself — a common infection indicator","A failed feature update","Low disk space"], a:1, e:"Malware routinely disables protection and updates to survive. Security tooling that mysteriously stops working is itself a red flag."}
]
},
