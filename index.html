{
id:"3.2", name:"Troubleshoot common personal computer security issues",
notes:`
<h2>OS-level symptoms</h2>
<table>
<tr><th>Symptom</th><th>Meaning / action</th></tr>
<tr><td><b>Unable to access the network</b></td><td>Malware may be blocking security sites/tools, or the machine has been quarantined by NAC. Investigate for infection</td></tr>
<tr><td><b>Desktop alerts / unwanted OS notifications</b></td><td>Distinguish REAL security alerts from fake ones injected by adware/browser permissions — know your legitimate AV's look</td></tr>
<tr><td><b>False alerts regarding antivirus protection</b></td><td>"Your PC is infected — call this number / install this cleaner" = rogue antivirus scam. Don't click; investigate with real tools</td></tr>
<tr><td><b>Altered system or host files</b></td><td>The <b>hosts file</b> (<code>C:\\Windows\\System32\\drivers\\etc\\hosts</code>) can redirect domains — malware adds entries to block AV sites or redirect banking. Inspect/clean it</td></tr>
<tr><td><b>OS update failures</b></td><td>Repeated failures can be malware self-defence (also disk space/service issues). Malware blocks patching to survive</td></tr>
</table>

<h2>Browser-related symptoms</h2>
<ul>
<li><b>Random/frequent pop-ups</b> — adware/PUPs or rogue notification permissions: remove suspicious extensions/programs, reset notification permissions.</li>
<li><b>Certificate warnings</b> (sudden, on many/major sites) — possible on-path interception or system clock wildly wrong (certs appear expired!). Check the clock first, then suspect interception/proxy malware.</li>
<li><b>Redirections</b> — search/URL redirects to wrong sites: hijacked browser settings, malicious extensions, poisoned hosts file, or rogue DNS/proxy settings. Work through that list.</li>
</ul>
<div class="callout"><b>Exam tells:</b> browser redirects + hosts file mention → check/clean the hosts file. "Every site shows certificate errors since yesterday" → check the system date/time. "Security popup demands a phone call" → fake AV, never call. Any combination of these → proceed to the 3.3 malware removal procedure.</div>

<h2>Security symptom → first check</h2>
<table>
<tr><th>Symptom</th><th>First check</th></tr>
<tr><td>AV vendor sites won't load; other sites OK</td><td>Hosts file blacklist</td></tr>
<tr><td>Redirected bank URL / hijacked search</td><td>Hosts → extensions → browser settings → DNS/proxy</td></tr>
<tr><td>Every HTTPS site warns about certificates</td><td>System date/time first</td></tr>
<tr><td>"Call Microsoft / install this cleaner" popup</td><td>Scareware — close, don't call; real AV console</td></tr>
<tr><td>Notification spam for dating/cleaners</td><td>Revoke site notification permissions + PUP sweep</td></tr>
<tr><td>Windows Update fails + popups/sluggishness</td><td>Treat as infection cluster → 3.3 procedure</td></tr>
<tr><td>Sudden network quarantine after IDS alerts</td><td>NAC isolation — remediate before reconnect</td></tr>
</table>
<div class="keyfact"><b>Hosts path:</b> <code>C:\Windows\System32\drivers\etc\hosts</code> — overrides DNS. Malware blackholes security sites to 127.0.0.1.</div>
`,
quiz:[
{q:"A user's browser reaches most sites, but every antivirus vendor's website fails to load. What does this pattern suggest?", o:["ISP outage","Malware blocking security sites (often via the hosts file) to protect itself","Firewall misconfiguration by IT","DNS server downtime"], a:1, e:"Selective blocking of security/AV domains is malware self-defence — inspect the hosts file and proceed to the removal procedure."},
{q:"A full-screen browser popup announces '5 viruses found! Call Microsoft support now'. What is this, and what should the user do?", o:["A real Defender alert; call","A fake security warning/rogue AV scam; close it (via Task Manager if needed), never call or install, then investigate with legitimate tools","A firewall prompt; allow","A certificate error; proceed"], a:1, e:"Real security software never demands phone calls. This is scareware — the correct reflex is closing it and running trusted scans."},
{q:"Typing a bank's correct URL lands on a different, suspicious site. Which FOUR places should the technician check?", o:["Wallpaper, theme, fonts, icons","Hosts file, browser extensions, browser/search settings, and DNS/proxy configuration","BIOS, TPM, RAM, PSU","Cookies only"], a:1, e:"Redirection has exactly those insertion points: local hosts overrides, malicious extensions, hijacked browser settings, or rogue DNS/proxy entries."},
{q:"Since this morning, EVERY https site shows certificate warnings on one PC. What should be checked FIRST?", o:["Reinstall the browser","The system date and time — a wrong clock invalidates all certificates","The router firmware","The hosts file"], a:1, e:"Certificates are validity-dated; a clock years off makes every cert 'expired/not yet valid'. Check the cheap universal cause before suspecting interception."},
{q:"Windows Update fails repeatedly on a machine that also shows popups and sluggishness. How should the update failure be interpreted?", o:["Coincidence","As part of the infection picture — malware commonly sabotages updating to survive; remediate the malware first","As a licence issue","As disk failure"], a:1, e:"Clustered symptoms belong to one diagnosis: infections disable patching and protection. Fix the cause, then updates flow again."},
{q:"Where is the Windows hosts file located, and why do attackers target it?", o:["C:\\hosts; it stores passwords","C:\\Windows\\System32\\drivers\\etc\\hosts; it overrides DNS, letting malware redirect or block domains locally","In the registry; it boots Windows","In Program Files; it lists apps"], a:1, e:"The hosts file maps names to IPs before DNS is consulted — one line can silently redirect a bank or blackhole an AV vendor."},
{q:"Constant Windows notification-corner popups advertise 'cleaners' and dating sites. The AV scan is clean. What is the LIKELY cause?", o:["A rootkit","Rogue browser notification permissions granted to spam sites — reset site notification permissions and remove PUPs","Failing RAM","The firewall"], a:1, e:"Sites granted notification permission can spam the OS notification centre without any 'infection'. Revoke the permissions; also sweep for PUP extensions."},
{q:"A workstation suddenly cannot reach the corporate network, and the helpdesk confirms it was automatically isolated after triggering IDS alerts. What is happening?", o:["The switch failed","Network access control/quarantine isolated a suspected-compromised machine — investigate and remediate before reconnection","DHCP exhaustion","Its licence expired"], a:1, e:"Security systems can quarantine machines that behave maliciously. 'Unable to access the network' can be the defence working, not the fault."},
{q:"What distinguishes a legitimate antivirus alert from a fake one?", o:["Legit alerts are louder","Legit alerts come from your installed product, use its normal interface, never demand calls/payments/immediate installs, and are verifiable by opening the AV console directly","Fake ones have spelling only","There is no way to tell"], a:1, e:"Verify inside the real product, not the popup. Urgency, phone numbers, and payment demands are the scam fingerprints."},
{q:"After removing adware, the technician finds dozens of entries in the hosts file pointing security domains to 127.0.0.1. What is the remediation?", o:["Leave them; they're defaults","Remove the malicious entries (restore the default hosts file) so security sites resolve normally again","Redirect them to 8.8.8.8","Delete the file entirely and reboot into BIOS"], a:1, e:"Blackholing security domains to localhost is the classic malware trick — cleaning/restoring the hosts file re-opens access to protection and updates."}
]
},
/* ---------------- 3.3 ---------------- */
{
id:"3.3", name:"Use best-practice procedures for malware removal",
notes:`
<h2>THE 7 STEPS — MEMORISE THE EXACT ORDER</h2>
<table>
<tr><th>#</th><th>Step</th><th>Detail</th></tr>
<tr><td>1</td><td><b>Investigate and verify malware symptoms</b></td><td>Confirm it actually is malware (3.2's symptom patterns)</td></tr>
<tr><td>2</td><td><b>Quarantine the infected system</b></td><td>Disconnect from the network — stop it spreading or phoning home</td></tr>
<tr><td>3</td><td><b>Disable System Restore</b> (in Windows)</td><td>Restore points can harbour the infection — prevent reinfection-by-restore</td></tr>
<tr><td>4</td><td><b>Remediate the infected system</b></td><td>a) Update anti-malware software (definitions), b) scan and use removal techniques — <b>Safe Mode</b> or the <b>preinstallation/recovery environment</b></td></tr>
<tr><td>5</td><td><b>Schedule scans and run updates</b></td><td>Ongoing scheduled scanning; patch the OS and software to close the entry hole</td></tr>
<tr><td>6</td><td><b>Enable System Restore and create a restore point</b></td><td>Now that it's clean — a fresh known-good rollback baseline</td></tr>
<tr><td>7</td><td><b>Educate the end user</b></td><td>How the infection happened, how to avoid the next one</td></tr>
</table>
<div class="callout"><b>Mnemonic:</b> <i>I Quit Dating Rude Studs — Everyone Else too.</i> (Investigate, Quarantine, Disable restore, Remediate, Schedule scans, Enable restore, Educate.) Exam angles: "what comes immediately after verifying symptoms?" → quarantine. "Why disable System Restore?" → infected restore points. "When is the restore point created?" → step 6, AFTER cleaning. "Last step?" → user education, always.</div>

<h2>Why the order matters</h2>
<ul>
<li>Quarantine before touching anything — remediation on a connected machine risks spread/exfiltration mid-clean.</li>
<li>Disable restore BEFORE remediating — otherwise the clean can be undone by restoring an infected point.</li>
<li>Scanning from <b>Safe Mode/WinRE</b> prevents the malware defending itself (ties to rootkits, 2.3).</li>
<li>Education last isn't optional garnish — the user is the patched vulnerability.</li>
</ul>

<h2>Step cue → action</h2>
<table>
<tr><th>Exam cue</th><th>Step</th></tr>
<tr><td>Symptoms confirmed — what NEXT?</td><td>2 Quarantine (disconnect)</td></tr>
<tr><td>Why disable System Restore first?</td><td>3 Infected restore points</td></tr>
<tr><td>Update AV definitions, then scan in Safe Mode/WinRE</td><td>4 Remediate</td></tr>
<tr><td>When create the new restore point?</td><td>6 After clean, restore re-enabled</td></tr>
<tr><td>Last step always?</td><td>7 Educate the user</td></tr>
<tr><td>Deep rootkit; trust gone</td><td>Wipe/reimage as remediation (still do 2, 5, 6, 7)</td></tr>
</table>
<div class="keyfact"><b>Order trap:</b> never remediate on a live network, never create a restore point before the clean, never skip education. Recurrence tomorrow = restore wasn't disabled or patches weren't applied.</div>
`,
quiz:[
{q:"What is the correct order of the malware removal best-practice steps?", o:["Quarantine, investigate, remediate, disable restore, educate, schedule, enable restore","Investigate/verify, quarantine, disable System Restore, remediate, schedule scans and updates, enable restore + create restore point, educate the user","Remediate, quarantine, investigate, educate, restore, scan, enable","Educate, investigate, quarantine, remediate, restore, scan, disable"], a:1, e:"The seven steps in order — investigate → quarantine → disable restore → remediate → schedule scans/updates → enable restore + new point → educate. Near-guaranteed exam question."},
{q:"Malware symptoms are verified on a workstation. What is the IMMEDIATE next action?", o:["Run a full scan","Quarantine it — disconnect it from the network","Disable System Restore","Create a restore point"], a:1, e:"Step 2 follows verification: isolate the machine before it spreads laterally or exfiltrates further."},
{q:"Why is System Restore disabled BEFORE remediation?", o:["It speeds up scanning","Restore points may contain the infection — restoring one later would reinfect the cleaned system","Restore blocks Safe Mode","It frees disk space"], a:1, e:"Malware persists inside restore points. Disabling (and thus purging) them prevents the cleanup being undone by a rollback."},
{q:"During remediation, why scan from Safe Mode or the Windows preinstallation/recovery environment?", o:["Scans run faster","The malware isn't running/defending itself there, so it can be detected and removed cleanly","It's the only place AV works","Networking is faster"], a:1, e:"Active malware hides, blocks, and regenerates. Minimal or offline environments deny it execution — essential for stubborn/rootkit-class infections."},
{q:"What TWO things does step 4 (remediation) explicitly consist of?", o:["Formatting and reinstalling","Updating the anti-malware software, then scanning/removal (using Safe Mode or preinstallation environments as needed)","Backing up and rebooting","Educating and documenting"], a:1, e:"The objectives split remediation into: a) update anti-malware, b) scan and removal techniques — current definitions first, then the clean."},
{q:"At which point in the procedure is a new restore point created?", o:["Before quarantine, to preserve evidence","Step 6 — after the system is clean, with System Restore re-enabled","During remediation","Never; restore stays off"], a:1, e:"A restore point is only valuable when it snapshots a KNOWN-CLEAN system — hence after remediation, not before."},
{q:"After cleaning, updates are applied and scans scheduled. Which final step is still outstanding, and why does it matter?", o:["Reboot twice","Educate the end user — the infection vector was likely their action, and training prevents recurrence","Reset all passwords twice","Reinstall the AV"], a:1, e:"Step 7. The technical clean fixes the machine; education fixes the vulnerability that let it in."},
{q:"A technician cleans a PC while it remains on the office network 'to keep definitions updating'. What is wrong with this?", o:["Nothing — connectivity helps","Quarantine was skipped: the infection can spread laterally or exfiltrate during the clean; definitions can be brought over safely instead","Updates should come first","Safe Mode forbids networking anyway"], a:1, e:"Remaining connected mid-remediation violates step 2 and risks the whole network. Isolate first; import updates via removable media or controlled connection."},
{q:"Why do the objectives place 'schedule scans and run updates' (step 5) immediately after remediation?", o:["Padding","Ongoing scanning catches recurrence, and patching closes the vulnerability the malware exploited to get in","It re-enables restore","Because scans require updates"], a:1, e:"Removal without patching leaves the door open; scheduled scans provide the ongoing watch. Step 5 is the 'stay clean' step."},
{q:"A colleague suggests skipping straight to reimaging every infected PC. Per the best-practice procedure, when IS wipe-and-reload the right call?", o:["Never","When remediation cannot restore confidence (deep rootkits, persistent reinfection) — it replaces step 4's removal, while quarantine, updates, restore-point, and education steps still apply","Always, immediately","Only for laptops"], a:1, e:"Reimaging is a legitimate remediation technique for untrustable systems (2.3 crossover) — but the surrounding procedure (isolate, patch, baseline, educate) still frames it."}
]
},

id:"3.4", name:"Troubleshoot common mobile OS and application issues",
notes:`
<h2>Application issues</h2>
<table>
<tr><th>Symptom</th><th>Fix ladder</th></tr>
<tr><td><b>App fails to launch / crashes / fails to close</b></td><td>Force-stop the app → clear the app's cache/data → update the app → restart the device → uninstall/reinstall</td></tr>
<tr><td><b>App fails to update</b></td><td>Check storage space, network, store sign-in; clear the store app's cache</td></tr>
<tr><td><b>Slow performance</b></td><td>Close background apps, restart, clear storage headroom (full storage cripples phones), check for runaway apps in battery stats, update OS</td></tr>
</table>

<h2>System issues</h2>
<ul>
<li><b>OS fails to update:</b> the big three blockers — <b>insufficient storage</b>, <b>insufficient battery</b> (updates demand a charge threshold), unstable network. Also: device too old (no longer supported — 1.8 EOL crossover).</li>
<li><b>Battery life issues:</b> screen brightness, background apps/radios, poor signal (radio works harder), battery health degradation (Core 1 5.5), rogue/malicious apps.</li>
<li><b>Randomly reboots:</b> OS/app fault after updates, overheating, failing battery, or hardware — update, then factory-reset test, then hardware service.</li>
<li><b>Screen does not autorotate:</b> #1 cause — <b>rotation lock is enabled</b> (quick settings). Then: the app doesn't support rotation; then a failed accelerometer/gyroscope (sensor test/restart).</li>
</ul>

<h2>Connectivity issues</h2>
<ul>
<li><b>WiFi/Bluetooth/NFC/AirDrop fail:</b> the ladder from Core 1 5.5 — toggle airplane mode, verify the radio is on, forget/re-pair or rejoin, restart, reset network settings.</li>
<li><b>AirDrop specifics:</b> requires WiFi AND Bluetooth on, devices close, and receiving visibility set (Contacts Only vs Everyone) — visibility settings are the classic AirDrop "fault".</li>
<li><b>NFC:</b> must be enabled; remove thick cases; correct antenna position against the terminal.</li>
</ul>

<h2>Mobile issue pick-list</h2>
<table>
<tr><th>Symptom</th><th>First fixes</th></tr>
<tr><td>App crashes on launch</td><td>Force-stop → clear cache/data → update/reinstall</td></tr>
<tr><td>OS update won't install</td><td>Free storage + charge/plugged in</td></tr>
<tr><td>Rapid battery drain</td><td>Battery usage stats (rogue app vs worn battery)</td></tr>
<tr><td>Screen won't rotate</td><td>Rotation lock in quick settings</td></tr>
<tr><td>AirDrop fails</td><td>WiFi + Bluetooth on; receiver visibility</td></tr>
<tr><td>Contactless pay fails after metal case</td><td>NFC blocked — remove/change case</td></tr>
<tr><td>2% storage; slow/crashy</td><td>Free space immediately</td></tr>
<tr><td>Random reboots after update</td><td>Patch → remove new apps → factory reset → hardware</td></tr>
<tr><td>One WiFi network: connected, no internet</td><td>Forget network and rejoin</td></tr>
</table>
<div class="keyfact"><b>App-local first:</b> force-stop and clear cache beat factory reset for a single crashing app. Escalate device-wide only when apps/OS keep failing.</div>
`,
quiz:[
{q:"An app crashes on launch after months of working. Rank the FIRST two steps of the standard fix ladder.", o:["Factory reset, then reinstall","Force-stop the app and clear its cache/data, then update or reinstall it","Root the device, then patch","Replace the battery"], a:1, e:"Start app-local: force-stop and clear cache/data resolves most corrupt-state crashes; updating/reinstalling follows before any device-level surgery."},
{q:"A phone refuses to install its OS update, showing no error beyond 'unable to update'. Which TWO are the most common blockers?", o:["SIM lock and NFC","Insufficient free storage and insufficient battery charge","Bluetooth off and rotation lock","Roaming and dark mode"], a:1, e:"OS updates need gigabytes of space and a minimum battery level (or charger connected) — the two universal prerequisites to check first."},
{q:"A phone's battery drains far faster than usual. Which built-in check identifies the culprit?", o:["Storage settings","The battery usage statistics showing per-app consumption","The IMEI menu","Screen resolution"], a:1, e:"Battery stats rank apps by drain — revealing rogue, buggy, or malicious apps (which also feeds the 3.5 security picture)."},
{q:"A user reports their screen 'stopped rotating' in every app. What is the FIRST thing to check?", o:["The gyroscope with a hardware test","The rotation-lock toggle in quick settings","A factory reset","The screen protector"], a:1, e:"Rotation lock is the overwhelmingly common cause — the one-tap check before sensor diagnostics."},
{q:"AirDrop between two iPhones fails though both have Bluetooth on. Which TWO further requirements must be met?", o:["NFC on and 5G","WiFi enabled on both, and receiving visibility set appropriately (Contacts Only vs Everyone)","Same Apple ID and a cable","Developer mode"], a:1, e:"AirDrop needs BOTH radios (WiFi + Bluetooth) plus the receiver's visibility allowing the sender — visibility is the classic gotcha."},
{q:"Contactless payment fails at every terminal since the user fitted a rugged metal-backed case. What is the cause?", o:["The bank blocked the card","The case is blocking the NFC antenna — remove it or use a compatible case","NFC needs WiFi","The terminal firmware"], a:1, e:"NFC's centimetre-range coupling is easily blocked by thick or metallic cases — a physical-layer fault, not a settings one."},
{q:"A phone with 2% storage free is slow, apps crash, and photos won't save. What is the remediation?", o:["Factory reset only","Free up storage (offload media/apps, clear caches) — full storage degrades the whole OS","New SIM","Disable autorotate"], a:1, e:"Mobile OSs need working space; near-full storage causes system-wide slowness and failures. Clearing space is the direct fix."},
{q:"A phone randomly reboots several times daily, starting after an OS update. Order the sensible escalation.", o:["Hardware service first","Check for a newer patch/update, remove recently added apps, then backup + factory reset; persistent reboots after reset indicate hardware (battery) service","Replace the screen","Toggle airplane mode"], a:1, e:"Software causes (bad update, rogue app) are eliminated first — cheap and reversible; a post-reset persistence proves hardware."},
{q:"Bluetooth audio keeps failing to a car kit that used to work (crossover from Core 1). What is the standard first remedy?", o:["Factory reset","Forget the pairing on both devices and re-pair","New head unit","Disable WiFi"], a:1, e:"Corrupt pairing records are the usual cause — clear both sides and pair fresh before deeper resets."},
{q:"An app repeatedly 'fails to update' from the store while others update fine. Which app-store-side fix applies?", o:["Reinstall the OS","Clear the store app's cache/data and retry (after confirming storage and sign-in)","Root the phone","Turn off NFC"], a:1, e:"A wedged store cache blocks individual updates; clearing it (plus storage/sign-in checks) resolves the store-side failure without touching the app itself."}
]
},

{
id:"3.5", name:"Troubleshoot common mobile OS and application security issues",
notes:`
<h2>Risky configurations — the entry points</h2>
<table>
<tr><th>Concern</th><th>Why it matters</th></tr>
<tr><td><b>APK source / sideloading (Android)</b></td><td>Installing .apk files from outside official stores bypasses store vetting — the top malware delivery route on Android</td></tr>
<tr><td><b>Developer mode</b></td><td>Unlocks debugging (ADB) and sideloading pathways — fine for developers, an attack surface on ordinary users' devices</td></tr>
<tr><td><b>Root access / jailbreak</b></td><td>Defeats the OS security sandbox entirely: apps can gain total control; MDM compliance checks typically block rooted/jailbroken devices</td></tr>
<tr><td><b>Bootleg / malicious applications</b></td><td>Pirated or fake apps carrying malware</td></tr>
<tr><td><b>Application spoofing</b></td><td>Malicious apps imitating legitimate ones (name/icon) to harvest credentials — check developer name, reviews, install counts</td></tr>
</table>

<h2>Symptoms of a compromised mobile device</h2>
<ul>
<li><b>High network traffic / data-usage limit notifications</b> — malware exfiltrating or ad-fraud traffic burning the allowance.</li>
<li><b>Sluggish response speed</b> + battery drain + heat — hidden workloads (2.3's cryptominer pattern applies to phones too).</li>
<li><b>Limited/no internet connectivity</b> — malware interfering with or redirecting the connection.</li>
<li><b>High number of ads</b> — adware infection or hostile app.</li>
<li><b>Fake security warnings</b> — mobile scareware pushing rogue "cleaner" installs (3.2's scam, pocket-sized).</li>
<li><b>Unexpected application behaviour</b> — apps opening themselves, settings changing, new unknown apps.</li>
<li><b>Leaked personal files/data</b> — accounts/photos appearing where they shouldn't: assume device or credential compromise.</li>
</ul>
<div class="callout"><b>Remediation pattern:</b> identify and uninstall the offending app (check battery/data stats for the culprit) → run mobile anti-malware → revoke odd permissions/profiles → update the OS → if trust is gone, backup, factory reset, restore selectively, change passwords. And for enterprises: MDM detects root/jailbreak and non-compliance and can quarantine the device.</div>

<h2>Compromise triad + response</h2>
<table>
<tr><th>Signal</th><th>Meaning / action</th></tr>
<tr><td>Unexpected data usage + heat + lag</td><td>Hidden malware workload — check battery + data stats</td></tr>
<tr><td>Sideloaded "free" APK then ads/flood</td><td>Untrusted APK vector — uninstall + scan</td></tr>
<tr><td>Bank app with wrong developer</td><td>App spoofing — remove, change credentials, MFA</td></tr>
<tr><td>Root / jailbreak on enrolled phone</td><td>MDM quarantine — sandbox untrusted</td></tr>
<tr><td>Developer mode + unknown-apps install</td><td>Attack surface — disable if not a developer</td></tr>
<tr><td>Scareware "install cleaner now"</td><td>Don't install; remove scareware; legitimate scan</td></tr>
<tr><td>Photos leaked; device suspect</td><td>Clean device for password resets + MFA; reset phone if needed</td></tr>
</table>
<div class="keyfact"><b>Sideloading trap:</b> Android APKs outside official stores skip vetting — top mobile malware route. Enterprise answer to root/sideload/non-compliance = <b>MDM</b>.</div>
`,
quiz:[
{q:"An Android user installed a 'free' version of a paid game from a forum APK link; now ads flood the device and data usage has tripled. What was the root cause?", o:["The game's servers","Sideloading an APK from an untrusted source, bypassing store vetting","5G roaming","Developer mode being off"], a:1, e:"Out-of-store APKs skip every safety check — the canonical Android infection route. The bundled 'free' game carried the payload."},
{q:"Why do corporate MDM policies typically block rooted or jailbroken devices?", o:["They run slower","Root/jailbreak defeats the OS security sandbox, so corporate data on the device can't be protected or its state trusted","They can't make calls","Licensing costs"], a:1, e:"The sandbox is the phone's security foundation; with root, any app can bypass containment, making compliance guarantees impossible."},
{q:"A user searched a store for their bank's app and installed one with the right name/icon but a different developer, then entered their credentials. Which attack is this?", o:["Vishing","Application spoofing — a fake app imitating the legitimate one to harvest logins","A zero-day","Tailgating"], a:1, e:"Spoofed apps mimic branding to steal credentials. Verify developer names, reviews, and install counts — and change the credentials now."},
{q:"A phone receives its data-limit warning mid-month with no change in the user's habits, runs warm, and lags. What do these indicate collectively?", o:["Carrier error","Likely malware — hidden traffic (exfiltration/ad fraud) plus background workload; check per-app data and battery stats to find the culprit","Old SIM card","WiFi calling"], a:1, e:"Unexplained traffic + heat + sluggishness is the compromised-device triad. Usage statistics identify the offending app for removal."},
{q:"What is 'developer mode' and why is it a security consideration on an ordinary user's phone?", o:["A faster CPU mode","A hidden settings tier enabling debugging (ADB) and sideloading pathways — expanding the attack surface if left on","A jailbreak","An MDM feature"], a:1, e:"Developer options exist for development: USB debugging and install-unknown-apps routes are exactly what attackers leverage on end-user devices."},
{q:"A phone shows persistent full-screen 'YOUR DEVICE IS INFECTED — INSTALL CLEANER NOW' warnings. What are these, and the correct response?", o:["Genuine OS alerts; install","Fake security warnings (scareware) pushing malicious 'cleaners'; never install, close, and remediate with legitimate tools","Carrier messages; reply STOP","MDM notices; comply"], a:1, e:"Mobile scareware works exactly like the desktop version (3.2) — the demanded 'fix' IS the malware."},
{q:"After a suspicious period, a user finds personal photos leaked online. Device compromise is suspected. Which response sequence is correct?", o:["Only delete the photos","Assume compromise: remove suspect apps/scan, change account passwords from a clean device, enable MFA, and if trust is gone — backup, factory reset, selective restore","Buy a new SIM","Turn off WiFi"], a:1, e:"Leaked personal data means containment plus credential rotation (from a device you trust), then rebuilding the phone's trust via reset if needed."},
{q:"Which TWO built-in statistics screens identify a hostile app on a phone?", o:["Wallpaper and ringtone menus","Battery usage and per-app data usage statistics","IMEI and serial screens","Bluetooth and NFC toggles"], a:1, e:"Malware consumes power and bandwidth — the battery and data-usage rankings expose which app is doing the consuming."},
{q:"A previously fine phone now has 'limited connectivity' — some sites fail, others redirect. In security terms, what should be suspected?", o:["Tower maintenance","Malware or a rogue profile/VPN/proxy interfering with the device's connectivity — inspect installed profiles/VPNs and remove suspicious apps","A wet SIM","Airplane mode"], a:1, e:"Connectivity manipulation (rogue VPN/proxy profiles, DNS tampering) is a mobile compromise symptom on the objectives — check configuration profiles and remediate."},
{q:"What is the enterprise-scale mechanism for detecting and responding to rooted devices, sideloading, and non-compliant configurations?", o:["Asking users","MDM compliance policies — detect root/jailbreak and policy violations, then quarantine or block corporate access","Carrier filtering","Antivirus alone"], a:1, e:"MDM continuously evaluates device state against policy and gates corporate access accordingly — the organisational answer to 3.5's whole list."}
]
}
]
,mock:[
{q:"A PC BSODs intermittently with different stop codes each time. Which cause does the VARIETY of codes most suggest, and which test follows?", o:["One bad driver; roll it back","Failing RAM; run a memory diagnostic","Malware; run the 7 steps","Failing PSU; swap it"], a:1, e:"Different codes each crash = corruption striking randomly = memory. A single repeated code leans toward one driver/component."},
{q:"A machine boots to 'No OS found' after an office move. Boot order is correct and no USB is present. What should be checked NEXT?", o:["Reinstall Windows","That the drive's cables reseated during transit / the drive is detected in firmware","The hosts file","gpupdate"], a:1, e:"Post-move detection failures are usually physical — cables shaken loose. Firmware detection first, WinRE bootrec after (Core 1 5.3 crossover)."},
{q:"Which repair should be attempted BEFORE a full Windows reinstall when system files are corrupt but data/apps must survive?", o:["Format C:","sfc /scannow, then a repair (in-place) installation if needed","diskpart clean","Rebuild the profile"], a:1, e:"The escalation runs sfc → repair install → clean reinstall. The repair install relays OS files while preserving apps and data."},
{q:"A single user's Outlook, Teams, and Explorer misbehave; other accounts on the same PC are fine. What is the standard fix?", o:["Reimage the machine","Rebuild that user's profile","Replace the RAM","Reset Winsock"], a:1, e:"One-profile-only symptoms with a clean second account isolate profile corruption — rebuild it, migrate data."},
{q:"Windows Update fails at 0x8… repeatedly; disk space is fine. Which TWO non-malware causes are worth checking before suspecting infection?", o:["The wallpaper and theme","The Windows Update service state and pending-restart/corrupt update cache (plus the troubleshooter)","BIOS version and RGB","The DNS TTL"], a:1, e:"Update failures commonly trace to stuck services or a corrupt update cache — the troubleshooter and service restart precede darker theories; persistent failure with other symptoms then raises malware."},
{q:"A browser's search results all route through an unknown 'search portal'. The hosts file is clean. Where NEXT?", o:["The PSU","Browser extensions and the browser's search-engine/homepage settings (then DNS/proxy)","The certificate store","Event Viewer"], a:1, e:"Redirection's insertion points in order of likelihood after hosts: hijacked extensions and browser settings, then network-level DNS/proxy tampering."},
{q:"A user's PC shows fake AV popups. The technician confirms infection. According to the 7 steps, what happens before ANY scanning?", o:["Create a restore point","Quarantine the machine and disable System Restore","Educate the user","Enable Safe Mode permanently"], a:1, e:"After verification: isolate (step 2), then disable restore (step 3). Only then does remediation/scanning begin."},
{q:"Why would restoring from a restore point created LAST WEEK reinfect a just-cleaned PC?", o:["Restore points expire","The restore point captured the infected state — which is why restore is disabled before cleaning and a NEW point made after","Restore reformats","AV deletes restore"], a:1, e:"Restore points are snapshots — infected then, infected on restore. Steps 3 and 6 exist precisely for this."},
{q:"Which environment should stubborn malware be scanned from, and why?", o:["Normal boot with all apps open","Safe Mode or the preinstallation/recovery environment, where the malware isn't running to defend itself","BIOS setup","A guest account"], a:1, e:"Denying the malware execution is the point — minimal/offline environments expose what a live infected OS conceals."},
{q:"The final step of malware removal is user education. Which topics complete the loop for a phishing-delivered infection?", o:["CPU architecture","Recognising phishing, verifying senders/links, and reporting suspicious messages","RAID levels","Port numbers"], a:1, e:"Education targets the vector that succeeded — phishing awareness turns the user from vulnerability into detector."},
{q:"An office PC cleaned of malware yesterday shows identical symptoms today. Which TWO procedural failures are the likely explanations?", o:["Wrong wallpaper; slow WiFi","Restore was never disabled (rollback reinfected it) or the entry vulnerability was never patched (step 5 skipped)","Too many scans; old BIOS","Wrong SSID"], a:1, e:"Recurrence points at surviving restore points or an unpatched entry hole — the exact steps (3 and 5) that get skipped in rushed cleans."},
{q:"A phone's battery drains overnight from full while unused, and it feels warm at wake. Which check identifies whether an app or the battery is at fault?", o:["The IMEI","Battery usage stats: a named app dominating = software; uniform drain with poor health % = battery hardware","Storage settings","Airplane test only"], a:1, e:"Battery stats separate rogue-consumer diagnoses from capacity-degradation diagnoses — the fork in the repair path."},
{q:"An iPhone won't AirDrop to a nearby colleague set to 'Contacts Only'. The transfer works when they switch to 'Everyone for 10 minutes'. What was the issue?", o:["Bluetooth interference","Receiving-visibility settings — the sender wasn't in the receiver's contacts","NFC disabled","WiFi channel overlap"], a:1, e:"AirDrop visibility gating is the classic 'fault': Contacts Only requires the sender's details in the receiver's contacts."},
{q:"A tablet's OS update fails at 40% battery, unplugged. Why do vendors enforce a charge threshold for updates?", o:["Marketing","Power loss mid-update can corrupt the OS partition and brick the device","To sell chargers","Battery calibration"], a:1, e:"Firmware/OS writes interrupted by power loss can leave the device unbootable — hence minimum charge or charger-connected requirements."},
{q:"A user's phone shows apps opening by themselves and settings changing. List the correct first response.", o:["Ignore it","Treat as compromise: review/remove unknown apps and profiles, run anti-malware, change passwords — escalating to backup and factory reset if behaviour persists","Just reboot monthly","Disable the screen lock"], a:1, e:"Unexpected app behaviour is a compromise symptom on the objectives — remediate app-level first, rebuild trust via reset if it persists."},
{q:"Which Android setting combination represents the highest infection risk profile?", o:["Store-only installs, updates on","Developer mode on, 'install unknown apps' enabled, APKs sideloaded from forums","MDM enrolled, encrypted","Bluetooth off"], a:1, e:"That trio bypasses every store protection and opens debug pathways — the maximal attack surface for a non-developer."},
{q:"A 'system cleaner' app a user installed after a scary popup now shows persistent notifications demanding payment to 'remove viruses'. Categorise and remediate.", o:["Legitimate AV; pay","Mobile scareware/rogue security app; uninstall it (Safe Mode if it resists), scan with legitimate tools, review granted permissions","OS feature; disable","Carrier bloatware; ignore"], a:1, e:"The 'cleaner' is the infection. Removal (using Safe Mode where it blocks uninstall), a real scan, and permission review complete the clean."},
{q:"Sluggish response, hot chassis, and high mobile data usage — but the user installed 'nothing'. Their teenager sideloaded a game emulator last week. What does the exam expect you to identify?", o:["Faulty digitizer","A bootleg/malicious app introduced by sideloading — the compromised-device symptom triad with a known vector","5G radio fault","Screen burn-in"], a:1, e:"Symptoms + vector = diagnosis: the sideloaded bootleg app is the presumptive cause; uninstall, scan, and educate (both users)."},
{q:"A company detects an enrolled phone was jailbroken. What does MDM typically do, and why?", o:["Nothing","Flag it non-compliant and quarantine/block corporate access — the security sandbox can no longer be trusted","Improve its signal","Wipe the user's personal photos automatically"], a:1, e:"Root/jailbreak detection → compliance failure → access revocation until the device returns to a trusted state. Proportionate protection of corporate data."},
{q:"A PC is slow; Task Manager shows 100% disk on an old 5,400 RPM HDD with 95% used space, dozens of startup apps, and 4 GB RAM under Windows 11. Order the impact of remediations.", o:["New wallpaper first","SSD migration + RAM addition are the hardware fixes; trimming startup apps and freeing space are the immediate software relief","Reinstall Windows weekly","Disable the page file"], a:1, e:"This is the composite 'sluggish system' scenario: quick wins from startup/storage hygiene; the durable fix is SSD + RAM (Core 1 3.3/3.2 crossover)."},
{q:"Which symptom pairing correctly matches its subdomain diagnosis?", o:["Certificate warnings everywhere + wrong clock → hardware fault","Redirected browsing + hosts file entries → malware tampering (3.2)","Autorotate failure → malware","App spoofing → PSU"], a:1, e:"Hosts-file redirection is 3.2's signature PC security symptom. (The clock scenario is a time issue; autorotate is rotation lock/sensor.)"},
{q:"A user asks why the technician 'wasted time' disconnecting their infected PC from the network before cleaning it. The correct justification?", o:["Habit","Quarantine prevents lateral spread to other machines and stops data exfiltration while the malware is still live","The scan runs faster offline","IT policy says so, reason unknown"], a:1, e:"Step 2's purpose in one sentence: contain the blast radius during the window when the malware still runs."},
{q:"Following remediation, which TWO artifacts should exist before the ticket closes (combining 3.3 with the Core 1 methodology)?", o:["A meme and a screenshot","A fresh known-clean restore point, and documentation of findings/actions/outcomes","Two reboots","A BIOS update"], a:1, e:"Step 6's clean baseline plus the methodology's step-6 documentation — the recovery point and the paper trail."},
{q:"A phone connects to WiFi but has 'no internet' only on that network; cellular works, other devices on the WiFi are fine. What is the most productive first fix?", o:["Factory reset","Forget the network and rejoin (then reset network settings if needed)","New router","Disable NFC"], a:1, e:"Single-device, single-network failures are stale association/config — forget-and-rejoin repairs the pairing before any broader resets."},

{
id:"4.1", name:"Implement best practices for documentation and support systems information management",
notes:`
<h2>Ticketing systems — the anatomy of a good ticket</h2>
<ul>
<li>Captured fields: <b>user information</b>, <b>device information</b>, <b>description of the problem</b>, <b>categories</b> (routing), <b>severity</b> (prioritisation), <b>escalation levels</b> (tier 1 → 2 → 3).</li>
<li><b>Clear, concise written communication</b> at three points: the <b>problem description</b> (symptoms, when, what changed), <b>progress notes</b> (what's been tried — so anyone can pick it up), and the <b>problem resolution</b> (what fixed it — feeds the knowledge base).</li>
</ul>

<h2>Asset management</h2>
<ul>
<li><b>Inventory lists / database system</b> — every device recorded; <b>asset tags and IDs</b> physically link hardware to records.</li>
<li><b>Procurement life cycle</b> — request → purchase → deploy → maintain → retire/dispose (2.8 crossover at the end).</li>
<li>Track <b>warranty and licensing</b> and the <b>assigned user</b> per asset.</li>
</ul>

<h2>Document types — know each one's job</h2>
<table>
<tr><th>Document</th><th>Purpose</th></tr>
<tr><td><b>AUP (acceptable use policy)</b></td><td>What users may/may not do with company IT</td></tr>
<tr><td><b>Network topology diagram</b></td><td>Map of the network's devices and connections</td></tr>
<tr><td><b>Regulatory compliance requirements</b></td><td>Legal obligations (GDPR, PCI…); <b>splash screens</b> present policy/legal notices at login</td></tr>
<tr><td><b>Incident report</b></td><td>Formal record of a security/safety event (4.6 crossover)</td></tr>
<tr><td><b>SOP (standard operating procedure)</b></td><td>Step-by-step for routine tasks — e.g. <b>custom installation of a software package</b></td></tr>
<tr><td><b>New-user setup checklist</b></td><td>Onboarding: account, hardware, access, training</td></tr>
<tr><td><b>End-user termination checklist</b></td><td>Offboarding: disable accounts, recover assets, revoke access — promptly</td></tr>
<tr><td><b>Knowledge base/articles</b></td><td>Searchable solutions from past tickets — resolution notes become articles</td></tr>
</table>
`,
quiz:[
{q:"A ticket reads 'PC broken, fixed it'. Why does this fail best practice, and what should it contain?", o:["Too short for billing","No usable problem description, progress notes, or resolution — nobody can learn from it or pick it up; it should record symptoms, steps tried, and the actual fix","Missing the user's birthday","It should be verbal"], a:1, e:"Tickets are organisational memory: description → progress → resolution. 'Fixed it' leaves the next technician (and the knowledge base) with nothing."},
{q:"Which ticket field determines how urgently an issue is worked, and which routes it to the right team?", o:["Description and asset tag","Severity determines urgency; category routes it","User info and device info","Escalation and warranty"], a:1, e:"Severity drives prioritisation (server down vs cosmetic bug); categories route tickets to the right queue."},
{q:"Tier 1 cannot resolve a networking fault and passes it to a senior engineer with full notes. What is this process called?", o:["Delegation dumping","Escalation through support levels","Change management","Termination"], a:1, e:"Structured escalation moves tickets up expertise tiers — with progress notes making the handoff seamless."},
{q:"What physically connects a laptop to its record in the asset database?", o:["The user's memory","An asset tag/ID affixed to the device","The MAC address printed on the box","Its wallpaper"], a:1, e:"Asset tags carry the unique ID linking hardware to inventory records — user, warranty, licence, history."},
{q:"An employee resigns. Which document ensures accounts are disabled, equipment recovered, and access revoked without anything forgotten?", o:["The AUP","The end-user termination (offboarding) checklist","A splash screen","The topology diagram"], a:1, e:"Termination checklists make offboarding complete and prompt — forgotten accounts are classic insider-threat leftovers (2.4 crossover)."},
{q:"Which document tells every employee what they may and may not do with company computers and internet?", o:["SOP","The acceptable use policy (AUP)","MSDS","The knowledge base"], a:1, e:"The AUP defines permitted use of company IT — typically acknowledged at hire and via login splash screens."},
{q:"A technician planning firewall changes needs to see how the network's devices interconnect. Which document?", o:["The asset database","The network topology diagram","The AUP","A ticket export"], a:1, e:"Topology diagrams map devices and connections — the reference for planning and troubleshooting network changes."},
{q:"Installing the company's ERP client involves 14 exact steps that must be identical on every machine. What should exist?", o:["A verbal tradition","An SOP for the custom software installation","A splash screen","An incident report"], a:1, e:"Standard operating procedures make routine-but-precise tasks repeatable by anyone — the objectives name custom package installation as the example."},
{q:"Where should the resolution of a novel, tricky problem end up so the next occurrence takes minutes?", o:["The technician's memory","A knowledge base article","A deleted ticket","The AUP"], a:1, e:"Resolution notes graduating into KB articles is how support organisations learn — search first, solve once."},
{q:"At login, staff see a banner stating monitoring policies and legal terms before proceeding. What is this, and which documentation category does it serve?", o:["Adware; remove it","A splash screen presenting regulatory compliance/policy notices","A phishing test","The topology diagram"], a:1, e:"Splash screens deliver compliance and policy notices at the point of access — listed under regulatory compliance requirements."}
]
},

{
id:"4.2", name:"Explain basic change-management best practices",
notes:`
<h2>Why change management exists</h2>
<p>Uncontrolled changes cause outages. Change management makes changes <b>deliberate, approved, reversible, and communicated</b>.</p>

<h2>The documented business process</h2>
<table>
<tr><th>Element</th><th>Meaning</th></tr>
<tr><td><b>Request form</b></td><td>The formal proposal starting the process</td></tr>
<tr><td><b>Purpose of the change</b></td><td>Why — the problem it solves / benefit</td></tr>
<tr><td><b>Scope of the change</b></td><td>Exactly what is and is not included — which systems, users, sites</td></tr>
<tr><td><b>Date and time</b></td><td>Scheduled window — typically out-of-hours to minimise disruption</td></tr>
<tr><td><b>Affected systems / impact</b></td><td>What could break, who is affected, downtime expected</td></tr>
<tr><td><b>Risk analysis / risk level</b></td><td>Likelihood × severity of things going wrong — drives scrutiny level</td></tr>
<tr><td><b>Change board approval (CAB)</b></td><td>The committee that reviews and approves/rejects changes</td></tr>
<tr><td><b>End-user acceptance</b></td><td>Users/stakeholders confirm the change works and sign off</td></tr>
</table>

<h2>The safety nets</h2>
<ul>
<li><b>Rollback plan</b> — documented BEFORE the change: exactly how to return to the prior state if it fails. No rollback plan → no approval.</li>
<li><b>Sandbox testing</b> — prove the change in an isolated test environment first.</li>
<li><b>Responsible staff member</b> — one named owner accountable for the change end to end.</li>
</ul>
<div class="callout"><b>Exam angles:</b> "what must exist before implementing, in case it fails?" → rollback plan. "where is the change tested?" → sandbox. "who approves?" → change board/CAB. "the update broke payroll — which step was skipped?" → usually sandbox testing, risk analysis, or scope/impact assessment.</div>
`,
quiz:[
{q:"A proposed server update is scheduled, tested, and approved. What must ALSO be documented before implementation, in case the update fails?", o:["The next update","A rollback plan returning systems to their prior state","A press release","The AUP"], a:1, e:"Rollback plans are the mandatory escape hatch — defined in advance, when heads are cool and the prior state is intact."},
{q:"Where should a major application upgrade be proven before touching production?", o:["On the CEO's PC","In a sandbox/test environment isolated from production","On 10% of live users unannounced","Nowhere; vendor testing suffices"], a:1, e:"Sandbox testing catches failures where they cost nothing — the objectives' named pre-production step."},
{q:"Which body formally reviews and approves significant changes?", o:["The helpdesk","The change board (CAB)","The vendor","End users"], a:1, e:"Change advisory boards weigh purpose, scope, risk, and scheduling — approval gates implementation."},
{q:"A change request says 'upgrade stuff on some servers soon'. Which THREE required elements are missing or defective?", o:["Font, colour, logo","Defined scope, scheduled date/time, and affected-systems/impact analysis","Signature, stamp, envelope","Rollback, sandbox, CAB — which never matter"], a:1, e:"Scope must be exact, timing scheduled, and impact identified — vagueness in these is what change management exists to eliminate."},
{q:"Why are changes typically scheduled out of hours or in maintenance windows?", o:["Technicians prefer nights","To minimise impact on users and the business if systems are disrupted","Electricity is cheaper","Approvals expire at 9am"], a:1, e:"The date/time element exists to place risk where it costs least — the impact side of the analysis."},
{q:"What does 'risk level' in a change request determine?", o:["The invoice amount","The scrutiny applied — higher-risk changes need deeper review, testing, and more senior approval","The font size","Nothing; it's decorative"], a:1, e:"Risk analysis calibrates the process: a wallpaper change and a core-router replacement shouldn't face identical gates."},
{q:"After a successful change, users confirm the system works for their tasks and sign off. Which element is this?", o:["Rollback","End-user acceptance","Sandbox exit","Procurement"], a:1, e:"End-user acceptance closes the loop — the change isn't done when IT says so, but when its users confirm it works."},
{q:"An unapproved 'quick tweak' to a firewall on Friday afternoon takes down the VPN all weekend. Which failures does this illustrate?", o:["Bad luck only","Bypassing change management entirely — no request, risk analysis, approval, scheduling, or rollback plan","Too much documentation","Excessive sandbox testing"], a:1, e:"The scenario is the anti-pattern change management exists to prevent: unreviewed, unscheduled, unreversible changes to critical systems."},
{q:"What does naming a 'responsible staff member' on each change accomplish?", o:["Blame assignment for HR","Single-owner accountability for executing, monitoring, and if needed rolling back the change","Overtime calculation","Nothing"], a:1, e:"Every change needs one accountable owner shepherding it end to end — diffuse responsibility is how steps get skipped."},
{q:"Which sequence correctly orders a healthy change?", o:["Implement → request → test → approve","Request (purpose/scope/risk) → sandbox test → CAB approval → scheduled implementation with rollback ready → end-user acceptance → documentation","Approve → request → rollback → test","Test → implement → request retroactively"], a:1, e:"Propose, prove, approve, implement (reversibly), accept, document — the lifecycle in order."}
]
},

{
id:"4.3", name:"Given a scenario, implement workstation backup and recovery methods",
notes:`
<h2>Backup types — the core table</h2>
<table>
<tr><th>Type</th><th>What it copies</th><th>Backup speed / space</th><th>Restore needs</th></tr>
<tr><td><b>Full</b></td><td>Everything, every time</td><td>Slowest, most space</td><td>Just the one full — fastest restore</td></tr>
<tr><td><b>Incremental</b></td><td>Changes since the <b>last backup of any type</b></td><td>Fastest, least space</td><td>Last full + <b>every incremental since</b> — slowest restore</td></tr>
<tr><td><b>Differential</b></td><td>Changes since the <b>last FULL</b></td><td>Grows daily until next full</td><td>Last full + <b>only the latest differential</b></td></tr>
<tr><td><b>Synthetic full</b></td><td>Server combines the last full + subsequent increments into a new full — without re-reading the workstation</td><td>Full-backup benefits without the client/network load</td><td>As a full</td></tr>
</table>
<div class="callout"><b>The classic question:</b> full on Sunday, incrementals Mon–Fri, failure Thursday → restore Sunday's full + Mon, Tue, Wed incrementals in order. Same scheme with differentials → Sunday's full + Wednesday's differential only.</div>

<h2>Backup testing</h2>
<ul>
<li>An untested backup is a hope, not a backup. <b>Regularly scheduled test restores</b> verify the data actually comes back — frequency set by policy (and by how much you like your job).</li>
</ul>

<h2>Rotation schemes and rules</h2>
<ul>
<li><b>On-site vs off-site:</b> on-site restores fast; off-site (or cloud) survives fire/theft/site loss. You want both.</li>
<li><b>GFS (grandfather-father-son):</b> generational rotation — <b>son</b> = daily, <b>father</b> = weekly, <b>grandfather</b> = monthly; balances retention depth against media count.</li>
<li><b>3-2-1 rule:</b> <b>3</b> copies of the data, on <b>2</b> different media/types, with <b>1</b> off-site. The gold-standard memory hook — and ransomware's kryptonite when one copy is offline/immutable.</li>
</ul>
`,
quiz:[
{q:"A full backup runs Sunday with incrementals each weeknight. The disk dies Thursday morning. What must be restored, in order?", o:["Sunday's full only","Sunday's full, then Monday's, Tuesday's, and Wednesday's incrementals in sequence","Wednesday's incremental only","Sunday's full plus Wednesday's incremental"], a:1, e:"Incrementals each hold only that day's changes — the full plus EVERY subsequent incremental, in order, rebuilds Thursday-morning state."},
{q:"Same schedule but with DIFFERENTIALS instead: what does Thursday's restore require?", o:["The full plus all three differentials","Sunday's full plus Wednesday's differential only","Wednesday's differential only","All four differentials"], a:1, e:"Each differential contains everything since the last full — so the full plus the most recent differential suffices. The incremental/differential restore contrast is the exam's favourite backup question."},
{q:"Which backup type is fastest to CREATE nightly, and which is fastest to RESTORE from?", o:["Full to create; incremental to restore","Incremental to create; full to restore","Differential for both","Synthetic for neither"], a:1, e:"Incrementals copy the least (fast create, long restore chains); a full restores in one step (slow create). The trade-off defines the schemes."},
{q:"What is a synthetic full backup?", o:["A fake backup for testing","A full backup constructed server-side by merging the last full with subsequent incrementals — no full re-read of the workstation","A compressed differential","A cloud-only backup"], a:1, e:"Synthetic fulls deliver full-backup restore simplicity without hammering the client and network each cycle — the server does the merging."},
{q:"In a GFS rotation, what do son, father, and grandfather represent?", o:["Three technicians","Daily, weekly, and monthly backup generations","Three RAID levels","Test, staging, production"], a:1, e:"Grandfather-father-son cycles media generationally: sons daily, fathers weekly, grandfathers monthly — depth of retention with bounded media."},
{q:"State the 3-2-1 backup rule.", o:["3 backups, 2 technicians, 1 server","3 copies of data, on 2 different media types, with 1 copy off-site","3 days, 2 weeks, 1 month","3 fulls, 2 differentials, 1 incremental"], a:1, e:"Three copies, two media, one off-site — the resilience formula covering device failure, media failure, and site loss."},
{q:"A company backs up nightly to a NAS in the same server room. A fire destroys the room. Which principle was violated?", o:["GFS","The off-site (the '1' in 3-2-1) requirement — all copies shared the site's fate","Incremental chaining","Backup testing"], a:1, e:"On-site-only backups die with the site. Off-site or cloud copies exist precisely for fire/flood/theft scenarios."},
{q:"Backups have run green for two years, but the first real restore attempt produces corrupt, unusable data. What practice was missing?", o:["Bigger disks","Regularly scheduled test restores verifying recoverability","GFS labelling","Encryption"], a:1, e:"Success logs prove the job ran, not that data restores. Scheduled test restores are the only proof of an actual backup."},
{q:"Which backup property specifically blunts ransomware (which encrypts everything it can reach)?", o:["Speed","An offline/immutable off-site copy the malware cannot reach and encrypt","Compression ratio","Differential chaining"], a:1, e:"Ransomware encrypts connected storage — including reachable backups. The unreachable copy (offline/immutable/off-site) is what survives (2.3 crossover)."},
{q:"Why does differential backup size GROW each day between fulls?", o:["Media degradation","Each differential contains ALL changes since the last full — accumulating until the next full resets it","Compression weakens","It doesn't"], a:1, e:"Differentials re-copy everything changed since the full, so Wednesday's includes Monday's and Tuesday's changes too — the cost of the simpler restore."}
]
},
