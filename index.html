{
id:"2.4", name:"Explain common social-engineering attacks, threats, and vulnerabilities",
notes:`
<h2>Social engineering — attacking the human</h2>
<table>
<tr><th>Attack</th><th>Definition</th></tr>
<tr><td><b>Phishing</b></td><td>Fraudulent email/message harvesting credentials or delivering malware</td></tr>
<tr><td><b>Vishing</b></td><td>Voice phishing — fraudulent phone calls ("IT support needs your password")</td></tr>
<tr><td><b>Whaling</b></td><td>Phishing targeted at executives/high-value targets</td></tr>
<tr><td><b>Shoulder surfing</b></td><td>Watching someone enter credentials/data (defence: privacy screens)</td></tr>
<tr><td><b>Tailgating</b></td><td>Following an authorised person through a secure door (defence: vestibules, badges, culture)</td></tr>
<tr><td><b>Impersonation</b></td><td>Pretending to be someone trusted (delivery driver, IT, executive)</td></tr>
<tr><td><b>Dumpster diving</b></td><td>Retrieving sensitive info from rubbish (defence: shredding)</td></tr>
<tr><td><b>Evil twin</b></td><td>Rogue WiFi AP mimicking a legitimate SSID to intercept traffic</td></tr>
</table>

<h2>Technical threats</h2>
<table>
<tr><th>Threat</th><th>Definition</th></tr>
<tr><td><b>DoS / DDoS</b></td><td>Overwhelming a service — Distributed = from many (botnet) sources at once</td></tr>
<tr><td><b>Zero-day</b></td><td>Exploiting a vulnerability unknown to the vendor — no patch exists yet</td></tr>
<tr><td><b>Spoofing</b></td><td>Forging an identity — IP, MAC, email sender, caller ID</td></tr>
<tr><td><b>On-path attack</b> (man-in-the-middle)</td><td>Attacker inserts themselves between two parties, relaying/altering traffic</td></tr>
<tr><td><b>Brute-force</b></td><td>Trying every possible password (defence: lockouts, MFA, long passwords)</td></tr>
<tr><td><b>Dictionary attack</b></td><td>Trying likely words/known passwords first — beats bad passwords fast</td></tr>
<tr><td><b>Insider threat</b></td><td>Malicious or negligent people with legitimate access</td></tr>
<tr><td><b>SQL injection</b></td><td>Malicious database commands entered via input fields of poorly coded apps</td></tr>
<tr><td><b>XSS (cross-site scripting)</b></td><td>Injecting malicious scripts into websites that then run in victims' browsers</td></tr>
</table>

<h2>Vulnerabilities — weaknesses awaiting exploitation</h2>
<ul>
<li><b>Non-compliant systems</b> — machines drifted out of security policy/configuration baselines.</li>
<li><b>Unpatched systems</b> — known holes with fixes available but not applied.</li>
<li><b>Unprotected systems</b> — missing antivirus or firewall.</li>
<li><b>EOL OSs</b> — no patches will ever come (1.8 crossover).</li>
<li><b>BYOD</b> — personal devices touching corporate data: unmanaged patch state, apps, and loss risk (mitigate with MDM/MAM policy).</li>
</ul>

<h2>Scenario pick-list — name the attack</h2>
<table>
<tr><th>Scenario</th><th>Attack / issue</th></tr>
<tr><td>Email from "bank" asking you to log in via a link</td><td>Phishing</td></tr>
<tr><td>Phone call: "IT needs your password"</td><td>Vishing</td></tr>
<tr><td>Personalised email to the CEO demanding a wire transfer</td><td>Whaling</td></tr>
<tr><td>Someone watches you type a PIN on the train</td><td>Shoulder surfing</td></tr>
<tr><td>Stranger follows you through a badge door</td><td>Tailgating</td></tr>
<tr><td>Fake "CoffeeShop_FreeWiFi" capturing logins</td><td>Evil twin</td></tr>
<tr><td>Exploit with no vendor patch yet</td><td>Zero-day</td></tr>
<tr><td>Fix released in January; 40 PCs never installed it</td><td>Unpatched systems (not zero-day)</td></tr>
<tr><td>Login form accepts <code>' OR 1=1--</code> and dumps users</td><td>SQL injection</td></tr>
<tr><td>Malicious script in a forum post runs in visitors' browsers</td><td>XSS</td></tr>
</table>
<div class="keyfact"><b>Zero-day vs unpatched:</b> zero-day = no patch exists yet. Unpatched = patch exists but wasn't applied. Exam loves this split.</div>
`,
quiz:[
{q:"The finance director receives a highly personalised email, apparently from the CEO, urgently requesting a wire transfer. Which attack is this?", o:["Vishing","Whaling","Shoulder surfing","An evil twin"], a:1, e:"Executive-targeted phishing is whaling — personalised, high-value, often invoking authority and urgency."},
{q:"A caller claiming to be 'from Microsoft support' phones a user and asks for their password to 'fix an infection'. Which attack?", o:["Phishing","Vishing","Spoofing","Tailgating"], a:1, e:"Voice-channel social engineering is vishing. (The caller ID may also be spoofed, but the attack via phone call is vishing.)"},
{q:"At a coffee shop, a customer connects to 'CoffeeShop_FreeWiFi' — which is actually an attacker's access point capturing their logins. What is this?", o:["An on-path proxy","An evil twin","Wardriving","A rogue DHCP"], a:1, e:"An evil twin impersonates a legitimate SSID to lure connections and intercept traffic — the WiFi flavour of on-path attack."},
{q:"An employee holds the secure door open for a stranger carrying boxes. Which attack succeeded, and which physical control defeats it?", o:["Impersonation; CCTV","Tailgating; an access control vestibule","Dumpster diving; shredders","Shoulder surfing; privacy filters"], a:1, e:"Following someone through on their credential is tailgating; vestibules force one authenticated person per cycle. (The boxes are impersonation garnish.)"},
{q:"Which attack exploits a vulnerability for which NO patch exists because the vendor doesn't yet know about it?", o:["Brute force","Zero-day","Dictionary","XSS"], a:1, e:"Zero-days are unknown-to-the-vendor flaws — defences are layered mitigations, not patches, until disclosure."},
{q:"A website's login form crashes when a user types an apostrophe, and an attacker uses crafted input like ' OR 1=1-- to dump the user table. Which attack?", o:["XSS","SQL injection","CSRF","On-path"], a:1, e:"Malicious database syntax via input fields is SQL injection — the classic against poorly sanitised web applications."},
{q:"An attacker plants script in a forum post so that every visitor's browser executes it. Which attack?", o:["SQL injection","Cross-site scripting (XSS)","Spoofing","DoS"], a:1, e:"XSS injects scripts into web content that then run in other users' browsers — attacking the visitors, where SQLi attacks the database."},
{q:"What distinguishes a DDoS from a DoS?", o:["DDoS targets DNS only","DDoS floods from many distributed sources (typically a botnet) simultaneously","DoS is always physical","Nothing"], a:1, e:"The first D: Distributed. Traffic arrives from thousands of sources, defeating simple source-blocking."},
{q:"A disgruntled employee with legitimate admin access exfiltrates customer data before resigning. Which threat category?", o:["Zero-day","Insider threat","Spoofing","Shoulder surfing"], a:1, e:"Insider threats hold legitimate access — which is why least privilege, auditing, and prompt off-boarding matter."},
{q:"Which scenario describes the BYOD vulnerability?", o:["Company laptops missing patches","Personal phones with unknown patch levels and apps accessing corporate email","Servers past end of life","PCs with no antivirus"], a:1, e:"BYOD's risk is unmanaged personal devices touching corporate data — mitigated by MDM/MAM enrolment requirements and policy."}
]
},
/* ---------------- 2.5 ---------------- */
{
id:"2.5", name:"Manage and configure basic security settings in the Windows OS",
notes:`
<h2>Defender antivirus and firewall</h2>
<ul>
<li><b>Windows Defender/Security:</b> keep real-time protection ON and definitions updated; deactivate only briefly for diagnosis. Third-party AV supersedes it automatically.</li>
<li><b>Firewall:</b> on per profile; configure <b>application exceptions</b> and <b>port rules</b> (1.6 crossover).</li>
</ul>

<h2>Users and groups</h2>
<table>
<tr><th>Account type</th><th>Notes</th></tr>
<tr><td><b>Administrator</b></td><td>Full control — use only when needed</td></tr>
<tr><td><b>Standard user</b></td><td>Day-to-day account; can't install system-wide software or change security settings</td></tr>
<tr><td><b>Guest</b></td><td>Minimal-rights account — should be <b>disabled</b></td></tr>
<tr><td><b>Power user</b></td><td>Legacy group kept for compatibility — effectively standard user now</td></tr>
</table>
<ul>
<li><b>Local account vs Microsoft account:</b> local = this PC only; Microsoft account = cloud sign-in with settings sync, recovery, and Store integration.</li>
<li><b>Run as administrator vs standard user + UAC:</b> work as a standard user; elevate individual programs via Run as administrator. <b>UAC</b> prompts before elevation — even admins run non-elevated until they consent. Never disable it.</li>
<li><b>Login options (OS):</b> username/password, PIN, fingerprint, facial recognition (Windows Hello), <b>SSO</b> — one sign-in unlocking multiple resources (Kerberos in domains).</li>
</ul>

<h2>NTFS vs share permissions — the exam's favourite</h2>
<ul>
<li><b>Share permissions</b> apply only when accessing <b>over the network</b>. <b>NTFS permissions</b> apply <b>always</b> — network and local.</li>
<li>When both apply, the <b>most restrictive combination wins</b>.</li>
<li><b>Deny beats allow.</b> Permissions <b>inherit</b> from parent folders down (inheritance can be broken for exceptions).</li>
<li>File attributes: read-only, hidden, system, archive (basic file flags, distinct from permissions).</li>
</ul>

<h2>Encryption</h2>
<ul>
<li><b>BitLocker</b> — full-VOLUME encryption (Pro+, uses TPM). <b>BitLocker To Go</b> — the same for removable drives.</li>
<li><b>EFS (Encrypting File System)</b> — per-FILE/folder encryption tied to a user's account, on NTFS (Pro+).</li>
<li>Discriminator: whole drive → BitLocker; USB stick → BitLocker To Go; individual files, per-user → EFS.</li>
</ul>

<h2>Encryption picker</h2>
<table>
<tr><th>Need</th><th>Feature</th></tr>
<tr><td>Encrypt whole laptop volume; TPM; manage recovery keys</td><td><b>BitLocker</b> (Pro+)</td></tr>
<tr><td>Encrypt USB sticks / removables</td><td><b>BitLocker To Go</b></td></tr>
<tr><td>Encrypt specific files for one user only</td><td><b>EFS</b></td></tr>
</table>

<h2>Permissions decision tree</h2>
<ul>
<li>Accessing <b>locally</b>? → <b>NTFS only</b> (share permissions do not apply).</li>
<li>Accessing <b>over the network</b>? → apply both; <b>most restrictive wins</b>.</li>
<li>Explicit <b>Deny</b> anywhere in the effective set → Deny wins.</li>
<li>Greyed permissions matching parent → <b>inheritance</b>; break inheritance only for exceptions.</li>
</ul>
<div class="keyfact"><b>Stolen drive trap:</b> NTFS permissions fail if the attacker mounts the disk elsewhere. <b>BitLocker</b> is what stops physical theft from yielding readable data.</div>
`,
quiz:[
{q:"A user connects to a share over the network. The share permission grants Change, but NTFS grants Read only. What can they do?", o:["Change files — share wins","Read only — the most restrictive combination applies","Full control — permissions add up","Nothing — conflict blocks access"], a:1, e:"When share and NTFS permissions combine over the network, the most restrictive effective result wins: Read."},
{q:"Which permissions apply when a user signs in LOCALLY at the machine holding the files?", o:["Share permissions only","NTFS permissions only","Both","Neither"], a:1, e:"Share permissions govern network access only. Locally, NTFS permissions alone apply — a core discriminator."},
{q:"A user is in two groups: one allows Modify on a folder, the other has an explicit Deny Write. What is the outcome?", o:["Modify wins — allow beats deny","Write is denied — explicit deny overrides allows","Windows prompts to choose","Access is randomised"], a:1, e:"Explicit Deny trumps Allow entries across group memberships — the rule to remember."},
{q:"Why should staff use standard accounts with UAC rather than administrator accounts for daily work?", o:["Standard accounts are faster","Malware running as the user inherits their rights — least privilege limits the blast radius, with UAC gating elevation","Admin accounts cost licences","UAC only works for standard users"], a:1, e:"Code you run has your privileges. Standard-plus-UAC means infections can't silently make system-wide changes."},
{q:"A subfolder shows greyed-out permissions matching its parent. Why, and how are they changed for an exception?", o:["Corruption; run sfc","Inheritance from the parent; disable/override inheritance on the subfolder","EFS locking; decrypt first","Share conflict; recreate the share"], a:1, e:"NTFS permissions flow down via inheritance (greyed = inherited). Breaking inheritance on the child allows explicit exceptions."},
{q:"A company must encrypt entire laptop drives, storing recovery keys centrally, using the TPM. Which technology?", o:["EFS","BitLocker","BitLocker To Go","Defender"], a:1, e:"BitLocker is Windows' full-volume encryption, TPM-integrated, with manageable recovery keys. EFS is per-file; To Go covers removables."},
{q:"Sensitive spreadsheets on a shared workstation must be encrypted so only one user's account can open them, without encrypting the whole drive. Which feature?", o:["BitLocker","EFS","NTFS compression","The archive attribute"], a:1, e:"EFS encrypts files/folders bound to a specific user's certificate — per-user granularity BitLocker doesn't provide."},
{q:"Company policy requires USB sticks carrying work data to be encrypted. Which Windows feature enforces encrypted removable storage?", o:["EFS","BitLocker To Go","exFAT locking","ReadyBoost"], a:1, e:"BitLocker To Go extends BitLocker's volume encryption to removable drives, unlockable by password on other machines."},
{q:"Which built-in account should be verified DISABLED during a workstation security review?", o:["The user's account","Guest","Administrator (renamed)","Network Service"], a:1, e:"The Guest account allows anonymous local access and should stay disabled — a standing checklist item (and exam favourite)."},
{q:"What is the practical difference between signing into Windows with a Microsoft account versus a local account?", o:["Microsoft accounts are admin by default","Microsoft accounts sync settings/credentials via the cloud and aid recovery; local accounts exist only on that PC","Local accounts can't have passwords","No difference"], a:1, e:"Microsoft accounts are cloud identities (sync, Store, recovery); local accounts are machine-bound — the trade is convenience vs containment."}
]
},
/* ---------------- 2.6 ---------------- */
{
id:"2.6", name:"Configure workstation security best practices",
notes:`
<h2>Passwords</h2>
<ul>
<li><b>Complexity:</b> length + mixed character classes; length matters most. No dictionary words, reuse, or personal info.</li>
<li><b>Expiration:</b> periodic change policies exist on the objectives (know them), though modern guidance emphasises length + breach-driven changes.</li>
<li><b>BIOS/UEFI passwords:</b> supervisor password protects firmware settings; blocks boot-order tampering (3.4/1.9 crossover).</li>
</ul>

<h2>Account management</h2>
<ul>
<li><b>Restrict user permissions</b> — least privilege again.</li>
<li><b>Restrict login times</b> — accounts only valid during working hours.</li>
<li><b>Disable the guest account.</b></li>
<li><b>Failed-attempts lockout</b> — lock after N wrong passwords: defeats brute force.</li>
<li><b>Timeout / screen lock</b> — auto-lock after inactivity; <b>screensaver locks</b> requiring a password on wake.</li>
<li><b>Change default administrator account/password</b> — rename/disable the built-in admin; never leave default credentials anywhere (routers included).</li>
</ul>

<h2>End-user behaviours</h2>
<ul>
<li><b>Log off / lock (Win+L)</b> when leaving the desk. <b>Secure/protect critical hardware</b> (cable locks). <b>Secure PII and passwords</b> — no sticky notes, clean desks, privacy filters against shoulder surfing.</li>
</ul>

<h2>System settings</h2>
<ul>
<li><b>Encrypt data at rest</b> — BitLocker on workstations (2.5).</li>
<li><b>Disable AutoRun/AutoPlay</b> — stops removable media executing automatically on insertion: a classic malware vector (the "found USB stick in the car park" attack).</li>
</ul>

<h2>Workstation hardening checklist</h2>
<ol>
<li>Rename/disable built-in Administrator; set a unique strong password.</li>
<li>Disable Guest account.</li>
<li>Enforce password complexity + failed-attempt <b>lockout</b>.</li>
<li>Restrict login times where role allows.</li>
<li>Inactivity screen lock / screensaver password; train Win+L.</li>
<li>BitLocker on workstations; disable AutoRun/AutoPlay.</li>
<li>Set BIOS/UEFI supervisor password (block boot-order bypass).</li>
</ol>

<h2>Scenario pick-list</h2>
<table>
<tr><th>Scenario</th><th>Control</th></tr>
<tr><td>Scripted password guessing</td><td>Failed-attempts lockout</td></tr>
<tr><td>USB sticks found in car park infect PCs on insert</td><td>Disable AutoRun/AutoPlay</td></tr>
<tr><td>Warehouse staff only work 06:00–20:00</td><td>Login time restrictions</td></tr>
<tr><td>PCs left unlocked at lunch</td><td>Timeout lock + Win+L habit</td></tr>
<tr><td>Shoulder surfing / PII on open-plan screens</td><td>Privacy filters + clean desk</td></tr>
<tr><td>Default Admin account still enabled</td><td>Rename/disable + strong unique password</td></tr>
</table>
<div class="keyfact"><b>Least privilege again:</b> giving every new starter access to all shares "to be safe" is the opposite of restrict-user-permissions.</div>
`,
quiz:[
{q:"An attacker with a stolen password list scripts thousands of login attempts. Which account policy defeats this?", o:["Password hints","Failed-attempts lockout after a small number of tries","Longer usernames","Disabling UAC"], a:1, e:"Lockout thresholds stop brute-force and credential-stuffing cold — a handful of guesses, then the account locks."},
{q:"USB sticks 'found' in the car park keep infecting reception PCs the moment they're inserted. Which setting stops the automatic execution?", o:["Enable BitLocker To Go","Disable AutoRun/AutoPlay","Format all USB sticks","Enable the guest account"], a:1, e:"AutoRun/AutoPlay executes or prompts content on insertion — disabling it neutralises the drop-a-USB attack vector."},
{q:"Warehouse staff accounts should only authenticate between 06:00 and 20:00. Which control implements this?", o:["Screensaver locks","Login time restrictions on the accounts","UAC scheduling","Password expiration"], a:1, e:"Login time restrictions make accounts unusable outside defined hours — limiting after-hours misuse of credentials."},
{q:"Users leave PCs unlocked at lunch, exposing patient data. Which TWO controls address this?", o:["Longer passwords and BIOS passwords","Inactivity screen-lock/screensaver requiring a password, plus training users to lock (Win+L) when leaving","AutoPlay and guest account","EFS and exFAT"], a:1, e:"Automatic timeout locking backstops human forgetfulness; the habit of manual locking closes the gap before the timer."},
{q:"During workstation hardening, what should be done with the built-in Administrator account?", o:["Give it a blank password for recovery","Rename or disable it and set a strong unique password","Make all users members of it","Delete the OS partition"], a:1, e:"Default admin accounts are the first target (known name = half the credential). Rename/disable and secure it — same principle as router default passwords."},
{q:"Which password is configured in firmware to prevent unauthorised changes to boot order and hardware settings?", o:["The Windows Hello PIN","A BIOS/UEFI supervisor password","A RADIUS secret","The screensaver password"], a:1, e:"The supervisor/setup password protects firmware configuration — blocking boot-media bypasses of OS security."},
{q:"Which combination BEST protects PII visible in an open-plan office?", o:["Bigger monitors","Privacy filters on screens, clean-desk policy, and locking when away","Louder alarms","Disabling NTFS"], a:1, e:"Shoulder surfing and paper exposure are physical/behavioural risks — filters, clean desks, and locking habits are the matched controls."},
{q:"What is the primary security value of full-disk encryption on office desktops?", o:["Faster disk access","Data at rest is unreadable if drives are stolen or improperly disposed of","It blocks phishing","It replaces backups"], a:1, e:"Encryption at rest means physical theft of the machine or drive yields ciphertext — pairing with 2.8's disposal chapter."},
{q:"Which of these is the WEAKEST password practice, per the exam?", o:["14+ character passphrases","Reusing one strong password across all accounts","Mixing character classes","Avoiding dictionary words"], a:1, e:"Reuse means one breach unlocks everything. Unique-per-account outranks raw complexity."},
{q:"New starters receive accounts pre-configured with access to every departmental share 'to be safe'. Which principle does this violate?", o:["Defence in depth","Least privilege — permissions should be restricted to role requirements","Separation of duties","Zero-day protection"], a:1, e:"'Access to everything just in case' is the opposite of least privilege — the restrict-user-permissions bullet exists for exactly this."}
]
},

{
id:"2.7", name:"Explain common methods for securing mobile and embedded devices",
notes:`
<h2>Screen locks — weakest to strongest</h2>
<ul>
<li><b>Swipe</b> (no security) → <b>pattern</b> (smudge-guessable) → <b>PIN</b> → <b>password</b> → <b>fingerprint</b> / <b>facial recognition</b> (convenient biometrics, usually PIN-backed).</li>
<li><b>Failed-login restrictions</b> — delays, lockouts, or full device wipe after N failed attempts.</li>
</ul>

<h2>Lost/stolen device protections</h2>
<ul>
<li><b>Locator applications</b> (Find My iPhone/Device) — locate, ring, lock remotely.</li>
<li><b>Remote wipe</b> — erase the device over the air once it's deemed lost; requires prior enrolment (MDM or account features).</li>
<li><b>Remote backup</b> — cloud backups mean a wiped/lost device costs no data.</li>
<li><b>Device encryption</b> — default on modern iOS/Android; renders storage unreadable without the credential.</li>
</ul>

<h2>Software protections</h2>
<ul>
<li><b>Antivirus/anti-malware</b> — mainly an Android concern (open ecosystem); <b>firewalls</b> available on mobile platforms too.</li>
<li><b>Patching/OS updates</b> — the perpetual baseline.</li>
</ul>

<h2>Policies</h2>
<ul>
<li><b>BYOD vs corporate-owned:</b> personal devices (MAM containers protect corporate data only, 1.4 Core 1 crossover) vs company devices (full MDM control).</li>
<li><b>Profile security requirements</b> — MDM-pushed configuration profiles enforce passcodes, encryption, app restrictions before granting access.</li>
<li><b>IoT devices</b> — change default credentials, patch firmware, and <b>segment onto their own network/VLAN</b> (Core 1 2.4 crossover).</li>
</ul>

<h2>Lost / stolen decision tree</h2>
<table>
<tr><th>Situation</th><th>Action</th></tr>
<tr><td>Mislaid in the building — hope to find it</td><td>Locator app (map + ring)</td></tr>
<tr><td>Confirmed stolen with corporate data</td><td><b>Remote wipe</b> (needs prior MDM/account enrolment)</td></tr>
<tr><td>BYOD; wipe work email only, keep photos</td><td><b>MAM</b> container wipe</td></tr>
<tr><td>Corporate-owned; full device control</td><td><b>MDM</b> (passcode, encrypt, remote wipe)</td></tr>
<tr><td>Thief guessing the PIN offline</td><td>Failed-attempt lockout / wipe after N tries</td></tr>
</table>
<div class="keyfact"><b>Passcode ≠ encryption alone:</b> the lock screen gates the UI; encryption protects storage if the thief chips the disk. Modern phones pair them — passcode unlocks the encryption key.</div>
<div class="keyfact"><b>IoT trio:</b> change defaults → patch firmware → segment VLAN. Never leave cameras/thermostats on the staff LAN with factory passwords.</div>
`,
quiz:[
{q:"Which screen-lock method provides essentially NO security?", o:["Pattern","Swipe","PIN","Fingerprint"], a:1, e:"Swipe merely prevents pocket dialling. Everything else at least requires knowledge or biometrics."},
{q:"A company phone is confirmed stolen with sensitive email on it. Which capability, prepared in advance, protects the data NOW?", o:["Antivirus","Remote wipe via MDM or account tooling","A longer PIN","A locator app after the fact"], a:1, e:"Remote wipe erases the device over the air — but only works if enrolment happened beforehand. Encryption + wipe is the stolen-device answer."},
{q:"A user mislays their phone somewhere in the building. Which feature finds it fastest?", o:["Remote wipe","A locator application (with the ring function)","Device encryption","Failed-login restrictions"], a:1, e:"Locator apps map and ring the device — wipe would be premature for a phone under the sofa."},
{q:"What does setting 'erase device after 10 failed passcode attempts' defend against?", o:["Phishing","Offline brute-forcing of the passcode on a stolen device","SIM swapping","Malware"], a:1, e:"Failed-login restrictions cap guessing attempts — combined with encryption, the stolen device becomes a brick rather than a puzzle."},
{q:"Why does device encryption matter if the phone already has a strong passcode?", o:["It doesn't","Without encryption, storage could be read directly (chip-off/adapters) bypassing the lock screen; encryption makes data unreadable without the key","Encryption speeds up the phone","Passcodes expire"], a:1, e:"Lock screens gate the UI; encryption protects the storage itself. Modern devices pair them — the passcode unlocks the encryption key."},
{q:"An employee's personal phone will access corporate email. The company must be able to remove corporate data without touching personal photos. Which policy/tooling pairing fits?", o:["Corporate-owned + full MDM","BYOD + MAM (containerised corporate data)","BYOD + full-device wipe rights","No controls"], a:1, e:"BYOD's proportionate control is MAM: manage and wipe the corporate container only. Full MDM suits corporate-owned hardware."},
{q:"Before a phone may access company resources, MDM verifies a passcode is set, encryption is on, and the OS is current. What is this mechanism called?", o:["A login script","Profile security requirements / compliance policy enforcement","Kerberos ticketing","Failed-login restriction"], a:1, e:"MDM configuration/compliance profiles enforce security requirements as a condition of access."},
{q:"Which mobile ecosystem has a stronger case for third-party antivirus and why?", o:["iOS, due to App Store scale","Android, due to its open ecosystem, sideloading, and multiple stores","Both equally","Neither ever needs it"], a:1, e:"Android's openness (sideloading, third-party stores) creates a broader malware surface; iOS's closed model narrows it."},
{q:"A smart thermostat and cameras join an office network. Which THREE hardening steps apply?", o:["Give them public IPs, UPnP, default creds","Change default credentials, patch firmware, segment them onto a separate VLAN/network","Disable encryption, enable telnet, port-forward","Install desktop antivirus on them"], a:1, e:"IoT hardening: kill default credentials, keep firmware current, and isolate the devices so compromise can't spread."},
{q:"What is the role of remote backup in mobile security?", o:["It prevents theft","It makes remote wipe and device loss non-events for data — the data is restorable elsewhere","It replaces encryption","It locks the SIM"], a:1, e:"With current cloud backups, a lost/wiped phone costs hardware, not data — which is what lets you pull the wipe trigger confidently."}
]
},
/* ---------------- 2.8 ---------------- */
{
id:"2.8", name:"Use common data destruction and disposal methods",
notes:`
<h2>Physical destruction — data unrecoverable, drive unusable</h2>
<table>
<tr><th>Method</th><th>Notes</th></tr>
<tr><td><b>Shredding</b></td><td>Industrial machines grind drives to fragments — gold standard for end-of-life media</td></tr>
<tr><td><b>Drilling</b></td><td>Holes through platters — quick in-house deterrent; fragments of data theoretically survive but practically strong</td></tr>
<tr><td><b>Degaussing</b></td><td>Powerful magnetic field scrambles MAGNETIC media (HDDs, tape) — destroys the drive too. <b>Useless on SSDs/flash</b> (nothing magnetic to scramble)</td></tr>
<tr><td><b>Incineration</b></td><td>Burning at certified facilities</td></tr>
</table>

<h2>Recycling or repurposing — drive survives</h2>
<ul>
<li><b>Erasing/wiping</b> — software overwrites every sector (single or multi-pass); the drive is reusable and the data is gone. (SSDs: use the manufacturer's <b>secure erase</b> utility.)</li>
<li><b>Standard format</b> — rebuilds the filesystem but <b>data remains recoverable</b> underneath (quick format especially). Not sanitisation.</li>
<li><b>Low-level format</b> — closer to a full overwrite in common usage (true LLF is a factory process); the exam contrast: standard format = recoverable, low-level/overwrite = not.</li>
</ul>
<div class="callout"><b>Exam tells:</b> "drives will be reused internally" → wiping/erasing. "drives leaving the building forever" → physical destruction (shred). "SSD" → NOT degaussing. "quick formatted then sold" → data was recoverable — that's the mistake.</div>

<h2>Reuse vs destroy — pick the method</h2>
<table>
<tr><th>Scenario</th><th>Method</th></tr>
<tr><td>Healthy drives redeployed inside the company</td><td>Software <b>wipe/overwrite</b> (SSD: manufacturer secure erase)</td></tr>
<tr><td>Regulated data leaving forever</td><td>Industrial <b>shredding</b> + certificate of destruction</td></tr>
<tr><td>Magnetic HDDs / tape, destroy in-house field</td><td>Degaussing (also kills the drive)</td></tr>
<tr><td>SSD batch retirement</td><td>Secure erase / crypto-erase — or shred; <b>not</b> degauss</td></tr>
<tr><td>Quick format then sold</td><td><b>Wrong</b> — data still recoverable</td></tr>
<tr><td>Outsourced destruction</td><td>Demand <b>certificate</b> listing serials + method</td></tr>
</table>
<div class="keyfact"><b>Format ≠ sanitise:</b> standard/quick format rebuilds the filesystem; overwriting (or shredding) is what actually removes data. Degaussing does nothing to flash/SSDs.</div>

<h2>Outsourcing</h2>
<ul>
<li><b>Third-party vendors</b> destroy at scale — always obtain a <b>certificate of destruction/recycling</b>: the documented, auditable proof (chain of custody) that specific serial-numbered media were destroyed.</li>
</ul>
`,
quiz:[
{q:"A company sells old PCs after quick-formatting the drives. What is the risk?", o:["None — formatting erases everything","Standard/quick formats leave data recoverable with free tools — the drives should have been wiped or destroyed","The buyers can't install Windows","BitLocker blocks resale"], a:1, e:"Formatting rebuilds filesystem structures; the underlying data remains until overwritten. Sanitisation requires overwriting (wiping) or destruction."},
{q:"Which destruction method is INEFFECTIVE on SSDs, and why?", o:["Shredding — flash chips are too small","Degaussing — SSDs store data in flash cells, not magnetically","Incineration — flash resists heat","Drilling — SSDs have no platters"], a:1, e:"Degaussing scrambles magnetic domains; flash memory has none. For SSDs: secure erase, encryption-based sanitisation, or physical shredding."},
{q:"Drives from a finance department are being retired permanently and contain regulated data. Which method provides the strongest assurance?", o:["Quick format","Industrial shredding (with certification)","Deleting all files","Removing the partitions"], a:1, e:"Physical shredding makes recovery impossible and, via certified vendors, produces auditable proof — the end-of-life gold standard for sensitive media."},
{q:"Old but healthy drives will be redeployed inside the company after use in HR. Which method fits?", o:["Drilling","Software wiping/overwriting of every sector","Degaussing","Incineration"], a:1, e:"Reuse requires the data gone but the drive alive — overwrite-based erasing. Physical methods and degaussing kill the hardware."},
{q:"What document should be demanded from a disposal vendor who destroys company media?", o:["A goodwill letter","A certificate of destruction listing the media (serials) and method","A VAT invoice only","A photo of the skip"], a:1, e:"Certificates of destruction provide the auditable chain-of-custody evidence that specific media were destroyed — compliance depends on it."},
{q:"Which method uses a powerful magnetic field and on which media does it work?", o:["Degaussing; hard drives and tape (magnetic media)","Degaussing; SSDs and USB sticks","Low-level format; optical discs","Shredding; all media"], a:0, e:"Degaussers scramble magnetic media — HDDs and tapes — rendering them (and their servo data) unusable. Flash is immune."},
{q:"What is the practical exam distinction between a standard format and a low-level format/overwrite?", o:["Speed only","Standard format leaves data recoverable; low-level/overwriting actually replaces the data on every sector","Standard is for SSDs, low-level for HDDs","No difference"], a:1, e:"The tested contrast: formatting = filesystem rebuild (recoverable); overwriting = data genuinely replaced (unrecoverable)."},
{q:"An office worker drills three holes through each old drive before skip disposal. What is the honest assessment?", o:["Data is 100% unrecoverable","A strong practical deterrent, but fragments of platter data survive — shredding is the higher-assurance standard","Useless — drills don't affect data","Better than shredding"], a:1, e:"Drilling destroys usability and defeats casual recovery, but undamaged platter regions technically retain data. Regulated data warrants shredding/certified destruction."},
{q:"Which disposal approach is correct for a batch of encrypted SSDs being retired?", o:["Degauss them","Manufacturer secure-erase (or crypto-erase), or physical shredding for high assurance","Quick format and skip","Remove the labels"], a:1, e:"SSD sanitisation uses the drive's secure-erase (or destroying the encryption key); degaussing does nothing. Shredding covers the highest-sensitivity cases."},
{q:"Why might a company outsource destruction rather than DIY?", o:["It's always cheaper","Scale, certified processes, and documented chain of custody/certificates for compliance","DIY is illegal","Vendors reuse the data"], a:1, e:"Third-party vendors bring industrial equipment and, crucially, the certified audit trail regulators and clients expect."}
]
},

{
id:"2.9", name:"Configure appropriate security settings on SOHO wireless and wired networks",
notes:`
<h2>Home router hardening — the checklist</h2>
<ul>
<li><b>Change default passwords</b> — the router admin credential FIRST (default logins are public knowledge); also any default WiFi passphrase.</li>
<li><b>Firmware updates</b> — patch the router itself; unpatched routers are a favourite target.</li>
<li><b>IP filtering</b> — allow/deny lists by address.</li>
<li><b>Content filtering</b> — block categories of sites (parental/office controls).</li>
<li><b>Physical placement/secure location</b> — router locked away from tampering; also radio placement (central = coverage; near windows = leaks outside).</li>
<li><b>DHCP reservations / static WAN IP</b> — predictable addressing for devices/services (2.6 Core 1 crossover).</li>
<li><b>UPnP — disable it:</b> it lets any LAN application open inbound ports automatically; convenient, and a classic security hole.</li>
<li><b>Screened subnet (DMZ)</b> — a separate zone for internet-facing hosts, isolated from the internal LAN.</li>
</ul>

<h2>Wireless-specific settings</h2>
<ul>
<li><b>Change the SSID</b> from the default (defaults reveal router model → known exploits) and <b>consider disabling SSID broadcast</b> — hides the name from casual view, but any real attacker sees it in seconds: <b>obscurity, not security</b> (the exam wants you to know BOTH halves of that).</li>
<li><b>Encryption settings</b> — WPA3 (or WPA2-AES minimum) — 2.2 crossover.</li>
<li><b>Disable guest access</b> if unused; if used, isolate it.</li>
<li><b>Changing channels</b> — mainly interference management (1/6/11), listed here as an available control.</li>
</ul>

<h2>Firewall settings</h2>
<ul>
<li><b>Disable unused ports</b> — close/turn off services and ports not needed (management interfaces especially — no WAN-side admin).</li>
<li><b>Port forwarding/mapping</b> — deliberately publishing an internal service (e.g. WAN :8080 → 192.168.1.50:80): forward only what's needed, to specific hosts.</li>
</ul>

<h2>Ordered SOHO hardening — do these first</h2>
<ol>
<li>Change default <b>admin password</b>.</li>
<li>Update <b>firmware</b>.</li>
<li>Set WiFi to <b>WPA3</b> (or WPA2-AES minimum); change default passphrase.</li>
<li><b>Disable UPnP</b>; use deliberate port forwards only.</li>
<li>Disable WAN-side remote admin / unused services.</li>
<li>Place router securely; avoid signal leaking to the car park.</li>
</ol>

<h2>Scenario pick-list</h2>
<table>
<tr><th>Scenario</th><th>Setting</th></tr>
<tr><td>Any LAN app opening inbound ports by itself</td><td>Disable UPnP</td></tr>
<tr><td>Publish one game/CCTV port to a fixed PC</td><td>Port forward + DHCP reservation</td></tr>
<tr><td>Internet-facing host isolated from LAN</td><td>Screened subnet (DMZ)</td></tr>
<tr><td>Block adult sites for kids</td><td>Content filtering</td></tr>
<tr><td>Hidden SSID alone for "security"</td><td>Obscurity only — still need WPA2/3</td></tr>
<tr><td>Default admin left on WAN management</td><td>Change password; disable WAN admin</td></tr>
</table>
<div class="keyfact"><b>Hidden SSID + MAC filter ≠ encryption.</b> Both are trivially observed/spoofed. Real protection is WPA2-AES / WPA3.</div>
`,
quiz:[
{q:"What is the FIRST configuration change on any new SOHO router?", o:["Change the WiFi channel","Change the default administrator password","Disable DHCP","Enable UPnP"], a:1, e:"Default admin credentials are printed in manuals and databases online — changing them precedes everything else."},
{q:"Why do the objectives recommend disabling UPnP on a SOHO router?", o:["It slows WiFi","It allows any internal application (including malware) to open inbound ports automatically without approval","It conflicts with DHCP","It broadcasts the SSID"], a:1, e:"UPnP trades security for convenience: software punches its own holes through the firewall. Disable it and forward ports deliberately."},
{q:"What is the honest security value of disabling SSID broadcast?", o:["Makes the network invisible to all attackers","Hides it from casual users only — scanners reveal it instantly; it's obscurity, not security","Encrypts the SSID","Doubles WiFi range"], a:1, e:"The exam wants both halves: it's a listed hardening option AND trivially defeated. Real protection comes from WPA2/3 encryption."},
{q:"A home CCTV system must be reachable from the internet on port 443, mapped to the NVR at 192.168.1.80. Which router feature accomplishes this?", o:["UPnP","Port forwarding to that specific internal host/port","A screened subnet for the whole LAN","Content filtering"], a:1, e:"Port forwarding deliberately publishes one internal service — forward the single port to the single host, nothing broader."},
{q:"Which zone isolates an internet-facing server so its compromise cannot reach the internal LAN?", o:["The guest SSID","A screened subnet (DMZ)","A DHCP reservation","A VLAN trunk"], a:1, e:"The screened subnet/DMZ sits between internet and LAN; exposed hosts live there with strict rules separating them from internal systems."},
{q:"Why should a router's firmware be updated as part of hardening?", o:["To improve the admin page's design","Routers have vulnerabilities like any system; unpatched ones are routinely compromised at scale","To reset the SSID","Firmware updates increase range"], a:1, e:"Router firmware flaws are actively exploited (botnets recruit routers wholesale). Patching the router is patching the network's front door."},
{q:"Which pair of settings gives internal servers predictable addresses while keeping management central?", o:["APIPA and UPnP","DHCP reservations (and/or a static WAN IP for the router)","Port forwarding and DMZ","SSID and channel"], a:1, e:"Reservations pin LAN devices to fixed addresses; a static WAN IP keeps externally published services findable."},
{q:"Parents want to block adult content for all devices on the home network. Which router feature applies?", o:["IP filtering","Content filtering","Port forwarding","Channel bonding"], a:1, e:"Content filtering blocks site categories network-wide at the router. IP filtering works on addresses, not categories."},
{q:"Why does the physical placement of a SOHO router matter for security (two reasons)?", o:["Aesthetics and heat","Physical access enables reset/tampering, and radio placement affects how far the signal leaks outside the premises","It doesn't","Cable length and colour"], a:1, e:"A reachable router can be factory-reset (wiping your hardening) or tampered with; and signal reaching the car park invites outside attack."},
{q:"An audit finds the router's management interface reachable from the internet with Telnet enabled. Which TWO actions apply?", o:["Enable UPnP; change channel","Disable WAN-side administration and disable the unused/insecure service ports","Broadcast the SSID; enable guest","Add a DHCP reservation"], a:1, e:"Remote admin exposure plus a plaintext protocol is the worst combination — disable WAN management and shut unused/insecure ports."}
]
},
/* ---------------- 2.10 ---------------- */
{
id:"2.10", name:"Install and configure browsers and relevant security settings",
notes:`
<h2>Getting the browser (and extensions) safely</h2>
<ul>
<li><b>Trusted sources:</b> download browsers/installers from the vendor's official site or store — not bundled third-party download portals.</li>
<li><b>Hashing:</b> for untrusted/mirrored downloads, compare the file's hash (SHA-256) with the vendor-published value — a mismatch means tampering/corruption.</li>
<li><b>Extensions/plugins from trusted sources only</b> — official stores, minimal set, review permissions; malicious extensions can read everything you browse.</li>
</ul>

<h2>Credentials and connections</h2>
<ul>
<li><b>Password managers</b> — generate and store unique strong passwords per site; better than reuse or browser sticky notes.</li>
<li><b>Secure connections/valid certificates:</b> HTTPS + padlock = encrypted, and the <b>certificate</b> proves the site's identity. Certificate warnings (expired, wrong name, untrusted issuer) mean STOP — don't click through on anything sensitive.</li>
</ul>

<h2>Settings that matter</h2>
<table>
<tr><th>Setting</th><th>Why</th></tr>
<tr><td><b>Pop-up blocker</b></td><td>Stops nuisance/malicious pop-ups (know how to allow exceptions for legit sites)</td></tr>
<tr><td><b>Clearing browsing data/cache</b></td><td>Removes history, cookies, cached files — troubleshooting stale pages and protecting privacy on shared machines</td></tr>
<tr><td><b>Private browsing mode</b></td><td>No local history/cookies persisted after the session — does NOT make you anonymous to networks/sites</td></tr>
<tr><td><b>Sign-in/browser data synchronization</b></td><td>Sync bookmarks/passwords across devices via an account — convenient; consider what syncs onto shared machines</td></tr>
<tr><td><b>Ad blockers</b></td><td>Block adverts and the malvertising delivered through them</td></tr>
</table>

<h2>Browser decision map</h2>
<table>
<tr><th>Situation</th><th>Do this</th></tr>
<tr><td>Certificate expired / name mismatch / untrusted</td><td><b>Stop</b> — don't enter secrets; possible on-path</td></tr>
<tr><td>No padlock / <code>http://</code> on a login page</td><td>Do not enter credentials/payment</td></tr>
<tr><td>Installer from a mirror</td><td>Compare <b>SHA-256</b> to vendor value</td></tr>
<tr><td>Hash mismatch</td><td>Delete; download from official source only</td></tr>
<tr><td>Shared reception PC</td><td>Clear browsing data; don't sign in / sync browser</td></tr>
<tr><td>Legit app pop-ups blocked</td><td>Per-site exception — don't disable blocker globally</td></tr>
<tr><td>Private/incognito mode</td><td>Local amnesia only — not anonymous to network/sites</td></tr>
</table>
<div class="keyfact"><b>Private browsing myth:</b> no local history after the session — employers, ISPs, and websites still see traffic. It does not replace HTTPS or a VPN.</div>
`,
quiz:[
{q:"A user downloads an installer from a mirror site. How can they verify it wasn't tampered with?", o:["Scan the filename","Compare its SHA-256 hash against the value published by the vendor","Check the file size looks right","Run it and see"], a:1, e:"Hash comparison proves bit-for-bit integrity: any modification changes the hash completely. Mismatch = don't run it."},
{q:"What is the correct response to a browser warning that a site's certificate is expired or doesn't match the domain?", o:["Click through — warnings are routine","Stop; don't proceed with anything sensitive — the site's identity can't be verified","Switch to private browsing and continue","Disable the antivirus"], a:1, e:"Certificate errors mean the encryption's identity guarantee has failed — possible impersonation/on-path attack. Never click through for logins or payments."},
{q:"What does private/incognito browsing actually do?", o:["Hides your IP from websites","Prevents history, cookies, and site data persisting locally after the session","Encrypts all traffic","Blocks all ads and trackers"], a:1, e:"Private mode is local amnesia only — networks, employers, and websites still see the traffic. A heavily tested misconception."},
{q:"An employee reuses one password everywhere 'to remember it'. Which tool solves this properly?", o:["Longer single password","A password manager generating unique credentials per site","Writing them in a notebook","Browser autofill with sync off"], a:1, e:"Password managers make unique-per-site practical — one breach no longer cascades. The objectives name them explicitly."},
{q:"A legitimate business web app breaks because its windows are being blocked. Which setting needs an exception rather than disabling?", o:["The ad blocker globally","The pop-up blocker — allow that site specifically","Certificate checking","Private browsing"], a:1, e:"Per-site pop-up exceptions keep protection everywhere else — the configure-don't-disable pattern the exam rewards."},
{q:"Why are browser extensions a security consideration?", o:["They slow startup only","They can read/modify everything in the browser — install minimal, trusted-store extensions and review permissions","They can't be updated","They disable HTTPS"], a:1, e:"A malicious or hijacked extension sees every page and keystroke in the browser. Trusted sources, minimal set, permission review."},
{q:"A shared reception PC shows previous users' accounts pre-filled on websites. Which TWO measures address this?", o:["Ad blocking and pop-up blocking","Clearing browsing data and avoiding signed-in browser sync on shared machines","Hashing and certificates","UPnP and DMZ"], a:1, e:"Clearing cookies/data removes persisted sessions; keeping personal browser sign-in/sync off shared machines stops credentials arriving there at all."},
{q:"Where should a browser itself be obtained?", o:["Any download aggregator","The vendor's official website or the OS's official store","A forum link","A USB stick from a colleague"], a:1, e:"Bundled installers from download portals are a classic PUP/malware vector — official sources only, hash-verify anything less."},
{q:"What is 'malvertising', and which tool mitigates it?", o:["Fake reviews; report buttons","Malware delivered through advertising networks on otherwise legitimate sites; ad blockers","Email spam; filters","Pop-ups; nothing helps"], a:1, e:"Compromised ad networks can serve exploit-laden ads on reputable sites — ad blocking removes the vector, which is why it's a security control, not just convenience."},
{q:"A stale version of an updated webpage keeps loading. Which browser action fixes it?", o:["Enable sync","Clear the cache (cached images and files)","Add a pop-up exception","Reinstall the browser"], a:1, e:"The cache serves old copies; clearing it (or hard-refreshing) forces fresh content — the everyday troubleshooting use of clearing browsing data."}
]
}
]
,mock:[
{q:"A server room needs entry control that prevents both unauthorised access AND tailgating, with an audit trail. Which combination?", o:["A keypad and a sign","Badge-reader access control vestibule with logging (plus CCTV)","A guard at lunchtimes","Motion sensors inside"], a:1, e:"The vestibule defeats tailgating structurally; badge readers authenticate and log each entry; CCTV adds evidence."},
{q:"Which access model does 'assign permissions to security groups, place users into groups by role' implement?", o:["Discretionary chaos","Role-based least-privilege management","Mandatory access control","Zero trust"], a:1, e:"Group-based permissioning by role is how least privilege is administered at scale in AD."},
{q:"An organisation upgrades WiFi so that captured handshakes cannot be brute-forced offline and each user signs in with domain credentials. Which TWO technologies?", o:["WEP and MAC filtering","WPA3 (SAE) and Enterprise 802.1X/RADIUS authentication","WPA-TKIP and shared keys","Hidden SSID and static IPs"], a:1, e:"WPA3's SAE kills offline handshake attacks; Enterprise mode with RADIUS provides per-user credentialed access."},
{q:"Which authentication protocol underpins single sign-on inside an Active Directory domain?", o:["RADIUS","TACACS+","Kerberos","SAE"], a:2, e:"Kerberos tickets from the domain controller grant access across domain resources after one sign-in — AD's native SSO."},
{q:"A PC shows browser redirects and popups; the AV won't launch and scans from within Windows find nothing. Order the correct escalation.", o:["Reinstall the browser","Scan from recovery/boot-time media (suspected rootkit); if trust can't be re-established, wipe and reinstall from known-good media","Pay for premium AV","Delete temp files"], a:1, e:"Self-defending, scan-invisible malware points to rootkit behaviour: scan from outside the OS, and rebuild when confidence can't be restored."},
{q:"What is the correct PRIMARY defence that makes ransomware a nuisance rather than a catastrophe?", o:["Paying quickly","Tested, offline/versioned backups","A bigger firewall","Disabling email"], a:1, e:"Ransomware's leverage is your data's irreplaceability. Offline, tested backups remove the leverage entirely."},
{q:"An attacker calls reception claiming to be the CEO's assistant, urgently needing the guest WiFi password and the CEO's diary. Which TWO techniques are in play?", o:["Phishing and XSS","Impersonation and vishing (urgency-based social engineering)","Whaling and tailgating","Evil twin and spoofing"], a:1, e:"Pretending to be a trusted person over a voice call combines impersonation with vishing — pressure and authority are the tells."},
{q:"Which attack does a privacy filter on a monitor mitigate?", o:["Phishing","Shoulder surfing","Dumpster diving","On-path"], a:1, e:"Privacy filters narrow the viewing angle so onlookers can't read the screen — the matched control for shoulder surfing."},
{q:"A company's web server is knocked offline by traffic from tens of thousands of IP addresses simultaneously. Which attack?", o:["DoS","DDoS","Brute force","SQL injection"], a:1, e:"Many distributed sources (a botnet) define DDoS — unblockable by filtering any single origin."},
{q:"Which vulnerability does 'the January patch fixed this, but 40 machines never installed it' describe?", o:["Zero-day","Unpatched systems","EOL OS","BYOD"], a:1, e:"A fix exists but isn't applied — unpatched systems. (Zero-day means NO fix exists yet — the distinction is tested.)"},
{q:"A user needs to install one application but works as a standard user. What is the correct, least-privilege way to proceed?", o:["Log in as Administrator for the day","Use Run as administrator / UAC elevation for that single installation with admin credentials","Add the user to Administrators permanently","Disable UAC first"], a:1, e:"Elevate the single task, not the whole session — UAC exists precisely for momentary, consented elevation."},
{q:"Over the network, a user's share permission says Full Control but NTFS says Modify. Locally at the same machine, what applies?", o:["Full Control","Modify — NTFS alone applies locally","Read only","Nothing"], a:1, e:"Share permissions evaporate for local access; NTFS always applies. Over the network it'd be the most restrictive combination (Modify here too)."},
{q:"A stolen laptop's drive is moved to another PC to read the files, but everything is unreadable ciphertext. Which control did its job?", o:["NTFS permissions","BitLocker full-volume encryption","The BIOS password","EFS on one folder"], a:1, e:"NTFS permissions are bypassed by mounting the drive elsewhere; encryption at rest (BitLocker) is what survives physical theft."},
{q:"Which THREE settings form the classic account-hardening trio on the objectives?", o:["Wallpaper, theme, icons","Failed-attempt lockout, login time restrictions, disabled guest account","UPnP, DMZ, port forwarding","Sync, cache, popups"], a:1, e:"Lockout defeats brute force, time restrictions bound the attack window, and the guest account is a standing hole to close."},
{q:"Why must the default administrator credentials be changed on EVERY device (PCs, routers, IoT)?", o:["Licensing requires it","Default credentials are publicly documented — attackers try them first, at scale","They expire anyway","To enable encryption"], a:1, e:"admin/admin lists exist for every product; botnets scan for them constantly. It's the same principle from workstation to router to camera."},
{q:"A phone used for corporate email under BYOD is lost. The company wipes its mail container remotely; personal photos survive. Which management model was in place?", o:["Full MDM","MAM (application/container management)","No management","Kerberos"], a:1, e:"Selective corporate-container wipe with personal data intact is MAM's defining capability — the proportionate BYOD control."},
{q:"Which screen-lock and failure policy pairing best protects a stolen phone's data (with encryption enabled)?", o:["Swipe + no limits","PIN/biometric + wipe after repeated failed attempts","Pattern + unlimited tries","Face only, no fallback"], a:1, e:"A real credential plus failed-attempt wipe means the thief gets a handful of guesses at an encrypted brick."},
{q:"Retired HDDs contain regulated medical data and will never be reused. The disposal vendor is engaged. Which TWO requirements complete the process correctly?", o:["Quick format then collection","Certified physical destruction (shredding) and a certificate of destruction with serials","Degauss the SSD batch too","Delete the partitions and recycle"], a:1, e:"Regulated data leaving forever = certified physical destruction plus the auditable certificate. (And note degaussing wouldn't touch SSDs.)"},
{q:"Which sanitisation method is appropriate for redeploying laptops internally, and which for their eventual final disposal?", o:["Format now; format later","Software wipe/overwrite for redeployment; shredding/certified destruction at end of life","Degauss for both","BitLocker for both stages"], a:1, e:"Reuse = overwrite-based wiping (drive survives). Final disposal of sensitive media = physical destruction with certification."},
{q:"A new SOHO router is being hardened. Which ordered trio is the objectives' core?", o:["Enable UPnP, hide SSID, boost power","Change default admin password, update firmware, configure WPA3/WPA2-AES","Set channel 6, enable guest, forward ports","Enable WEP, disable DHCP, reboot"], a:1, e:"Credentials, patches, encryption — the non-negotiable first three. Everything else (filtering, forwarding rules, placement) follows."},
{q:"Why is relying on a hidden SSID and MAC filtering alone considered inadequate?", o:["They slow the network","Both are trivially observed/spoofed by any attacker with a scanner — obscurity measures, not encryption","They block guests","They break WPA3"], a:1, e:"SSIDs appear in traffic and MACs are cloneable in seconds. Only strong encryption/authentication (WPA2-AES/WPA3) actually protects."},
{q:"A game server on the home LAN must be reachable from the internet, but the user refuses to enable UPnP. What is the correct configuration?", o:["Put the PC in the DMZ fully exposed","A single port-forward rule mapping the required external port to that PC's reserved IP","Disable the firewall","Use the guest network"], a:1, e:"Deliberate, minimal exposure: one port, one host (on a DHCP reservation so it doesn't move). DMZ-hosting a personal PC is overexposure."},
{q:"A user is about to enter card details but notices the padlock is missing and the address is http://. What do they conclude?", o:["The site is fine if it looks right","The connection is unencrypted — no HTTPS/certificate — so credentials/payment must not be entered","Private browsing will fix it","The pop-up blocker caused it"], a:1, e:"No HTTPS means plaintext transmission and no identity proof. Sensitive data only ever goes over valid-certificate HTTPS."},
{q:"Which statement about browser sign-in/data sync is the exam-correct nuance?", o:["Always enable it everywhere","Convenient on personal devices, but avoid signing in/syncing on shared or public machines where passwords and history would persist","It replaces password managers","It encrypts the connection"], a:1, e:"Sync pulls your credentials/history onto whatever machine you sign into — great on your own devices, a leak on shared ones."},
{q:"An installer downloaded from a third-party mirror has a SHA-256 that does not match the vendor's published hash. What does this mean and what is the action?", o:["Normal version drift; run it","The file is corrupted or tampered with; delete it and download from the official source","Hashes change per download; ignore","Run it in private browsing"], a:1, e:"Hashes are deterministic — any mismatch means the bits differ from the vendor's release. Never execute it; fetch from the trusted source."}
]
},
{
core:"core2", id:"c2d3", num:"3.0", name:"Software Troubleshooting", weight:22,
blurb:"Windows OS problems, PC security symptoms, the 7-step malware removal procedure, and mobile OS/application troubleshooting and security concerns.",
subs:[
/* ---------------- 3.1 ---------------- */
{
id:"3.1", name:"Troubleshoot common Windows OS problems",
notes:`
<h2>Symptom → cause → fix</h2>
<table>
<tr><th>Symptom</th><th>Think / Fix</th></tr>
<tr><td><b>BSOD</b></td><td>Driver, RAM, hardware. Note the stop code; roll back recent drivers/updates; memory diagnostic; sfc</td></tr>
<tr><td><b>Sluggish performance</b></td><td>Task Manager first: what's consuming CPU/RAM/disk? Startup bloat, low RAM (paging), fragmented/failing HDD, malware</td></tr>
<tr><td><b>Boot problems / "No OS found"</b></td><td>Boot order (USB stick left in!), disconnected drive, corrupt bootloader → Startup Repair / <code>bootrec</code> from WinRE</td></tr>
<tr><td><b>Frequent shutdowns</b></td><td>Overheating or PSU (Core 1 5.2) — check Event Viewer for the pattern</td></tr>
<tr><td><b>Services not starting</b></td><td>services.msc: check dependencies, log-on account, event log; restart the service</td></tr>
<tr><td><b>Applications crashing</b></td><td>Update/reinstall the app, check Event Viewer Application log, verify requirements/compat</td></tr>
<tr><td><b>Low memory warnings</b></td><td>Close/lean apps, increase page file, add RAM</td></tr>
<tr><td><b>USB controller resource warnings</b></td><td>Too many devices for the controller's endpoints — move devices, powered hub, spread across controllers</td></tr>
<tr><td><b>Slow profile load</b></td><td>Domain: roaming profile size/network; local: profile corruption → rebuild the profile</td></tr>
<tr><td><b>Time drift</b></td><td>Resync/NTP settings; persistent drift on cold boot → CMOS battery (Core 1 crossover)</td></tr>
</table>

<h2>The remediation toolbox (ordered least → most drastic)</h2>
<ul>
<li><b>Reboot</b> → <b>restart services</b> → <b>update/uninstall-reinstall the app</b> → <b>verify requirements / add resources</b> → <b>sfc /scannow</b> (system file check) → <b>roll back updates/drivers</b> → <b>System Restore</b> (restore point) → <b>rebuild user profile</b> → <b>repair install of Windows</b> → <b>reimage/clean reinstall</b>.</li>
<li>Exam logic: choose the LEAST destructive step that addresses the cause; escalate only as needed.</li>
</ul>

<h2>First-move pick-list</h2>
<table>
<tr><th>Scenario</th><th>First move</th></tr>
<tr><td>BSOD after a driver/update change</td><td>Safe Mode → roll back that driver/update</td></tr>
<tr><td>"No OS found" + USB stick plugged in</td><td>Remove stick / fix boot order</td></tr>
<tr><td>Low memory with full workload</td><td>Page file stopgap → add RAM</td></tr>
<tr><td>Service won't start</td><td>Start dependencies; check Event Viewer</td></tr>
<tr><td>System utilities crash / OS erratic</td><td><code>sfc /scannow</code></td></tr>
<tr><td>USB "not enough controller resources"</td><td>Move devices / powered hub</td></tr>
<tr><td>Symptoms only in one user account</td><td>Rebuild that profile</td></tr>
<tr><td>Clock drifts while PC is on</td><td>NTP / timezone (not CMOS yet)</td></tr>
<tr><td>App crashes on launch</td><td>Update/reinstall app before System Restore</td></tr>
</table>
<div class="keyfact"><b>Least destructive first:</b> reboot → service → app reinstall → sfc → rollback → restore → rebuild profile → repair install → reimage. Never jump to reimage when a driver roll-back will do.</div>
`,
quiz:[
{q:"After a graphics driver update, a PC BSODs on every boot. What is the FIRST targeted fix?", o:["Reinstall Windows","Boot Safe Mode and roll back the driver","Replace the GPU","Increase the page file"], a:1, e:"A crash correlated with a driver change means roll the driver back — Safe Mode loads without it, making the rollback possible. Least destructive, matches the cause."},
{q:"A PC displays 'No operating system found'. A USB stick is plugged in. What should be checked FIRST?", o:["Reinstall the OS","Remove the USB stick / check the boot order","Replace the drive","Run chkdsk from WinRE"], a:1, e:"A non-bootable USB ahead of the system drive in boot order is the classic trivial cause — question the obvious before surgery."},
{q:"Windows reports 'low memory' whenever the user opens their full workload. Which TWO remedies match the cause?", o:["Defragment and reboot","Increase the page file as a stopgap; add physical RAM as the real fix","Disable the GPU; clear cache","sfc and chkdsk"], a:1, e:"Low memory means demand exceeds RAM. Paging file expansion buys headroom (slowly); more RAM actually solves it."},
{q:"A service fails to start, and its dependency service is also stopped. What is the correct approach?", o:["Reinstall Windows","Start the dependency first (check the service's Dependencies tab), then the service; review Event Viewer for errors","Set both to Disabled","Rename the service"], a:1, e:"Services declare dependencies; the chain must start in order. The Dependencies tab and System log tell you what's blocking."},
{q:"Windows behaves erratically and several system utilities crash. Which built-in command checks and repairs Windows' own files?", o:["chkdsk /f","sfc /scannow","gpupdate /force","defrag C:"], a:1, e:"System File Checker verifies protected OS files and restores corrupted ones — the matched tool for OS-file corruption (DISM backs it up on newer systems)."},
{q:"A PC plugged full of USB devices shows 'not enough USB controller resources'. What is the practical fix?", o:["Reinstall USB drivers","Redistribute devices across controllers/ports or use a powered hub; disconnect unneeded devices","Enable XHCI hand-off twice","Increase RAM"], a:1, e:"Controllers have finite endpoints. Spreading devices (especially off one root hub) or consolidating through a powered hub resolves the exhaustion."},
{q:"A domain user's sign-in takes ten minutes at one site only; their roaming profile is 8 GB. What is the cause?", o:["Kerberos failure","The oversized roaming profile transferring over the site's slow link — trim/redirect folders","BIOS battery","DNS"], a:1, e:"Roaming profiles copy at logon; size × slow WAN = slow sign-in. Folder redirection (2.1's tool) keeps big data server-side instead."},
{q:"Which sequence respects 'least destructive first' for an app that crashes on launch?", o:["Reimage → restore → update","Update the app → reinstall it → check Event Viewer/compat → System Restore if a system change caused it","Rebuild profile → repair Windows → reboot","Delete user data first"], a:1, e:"Escalate gently: app-level fixes before system-level rollbacks before rebuilds. The exam rewards the least drastic adequate step."},
{q:"A PC's clock loses time while RUNNING, not just across power-offs. What should be checked?", o:["The CMOS battery only","Time synchronisation/NTP configuration (and timezone), since drift while powered isn't the coin cell","The PSU","Fast startup"], a:1, e:"Cold-boot resets = CMOS battery; drift during operation = sync/NTP/timezone issues. The discriminator is when the time goes wrong."},
{q:"Every lighter fix has failed and a user's profile is corrupt — apps misbehave only in their account; a fresh test account is fine. What is the fix?", o:["Reimage the PC","Rebuild the user profile (new profile, migrate data)","Replace the drive","Run gpresult"], a:1, e:"Symptoms confined to one profile with a clean test account = profile corruption. Rebuild it rather than nuking a healthy Windows."}
]
},
