{
id:"4.4", name:"Given a scenario, use common safety procedures",
notes:`
<h2>ESD — electrostatic discharge</h2>
<ul>
<li>Static that's harmless to you (felt from ~3,000 V) destroys components at tens of volts — <b>damage you can't feel is still damage</b> (latent failures).</li>
<li><b>ESD straps</b> — wrist strap connecting you to ground/chassis: the primary defence while handling components.</li>
<li><b>ESD mats</b> — grounded work surface. <b>Antistatic bags</b> — components live in them whenever not installed (store AND transport).</li>
<li><b>Equipment grounding</b> — chassis/equipment properly earthed; when no strap is available, touching the unpainted metal chassis (with PSU plugged to an earthed socket but OFF, per classic practice) equalises potential.</li>
<li>Handle cards by edges, never touch contacts/chips; low humidity worsens static (4.5 crossover).</li>
</ul>

<h2>Personal safety</h2>
<ul>
<li><b>Disconnect power FIRST</b> before servicing — unplug, don't trust soft-off. Capacitors (PSUs, CRTs, laser fusers) hold charge: <b>never open a PSU</b> — replace it.</li>
<li><b>Lifting techniques</b> — bend the knees, back straight, load close; get help/team-lift heavy items (guideline: seek help above roughly 20 kg/40–50 lb, per policy).</li>
<li><b>Electrical fire safety</b> — NEVER water. Use a <b>Class C (US) / CO₂ or dry-powder</b> extinguisher rated for electrical fires; cut power if safe.</li>
<li><b>Safety goggles</b> — chemicals, debris, drilling. <b>Air filtration mask</b> — dust-heavy cleanouts, toner spills.</li>
<li><b>Compliance with government regulations</b> — health-and-safety law, electrical codes, disposal law (4.5): not optional.</li>
</ul>
`,
quiz:[
{q:"Why is ESD dangerous even when the technician feels nothing?", o:["It isn't","Component damage occurs at voltages far below human perception (~tens of volts vs ~3,000 V to feel) — including latent damage that fails later","Only CRTs carry static","Feeling it discharges it safely"], a:1, e:"The perception threshold is orders of magnitude above the damage threshold — invisible zaps cause immediate or latent component death."},
{q:"Rank the proper ESD kit for a RAM upgrade at a workbench.", o:["Rubber gloves and a wool jumper","Wrist strap to ground, antistatic mat, components kept in antistatic bags until fitted, handled by edges","Just work fast","A damp cloth underneath"], a:1, e:"Strap + mat + bags + edge-handling is the full discipline; each element removes a discharge path to the silicon."},
{q:"With no wrist strap available, what is the accepted improvisation before touching components?", o:["Lick your fingers","Touch the unpainted metal of the (earthed) chassis to equalise potential, and re-touch periodically","Wear trainers","Work on carpet"], a:1, e:"Chassis contact brings you and the equipment to the same potential — imperfect but standard field practice; re-equalise after moving."},
{q:"What is the FIRST action before opening any PC for service?", o:["Ground the case","Disconnect the power (unplug — don't trust soft-off)","Remove the CMOS battery","Photograph it"], a:1, e:"Power removal precedes everything — soft-off leaves standby voltages live. (Ties to Core 1 1.1's laptop battery-disconnect rule.)"},
{q:"Why must a failed PSU be replaced rather than opened for repair?", o:["Warranty stickers","Its capacitors retain lethal charge long after disconnection","Screws are proprietary","It's faster"], a:1, e:"PSU (and CRT) capacitors store dangerous energy for days. Field rule: swap the sealed unit, never open it."},
{q:"A server catches fire in the rack. Which extinguisher class is safe?", o:["Water (Class A)","CO₂ / dry powder rated for electrical fires (Class C in the US)","Foam","A wet blanket"], a:1, e:"Water and foam conduct — electrocution risk plus damage. Electrical-rated CO₂/dry-powder extinguishers (and cutting power) are correct."},
{q:"A 30 kg UPS must move to another rack. Correct procedure?", o:["Lift fast with a straight back bent at the waist","Team-lift/use equipment: bend the knees, back straight, load close to the body — don't solo heavy items","Slide it with a cable","Roll it end over end"], a:1, e:"Legs lift, back stays straight, load stays close — and above solo-safe weights, get help or a trolley. Injuries outlast deadlines."},
{q:"Which PPE applies when blowing years of dust from desktops with compressed air?", o:["Ear defenders only","An air filtration mask (and ideally goggles), working in a ventilated space","Latex gloves only","None"], a:1, e:"Aerosolised dust (and toner) shouldn't be inhaled — masks for particles, goggles for ejected debris, ventilation for both (4.5 crossover)."},
{q:"Where should a graphics card live between removal and reinstallation next week?", o:["On the metal shelf","Inside an antistatic bag","Wrapped in bubble wrap (the pink kind is optional)","On top of the PSU"], a:1, e:"Antistatic bags shield components in storage and transit — the only correct home for loose boards. Standard bubble wrap can generate static."},
{q:"A technician notices a colleague daisy-chaining power strips to run a rack. Which safety category does this violate?", o:["ESD procedure","Proper power handling / electrical code compliance — overload and fire risk","Lifting technique","Chain of custody"], a:1, e:"Daisy-chained strips overload circuits — a fire-code violation under proper power handling and regulatory compliance."}
]
},
/* ---------------- 4.5 ---------------- */
{
id:"4.5", name:"Summarize environmental impacts and local environmental controls",
notes:`
<h2>MSDS/SDS and disposal</h2>
<ul>
<li><b>MSDS (material safety data sheet)</b> — the document accompanying chemicals/hazardous items describing safe <b>handling and disposal</b>: consult it for spills, exposure, storage.</li>
<li><b>Battery disposal</b> — never landfill: batteries contain toxic/reactive chemistry — battery recycling points (Core 1 swollen-battery crossover).</li>
<li><b>Toner disposal</b> — cartridges to manufacturer/recycler programmes; spilled toner via toner-safe vacuum (5.6 crossover).</li>
<li><b>Other devices/assets</b> — electronics are e-waste: recycle per regulation (WEEE in the UK/EU), never general waste; data sanitisation first (2.8).</li>
</ul>

<h2>Room environment</h2>
<ul>
<li><b>Temperature</b> — heat kills electronics; server rooms cooled and monitored.</li>
<li><b>Humidity</b> — the Goldilocks band (~40–60%): <b>too LOW → static/ESD risk; too HIGH → condensation/corrosion</b>. A favourite exam pairing.</li>
<li><b>Ventilation and placement</b> — equipment needs airflow: never in sealed cupboards; respect rack front-to-back airflow; keep intakes clear.</li>
<li><b>Dust cleanup</b> — dust blankets insulate and clog cooling: <b>compressed air</b> (outdoors/ventilated, holding fans still) and <b>toner-safe/ESD-safe vacuums</b>; masks and goggles per 4.4.</li>
</ul>

<h2>Power protection</h2>
<table>
<tr><th>Event</th><th>Description</th><th>Protection</th></tr>
<tr><td><b>Power surge</b></td><td>Voltage spike (switching, lightning)</td><td><b>Surge suppressor</b> clamps the excess</td></tr>
<tr><td><b>Under-voltage event</b> (brownout/sag)</td><td>Voltage dips below normal — flickers, reboots, stress</td><td><b>UPS</b> (line-interactive/online) conditions and fills in</td></tr>
<tr><td><b>Power failure</b> (blackout)</td><td>Complete loss</td><td><b>Battery backup (UPS)</b> — minutes of runtime for graceful shutdown or generator handover</td></tr>
</table>
<div class="callout"><b>Exam tells:</b> "lights dim, PCs reboot when the lift runs" → under-voltage → UPS. "protect against spikes only, cheaply" → surge suppressor. "server must shut down cleanly in an outage" → UPS with shutdown software. Surge strips ≠ UPS: strips don't help when power DROPS.</div>
`,
quiz:[
{q:"A cleaner splashes an unknown solvent; the technician needs its hazards, first aid, and disposal requirements. Which document?", o:["The AUP","The MSDS/SDS for that product","The topology diagram","The EULA"], a:1, e:"Material safety data sheets exist for exactly this — hazards, handling, exposure response, and disposal for chemical products."},
{q:"Why must batteries never go into general waste?", o:["They're too heavy","They contain toxic/reactive chemicals that leach or ignite — regulated battery recycling is required","They're valuable antiques","Bins are flammable"], a:1, e:"Battery chemistry (lithium, cadmium, lead) is hazardous waste; recycling is the legal and safe route — same rule as the swollen-battery scenario."},
{q:"Server room humidity reads 20%. What is the risk, and at 85%?", o:["None; humidity is cosmetic","At 20%: elevated static/ESD risk; at 85%: condensation and corrosion — target the middle band (~40–60%)","Reverse: low = rust, high = static","Both cause overheating only"], a:1, e:"Dry air breeds static; wet air breeds condensation. The both-directions humidity question is an exam staple."},
{q:"PCs in a call centre reboot whenever the building's air-con compressors kick in, and lights visibly dim. What is the event and the fix?", o:["Surges; more surge strips","Under-voltage events (sags/brownouts); UPS units to condition and bridge the dips","Blackouts; a generator","ESD; humidifiers"], a:1, e:"Dimming + reboots on heavy-load start = voltage sag. Surge strips do nothing for LOW voltage — a UPS rides through it."},
{q:"What does a surge suppressor protect against, and what does it NOT do?", o:["Everything electrical","Clamps voltage spikes; provides no help during sags or outages (no stored energy)","Outages only","It conditions frequency"], a:1, e:"Suppressors shunt excess voltage — one-directional protection. Battery-backed UPS units cover the downward events."},
{q:"A file server must survive brief outages and shut down gracefully in longer ones. Which solution?", o:["A surge strip","A UPS with battery runtime and shutdown-agent software","RAID 1","Dual NICs"], a:1, e:"The UPS bridges short cuts and its management software triggers clean shutdown before the battery empties — protecting data integrity."},
{q:"Where should a small office server NOT be placed, per ventilation guidance?", o:["A ventilated rack","Inside a sealed cupboard 'to keep it quiet'","A cool room corner with clearance","A proper comms room"], a:1, e:"Sealed spaces recycle heat until thermal shutdown (Core 1 5.2). Equipment placement must provide airflow and heat escape."},
{q:"During a dusty PC cleanout with compressed air, why hold the fans still?", o:["Fans are fragile to air","Free-spinning fans can overspeed (bearing damage) and generate current back into the board","It's quieter","To conserve air"], a:1, e:"Air-spun fans exceed rated RPM and act as generators — hold them while blasting; work outside/ventilated with a mask (4.4)."},
{q:"Old PCs and monitors are being cleared out. Which TWO steps complete lawful, safe disposal?", o:["Skip and landfill","Data sanitisation (2.8) first, then e-waste recycling per regulation (e.g. WEEE)","Sell without wiping","Burn on site"], a:1, e:"Assets leave via sanitisation THEN regulated e-waste recycling — the environmental half of the disposal story."},
{q:"Toner spills inside a printer during cartridge replacement. Correct cleanup?", o:["Ordinary vacuum","A toner-certified vacuum, wearing a mask; never compressed air indoors","A wet mop","Blow it out with the fan"], a:1, e:"Toner particles pass ordinary filters and shouldn't be inhaled or aerosolised — toner-safe vacuum plus PPE (5.6/4.4 crossover)."}
]
},
/* ---------------- 4.6 ---------------- */
{
id:"4.6", name:"Explain prohibited content/activity, privacy, licensing, and policy concepts",
notes:`
<h2>Incident response — when prohibited content/activity is found</h2>
<ul>
<li><b>First response:</b> identify what you've found, <b>report through proper channels — inform management/law enforcement as necessary</b>, and preserve everything. Do NOT investigate beyond your role, browse the material, or confront the user.</li>
<li><b>Chain of custody</b> — documented, unbroken record of who held the evidence, when, and what was done: without it, evidence is legally worthless.</li>
<li><b>Copy of drive:</b> forensic imaging preserves <b>data integrity</b> — work on the copy, hash-verify against the original, preserve the original untouched.</li>
<li><b>Documentation of the incident</b> — the incident report (4.1): what, when, who, actions taken.</li>
</ul>

<h2>Licensing / DRM / EULA</h2>
<ul>
<li><b>EULA</b> — the end-user licence agreement: you're buying a licence to use, not ownership. <b>DRM</b> — technical enforcement of those rights.</li>
<li><b>Valid and non-expired licences</b> — track them (asset management, 4.1); running unlicensed/expired software = legal exposure (1.7 crossover).</li>
<li><b>Personal vs corporate licences</b> — home/personal editions generally can't be used commercially; corporate/volume licensing covers organisational deployment.</li>
<li><b>Open-source licences</b> — source available, free to use/modify/distribute under the licence's terms (GPL etc.); free ≠ unlicensed — terms still apply.</li>
</ul>

<h2>Regulated data — know the categories</h2>
<table>
<tr><th>Category</th><th>Examples / regime</th></tr>
<tr><td><b>PII</b></td><td>Personally identifiable information — anything identifying an individual (name+DOB+address…)</td></tr>
<tr><td><b>Healthcare data</b></td><td>Medical records — special-category (HIPAA in the US; UK GDPR special category)</td></tr>
<tr><td><b>Credit card transactions</b></td><td><b>PCI DSS</b> — the payment-card industry's security standard</td></tr>
<tr><td><b>Government-issued information</b></td><td>Passport, NI/SSN, licence numbers</td></tr>
</table>
<ul>
<li><b>Data retention requirements</b> — laws/policies dictate how long data must be kept AND when it must be destroyed; retention schedules drive both storage and 2.8's destruction.</li>
</ul>
`,
quiz:[
{q:"A technician repairing a PC discovers apparent illegal content. What is the correct FIRST action?", o:["Delete it immediately","Stop, preserve the evidence, and report through proper channels (management/law enforcement per policy) — do not browse further or confront the user","Copy it to USB for proof and show colleagues","Confront the user"], a:1, e:"First response = identify, report through the chain, preserve. Deleting destroys evidence; browsing or DIY investigation compromises it (and you)."},
{q:"Why does evidence require a chain of custody?", o:["Insurance pricing","An unbroken documented record of possession and handling is what makes evidence admissible — gaps invite claims of tampering","To assign blame faster","It's optional paperwork"], a:1, e:"Chain of custody proves the evidence today is the evidence collected — who, when, what was done, signed at every handoff."},
{q:"How is a suspect drive handled to preserve data integrity for investigation?", o:["Boot it and look around","Create a forensic image (hash-verified copy), work only on the copy, preserve the original untouched","Defragment it first","Copy the interesting files"], a:1, e:"Booting/writing alters evidence. Imaging with hash verification preserves integrity; analysis happens on the duplicate."},
{q:"A company installs 'Home' editions of software on office machines because they're cheaper. Which concept does this violate?", o:["Open source","Personal-use vs corporate licensing — home licences generally prohibit commercial use","DRM removal","Data retention"], a:1, e:"Licence class matters: personal/home editions exclude business use. Compliance means corporate/volume licensing for the organisation."},
{q:"What does purchasing commercial software actually confer, per the EULA?", o:["Ownership of the code","A licence to use the software under the agreement's terms","Redistribution rights","The source code"], a:1, e:"You buy usage rights defined by the EULA, not the software itself — DRM technically enforces those limits."},
{q:"Which statement about open-source software is CORRECT?", o:["It has no licence","It is licensed — source is available and use/modification/distribution are permitted under the licence's terms, which still bind you","It cannot be used commercially","It's always public domain"], a:1, e:"Open source is a licensing model, not an absence of one: GPL, MIT etc. carry real obligations (attribution, share-alike…)."},
{q:"A retailer processes card payments. Which standard governs how that cardholder data is secured?", o:["HIPAA","PCI DSS","WEEE","POPIA only"], a:1, e:"The Payment Card Industry Data Security Standard applies to anyone handling card transactions — the objectives' named regime for card data."},
{q:"Name + date of birth + home address in a spreadsheet constitutes which regulated category?", o:["Telemetry","PII (personally identifiable information)","Open data","DRM"], a:1, e:"Information identifying an individual is PII — triggering protection duties (GDPR and friends) for storage, access, and disposal."},
{q:"Why do data retention requirements matter to a technician wiping old drives?", o:["They don't","Regulations dictate both how long data MUST be kept and when it must be destroyed — premature destruction and over-retention are both violations","Only lawyers care","Retention only covers paper"], a:1, e:"Retention schedules bind both directions: destroy legally-held data too soon, or keep personal data too long, and you're non-compliant either way (2.8 pairing)."},
{q:"Which category applies to a clinic's patient records, and what does it imply?", o:["Ordinary business data","Healthcare data — special-category/regulated (HIPAA in the US), demanding heightened protection, access control, and audit","Open data","PCI"], a:1, e:"Medical data is the archetypal special-category information — strongest handling, minimal access, full auditability."}
]
},
/* ---------------- 4.7 ---------------- */
{
id:"4.7", name:"Use proper communication techniques and professionalism",
notes:`
<h2>Communication fundamentals</h2>
<ul>
<li><b>Proper language</b> — avoid jargon, acronyms, and slang with non-technical users; explain in their terms.</li>
<li><b>Positive attitude / project confidence</b> — even (especially) when the news is bad.</li>
<li><b>Actively listen, take notes, avoid interrupting</b> — let the customer finish; restate to confirm.</li>
<li><b>Be culturally sensitive</b> — including using <b>appropriate professional titles</b>.</li>
<li><b>Be on time</b> — and <b>if late, contact the customer</b> before the appointment time.</li>
<li><b>Avoid distractions</b> — no personal calls, texting/social media, or chatting to co-workers mid-job; minimise personal interruptions.</li>
</ul>

<h2>Difficult customers or situations</h2>
<ul>
<li><b>Do not argue or get defensive.</b> <b>Avoid dismissing</b> their problems. <b>Avoid being judgmental</b> ("what did you click THIS time?" — no).</li>
<li><b>Clarify:</b> ask <b>open-ended questions</b> to narrow the problem; <b>restate the issue</b> to verify understanding.</li>
<li><b>Never post about customers/experiences on social media.</b></li>
</ul>

<h2>Expectations and follow-through</h2>
<ul>
<li><b>Set and meet expectations/timeline; communicate status</b> — especially when things change.</li>
<li><b>Offer options:</b> repair vs replacement, with honest trade-offs — the customer decides.</li>
<li><b>Provide documentation</b> of services rendered; <b>follow up later to verify satisfaction</b>.</li>
<li><b>Confidential materials:</b> if private information (documents on screens/desktops/printers) appears during work — don't read, share, or comment; look away, minimise, hand printouts back. Treat customer data as untouchable.</li>
</ul>
`,
quiz:[
{q:"A furious customer rants about their 'useless computer and useless IT'. What is the professional response?", o:["Match their energy","Listen without interrupting, don't take it personally or argue, then restate the actual problem and focus on solving it","Explain why they're wrong","End the call"], a:1, e:"De-escalation: absorb, don't argue or get defensive; clarify with restatement; redirect energy at the problem, not the person."},
{q:"Which question style extracts the most diagnostic information from a vague complaint like 'the internet is broken'?", o:["'Is it broken? Yes or no?'","Open-ended questions — 'What were you doing when it stopped? What exactly do you see?'","Leading questions","No questions; just start fixing"], a:1, e:"Open-ended questions surface details yes/no questions never reach — paired with restating to confirm understanding."},
{q:"A technician explains a fault as 'your DNS resolution is failing at the recursive resolver'. What professional principle is violated?", o:["Punctuality","Avoiding jargon/acronyms with non-technical customers — translate to their terms","Cultural sensitivity","Chain of custody"], a:1, e:"Communication must match the audience: 'the system that turns website names into addresses isn't responding' informs; jargon alienates."},
{q:"Traffic makes a technician 20 minutes late to a customer site. Correct handling?", o:["Arrive silently and apologise if asked","Contact the customer BEFORE the appointment time to warn them and reset expectations","Blame traffic on arrival","Cancel"], a:1, e:"The objective is explicit: be on time; if late, contact the customer. Proactive communication preserves trust."},
{q:"While fixing an executive's PC, a confidential salary spreadsheet is open on screen. What does professionalism require?", o:["A quick read for context","Don't read, share, or comment — minimise it/look away and continue the work; treat all customer materials as private","A photo for the ticket","Mentioning it to colleagues"], a:1, e:"Confidential material on screens, desks, and printers is untouchable — privacy discipline is part of the job description."},
{q:"During an on-site repair the technician's phone buzzes with personal messages. Correct behaviour?", o:["Reply quickly between steps","Ignore personal calls/texts/social media until the job is done — the customer has your full attention","Take the call outside for privacy","Show the customer the meme"], a:1, e:"Avoiding distractions is a listed objective: personal communications wait; divided attention reads as disrespect (and causes mistakes)."},
{q:"A repair needs a part that won't arrive until Thursday. The customer expected same-day. What is the correct expectation management?", o:["Say nothing and hope","Communicate the revised timeline honestly now, explain why, offer any interim options, and then MEET the new commitment","Promise tomorrow to keep them happy","Let the parts desk tell them"], a:1, e:"Set expectations honestly, communicate status changes immediately, and hit what you promise — under-promise beats over-promise."},
{q:"A customer's laptop repair would cost 80% of a new machine. What does professionalism require?", o:["Recommend repair; it's your revenue","Present both repair and replacement options with honest costs/trade-offs, letting the customer decide","Decide for them","Only mention replacement"], a:1, e:"Offering repair/replacement options with straight numbers respects customer autonomy — the objectives name this explicitly."},
{q:"After a frustrating job at a customer site, a technician drafts a witty post about it. What is the rule?", o:["Fine if anonymised","Never post about customers or their environments on social media — full stop","Fine after 30 days","Fine on private accounts"], a:1, e:"The objective is absolute: no social-media disclosure of customer experiences. Anonymisation fails and trust doesn't survive it."},
{q:"A job is finished. Which TWO actions properly close it out?", o:["Leave quietly","Provide documentation of the services rendered, and follow up later to verify satisfaction","Invoice twice","Ask for a review immediately"], a:1, e:"Documentation plus follow-up are the listed closers — the paper trail and the confirmation that the fix held."}
]
},

{
id:"4.8", name:"Identify the basics of scripting",
notes:`
<h2>Script file types — extension → environment</h2>
<table>
<tr><th>Extension</th><th>Language / runs in</th></tr>
<tr><td><b>.bat</b></td><td>Windows batch — legacy cmd.exe scripting</td></tr>
<tr><td><b>.ps1</b></td><td><b>PowerShell</b> — modern Windows administration/automation</td></tr>
<tr><td><b>.vbs</b></td><td>VBScript — legacy Windows scripting</td></tr>
<tr><td><b>.sh</b></td><td>Shell script — <b>Linux/macOS</b> (bash)</td></tr>
<tr><td><b>.js</b></td><td>JavaScript — browsers and Node.js</td></tr>
<tr><td><b>.py</b></td><td><b>Python</b> — cross-platform general scripting</td></tr>
</table>
<div class="callout"><b>The mapping questions:</b> "modern Windows admin script" → .ps1. "Linux automation" → .sh. "cross-platform data-gathering script" → .py. "ancient login script in cmd" → .bat.</div>

<h2>Use cases for scripting</h2>
<ul>
<li><b>Basic automation</b> of repetitive tasks · <b>restarting machines</b> · <b>remapping network drives</b> · <b>installation of applications</b> (silent deploys) · <b>automated backups</b> · <b>gathering information/data</b> (inventory, diagnostics) · <b>initiating updates</b>.</li>
<li>The theme: anything done manually more than a few times should be scripted — consistent, fast, logged.</li>
</ul>

<h2>Other considerations — scripts can hurt</h2>
<ul>
<li><b>Unintentionally introducing malware</b> — running scripts from untrusted sources (that "handy script" from a forum) executes with your privileges.</li>
<li><b>Inadvertently changing system settings</b> — a mistyped path or variable in a script hitting hundreds of machines multiplies the mistake.</li>
<li><b>Browser/system crashes from mishandling of resources</b> — runaway loops, memory leaks, or mass operations can hang or crash systems.</li>
<li>Mitigations: read/understand before running, test in a sandbox (4.2!), least privilege, and version control.</li>
</ul>
`,
quiz:[
{q:"Which file extension indicates a PowerShell script?", o:[".bat",".ps1",".sh",".vbs"], a:1, e:".ps1 is PowerShell — the modern Windows automation language. .bat is legacy batch, .sh is Linux/macOS shell, .vbs is legacy VBScript."},
{q:"A technician needs a script to run on Linux servers via bash. Which extension?", o:[".bat",".sh",".ps1",".js"], a:1, e:".sh denotes shell scripts for Unix-family systems. Windows-native formats (.bat/.ps1) don't run natively there."},
{q:"Which language is the cross-platform choice frequently used for information gathering and general automation on any OS?", o:["VBScript","Python (.py)","Batch","JScript"], a:1, e:"Python runs everywhere and dominates general-purpose scripting — the objectives' cross-platform representative."},
{q:"A script must map network drives for every user at logon in a legacy cmd-based environment. Which file type is traditional?", o:[".py",".bat",".sh",".json"], a:1, e:"Batch files (.bat) are the classic Windows logon scripts — 'net use' drive mappings and all (1.2 crossover)."},
{q:"Which list contains ONLY scripting use cases named on the objectives?", o:["Gaming, mining, streaming","Automated backups, remapping drives, restarting machines, gathering information, initiating updates, installing applications","Compiling kernels, soldering, imaging","Browsing, emailing, printing"], a:1, e:"The objectives enumerate exactly those: automation, restarts, drive remapping, app installation, backups, data gathering, updates."},
{q:"A 'useful cleanup script' from a random forum is run with admin rights and infects the machine. Which stated scripting risk is this?", o:["Resource mishandling","Unintentionally introducing malware by running untrusted scripts","Changing settings inadvertently","Version drift"], a:1, e:"Scripts execute with your privileges — untrusted code run as admin IS the malware delivery. Read and understand before running."},
{q:"A deployment script with a wrong registry path modifies a setting on 400 PCs. Which risk category, and which practice would have caught it?", o:["Malware; antivirus","Inadvertently changing system settings; sandbox testing before deployment (4.2)","Crashes; more RAM","None; scripts are safe"], a:1, e:"Automation multiplies errors at scale — which is why change management's sandbox applies to scripts as much as patches."},
{q:"An infinite loop in a data-gathering script consumes all memory and hangs workstations. Which listed consideration is this?", o:["Introducing malware","Browser/system crashes due to mishandling of resources","Licence violation","Chain of custody"], a:1, e:"Runaway resource consumption (loops, leaks, mass operations) is the third named risk — test with limits and timeouts."},
{q:"Which extension belongs to a script most at home in web browsers (and Node.js)?", o:[".vbs",".js",".ps1",".sh"], a:1, e:".js is JavaScript — the browser's language, also server-side via Node."},
{q:"What FOUR practices make script use safe in production?", o:["Speed, secrecy, admin rights, no comments","Read/understand the code, test in a sandbox, run with least privilege, and keep scripts documented/version-controlled","Rename to .txt, zip, email, pray","Only run at midnight"], a:1, e:"Comprehension, sandboxing, least privilege, and documentation address all three listed risks — the operational wrapper around scripting."}
]
},
/* ---------------- 4.9 ---------------- */
{
id:"4.9", name:"Use remote access technologies",
notes:`
<h2>The methods — tool → job → security note</h2>
<table>
<tr><th>Tool</th><th>Job</th><th>Security consideration</th></tr>
<tr><td><b>RDP</b></td><td>Full graphical remote control of Windows (Pro+ hosts, port 3389)</td><td>Never expose 3389 to the internet — tunnel via VPN; brute-force magnet</td></tr>
<tr><td><b>VPN</b></td><td>Encrypted tunnel INTO a network — then use other tools across it</td><td>The secure transport that should wrap the others; MFA the logins</td></tr>
<tr><td><b>VNC</b></td><td>Cross-platform graphical screen sharing/control</td><td>Base protocol weakly secured — use versions with proper encryption, or tunnel it</td></tr>
<tr><td><b>SSH</b></td><td>Encrypted command-line access (port 22) — Linux/network devices</td><td>Strong; prefer key-based auth over passwords</td></tr>
<tr><td><b>RMM</b></td><td>Remote monitoring and management — MSP agent platforms: monitoring, patching, scripting, remote control at fleet scale</td><td>The agent has deep privileges on every endpoint — RMM compromise = every client compromised</td></tr>
<tr><td><b>MSRA / Quick Assist</b></td><td>Microsoft Remote Assistance — user INVITES a helper to view/share control of their session</td><td>Invitation-based assistance vs RDP's takeover (RDP logs the local user out; assistance shares their session)</td></tr>
<tr><td><b>Third-party tools</b></td><td><b>Screen-sharing</b>, <b>video-conferencing</b>, <b>file transfer</b>, <b>desktop management</b> software (TeamViewer-alikes)</td><td>Vet the vendor, MFA the accounts, uninstall when not needed — scam callers LOVE these tools</td></tr>
</table>
<div class="callout"><b>Exam discriminators:</b> "help a user WHILE THEY WATCH and share the session" → MSRA/Quick Assist. "full control of an unattended Windows box" → RDP (over VPN). "command line on a Linux server" → SSH. "MSP managing 500 endpoints' patching and monitoring" → RMM. "secure pipe first, tools through it" → VPN.</div>
`,
quiz:[
{q:"A user needs to show a technician their error WHILE staying in control of the session, granting help by invitation. Which tool fits?", o:["RDP","MSRA/Quick Assist (remote assistance)","SSH","diskpart"], a:1, e:"Remote ASSISTANCE shares the user's live session by invitation. RDP would log the console user off and take over — the key discriminator."},
{q:"A technician must administer a headless Ubuntu server securely from Windows. Which protocol?", o:["RDP","VNC","SSH","Telnet"], a:2, e:"SSH provides encrypted command-line access — the standard for Linux and network devices (port 22, keys over passwords)."},
{q:"Why should RDP never be exposed directly to the internet, and what is the correct architecture?", o:["It's too slow","Port 3389 is relentlessly brute-forced and exploited; require a VPN first, with RDP reachable only inside the tunnel","Licensing forbids it","It only works on LANs"], a:1, e:"Internet-facing RDP is a top ransomware entry vector. VPN (with MFA) provides the encrypted, authenticated outer layer."},
{q:"An MSP needs continuous monitoring, patch deployment, scripted maintenance, and on-demand remote control across 40 clients' fleets. Which technology category?", o:["VNC","RMM (remote monitoring and management)","MSRA","FTP"], a:1, e:"RMM platforms are agent-based fleet management — monitoring, patching, scripting, remote access at scale. Exactly the MSP toolset."},
{q:"What is the major security consideration attached to RMM platforms?", o:["They're slow","The agents hold deep privileges everywhere, so a compromised RMM compromises every managed endpoint — harden and MFA the platform itself","They can't patch","They need port 23"], a:1, e:"RMM is a keys-to-everything system; supply-chain attacks on RMM vendors have ransomed entire client bases. Guard it accordingly."},
{q:"Which tool provides cross-platform graphical control, but with a base protocol requiring added encryption or tunnelling to be safe?", o:["SSH","VNC","RDP","RMM"], a:1, e:"VNC works everywhere but classic VNC security is weak — use encrypted implementations or wrap it in SSH/VPN tunnels."},
{q:"'Scam likely' callers convince victims to install a legitimate screen-sharing tool, then 'fix' invented problems. What is the professional takeaway about third-party remote tools?", o:["Ban them universally","They're legitimate but powerful — vet vendors, protect accounts with MFA, and remove/disable them when not in use; educate users that cold-callers requesting them are scams","They're malware by definition","Only browsers are safe"], a:1, e:"The tools are fine; unsolicited installation requests are the scam. Governance plus the user-education thread running through the whole exam."},
{q:"Which is the correct pairing of need → tool?", o:["Unattended server GUI → MSRA","Team meeting with screen share → video-conferencing/screen-sharing software; moving large files to a client → secure file-transfer software","Linux CLI → VNC","Fleet patching → Quick Assist"], a:1, e:"The objectives list screen-sharing, video-conferencing, file-transfer, and desktop-management as the third-party categories — match the job to the category."},
{q:"What is the functional difference between connecting by VPN and connecting by RDP?", o:["None","VPN joins your device to the remote NETWORK (a transport); RDP controls one remote MACHINE'S desktop — commonly you VPN first, then RDP through it","VPN is Windows-only","RDP encrypts the whole network"], a:1, e:"VPN = network membership; RDP = machine control. They're layers, not alternatives — which is why 'RDP over VPN' is the standard pattern."},
{q:"A technician needs occasional file retrieval from a remote Linux box they already SSH into. Which SSH-family tools apply?", o:["Telnet and TFTP","SFTP/SCP — file transfer secured over the SSH connection","VNC file mode","SMB over the internet"], a:1, e:"SFTP and SCP ride SSH's encryption (1.2 Core 1 crossover: port 22 secures them) — no extra exposure needed."}
]
}
]
,mock:[
{q:"A recurring tricky fault gets solved in 4 hours. Which TWO documentation actions convert that time into permanent organisational value?", o:["A celebratory email","Full resolution notes on the ticket, promoted into a knowledge base article","Deleting the ticket to close stats","A verbal debrief only"], a:1, e:"Ticket resolution notes feed the knowledge base; the next occurrence becomes a search, not a 4-hour investigation."},
{q:"A new starter joins Monday. Which document guarantees their account, hardware, access rights, and inductions all happen?", o:["The AUP","The new-user setup checklist","An incident report","The EULA"], a:1, e:"Onboarding checklists make setup complete and consistent — the mirror image of the termination checklist."},
{q:"An audit asks which laptops are under warranty, who holds them, and what software they're licensed for. Which system answers in minutes?", o:["Email archives","The asset management database (tags/IDs, assigned users, warranty and licence records)","The topology diagram","Memory"], a:1, e:"That's asset management's whole job: inventory + assignment + warranty + licensing per tagged device."},
{q:"A risky database migration is proposed. Which FOUR change-management elements must exist before the CAB will approve?", o:["Logo, slogan, budget, lunch","Purpose/scope, risk analysis, scheduled date/time with impact assessment, and a rollback plan (with sandbox test results)","Rollback only","A verbal promise"], a:1, e:"The request must show why, what exactly, when/what breaks, how risky — and how to undo it, proven in the sandbox."},
{q:"Mid-change, the migration fails at 2 a.m. Because the process was followed, what happens next?", o:["Panic and improvisation","The documented rollback plan is executed, returning systems to the prior state before business hours","The team pushes forward regardless","Users are informed at 9am there's no system"], a:1, e:"This is why rollback plans are written before implementation — 2 a.m. failure becomes a controlled reversal, not a crisis."},
{q:"Sunday full + Monday-Saturday incrementals, tape failure discovered Friday morning, but WEDNESDAY'S incremental tape is corrupt. What is recoverable?", o:["Everything through Thursday","Only through Tuesday night — the incremental chain breaks at the corrupt link","Nothing at all","Everything; incrementals are independent"], a:1, e:"Incremental restores need every link: full + Mon + Tue works; Wednesday's corruption orphans Thursday's too. Chain fragility is incremental backup's cost — and why testing matters."},
{q:"A firm implements: production data + a NAS copy + encrypted cloud copy (different media), cloud being off-site. Which principle is satisfied?", o:["GFS","The 3-2-1 rule — 3 copies, 2 media types, 1 off-site","RAID 10","Synthetic fulls"], a:1, e:"Three copies across two media with one off-site is the textbook 3-2-1 implementation."},
{q:"Which backup regime pairing is CORRECT?", o:["GFS: hourly/daily/weekly","GFS: daily sons, weekly fathers, monthly grandfathers","3-2-1: 3 tapes, 2 safes, 1 key","Synthetic: backups that don't exist"], a:1, e:"Grandfather-father-son = monthly-weekly-daily generations. The 3-2-1 numbers mean copies/media/off-site."},
{q:"A technician about to swap RAM is wearing a wool jumper on a carpeted floor with no strap available. Which TWO actions reduce ESD risk most?", o:["Work faster","Touch the earthed unpainted chassis to equalise before and during work, and keep components in antistatic bags until the moment of installation","Rubber gloves","Breathe less"], a:1, e:"Potential equalisation via the chassis plus bag discipline are the no-strap mitigations; the jumper and carpet are exactly why they matter."},
{q:"Which THREE items belong to PERSONAL safety rather than equipment safety?", o:["Antistatic bags, ESD mats, straps","Disconnecting power before service, proper lifting technique, goggles/mask for debris and dust","RAID, UPS, surge strips","Chain of custody"], a:1, e:"Power-first, lift-with-legs, and PPE protect the human; the ESD kit protects the silicon. The exam distinguishes the two lists."},

/* ============================================================
   State, storage (safe — degrades if storage unavailable)
   ============================================================ */
const PROGRESS_KEY = "quiz_progress";
let storageOk = true;
const store = {
  get(k){ if(!storageOk) return null; try{ return JSON.parse(localStorage.getItem("aplus_"+k)); }catch(e){ storageOk=false; return null; } },
  set(k,v){
    if(!storageOk) return false;
    try{ localStorage.setItem("aplus_"+k, JSON.stringify(v)); setSaveStatus("saved"); return true; }
    catch(e){ storageOk=false; setSaveStatus("error"); return false; }
  },
  remove(k){ if(!storageOk) return; try{ localStorage.removeItem("aplus_"+k); }catch(e){ storageOk=false; } }
};
let view = {name:"home"};
let stack = [];
let quiz = null;
let game = null;
let pendingNav = null;

function setSaveStatus(state, detail){
  const el = document.getElementById("saveStatus");
  if(!el) return;
  el.className = "save-status " + (state||"");
  const labels = {saved:"Saved locally", unsaved:"Unsaved changes", error:"Storage unavailable", ready:"Ready"};
  el.querySelector("span").textContent = detail || labels[state] || labels.ready;
}
function hasActiveQuiz(){ return quiz && !quiz.done; }
function abandonQuiz(){ clearQuizProgress(); quiz = null; }
function navigateTo(name, params={}, push=true){
  if(push) stack.push(view);
  view = Object.assign({name}, params);
  render();
  window.scrollTo({top:0});
}
function go(name, params={}, push=true){
  if(hasActiveQuiz() && !(name==="quiz" && !push)){
    pendingNav = {type:"go", name, params, push};
    showLeaveModal();
    return;
  }
  navigateTo(name, params, push);
}
function goBack(){
  if(hasActiveQuiz()){ pendingNav = {type:"back"}; showLeaveModal(); return; }
  if(view.name==="game") game = null;
  quiz = null;
  view = stack.pop() || {name:"home"};
  render();
  window.scrollTo({top:0});
}
function showLeaveModal(){
  if(document.getElementById("leaveModal")) return;
  const ov = document.createElement("div");
  ov.className = "modal-overlay";
  ov.id = "leaveModal";
  ov.innerHTML = `<div class="modal" role="dialog" aria-modal="true" aria-labelledby="lmTitle">
    <h3 id="lmTitle">Leave in-progress quiz?</h3>
    <p>Your answers are auto-saved locally. You can resume later, or leave and discard this attempt.</p>
    <div class="row">
      <button class="btn" id="lmNo">Keep studying</button>
      <button class="btn primary" id="lmYes">Leave quiz</button>
    </div></div>`;
  document.body.appendChild(ov);
  document.getElementById("lmNo").onclick = ()=>{ pendingNav = null; closeLeaveModal(); };
  ov.onclick = (e)=>{ if(e.target===ov){ pendingNav = null; closeLeaveModal(); } };
  document.getElementById("lmYes").onclick = ()=>{
    const nav = pendingNav;
    pendingNav = null;
    closeLeaveModal();
    abandonQuiz();
    if(!nav || nav.type==="back"){
      view = stack.pop() || {name:"home"};
      render();
      window.scrollTo({top:0});
    } else if(nav.type==="startQuiz"){
      beginQuiz(nav.core, nav.num, nav.subId);
    } else {
      navigateTo(nav.name, nav.params, nav.push);
    }
  };
  document.getElementById("lmNo").focus();
}
function closeLeaveModal(){
  const ov = document.getElementById("leaveModal");
  if(ov) ov.remove();
}
function saveQuizProgress(){
  if(!quiz || quiz.done) return;
  const ok = store.set(PROGRESS_KEY, {
    core:quiz.core, num:quiz.num, subId:quiz.subId,
    qs:quiz.qs, i:quiz.i, right:quiz.right, wrong:quiz.wrong||[],
    answered:quiz.answered, picked:quiz.picked,
    label:quiz.label, key:quiz.key, savedAt:Date.now()
  });
  if(ok) setSaveStatus("saved", `Q ${quiz.i+1}/${quiz.qs.length} saved`);
}
function clearQuizProgress(){ store.remove(PROGRESS_KEY); }
function getSavedProgress(){ return store.get(PROGRESS_KEY); }
function resumeQuiz(){
  const p = getSavedProgress();
  if(!p || !p.qs) return false;
  quiz = {
    core:p.core, num:p.num, subId:p.subId||null,
    qs:p.qs, i:p.i||0, right:p.right||0, wrong:p.wrong||[],
    answered:!!p.answered, picked:p.picked??null,
    done:false, label:p.label, key:p.key
  };
  navigateTo("quiz", {}, false);
  setSaveStatus("saved", "Session restored");
  return true;
}
function recordScore(key, right, total){
  const prev = store.get(scoreKey(key));
  const prevBest = typeof prev === "number" ? prev : (prev?.best ?? 0);
  const prevAttempts = typeof prev === "object" && prev ? (prev.attempts || 0) : (prev != null ? 1 : 0);
  const pct = Math.round(100*right/total);
  const next = {
    best: Math.max(prevBest, right),
    attempts: prevAttempts + 1,
    lastAt: Date.now(),
    lastPct: pct
  };
  store.set(scoreKey(key), next);
  return next;
}
window.addEventListener("beforeunload", (e)=>{
  if(hasActiveQuiz()){ saveQuizProgress(); e.preventDefault(); e.returnValue = ""; }
});
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function findDomain(core,num){ return DOMAINS.find(d=>d.core===core && d.num===num); }
function noteReadMeta(notes){
  const text = notes.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
  const words = text ? text.split(" ").length : 0;
  const sections = (notes.match(/<h2>/gi) || []).length;
  return {words, min:Math.max(1, Math.ceil(words / 200)), sections};
}
function prepNotesSheet(notes, subId){
  let section = 0;
  const toc = [];
  let html = notes.replace(/<h2>([^<]+)<\/h2>/g, (_, title) => {
    section++;
    const id = `note-${subId.replace(/\./g, "")}-${section}`;
    const label = title.trim();
    toc.push({id, label});
    return `<h2 id="${id}">${label}</h2>`;
  });
  html = html.replace(/<table>/g, '<div class="notes-table-wrap"><table>').replace(/<\/table>/g, "</table></div>");
  const examTips = [];
  const calloutRe = /<div class="callout"><b>([^<]+)<\/b>\s*([\s\S]*?)<\/div>/gi;
  let m;
  while((m = calloutRe.exec(notes))){
    const label = m[1].replace(/:$/, "").trim();
    const body = m[2].replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
    if(/exam|memorise|memorize|trap|discriminator|angle/i.test(label + " " + body.slice(0, 80)))
      examTips.push({label, text:body.slice(0, 140) + (body.length > 140 ? "…" : "")});
  }
  const meta = noteReadMeta(notes);
  const tocHtml = toc.length >= 3
    ? `<nav class="notes-toc" aria-label="Section menu"><h3>On this sheet</h3><ul>${toc.map(t =>
        `<li><a href="#" onclick="scrollNoteSection('${t.id}');return false">${esc(t.label)}</a></li>`
      ).join("")}</ul></nav>` : "";
  const examStrip = examTips.length
    ? `<div class="notes-exam-strip" aria-label="Exam tips">${examTips.slice(0, 4).map(t =>
        `<span class="notes-exam-chip" title="${esc(t.text)}">${esc(t.label)}</span>`
      ).join("")}</div>` : "";
  return {html, tocHtml, examStrip, meta};
}
function scrollNoteSection(id){
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
}
function renderSubNav(core, num, d, subId){
  const idx = d.subs.findIndex(s => s.id === subId);
  const prev = idx > 0 ? d.subs[idx - 1] : null;
  const next = idx < d.subs.length - 1 ? d.subs[idx + 1] : null;
  const mk = (s, dir) => s
    ? `<button class="btn sub-nav-btn" onclick="go('sub',{core:'${core}',num:'${num}',sub:'${s.id}'})">${dir === "prev" ? "← " : ""}${s.id}${dir === "next" ? " →" : ""}</button>`
    : "<span></span>";
  return `<div class="sub-nav">${mk(prev, "prev")}<button class="btn" onclick="go('domain',{core:'${core}',num:'${num}'})">All ${d.num} topics</button>${mk(next, "next")}</div>`;
}

function scoreKey(id){ return "score_"+id; }
function scorePill(id, total){
  const s = store.get(scoreKey(id));
  if(!s) return "";
  const best = typeof s === "number" ? s : s.best;
  if(best==null) return "";
  const pct = Math.round(100*best/total);
  const attempts = typeof s === "object" && s.attempts ? s.attempts : null;
  const meta = attempts ? `<span class="score-meta">· ${attempts} attempt${attempts===1?"":"s"}</span>` : "";
  return `<span class="pill score ${pct<75?"low":""}">Best: ${pct}%</span>${meta}`;
}
function resumeBanner(){
  const p = getSavedProgress();
  if(!p || !p.qs) return "";
  const when = p.savedAt ? new Date(p.savedAt).toLocaleString() : "recently";
  return `<div class="resume-banner" role="status">
    <p><b>Resume:</b> ${esc(p.label)} — question ${p.i+1} of ${p.qs.length} (${p.right} correct) · saved ${esc(when)}</p>
    <button class="btn primary" onclick="resumeQuiz()">Continue quiz</button>
  </div>`;
}
function storageWarning(){
  if(storageOk) return "";
  return `<div class="storage-warn" role="alert">Local storage is unavailable — scores and quiz progress cannot be saved in this browser session.</div>`;
}
function readBest(key, total){
  const s = store.get(scoreKey(key));
  if(s == null) return null;
  const best = typeof s === "number" ? s : s.best;
  return best == null ? null : Math.round(100 * best / total);
}
function coreProgress(coreKey){
  const c = ROSTER[coreKey];
  let attempted = 0, passing = 0, weighted = 0, weightTotal = 0, lastAt = 0;
  const weak = [];
  for(const rd of c.domains){
    const d = findDomain(coreKey, rd.num);
    if(!d) continue;
    const pct = readBest(d.id + "_mock", d.mock.length);
    weightTotal += rd.weight;
    if(pct != null){
      attempted++;
      weighted += pct * rd.weight;
      if(pct >= 75) passing++;
      else weak.push({num: rd.num, name: d.name, pct});
      const rec = store.get(scoreKey(d.id + "_mock"));
      const ts = typeof rec === "object" && rec?.lastAt ? rec.lastAt : 0;
      if(ts > lastAt) lastAt = ts;
    }
  }
  const readiness = weightTotal && attempted ? Math.round(weighted / weightTotal) : 0;
  return {domains: c.domains.length, attempted, passing, readiness, weak, lastAt};
}
function gamesProgressSummary(){
  const ready = GAME_CATALOG.filter(g=>g.ready);
  const played = new Set();
  for(const g of ready){
    if(g.type==="story") continue;
    if(store.get(scoreKey(gameScoreKey(g.id,"normal"))) || store.get(scoreKey(gameScoreKey(g.id)))) played.add(g.id);
    if(g.modes && store.get(scoreKey(gameScoreKey(g.id,"hard")))) played.add(g.id);
  }
  let fablesPlayed = 0;
  for(const s of STORY_DATA){
    if(store.get(scoreKey(gameScoreKey("storychat", s.id)))){
      fablesPlayed++;
      played.add("storychat");
    }
  }
  let milBest = null, milQ = 0;
  const mil = store.get(scoreKey("game_millionaire"));
  if(mil){
    const best = typeof mil === "number" ? mil : mil.best;
    if(best != null){
      milQ = best;
      played.add("millionaire");
      milBest = formatMillionairePrize(best >= 15 ? MILLIONAIRE_LADDER[14] : (best > 0 ? MILLIONAIRE_LADDER[best-1] : 0));
    }
  }
  return {playedCount: played.size, total: ready.length, fablesPlayed, fablesTotal: STORY_DATA.length, milBest, milQ};
}
