{q:"A technician suspects a faulty patch cable is causing a user's network drops. What is the NEXT step?", o:["Replace all cabling in the office","Test the theory — e.g. swap in a known-good cable","Document the cable fault","Escalate to networking"], a:1, e:"A theory of probable cause exists (step 2 done); step 3 is testing it — a known-good cable swap confirms or eliminates it cheaply."},
{q:"The technician's theory is disproved and they cannot form a new one. What does the methodology say to do?", o:["Reinstall the OS as a catch-all","Escalate the problem","Close the ticket as unreproducible","Skip to documentation"], a:1, e:"Within step 3: if the theory fails, form a new theory or escalate to someone with more expertise/access. Escalation is a legitimate outcome, not a failure."},
{q:"Before making changes to a user's malfunctioning laptop, what should the technician ALWAYS do as part of identifying the problem?", o:["Update the BIOS","Perform a backup of the user's data","Clear the browser cache","Remove the battery"], a:1, e:"The methodology explicitly includes backing up data before making changes — a fix that destroys the user's files is worse than the fault."},
{q:"A fix has been applied and the user confirms the application opens. What TWO things remain before documenting?", o:["Nothing; document immediately","Verify FULL system functionality and implement preventive measures","Escalate and re-test","Establish a new theory"], a:1, e:"Step 5 is verifying the whole system works (not just the reported symptom) and putting preventive measures in place; step 6 is then documentation."},
{q:"Why does the methodology end with documenting findings, actions, and outcomes?", o:["For billing purposes only","So future incidents can be resolved faster using recorded knowledge","It is optional","To assign blame"], a:1, e:"Documentation builds the knowledge base — the same fault next time gets solved in minutes. It also creates an audit trail."},
{q:"A server fix requires a reboot that will interrupt 50 users. Which part of the methodology addresses this?", o:["Test the theory","Establish a plan of action — scheduling implementation to minimise disruption","Identify the problem","Verify functionality"], a:1, e:"Step 4 covers planning the implementation, including referring to vendor guidance and timing changes (maintenance windows) to limit impact."},
{q:"'Question the obvious' belongs to which step?", o:["Identify the problem","Establish a theory of probable cause","Verify functionality","Document findings"], a:1, e:"When forming a theory (step 2), check the simple explanations first — is it plugged in, is the switch on — before exotic ones."},
{q:"A technician wants to apply a registry fix found online, but the company has a change-control process. What does the methodology require?", o:["Apply it quickly before anyone notices","Consider corporate policies and procedures before implementing changes","Skip to verification","Escalate to the vendor"], a:1, e:"The methodology explicitly subordinates changes to organisational policy — change control, approvals, and procedures come before action."},
{q:"After replacing a failed drive, the technician also configures SMART monitoring alerts so future degradation is caught early. Which step does this exemplify?", o:["Testing the theory","Implementing preventive measures during verification","Identifying the problem","Establishing a theory"], a:1, e:"Preventive measures — stopping recurrence or catching it early — are part of step 5 alongside verifying full functionality."}
]
},
/* ---------------- 5.2 ---------------- */
{
id:"5.2", name:"Troubleshoot problems related to motherboards, RAM, CPU, and power",
notes:`
<h2>POST and startup symptoms</h2>
<ul>
<li><b>POST beep codes / debug LEDs</b> — patterns identify the failing subsystem (RAM, GPU, CPU); meaning is <b>vendor-specific — check the motherboard manual</b>. Continuous/repeating beeps classically indicate memory.</li>
<li><b>No power at all</b> — check outlet, cable, PSU switch, then PSU itself (paperclip test/PSU tester).</li>
<li><b>Powers on, no POST/black screen</b> — reseat RAM and GPU, minimum-boot with one stick, check the 4/8-pin CPU power lead (a classic new-build miss).</li>
<li><b>Boot loops / crash to reboot</b> — PSU, overheating, or RAM.</li>
</ul>

<h2>Physical inspection tells</h2>
<ul>
<li><b>Swollen/bulging or leaking capacitors</b> on the board → board failure; replace the motherboard.</li>
<li><b>Burning smell / scorch marks</b> → power down immediately; component or PSU has burned out.</li>
<li><b>Date/time resets each boot</b> → CMOS battery (CR2032) — also causes "settings lost" and boot prompts.</li>
</ul>

<h2>Instability patterns</h2>
<ul>
<li><b>BSOD / random crashes</b> — faulty RAM is suspect #1: run memory diagnostics (Windows Memory Diagnostic, MemTest86); also drivers, overheating.</li>
<li><b>Intermittent shutdowns under load</b> — overheating (dust, dead fan, dried thermal paste) or insufficient/failing PSU. Temps normal → PSU; temps high → cooling.</li>
<li><b>Sluggish performance + fans roaring</b> — thermal throttling: clean dust, verify heatsink seating and paste.</li>
<li><b>Inaccurate system date/time</b> while running → CMOS battery or NTP/timezone config.</li>
<li><b>Grinding noise</b> from the case → a failing <b>fan bearing</b> (or HDD — see 5.3). Smoke/sparks → PSU, stop immediately.</li>
</ul>

<h2>Symptom → first check (quick map)</h2>
<table>
<tr><th>Symptom</th><th>First check / tool</th></tr>
<tr><td>Repeating POST beeps, no display</td><td>Motherboard manual for beep code → reseat / swap RAM</td></tr>
<tr><td>Fans spin, black screen, new build</td><td>4/8-pin EPS CPU power + one stick RAM minimum boot</td></tr>
<tr><td>No power at all (no fans/LEDs)</td><td>Outlet, cable, PSU switch → paperclip/PSU tester</td></tr>
<tr><td>Date/time resets every cold boot</td><td>Replace CR2032 CMOS battery</td></tr>
<tr><td>Random BSODs, varied stop codes</td><td>Memory diagnostic (MemTest86 / Windows Memory Diagnostic)</td></tr>
<tr><td>Shutdown under load, temps normal</td><td>PSU wattage / failing supply</td></tr>
<tr><td>Shutdown under load, temps high / fans max</td><td>Dust, paste, heatsink seating (thermal throttle)</td></tr>
<tr><td>Bulging/leaking capacitors</td><td>Replace motherboard</td></tr>
<tr><td>Burning smell / smoke</td><td>Power off immediately — then inspect PSU/board</td></tr>
</table>

<h2>Minimum-config / swap order</h2>
<ol>
<li>Power off; discharge static.</li>
<li>One known-good RAM stick in the primary slot; disconnect all non-essential drives/cards.</li>
<li>Reseat GPU or temporarily try onboard video if available.</li>
<li>Confirm 24-pin + EPS connected; try known-good PSU if available.</li>
<li>Listen for beep codes / watch debug LEDs — document the pattern.</li>
</ol>

<div class="keyfact"><b>Heat vs power:</b> both can shut a PC down under load. High temps + roaring fans = cooling. Normal temps + instant restart = PSU. Don't replace both until you know which.</div>
<div class="callout"><b>Exam angle:</b> map symptom → first tool: crashes → memory diagnostic. No POST + beeps → count the beeps, check manual. Time resets → CR2032. Bulging caps → new board. Shutdown under load, temps fine → PSU.</div>
`,
quiz:[
{q:"A PC powers on but gives a repeating beep pattern and no display. What should the technician consult and suspect FIRST?", o:["The Windows event log; drivers","The motherboard manual for the beep code; likely RAM","The router logs; DHCP","The PSU label; wattage"], a:1, e:"Beep codes are the board's POST diagnostics — vendor-specific, so check the manual. Repeating/continuous beeps classically indicate a memory fault; reseat/swap RAM."},
{q:"A desktop resets its date and time to a default every time it is unplugged overnight. What is the fix?", o:["Replace the PSU","Replace the CR2032 CMOS battery","Reflash the BIOS","Replace the RTC crystal"], a:1, e:"The coin cell keeps the real-time clock alive without mains power. Time loss on cold boots is its signature end-of-life symptom."},
{q:"A machine BSODs randomly several times a day with varying error codes. Which diagnostic should be run FIRST?", o:["chkdsk","A memory diagnostic such as MemTest86","A WiFi analyzer","GPU stress test"], a:1, e:"Random, varied BSODs are the classic bad-RAM pattern — memory testing is the first, cheapest, highest-yield check."},
{q:"During inspection of an unstable PC, the technician sees several capacitors on the motherboard with domed, bulging tops. What is the correct remedy?", o:["Reseat the capacitors","Replace the motherboard","Update the chipset drivers","Increase PSU wattage"], a:1, e:"Bulging/leaking electrolytic capacitors mean the board is failing. Board replacement is the standard field remedy."},
{q:"A newly built PC's fans spin but it never POSTs and the screen stays black. Which frequently forgotten connector should be checked?", o:["Front-panel USB header","The 4/8-pin EPS CPU power connector","SATA power to the SSD","The RGB header"], a:1, e:"Fans-spin-no-POST in fresh builds is very often the CPU power lead left unplugged — the 24-pin alone won't run the processor."},
{q:"A PC shuts down five minutes into any game. Temperatures logged just before shutdown are normal. What is the MOST likely culprit?", o:["CPU overheating","A failing or undersized power supply","Bad RAM timings","Display cable fault"], a:1, e:"Load-triggered shutdowns with healthy temperatures point at the PSU sagging under peak draw. High temps would instead implicate cooling."},
{q:"A computer has become sluggish, and its fans run at full speed constantly. The interior is thick with dust. What is happening?", o:["The CPU is thermal throttling due to poor cooling","RAM is failing","The PSU is over-delivering","The BIOS needs updating"], a:0, e:"Dust-choked cooling raises temperatures; the CPU protects itself by throttling clocks (slowness) while fans max out. Clean it, check paste and heatsink seating."},
{q:"A burning smell comes from a running desktop. What is the FIRST action?", o:["Run diagnostics to locate the fault","Power off and disconnect it immediately","Open a ticket","Spray compressed air inside while running"], a:1, e:"Burning smells mean active component failure and fire risk — kill the power first, investigate second."},
{q:"A loud grinding noise comes from the rear of a desktop case; airflow from the exhaust feels weak. What has MOST likely failed?", o:["The HDD actuator","A case/CPU fan bearing","The PSU transformer","The speaker"], a:1, e:"Grinding plus reduced airflow localises to a failing fan bearing. (Grinding/clicking from the drive bay area would suggest an HDD — position matters.)"},
{q:"A PC reboots itself at random moments, sometimes mid-boot. Which THREE are the classic suspects to work through?", o:["PSU, overheating, RAM","Keyboard, mouse, monitor","DNS, DHCP, NAT","Fuser, drum, toner"], a:0, e:"Spontaneous reboots triangulate between power delivery, thermals, and memory — test/eliminate each in turn (PSU swap/tester, temps and dust, memory diagnostic)."}
]
},
/* ---------------- 5.3 ---------------- */
{
id:"5.3", name:"Troubleshoot and diagnose problems with storage drives and RAID arrays",
notes:`
<h2>Mechanical drive symptoms</h2>
<ul>
<li><b>Grinding, clicking ("click of death")</b> — imminent HDD failure: <b>back up immediately</b>, replace the drive. Do not keep running it.</li>
<li><b>Extended read/write times, low IOPS</b> — a degrading drive, severe fragmentation (HDD), or a nearly full/failing SSD.</li>
<li><b>LED status indicators</b> — drive/NAS/RAID bay LEDs (amber/red) flag failed members; check enclosure documentation.</li>
</ul>

<h2>S.M.A.R.T.</h2>
<ul>
<li>Drives self-monitor reallocated sectors, pending sectors, temperature, etc. A <b>SMART warning is a pre-failure alert</b>: back up and replace — don't wait for it to die.</li>
</ul>

<h2>Boot and detection failures</h2>
<ul>
<li><b>"Bootable device not found" / "No OS found"</b> — check boot order in UEFI, check the drive is detected in firmware, reseat data/power cables; if undetected everywhere, the drive (or its connection) is dead.</li>
<li><b>Data loss/corruption</b> — failing drive, unsafe removal, power loss mid-write. Tools: <code>chkdsk</code>, restore from backup.</li>
</ul>

<h2>RAID failures</h2>
<ul>
<li><b>One drive fails in RAID 1/5/10</b> — array runs <b>degraded</b>: still serving data but with no remaining tolerance. Replace the failed drive promptly → the array <b>rebuilds</b>.</li>
<li><b>Second failure while degraded</b> (or any failure in RAID 0) — array lost; restore from backup.</li>
<li><b>RAID not found / controller errors</b> — controller card, its battery/cache, or configuration metadata; don't reinitialise (that destroys data) — import/rescan first.</li>
</ul>

<h2>Scenario pick-list — storage & RAID</h2>
<table>
<tr><th>Scenario</th><th>First / correct action</th></tr>
<tr><td>HDD clicking, files opening slowly</td><td>Back up immediately → replace drive</td></tr>
<tr><td>SMART pre-failure warning at POST</td><td>Back up and replace proactively (don't wait)</td></tr>
<tr><td>"No boot device" — drive missing in UEFI</td><td>Reseat SATA data/power cables; then condemn drive</td></tr>
<tr><td>RAID 5 one disk failed (amber LED)</td><td>Degraded mode — replace failed disk, rebuild</td></tr>
<tr><td>Second disk fails before rebuild finishes</td><td>Array lost — restore from backup</td></tr>
<tr><td>Controller error; tempted to "initialise"</td><td><b>Do not initialise</b> — import/rescan foreign config</td></tr>
<tr><td>SSD disappears / read-only, no click sounds</td><td>Silent SSD failure — back up whatever remounts, replace</td></tr>
<tr><td>Power-cut file corruption (drive otherwise healthy)</td><td><code>chkdsk</code> + UPS for prevention</td></tr>
</table>

<h2>SSD vs HDD failure signatures</h2>
<ul>
<li><b>HDD:</b> click/grind, escalating I/O stalls, SMART reallocations — acoustic warning.</li>
<li><b>SSD:</b> silent — I/O errors, vanishing from detection, read-only lockdown, sudden capacity anomalies. Rely on SMART and backups.</li>
<li>Either way: <b>data first, replace second</b>. Do not run destructive tools (diskpart clean / format) on suspect volumes with unrecovered data.</li>
</ul>

<div class="keyfact"><b>Degraded ≠ safe:</b> a RAID array with one failed member still serves data but has <b>zero</b> remaining fault tolerance. Treat it as an emergency replace-and-rebuild, not "it's fine for now".</div>
<div class="callout"><b>Exam angle:</b> clicking drive → backup NOW. SMART alert → replace proactively. RAID 5 with one dead disk → degraded, replace + rebuild. "Technician reinitialises the array" → wrong, data gone.</div>
`,
quiz:[
{q:"A user's laptop makes repetitive clicking sounds and files open slowly. What should the technician do FIRST?", o:["Defragment the drive","Back up the data immediately","Run a 24-hour stress test","Update storage drivers"], a:1, e:"Clicking is imminent mechanical failure. Every minute of further use risks the data — back up first, replace the drive second."},
{q:"A workstation displays a SMART pre-failure warning at boot but works normally. What is the correct response?", o:["Ignore it until symptoms appear","Back up and replace the drive proactively","Disable SMART in BIOS","Run defrag to clear it"], a:1, e:"SMART exists to warn before failure. The drive is telling you it's dying — act while the data is still readable."},
{q:"A PC reports 'Bootable device not found'. The drive is NOT listed in UEFI. What should be checked FIRST?", o:["Windows boot configuration","The drive's data and power cable connections","The page file","The GPU seating"], a:1, e:"If firmware can't even see the drive, it's physical: reseat/replace SATA data and power leads before condemning the drive itself."},
{q:"One disk in a healthy RAID 5 array fails. What is the array's state and the correct action?", o:["Array lost; restore from backup","Degraded but operational; replace the failed disk so it rebuilds","Unaffected; RAID 5 tolerates two failures","Read-only until reformatted"], a:1, e:"RAID 5 survives one failure in degraded mode. Replace the dead disk promptly — a second failure before the rebuild completes loses everything."},
{q:"A second drive dies in that degraded RAID 5 array before the rebuild completes. What now?", o:["Rebuild both drives simultaneously","The array is lost; restore from backup","Swap the controller","Force-mount read-write"], a:1, e:"RAID 5 tolerates exactly one failure. Two concurrent failures destroy the array — this is why degraded arrays are an emergency and why RAID isn't backup."},
{q:"After a controller error, a technician is tempted to 'initialise' the RAID array to clear the fault. Why is this wrong?", o:["Initialisation takes too long","Initialising writes new metadata and destroys the existing data — import/rescan the foreign config instead","Controllers cannot be initialised","It voids the warranty"], a:1, e:"Initialisation creates a fresh, empty array. The correct move for configuration errors is importing/rescanning the existing config (and involving backups before risky steps)."},
{q:"A NAS shows a solid amber LED on bay 3 while others are green. What does this MOST likely indicate?", o:["Bay 3 is rebuilding at full speed","The drive in bay 3 has failed or is faulted","Bay 3 is the parity drive","The NAS needs a firmware update"], a:1, e:"Status LEDs are the enclosure's failure indicators — amber/red on one bay flags that member drive. Confirm in the management interface and replace."},
{q:"An older laptop's HDD shows very long read/write times and the system takes minutes to boot, though SMART is clean. Which TWO are reasonable responses?", o:["Replace the RAM; disable SMART","Check fragmentation/health and, ideally, migrate to an SSD","Reinstall drivers; enlarge the page file","Enable RAID 0; add a fan"], a:1, e:"Slow mechanical storage — through age, fragmentation, or simply being an HDD — is best solved by SSD migration; health checks confirm nothing worse is brewing."},
{q:"Which symptom differentiates a failing SSD from a failing HDD?", o:["SSDs click loudly","SSDs fail silently — no mechanical noise, just errors, disappearing drives, or read-only lockdown","HDDs never slow down first","SSDs always give a year of warning"], a:1, e:"With no moving parts, SSDs give no audible warning — they throw I/O errors, vanish from detection, or drop to read-only. SMART and backups matter even more."},
{q:"Frequent power cuts have left a desktop with recurring file corruption. Alongside a UPS, which built-in tool checks and repairs filesystem errors?", o:["defrag","chkdsk","diskpart clean","format /q"], a:1, e:"chkdsk scans and repairs filesystem inconsistencies. (diskpart clean and format destroy data — classic trap options.)"}
]
},
/* ---------------- 5.4 ---------------- */
{
id:"5.4", name:"Troubleshoot video, projector, and display issues",
notes:`
<h2>No image / wrong image</h2>
<ul>
<li><b>Incorrect data source</b> — monitor/projector set to the wrong input (HDMI 1 vs 2) — embarrassingly common; check first.</li>
<li><b>Physical cabling issues</b> — loose/damaged cable or wrong port (plugged into motherboard video while a discrete GPU is fitted).</li>
<li><b>No image at all</b> — test with a known-good monitor/cable; isolate GPU vs display.</li>
</ul>

<h2>Projector-specific</h2>
<ul>
<li><b>Burned-out bulb</b> — no/very dim image, lamp warning light; bulbs are consumables with rated hours — replace the lamp.</li>
<li><b>Intermittent projector shutdown</b> — <b>overheating</b>: clogged filter/vents, hot room; it cools then works again. Clean filters, improve ventilation.</li>
<li><b>Fuzzy image (projector)</b> — focus ring, lens cleaning, keystone/native resolution.</li>
</ul>

<h2>Image quality</h2>
<ul>
<li><b>Fuzzy/blurry (monitor)</b> — resolution not set to the panel's <b>native resolution</b>; also check scaling.</li>
<li><b>Incorrect colour display</b> — damaged/loose cable (classic pink/green VGA tint), bent pins, colour profile/driver.</li>
<li><b>Dim image</b> — brightness settings, power-saving mode, or a failing backlight (torch test → backlight, see 1.2).</li>
<li><b>Flashing/flickering screen</b> — cable/connection, refresh rate mismatch, failing panel or GPU driver.</li>
<li><b>Dead pixels</b> — stuck/off pixels: a panel defect; not fixable by software — replace panel (check dead-pixel warranty policy).</li>
<li><b>Burn-in</b> — persistent ghost of static content (OLED/plasma especially): permanent; prevent with screen savers/pixel shift/varied content.</li>
<li><b>Audio issues</b> — HDMI/DP carry audio: set the correct playback device; audio follows the video cable.</li>
</ul>

<h2>Where is the fault? — isolate display path</h2>
<table>
<tr><th>Test</th><th>If artefact/problem…</th><th>Then the fault is likely</th></tr>
<tr><td>Screenshot on Bad PC, view on another machine</td><td>Still present in the file</td><td>GPU / driver</td></tr>
<tr><td>Same screenshot, views clean on other PC</td><td>Only visible live on Bad PC's monitor</td><td>Cable, panel, or projector</td></tr>
<tr><td>Move cable to another known-good monitor</td><td>Problem follows the monitor</td><td>That display / its PSU / backlight</td></tr>
<tr><td>Problem follows the cable when swapped</td><td>Symptom moves with cable</td><td>Replace the video cable</td></tr>
<tr><td>Discrete GPU installed; cable in motherboard ports</td><td>No image though PC POSTs</td><td>Plug into the GPU's ports instead</td></tr>
</table>

<h2>Projector checklist</h2>
<ol>
<li>Correct input source (HDMI 1/2) and laptop Fn display toggle.</li>
<li>Lamp hours / lamp warning light — dim or no image after rated life → replace bulb.</li>
<li>Thermal cycle: works, shuts down, works after cool-down → clean filter / vents.</li>
<li>Focus/keystone/native resolution for fuzziness (panel/projector, not GPU artefacts).</li>
</ol>

<div class="keyfact"><b>Burn-in vs dead pixels:</b> permanent ghost of static layout → burn-in (OLED). Fixed black dots that never change → dead pixels. Soft blurry text on LCD → wrong (non-native) resolution.</div>
<div class="callout"><b>Exam angle:</b> ghost image permanently visible → burn-in. Same spots always black → dead pixels. Blurry text on LCD → set native resolution. Projector cuts out then recovers → overheating/filter. Everything tinted → cable/pins.</div>
`,
quiz:[
{q:"A conference room display shows 'No signal' although the laptop is connected and on. What should be checked FIRST?", o:["Replace the HDMI cable","That the display is set to the correct input source","Update GPU drivers","The projector bulb"], a:1, e:"Wrong input source is the most common and fastest-to-check cause — verify HDMI 1 vs HDMI 2 before touching hardware."},
{q:"Text on an office LCD looks soft and slightly blurry. The monitor is 1920×1080 but Windows is outputting 1600×900. What is the fix?", o:["Increase brightness","Set the output to the panel's native 1920×1080 resolution","Replace the VGA cable with a longer one","Enable ClearType only"], a:1, e:"LCDs are sharp only at native resolution; anything else is interpolated and soft. Match the output to the panel."},
{q:"A projector shuts itself down mid-presentation, works after cooling, then dies again. What is the MOST likely cause?", o:["Burned-out bulb","Overheating from a clogged filter or blocked vents","Wrong data source","HDCP failure"], a:1, e:"Cyclic thermal shutdown-and-recovery is the overheating signature. Clean the filter, clear the vents, check the room temperature."},
{q:"A projector powers on, its status lights are normal-ish with a lamp warning, but no image appears at all. What needs replacing?", o:["The HDMI cable","The projector lamp/bulb","The remote batteries","The lens"], a:1, e:"Projector bulbs are rated-hours consumables; a lamp warning plus no image means the bulb has burned out. Replacement lamps are a standard stock item."},
{q:"After a monitor is moved, everything on screen has a strong pink tint. What is the MOST likely cause?", o:["Failing backlight","A loose or damaged video cable / bent connector pins","Dead pixels","GPU overheating"], a:1, e:"Colour-channel tinting (pink/green) classically means one analogue channel is dropped by a loose cable or bent pin. Reseat/replace the cable."},
{q:"A hospital monitor that displayed the same status screen for years now shows a permanent ghost of that layout over everything. What is this?", o:["Dead pixels","Image persistence/burn-in","A refresh rate fault","Backlight bleed"], a:1, e:"Static content displayed long-term burns into the panel (especially OLED/plasma). It's permanent — prevention (content rotation, pixel shift) is the only cure."},
{q:"Three tiny spots on a laptop screen remain black on every background and never change position. What are they?", o:["Burn-in","Dead pixels","Dust under the bezel","GPU artefacts"], a:1, e:"Fixed, position-stable black dots are dead pixels — a panel defect resolved only by panel replacement (policies define how many qualify)."},
{q:"A user connects a monitor over HDMI but sound still plays from the laptop speakers. What should be changed?", o:["The HDMI cable to one with audio wires","The default playback device to the HDMI/monitor output","The monitor's refresh rate","The colour profile"], a:1, e:"HDMI always carries audio; the OS simply keeps the old default output. Select the HDMI audio device in sound settings."},
{q:"A desktop with a new discrete graphics card shows no image, though the machine POSTs (keyboard lights, fans normal). The monitor is plugged into the ports beside the USB stack. What is wrong?", o:["The GPU is dead","The cable is in the motherboard's video output instead of the graphics card's ports","The PSU is failing","The monitor needs drivers"], a:1, e:"With a discrete GPU installed, output usually moves to the card; the motherboard's integrated ports may be disabled. Move the cable to the GPU."},
{q:"A screen flickers intermittently; wiggling the video cable changes the behaviour. What is the MOST likely fix?", o:["A new GPU","Reseat or replace the video cable","A BIOS update","Lower the resolution"], a:1, e:"Symptom responding to cable movement localises the fault to the cable/connector. Reseat firmly; replace if damaged."}
]
},
/* ---------------- 5.5 ---------------- */
{
id:"5.5", name:"Troubleshoot common issues with mobile devices",
notes:`
<h2>Battery and charging</h2>
<ul>
<li><b>Poor battery health</b> — capacity fades with cycles; rapid drain on an old device usually means replace the battery (check the battery health readout). Rule out rogue apps and brightness first.</li>
<li><b>Swollen battery</b> — case bulging, screen lifting: stop using, don't charge, don't puncture; replace and recycle properly (ties to 1.1).</li>
<li><b>Improper charging / not charging</b> — try a known-good cable and adapter, inspect and clean the <b>port for lint/debris</b> (extremely common), then assess for a damaged port. Charging only at odd cable angles → physically damaged port.</li>
</ul>

<h2>Screen and input</h2>
<ul>
<li><b>Broken screen</b> — cracked glass with a working display = digitizer/glass replacement; damaged image = panel.</li>
<li><b>Digitizer issues / unresponsive touch</b> — restart, remove case/screen protector, calibrate; persistent → digitizer hardware.</li>
<li><b>Cursor drift / phantom touches</b> — protector interference, damaged digitizer, or calibration.</li>
</ul>

<h2>Connectivity ladder (WiFi / Bluetooth / cellular)</h2>
<ul>
<li>Toggle airplane mode → verify the right radio is on → forget/re-pair or rejoin → restart → check coverage/interference → reset network settings → (last resort) factory reset.</li>
</ul>

<h2>Physical and environmental</h2>
<ul>
<li><b>Liquid damage</b> — power off immediately, do <b>not</b> charge, dry externally; <b>liquid contact indicator (LCI)</b> stickers turn red and are checked for warranty. Rice is a myth — professional cleaning for valuable devices.</li>
<li><b>Overheating</b> — heavy load, charging while gaming, direct sun, or a failing battery; device throttles or shuts down. Remove case and load, cool gradually; persistent → hardware/battery.</li>
<li><b>Physically damaged ports</b> — bent/loose connectors: repair, don't wiggle harder.</li>
</ul>

<h2>Malware indicators on mobile</h2>
<ul>
<li>Sudden battery drain + heat + data-usage spikes + popups/unknown apps → possible malware: review installed apps and permissions, remove offenders, scan or factory reset (Core 2 covers the full removal procedure).</li>
</ul>

<h2>Symptom → first action (mobile)</h2>
<table>
<tr><th>Symptom</th><th>First action</th></tr>
<tr><td>Won't charge; known-good cable same behaviour</td><td>Inspect/clean port for lint; then assess port damage</td></tr>
<tr><td>Charges only at an odd cable angle</td><td>Damaged charge port — repair, don't force</td></tr>
<tr><td>Rapid drain; battery health ~70%</td><td>Replace degraded battery (apps already ruled out)</td></tr>
<tr><td>Case bulging / screen lifting</td><td>Stop use, don't charge, replace swollen battery</td></tr>
<tr><td>Cracked glass, image OK, touch dead in area</td><td>Digitizer/glass assembly</td></tr>
<tr><td>Touch offset after new protector</td><td>Remove protector and retest</td></tr>
<tr><td>Bluetooth won't reconnect to known car kit</td><td>Forget/unpair both ends → re-pair</td></tr>
<tr><td>WiFi/calls dead but device otherwise on</td><td>Airplane mode / radio toggles first</td></tr>
<tr><td>Dropped in water</td><td>Power off, do <b>not</b> charge; LCI may void warranty</td></tr>
<tr><td>Drain + heat + unknown apps + data spike</td><td>Malware audit — remove unknown apps/permissions</td></tr>
</table>

<h2>Connectivity ladder (detail)</h2>
<ol>
<li>Toggle airplane mode on/off (resets radios quickly).</li>
<li>Confirm WiFi / Bluetooth / cellular each enabled.</li>
<li>Forget network or unpair device → reconnect/re-pair.</li>
<li>Restart device (and try another known-good hotspot/AP).</li>
<li>Check distance, interference, carrier coverage.</li>
<li>Reset network settings (wipes saved WiFi/BT).</li>
<li>Factory reset only after backup — last resort.</li>
</ol>

<div class="keyfact"><b>Liquid + charge = worse damage.</b> Power off immediately. Rice is a myth. Manufacturers check LCI stickers — colour change = liquid contact for warranty.</div>
`,
quiz:[
{q:"A phone charges only when the cable is held at an angle, and lately not at all. A known-good cable behaves the same. What should be checked FIRST?", o:["The battery health percentage","The charging port for lint/debris and physical damage","The wall adapter wattage","Airplane mode"], a:1, e:"Compacted pocket lint in the port prevents full insertion and is extremely common; clean carefully, then assess whether the port itself is damaged and needs repair."},
{q:"A tablet's screen is cracked but the image beneath is perfect; touch no longer works in the cracked region. Which component needs replacing?", o:["The LCD panel","The digitizer/glass assembly","The backlight","The GPU"], a:1, e:"Image intact + touch broken = the digitizer layer. Panel replacement is only needed when the displayed image itself is damaged."},
{q:"A phone was dropped in water. What is the FIRST correct action?", o:["Charge it to test the battery","Power it off and do not charge it","Put it in rice for 48 hours","Dry it quickly with a hairdryer on hot"], a:1, e:"Power through wet circuitry is what causes the damage — switch off immediately and keep charging current away. Rice is folklore; professional drying/cleaning is the real remedy."},
{q:"What do manufacturers check to determine whether a phone suffered liquid damage under warranty?", o:["Battery cycle count","Liquid contact indicator (LCI) stickers that change colour","The SIM tray serial","OS moisture logs"], a:1, e:"LCI stickers inside the SIM tray/chassis turn red on liquid contact — the standard warranty evidence."},
{q:"A two-year-old phone drains from 100% to 20% by lunchtime with light use; battery health reads 71%. What is the appropriate fix?", o:["Factory reset","Replace the degraded battery","Disable WiFi permanently","Recalibrate the digitizer"], a:1, e:"Sub-80% health with rapid drain is battery degradation — replacement restores runtime. Software changes can't restore lost capacity."},
{q:"A phone gets very hot and lags while the user games during charging in direct sun. What is the immediate advice?", o:["Keep playing; heat is normal","Stop the load, remove the case, get it out of the sun, and let it cool gradually","Put it in the freezer","Replace the charge port"], a:1, e:"Heat throttles performance and degrades the battery. Remove load and heat sources; never freeze a device (condensation). Persistent overheating warrants a battery/hardware check."},
{q:"A user's phone shows sudden battery drain, unexpected data usage, popups, and an app they don't remember installing. What do these symptoms collectively suggest?", o:["A failing digitizer","Malware infection","A stale PRL","Liquid damage"], a:1, e:"Drain + data spikes + popups + unknown apps is the mobile malware signature — audit installed apps and permissions and remediate."},
{q:"A phone's Bluetooth refuses to reconnect to a car kit it previously worked with. What is the standard FIRST remedy?", o:["Factory reset the phone","Forget/unpair the device on both ends and re-pair from scratch","Replace the head unit","Update the PRL"], a:1, e:"Corrupted pairing records cause most reconnection failures; clearing the pairing on both sides and re-pairing fixes it before any drastic steps."},
{q:"Touches register slightly offset from where the user taps, ever since a thick glass protector was fitted. What should be tried FIRST?", o:["Replace the digitizer","Remove the screen protector and retest","Factory reset","Disable gestures"], a:1, e:"Thick or badly fitted protectors interfere with capacitive sensing — eliminate the cheap variable before hardware or calibration steps."},
{q:"A user has no mobile data or calls, though WiFi works fine. What quick check comes FIRST?", o:["Whether airplane mode is on or cellular is toggled off","Ordering a new SIM","Factory reset","A baseband reflash"], a:0, e:"WiFi-works-cellular-doesn't is often just airplane mode or a disabled cellular toggle — question the obvious before SIM reseats and carrier involvement."}
]
},
/* ---------------- 5.6 ---------------- */
{
id:"5.6", name:"Troubleshoot and resolve printer issues",
notes:`
<h2>Laser print-quality symptoms → causes (pairs with 3.7's imaging process)</h2>
<table>
<tr><th>Symptom</th><th>Cause</th></tr>
<tr><td>Toner smudges/rubs off</td><td><b>Fuser</b> not heating</td></tr>
<tr><td>Vertical lines/streaks</td><td>Scratched <b>drum</b>, dirty transfer path, low/leaking toner</td></tr>
<tr><td>Marks repeating at regular intervals</td><td><b>Drum</b> defect (once per revolution)</td></tr>
<tr><td>Double/echo (ghost) images</td><td>Drum/<b>cleaning</b>-stage residue</td></tr>
<tr><td>Faded print overall</td><td>Low toner, low density setting, worn transfer roller</td></tr>
<tr><td>Speckling / random spots</td><td>Leaking toner, dirty interior — clean with a <b>toner-safe vacuum</b></td></tr>
<tr><td>Incorrect colours</td><td>Depleted colour cartridge; run <b>colour calibration</b></td></tr>
</table>

<h2>Data and job problems</h2>
<ul>
<li><b>Garbled print</b> (pages of symbols) — wrong/corrupt driver or interrupted data; reinstall the correct driver.</li>
<li><b>Multiple jobs pending, nothing printing</b> — a stuck job wedging the queue: cancel it and <b>restart the print spooler service</b>.</li>
<li><b>Incorrect orientation / paper-size errors</b> — application/driver settings vs tray configuration mismatch.</li>
</ul>

<h2>Paper handling</h2>
<ul>
<li><b>Paper jams</b> — follow panel location guidance; remove media <b>gently along the paper path</b>; check worn pickup rollers, media weight, overfilled tray.</li>
<li><b>Paper not feeding</b> — worn/glazed <b>pickup rollers</b> (clean/replace), tray guides, humid paper — fan the ream.</li>
<li><b>Multipage misfeed</b> — worn <b>separation pad</b>, damp or overfilled paper.</li>
<li><b>Grinding noise</b> — gear train/roller wear or a foreign object: stop and inspect.</li>
</ul>

<h2>Finishing issues</h2>
<ul>
<li><b>Staple jams</b> — clear/reseat the finisher's staple cartridge. <b>Hole punch</b> faults — empty the chad (waste) container, align punch settings to paper size.</li>
</ul>

<h2>Scenario pick-list — print & scan faults</h2>
<table>
<tr><th>Scenario</th><th>Best first fix</th></tr>
<tr><td>Toner rubs off when touched</td><td>Replace fuser</td></tr>
<tr><td>Same defect repeats every ~75 mm</td><td>Imaging drum (circumference matching interval)</td></tr>
<tr><td>Ghost of previous page</td><td>Drum / cleaning stage</td></tr>
<tr><td>Pages of random symbols (all users after driver push)</td><td>Wrong/corrupt driver on print server — reinstall</td></tr>
<tr><td>Queue stuck; nothing prints for anyone</td><td>Cancel wedged job + restart print spooler</td></tr>
<tr><td>Grabs 3–4 sheets at once</td><td>Separation pad (or damp/overfilled paper)</td></tr>
<tr><td>"Load paper" with full tray</td><td>Clean/replace pickup rollers; fan the ream</td></tr>
<tr><td>Speckles + toner dust inside</td><td>Toner-safe vacuum (not compressed air)</td></tr>
<tr><td>Finisher staple error</td><td>Clear/reseat staple cartridge</td></tr>
<tr><td>Inkjet missing one colour, streaky</td><td>Run head cleaning cycle first</td></tr>
</table>

<div class="keyfact"><b>Hardware vs software spit:</b> smudges, streaks, repeating marks, jams → consumables/mechanicals (3.7). Garbled symbols, wrong orientation on one app, stuck queue → drivers/settings/spooler.</div>
`,
quiz:[
{q:"Every page from a laser printer smears when touched. Which part has failed?", o:["Transfer roller","Fuser assembly","Pickup roller","Separation pad"], a:1, e:"Loose, smudging toner means the fuser isn't melting it into the paper — the definitive fuser symptom."},
{q:"Nothing prints for anyone, and the queue shows a dozen jobs stuck behind one document. What should the technician do?", o:["Reinstall drivers on every PC","Cancel the stuck job and restart the print spooler service","Replace the network cable","Power-cycle the switch"], a:1, e:"One corrupt job can wedge the whole queue. Clear it and restart the spooler — the classic fix before anything hardware-level."},
{q:"A laser printer produces a faint ghost of the previous page on each new sheet. Which component/stage is at fault?", o:["Fuser too cold","Drum/cleaning stage failing to clear residual toner","Pickup rollers","Duplex unit"], a:1, e:"Echo/ghost images mean residue survives on the drum between rotations — a cleaning-blade or drum fault; replace the drum/cartridge."},
{q:"The office printer keeps grabbing three or four sheets at once. What is the MOST likely worn component?", o:["The fuser","The separation pad","The toner cartridge","The formatter board"], a:1, e:"The separation pad holds back all but the top sheet; when worn (or paper is damp/overfilled), multipage misfeeds result."},
{q:"Paper frequently fails to feed from tray 1; the printer says 'load paper' though the tray is full. What maintenance applies?", o:["Replace the fuser","Clean or replace the pickup rollers and fan the paper stack","Update the driver","Recalibrate colour"], a:1, e:"Glazed, dirty pickup rollers can't grip the sheet — cleaning/replacing them (and fanning humid paper) restores feeding."},
{q:"Prints show random black speckles, and toner dust is visible inside the printer. What is the correct cleanup tool?", o:["Compressed air blasted inside","A toner-safe vacuum","A damp cloth wiped over the drum","A magnet"], a:1, e:"Leaked toner requires a toner-certified vacuum — compressed air and ordinary vacuums just spread the ultra-fine particles."},
{q:"A colour laser prints photos with a strong colour cast after a cartridge change. What should be run?", o:["A spooler restart","The printer's colour calibration routine","chkdsk","A fuser replacement"], a:1, e:"After colour consumable changes, the calibration routine re-registers and rebalances the colour planes, fixing casts and misregistration."},
{q:"A user's documents print landscape when they need portrait — but only from one application. Where is the fault?", o:["The fuser","That application's print/orientation settings","The pickup rollers","The finisher"], a:1, e:"Single-application symptoms point at that app's settings overriding defaults; device-wide problems would implicate the driver or device config."},
{q:"When clearing a paper jam, how should the sheet be removed?", o:["Whichever way is fastest","Gently, pulling in the direction of the paper path","Always backwards toward the tray","Straight up through the lid"], a:1, e:"Pulling along the paper path avoids tearing (which leaves fragments) and protects the rollers and fuser from reverse strain."},
{q:"The departmental copier stops stapling and shows a finisher error. What is the FIRST thing to check?", o:["The fuser temperature","The finisher's staple cartridge for jams, and reseat/refill it","The spooler service","The drum unit"], a:1, e:"Finishing faults localise to the finisher: clear jammed staples and reseat the cartridge (for hole-punch faults, empty the chad container)."}
]
},
/* ---------------- 5.7 ---------------- */
{
id:"5.7", name:"Troubleshoot problems with wired and wireless networks",
notes:`
<h2>Connectivity states</h2>
<ul>
<li><b>No connectivity</b> — check the physical layer first: cable seated, link lights, port enabled, correct SSID/credentials. Isolate with a known-good cable/port.</li>
<li><b>Intermittent connectivity</b> — damaged/loose cabling, failing NIC/switch port, wireless interference or weak signal, or an overloaded device. Wiggle-test and swap-test.</li>
<li><b>Limited connectivity</b> ("connected, no internet") — link is up but something upstream is broken: DHCP (check for APIPA 169.254.x.x), gateway, or DNS. Local pings work, internet doesn't → gateway/DNS.</li>
</ul>

<h2>Performance symptoms — know the vocabulary</h2>
<table>
<tr><th>Symptom</th><th>Meaning / typical cause</th></tr>
<tr><td><b>Slow network speeds</b></td><td>Congestion, duplex/speed mismatch, cable rated below expectation (Cat 5 on a gigabit link), interference on WiFi</td></tr>
<tr><td><b>High latency</b></td><td>Long delay per round trip — distance, congestion, satellite links; measured with <code>ping</code></td></tr>
<tr><td><b>Jitter</b></td><td><b>Variation</b> in latency between packets — the enemy of real-time traffic</td></tr>
<tr><td><b>Poor VoIP quality</b></td><td>Choppy/robotic calls: jitter + latency + packet loss; fix = QoS prioritisation for voice traffic, VLAN separation</td></tr>
<tr><td><b>Port flapping</b></td><td>A switch port cycling up/down/up repeatedly — bad cable/connector, failing NIC/SFP or port; check logs, swap components</td></tr>
</table>

<h2>Wireless-specific</h2>
<ul>
<li><b>External interference</b> — microwaves, cordless phones, Bluetooth, neighbouring WLANs on overlapping channels → survey with a WiFi analyzer (2.8), move to a clean channel (1/6/11 on 2.4 GHz) or to 5 GHz.</li>
<li><b>Signal/range issues</b> — distance, walls, antenna placement; symptoms worsen with distance from the AP.</li>
</ul>

<h2>Network triage ladder — wired then wireless</h2>
<ol>
<li><b>Physical:</b> link lights? reseat cable? try known-good patch lead and switch port.</li>
<li><b>IP config:</b> <code>ipconfig /all</code> — APIPA 169.254? wrong static? gateway blank?</li>
<li><b>Layered pings:</b> loopback → gateway → internet IP (8.8.8.8) → by name (google.com).</li>
<li><b>Name vs IP:</b> IP works, name fails → DNS. Neither works past gateway → routing/ISP/firewall.</li>
<li><b>WiFi add-ons:</b> correct SSID/password → channel survey (1/6/11) → move to 5 GHz if 2.4 GHz interference → coverage (extra AP).</li>
</ol>

<h2>Scenario pick-list — network</h2>
<table>
<tr><th>Scenario</th><th>Most likely cause / fix</th></tr>
<tr><td>Connected, address 169.254.x.x, no internet</td><td>DHCP failure — check DHCP server/path</td></tr>
<tr><td>Ping 8.8.8.8 works; browse by name fails</td><td>DNS — check/resolve with nslookup</td></tr>
<tr><td>VoIP choppy; downloads fine</td><td>Jitter → QoS / voice VLAN</td></tr>
<tr><td>Switch log: port up/down/up</td><td>Port flapping — swap cable, then NIC/port</td></tr>
<tr><td>WiFi dies when microwave runs</td><td>2.4 GHz interference → 5 GHz or clean channel</td></tr>
<tr><td>Far end of office: one bar; near AP: fine</td><td>Coverage — reposition AP or add AP</td></tr>
<tr><td>Gigabit NIC links at 100 Mbps on one wall jack</td><td>Damaged pair / Cat 5 run — test & reterminate</td></tr>
<tr><td>Whole floor slow; uplink at 100% utilisation</td><td>Congestion — upgrade/spread uplink load</td></tr>
<tr><td>Drops when desk is knocked</td><td>Patch cable / wall port seating</td></tr>
<tr><td>Half office APIPA; others with old leases OK</td><td>DHCP outage fingerprint</td></tr>
</table>

<div class="keyfact"><b>Ping ladder memory aid:</b> 127.0.0.1 (stack) → gateway (LAN route) → public IP (WAN) → FQDN (DNS). Fail at the first step that breaks.</div>
<div class="callout"><b>Exam angle:</b> "VoIP calls are choppy" → jitter → QoS. "Port goes up and down in the switch log" → flapping → cable/NIC/port swap. "Connected to WiFi but no internet, address 169.254…" → DHCP. "Slow only near the microwave/at the far end of the office" → interference/signal → analyzer.</div>
`,
quiz:[
{q:"VoIP calls in an office are choppy and robotic while file downloads are fine. Which network characteristic is the MOST likely culprit, and what is the standard fix?", o:["Bandwidth; buy a faster line","Jitter; implement QoS to prioritise voice traffic","DNS; change resolvers","MTU; enable jumbo frames"], a:1, e:"Real-time voice suffers from jitter (latency variation) and loss more than raw bandwidth. QoS prioritisation for voice (often with a voice VLAN) is the standard remedy."},
{q:"A switch log shows a port transitioning up/down/up dozens of times an hour. What is this called and what is the first-line response?", o:["Broadcast storm; enable STP","Port flapping; swap the cable, then test the NIC/port","Duplex mismatch; force full duplex","Flow control failure; reboot the switch"], a:1, e:"Repeated link cycling is port flapping — usually a damaged cable/connector or failing NIC/SFP/port. Substitute known-good components in order of cheapness."},
{q:"A PC shows 'connected' to the LAN but cannot reach the internet; its address is 169.254.8.20. What is broken?", o:["The default gateway hardware","DHCP — the client never received a lease","DNS resolution","The NIC driver"], a:1, e:"APIPA self-assignment means no DHCP answer. The link itself is fine — investigate the DHCP server and the path to it."},
{q:"A user can ping local devices and the router, and can reach websites by IP address, but browsing by name fails. What is at fault?", o:["DHCP","DNS","The default gateway","The NIC"], a:1, e:"Working IP connectivity with failing name lookups isolates DNS — check the configured resolvers."},
{q:"Wireless in the staff kitchen drops every time someone uses the microwave. What is happening and what is the practical fix?", o:["PoE overload; new switch","2.4 GHz external interference; move clients/AP to 5 GHz or a cleaner channel","DHCP exhaustion; larger scope","Port flapping; new patch lead"], a:1, e:"Microwave ovens blast the 2.4 GHz band. 5 GHz avoids it entirely; otherwise survey and choose the least-affected channel."},
{q:"Users at the far end of the office get one bar of WiFi and slow speeds; near the AP everything is fast. What are the sensible remedies?", o:["Replace the router's PSU","Improve coverage — reposition the AP centrally or add an AP/extender","Change DNS servers","Shorten DHCP leases"], a:1, e:"Distance/obstruction attenuation is a coverage problem — placement and additional APs fix it; settings changes won't."},
{q:"A gigabit-capable PC connects at only 100 Mbps through a wall port. Other ports run at 1 Gbps. What is the MOST likely cause?", o:["The switch is 100 Mbps only","A damaged pair or substandard (e.g. Cat 5/4-wire) run forcing a fallback to 100 Mbps","The NIC driver limits speed","DNS misconfiguration"], a:1, e:"Gigabit needs all four pairs intact; a damaged pair or old cabling auto-negotiates down to 100 Mbps. Test the run and re-terminate/replace."},
{q:"What is the difference between latency and jitter?", o:["They are synonyms","Latency is the delay; jitter is the variation in that delay between packets","Jitter only affects wired links","Latency applies only to DNS"], a:1, e:"Latency = how long packets take; jitter = how inconsistent that time is. Streaming/voice can tolerate steady latency far better than jitter."},
{q:"A user's wired connection drops for a few seconds whenever their desk is knocked. What is the MOST likely cause?", o:["DHCP lease expiry","A damaged or poorly seated patch cable/connector","A DNS timeout","Switch firmware"], a:1, e:"Physical-disturbance-correlated drops are cabling: reseat and then replace the patch lead; inspect the wall port."},
{q:"An entire floor reports slow speeds each afternoon; the uplink from the floor switch runs at sustained 100% utilisation. What is the problem?", o:["External interference","Congestion — the shared uplink is saturated","Port flapping","APIPA"], a:1, e:"A saturated uplink is classic congestion: symptoms are floor-wide, time-correlated with usage, and solved by upgrading the uplink or spreading the load."}
]
}
]
,mock:[
{q:"A user reports intermittent crashes. The technician immediately reinstalls Windows without asking any questions. Which methodology step was skipped?", o:["Documenting findings","Identifying the problem (gathering information, asking what changed)","Verifying functionality","Establishing a plan"], a:1, e:"Jumping to a drastic fix without gathering information skips step 1 entirely — and risks destroying evidence (and data) for a fault that may be hardware."},
{q:"A technician's cable-fault theory is confirmed by a known-good swap. According to the methodology, what comes NEXT?", o:["Document the fix","Establish a plan of action and implement the solution","Escalate","Form a second theory"], a:1, e:"Theory confirmed (step 3) → step 4: plan and implement the permanent fix — here, properly replacing/re-terminating the faulty run."},
{q:"After resolving a recurring overheating fault by replacing a fan, the technician sets a quarterly dust-cleaning schedule. This is an example of what?", o:["Escalation","A preventive measure within the verify-functionality step","Establishing a theory","Documentation"], a:1, e:"Step 5 pairs verification with preventive measures — stopping recurrence, not just curing the instance."},
{q:"A PC emits one long beep and two short beeps at power-on and shows nothing on screen. What should the technician do?", o:["Replace the PSU","Look up the beep code in the motherboard/BIOS vendor documentation — commonly a video fault — and reseat the GPU","Reinstall Windows","Swap the monitor cable"], a:1, e:"Beep codes are vendor-specific POST diagnostics; look the pattern up. This classic pattern typically points at video — reseating the graphics card is the first action."},
{q:"A machine BSODs under sustained load. Temperatures peak near the CPU's limit and the heatsink is barely warm to the touch. What is the MOST likely cause?", o:["Bad RAM","The heatsink is not making proper contact (mounting/paste failure)","An undersized PSU","A failing HDD"], a:1, e:"A hot CPU with a cool heatsink means heat isn't transferring — mounting pressure or thermal paste has failed. Remount with fresh paste."},
{q:"Which observation would justify replacing a motherboard outright?", o:["The CMOS battery is flat","Multiple capacitors are visibly bulging or leaking","The BIOS is outdated","One RAM slot is empty"], a:1, e:"Bulged/leaking capacitors indicate board-level failure. Batteries and BIOS versions are serviceable; capacitor damage generally isn't economical to repair in the field."},
{q:"A laptop's HDD emits rhythmic clicking and Windows intermittently freezes. Ranked by priority, what is the correct response sequence?", o:["Run chkdsk, then defragment","Back up the data immediately, then replace the drive","Update storage drivers, then reboot","Reinstall Windows on the same drive"], a:1, e:"The click of death precedes total failure — data rescue outranks every diagnostic. Then replace; never trust that drive again."},
{q:"A server's RAID 1 mirror reports one failed member. What is the risk level and correct action?", o:["Data already lost; restore from backup","Operational but with zero remaining redundancy; replace the failed drive promptly to rebuild","No action needed; RAID 1 tolerates two failures","Reinitialise the array"], a:1, e:"A degraded mirror still serves data but the next failure is fatal. Replace and rebuild promptly — and never 'initialise', which erases the surviving data."},
{q:"Windows reports 'S.M.A.R.T. status bad, backup and replace' at POST. The user says the PC works fine. What do you tell them?", o:["It's a false alarm; disable the warning","The drive is predicting its own failure — back up now and replace it before it dies","Run defrag to repair it","Only SSDs use SMART"], a:1, e:"SMART pre-failure warnings fire before symptoms. 'Works fine' is temporary; act while the data is still readable."},
{q:"A projector displays a very dim image even at maximum brightness, and its lamp-hours counter is far beyond the rated life. What is the fix?", o:["A new HDMI cable","Replace the projector lamp","Clean the air filter","Lower the resolution"], a:1, e:"Bulbs dim as they exhaust their rated hours — replacement restores brightness. (Filters cause overheating shutdowns, not dimness.)"},
{q:"A monitor shows horizontal artefacts. A screenshot taken on the affected PC and viewed on another machine shows the SAME artefacts. Where is the fault?", o:["The monitor panel","The video cable","The GPU or its driver","The monitor's PSU"], a:2, e:"Screenshots capture the GPU's rendered frame before it reaches cable or panel — defects present in the capture originate at the GPU/driver."},
{q:"A user reports their screen looks stretched and slightly blurry after a driver update. Resolution reads 1280×720 on a 1080p panel. The fix?", o:["Replace the panel","Set the native 1920×1080 resolution","Reduce refresh rate","Degauss"], a:1, e:"Non-native resolutions are interpolated — soft and distorted. Restore native output after checking the driver installed correctly."},
{q:"An OLED information display must show the same dashboard 24/7. What should be configured to prevent permanent damage?", o:["Higher brightness","Pixel-shift/screen-saver/content rotation to prevent burn-in","A faster refresh rate","HDR mode"], a:1, e:"Static content on OLED causes burn-in. Mitigations vary content and shift pixels; the damage itself is irreversible."},
{q:"A phone won't power on after a swim. The user already tried charging it overnight. What compounding mistake occurred, and what should happen now?", o:["Nothing wrong; charge longer","Charging pushed power through wet circuitry, worsening damage; power should stay off and the device go for professional cleaning/repair","The wrong charger wattage was used","The SIM must be replaced"], a:1, e:"Liquid + current = corrosion and shorts. The correct sequence was power off, no charging, professional treatment. The LCI stickers will have triggered regardless."},
{q:"A company tablet's battery has begun pushing the screen out of its frame. Rank the correct actions.", o:["Continue using it until replacement arrives; charge nightly","Stop use immediately, do not charge, replace the battery, recycle the old one properly","Press the screen back down and tape it","Freeze the tablet to shrink the battery"], a:1, e:"A swollen lithium battery is a fire hazard: discontinue use, no charging, no puncturing, professional replacement and proper recycling."},
{q:"A user's phone burns through its battery in hours, runs hot, and their data allowance vanished mid-month. Malware is suspected. What supports this theory MOST directly?", o:["The phone is two years old","Unfamiliar apps with heavy permissions and background data appear in the app list","The screen has a crack","Bluetooth is enabled"], a:1, e:"Unknown apps consuming data and power in the background are the direct evidence tying the symptom cluster to malware — remove and scan."},
{q:"Touch input on a kiosk tablet has drifted so taps register centimetres off. Restarting doesn't help and there's no protector fitted. What is the next step?", o:["Replace the battery","Run touch calibration; if drift persists, the digitizer is failing","Factory reset immediately","Disable the display"], a:1, e:"With cheap causes eliminated, recalibrate; persistent offset after calibration indicates digitizer hardware failure."},
{q:"A laser printer's output has a vertical white streak in the same position on every page. A brand-new toner cartridge doesn't fix it. What is implicated?", o:["The spooler","The drum or transfer path (blocked/scratched)","The tray guides","The application"], a:1, e:"Fresh toner ruled out, a positionally fixed void points to the drum or something obstructing the transfer path at that point."},
{q:"Pages print with marks recurring every 75 mm down the page. What does the regular interval reveal?", o:["A spooler fault","A rotating component — the drum — has a defect printing once per revolution","Wrong paper size","Fuser overheating"], a:1, e:"A repeat distance equals a roller/drum circumference; matching the interval to component specs identifies the culprit — most often the imaging drum."},
{q:"Every job from every user prints as pages of random characters since yesterday's server update. What is the MOST likely cause?", o:["All the toner expired","A wrong or corrupted driver deployed on the print server","The fuser died","Paper weight mismatch"], a:1, e:"Universal garbled output following a driver/server change is data-level, not mechanical — roll back or install the correct driver for the model."},
{q:"A printer intermittently jams, and torn corner fragments are found at the fuser entrance. What earlier mistake does this suggest?", o:["Toner overfill","Previous jams were yanked out against the paper path, leaving fragments","Wrong orientation setting","Colour miscalibration"], a:1, e:"Tearing sheets during jam clearance leaves debris that seeds future jams — remove media gently along the paper path and check for remnants."},
{q:"Users on WiFi complain of drops in one meeting room. A WiFi analyzer shows the office AP on channel 6 and a strong neighbouring network also on 6, plus others on 4 and 8. What is the BEST channel decision?", o:["Stay on 6 — sharing a channel is worse than overlapping","Move to channel 1 or 11, whichever is cleaner","Move to channel 5 between the neighbours","Double the transmit power"], a:1, e:"On 2.4 GHz only 1/6/11 avoid overlap. With 6 contested and 4/8 splattering onto it, survey 1 and 11 and take the cleaner one. Never pick in-between channels."},
{q:"Ping tests to the gateway show times of 2 ms, 40 ms, 3 ms, 55 ms, 4 ms. Which problem does this pattern indicate for a planned VoIP rollout?", o:["High steady latency","Jitter — highly variable delay that will degrade call quality","Packet loss","DNS failure"], a:1, e:"The average is fine but the variance is huge — that's jitter, the metric VoIP is most sensitive to. QoS and investigation of the congestion source come next."},
{q:"A switch port connected to a conference-room wall plate flaps continuously, but only when the room's long patch lead is plugged in. What confirms the diagnosis fastest?", o:["Rebooting the switch","Substituting a known-good cable on the same port","Updating switch firmware","Disabling spanning tree"], a:1, e:"Component substitution isolates the fault: if a known-good lead stabilises the port, the cable was the flapping cause — the usual suspect."},
{q:"Half the office suddenly reports 'no internet'. Affected machines all have 169.254.x.x addresses; unaffected machines have normal leases from before. What single failure explains this?", o:["The DNS server crashed","The DHCP server (or its scope) stopped responding — new/renewing clients fall back to APIPA","The firewall blocked port 443","A broadcast storm"], a:1, e:"Machines holding existing leases keep working; anyone renewing or joining gets APIPA. That split-pattern is the DHCP-outage fingerprint."}
]
},

{
id:"1.1", name:"Identify basic features of Microsoft Windows editions",
notes:`
<h2>The editions — what each adds</h2>
<table>
<tr><th>Edition</th><th>Key facts</th></tr>
<tr><td><b>Home</b></td><td>Consumer baseline. <b>Cannot join a domain</b>, no BitLocker, no Group Policy Editor, no RDP <i>host</i>. RAM limit 128 GB.</td></tr>
<tr><td><b>Pro</b></td><td>Adds <b>domain join</b>, <b>BitLocker</b>, <b>Group Policy (gpedit.msc)</b>, <b>Remote Desktop host</b>, Hyper-V. RAM limit 2 TB.</td></tr>
<tr><td><b>Pro for Workstations</b></td><td>Pro + support for high-end hardware: up to <b>4 CPUs and 6 TB RAM</b>, ReFS filesystem, persistent memory.</td></tr>
<tr><td><b>Enterprise</b></td><td>Volume-licensed for large organisations: everything in Pro plus advanced management/security (AppLocker, DirectAccess). Not sold retail.</td></tr>
</table>
<div class="callout"><b>The four Pro-vs-Home discriminators to memorise:</b> domain join, BitLocker, gpedit, RDP host. Any scenario needing one of these → minimum Pro. (Home can still act as an RDP <i>client</i> and use <i>device encryption</i> on supported hardware — classic trap.)</div>

<h2>Domain vs workgroup access</h2>
<ul>
<li><b>Workgroup</b> — peer-to-peer, local accounts per machine, realistic ceiling ~10–15 machines. All editions.</li>
<li><b>Domain</b> — centralised authentication and management via Active Directory (domain controller). Requires Pro or above.</li>
</ul>

<h2>Remote Desktop Protocol (RDP)</h2>
<ul>
<li>All editions can <b>connect out</b> (client). Only <b>Pro and above can be connected to</b> (host). Port 3389 (Core 1 crossover).</li>
</ul>

<h2>Upgrade paths</h2>
<ul>
<li><b>In-place upgrade</b> keeps files, apps, and settings (e.g. Windows 10 → 11, Home → Pro via licence key). You can move up editions in place; moving <b>down</b> an edition, or 64-bit → 32-bit (or vice versa), requires a <b>clean install</b>.</li>
<li>Windows 11 hardware floor (ties to Core 1 3.4): TPM 2.0, Secure Boot-capable UEFI, 4 GB RAM, 64 GB storage, supported 64-bit CPU.</li>
</ul>

<h2>Edition pick-list — match the need</h2>
<table>
<tr><th>Need</th><th>Minimum edition</th></tr>
<tr><td>Join Active Directory domain</td><td>Pro</td></tr>
<tr><td>BitLocker with recovery-key management</td><td>Pro</td></tr>
<tr><td>gpedit.msc / local Group Policy</td><td>Pro</td></tr>
<tr><td>Host Remote Desktop (be connected to)</td><td>Pro</td></tr>
<tr><td>Act as RDP client only</td><td>Home OK</td></tr>
<tr><td>3 TB RAM / dual CPUs / ReFS</td><td>Pro for Workstations</td></tr>
<tr><td>Volume licensing + AppLocker</td><td>Enterprise</td></tr>
<tr><td>40+ PCs, chaotic local passwords</td><td>Domain (needs Pro+ clients)</td></tr>
</table>
<div class="keyfact"><b>Clean install required for:</b> edition <i>downgrade</i>, or 32↔64-bit change. Edition <i>upgrade</i> (Home→Pro) and version upgrade (10→11) can be in-place.</div>
`,
quiz:[
{q:"A small business PC running Windows Home must join the company's Active Directory domain. What is required?", o:["Enable domain join in Settings","Upgrade to Windows Pro (or higher)","Install gpedit.msc manually","Join via Remote Desktop instead"], a:1, e:"Domain join is a Pro-and-above feature — Home simply lacks it. An in-place edition upgrade with a Pro key is the standard route."},
{q:"Which feature IS available on Windows Home?", o:["Acting as a Remote Desktop host","Acting as a Remote Desktop client","BitLocker drive encryption","The Local Group Policy Editor"], a:1, e:"Home can connect OUT to other machines as an RDP client; it just can't be connected TO. BitLocker and gpedit are Pro+ features."},
{q:"A workstation needs 3 TB of RAM and dual Xeon processors for simulation work. Which Windows edition supports this hardware?", o:["Home","Pro","Pro for Workstations","Any 64-bit edition"], a:2, e:"Pro tops out at 2 TB RAM; Pro for Workstations extends to 6 TB and 4 CPUs (plus ReFS and persistent memory support)."},
{q:"Which edition is distributed through volume licensing only and includes advanced features like AppLocker?", o:["Home","Pro","Pro for Workstations","Enterprise"], a:3, e:"Enterprise is licensed to organisations in volume, layering advanced security and management tools on top of Pro. It isn't sold at retail."},
{q:"An office of 40 PCs uses workgroup networking, and password management has become chaotic. What is the appropriate recommendation?", o:["Bigger workgroup names","Migrate to a domain with centralised Active Directory authentication","Enable BitLocker","Use one shared account everywhere"], a:1, e:"Workgroups are peer-to-peer with per-machine local accounts — unmanageable at 40 seats. A domain centralises accounts, policy, and management."},
{q:"A user with Windows 10 Home buys a Pro licence. How is the edition change performed?", o:["Clean install only","Enter the Pro product key for an in-place edition upgrade keeping files and apps","Via gpedit","Reinstall as 32-bit first"], a:1, e:"Upgrading UP an edition works in place via Change product key. Downgrading editions or switching bitness requires a clean install."},
{q:"Which pair of requirements blocks many older PCs from an in-place Windows 11 upgrade?", o:["RGB headers and PCIe 5","TPM 2.0 and UEFI with Secure Boot","SATA III and USB-C","A discrete GPU and 32 GB RAM"], a:1, e:"Windows 11's hardware floor mandates TPM 2.0 and Secure Boot-capable UEFI (plus a supported 64-bit CPU, 4 GB RAM, 64 GB storage)."},
{q:"gpedit.msc fails to open on a user's laptop with 'not found'. What does this indicate?", o:["Corrupt system files","The laptop runs Windows Home, which lacks the Local Group Policy Editor","Group Policy requires a domain","The user needs admin rights"], a:1, e:"The Group Policy Editor ships with Pro and above. Its absence is the fingerprint of a Home edition."},
{q:"A company requires full-drive encryption managed with recovery keys on all laptops. Which minimum edition is needed?", o:["Home — device encryption is identical","Pro, for BitLocker","Enterprise only","Pro for Workstations only"], a:1, e:"BitLocker (with management, recovery keys, BitLocker To Go) starts at Pro. Home's 'device encryption' is a limited hardware-dependent subset — the classic trap."},
{q:"A technician must move a PC from 32-bit Windows 10 to 64-bit Windows 11. Which statement is TRUE?", o:["An in-place upgrade handles the bitness change","A clean install is required — bitness cannot change in place","Only Enterprise can change bitness","gpupdate performs the conversion"], a:1, e:"Architecture changes (32↔64-bit) always require a clean installation; in-place upgrades preserve too much architecture-specific state to convert."}
]
},

{
id:"1.2", name:"Use the appropriate Microsoft command-line tool",
notes:`
<h2>Navigation</h2>
<table>
<tr><th>Command</th><th>Does</th></tr>
<tr><td><code>cd</code> / <code>cd ..</code></td><td>Change directory / go up one level (<code>cd \\</code> = root)</td></tr>
<tr><td><code>dir</code></td><td>List directory contents</td></tr>
<tr><td><code>md</code></td><td>Make directory</td></tr>
<tr><td><code>rmdir</code> (rd)</td><td>Remove directory (<code>/s</code> deletes contents too)</td></tr>
<tr><td><code>x:</code></td><td>Switch to drive X</td></tr>
</table>

<h2>Networking commands</h2>
<table>
<tr><th>Command</th><th>Does</th></tr>
<tr><td><code>ipconfig</code></td><td>Show IP config; <code>/all</code> full detail incl. MAC/DHCP/DNS; <code>/release</code> + <code>/renew</code> new DHCP lease; <code>/flushdns</code> clear DNS cache</td></tr>
<tr><td><code>ping</code></td><td>Test reachability + round-trip time (ICMP)</td></tr>
<tr><td><code>hostname</code></td><td>Print the computer's name</td></tr>
<tr><td><code>netstat</code></td><td>Show active connections and listening ports</td></tr>
<tr><td><code>nslookup</code></td><td>Query DNS — resolve names, test DNS servers</td></tr>
<tr><td><code>tracert</code></td><td>Trace the router hops to a destination</td></tr>
<tr><td><code>pathping</code></td><td>tracert + per-hop loss statistics over time</td></tr>
<tr><td><code>net user</code></td><td>Manage local user accounts</td></tr>
<tr><td><code>net use</code></td><td>Map/list network drives (<code>net use Z: \\\\server\\share</code>)</td></tr>
</table>

<h2>Disk and file commands</h2>
<table>
<tr><th>Command</th><th>Does</th></tr>
<tr><td><code>copy</code></td><td>Copy files (no subdirectories)</td></tr>
<tr><td><code>xcopy</code></td><td>Copy files + directory trees (<code>/s</code> subdirs, <code>/e</code> incl. empty)</td></tr>
<tr><td><code>robocopy</code></td><td>Robust copy: resumes, mirrors (<code>/mir</code>), preserves attributes, logs — the modern choice for big jobs</td></tr>
<tr><td><code>format</code></td><td>Format a volume with a filesystem (destructive)</td></tr>
<tr><td><code>diskpart</code></td><td>Partition management console (list/select/clean/create) — powerful and dangerous</td></tr>
<tr><td><code>chkdsk</code></td><td>Check disk; <code>/f</code> fix filesystem errors, <code>/r</code> also locate bad sectors (implies /f)</td></tr>
<tr><td><code>sfc /scannow</code></td><td>System File Checker — verify/repair protected Windows system files</td></tr>
</table>

<h2>System commands</h2>
<table>
<tr><th>Command</th><th>Does</th></tr>
<tr><td><code>gpupdate</code></td><td>Re-apply Group Policy now (<code>/force</code> reapplies all)</td></tr>
<tr><td><code>gpresult</code></td><td>Report which policies actually applied (<code>/r</code> summary)</td></tr>
<tr><td><code>shutdown</code></td><td><code>/s</code> shut down, <code>/r</code> restart, <code>/t xx</code> delay seconds, <code>/a</code> abort</td></tr>
<tr><td><code>winver</code></td><td>Show Windows version/build dialog</td></tr>
<tr><td><code>[command] /?</code></td><td>Help for any command</td></tr>
</table>
<div class="callout"><b>Exam pairings:</b> "corrupted system files" → <code>sfc /scannow</code>. "New group policy must apply now" → <code>gpupdate /force</code>. "Which policies applied?" → <code>gpresult</code>. "Copy a whole directory tree preserving permissions, resumable" → <code>robocopy</code>. "Stale DNS entry" → <code>ipconfig /flushdns</code>. "Where does the connection fail along the route?" → <code>tracert</code>/<code>pathping</code>.</div>

<h2>Scenario → command</h2>
<table>
<tr><th>Scenario</th><th>Command</th></tr>
<tr><td>Corrupted Windows system files</td><td><code>sfc /scannow</code></td></tr>
<tr><td>Filesystem errors + bad sectors</td><td><code>chkdsk /r</code></td></tr>
<tr><td>Stale DNS after site moved</td><td><code>ipconfig /flushdns</code></td></tr>
<tr><td>Force Group Policy now</td><td><code>gpupdate /force</code></td></tr>
<tr><td>See which GPOs applied</td><td><code>gpresult /r</code></td></tr>
<tr><td>Map Z: to a share</td><td><code>net use Z: \\\\server\\share</code></td></tr>
<tr><td>Big folder copy, resumable</td><td><code>robocopy</code></td></tr>
<tr><td>Where does the route die?</td><td><code>tracert</code> / <code>pathping</code></td></tr>
<tr><td>Listening ports / active connections</td><td><code>netstat</code></td></tr>
<tr><td>Edition / build dialog</td><td><code>winver</code></td></tr>
</table>
<div class="keyfact"><b>net use ≠ net user:</b> <code>net use</code> maps drives; <code>net user</code> manages accounts — deliberate exam mix-up.</div>
`,
quiz:[
{q:"Windows behaves oddly and the technician suspects corrupted system files. Which command verifies and repairs them?", o:["chkdsk /r","sfc /scannow","diskpart clean","gpupdate /force"], a:1, e:"System File Checker scans protected OS files against known-good copies and repairs them. chkdsk handles the disk/filesystem, not Windows' own files."},
{q:"A user's PC has a stale DNS entry for a recently moved website. Which command clears it?", o:["ipconfig /renew","ipconfig /flushdns","nslookup /clear","netstat -dns"], a:1, e:"ipconfig /flushdns empties the local DNS resolver cache, forcing fresh lookups. /renew refreshes the DHCP lease — different job."},
{q:"An admin changed a Group Policy and wants it applied to a workstation immediately. Which command?", o:["gpresult /r","gpupdate /force","net use /policy","sfc /gpo"], a:1, e:"gpupdate /force reapplies all policies now rather than waiting for the refresh interval. gpresult only reports what applied."},
{q:"A technician needs to copy a large folder tree to a NAS overnight, preserving attributes and resuming if the connection drops. Best tool?", o:["copy","xcopy","robocopy","format"], a:2, e:"Robocopy is built for exactly this: resumable, mirroring, attribute/permission preservation, logging. xcopy is its weaker ancestor."},
{q:"Which command maps \\\\fileserver\\accounts to drive letter Z:?", o:["net user Z: \\\\fileserver\\accounts","net use Z: \\\\fileserver\\accounts","mount Z: fileserver/accounts","dir Z:=\\\\fileserver\\accounts"], a:1, e:"net use maps network shares to drive letters. net user manages local accounts — the deliberately confusable sibling."},
{q:"A website is unreachable, and the technician wants to see at which router hop packets stop. Which command?", o:["ping -t","tracert","netstat -an","hostname"], a:1, e:"tracert lists each hop toward the destination, showing where the path dies. pathping adds per-hop loss statistics over time."},
{q:"Which command reveals every active connection and listening port on a machine suspected of malware activity?", o:["ipconfig /all","netstat","nslookup","tracert"], a:1, e:"netstat displays current TCP/UDP connections and listening ports — the quick look at what the machine is talking to."},
{q:"A drive has filesystem errors and suspected bad sectors. Which command checks AND attempts recovery from bad sectors?", o:["chkdsk /f","chkdsk /r","sfc /scannow","defrag /b"], a:1, e:"/r locates bad sectors and recovers readable data (and implies /f for filesystem fixes). /f alone only repairs logical filesystem errors."},
{q:"Which command sequence creates a folder called 'logs', enters it, then lists its contents?", o:["mkdir logs; open logs; list","md logs, cd logs, dir","newdir logs, enter logs, show","rd logs, cd logs, dir"], a:1, e:"md makes the directory, cd changes into it, dir lists contents. rd/rmdir deletes directories."},
{q:"A technician needs the exact Windows version and build number via a quick GUI dialog. Which command?", o:["version","winver","systeminfo /v","hostname"], a:1, e:"winver pops the About Windows dialog with edition, version, and build. (systeminfo gives a fuller text report — winver is the quick check.)"}
]

notes:`
<h2>Task Manager — know the tabs</h2>
<ul>
<li><b>Processes</b> — running apps/background processes with live CPU/RAM/disk/network per process; end unresponsive tasks here.</li>

<table>
<tr><th>Tool</th><th>Job</th></tr>
<tr><td><b>Event Viewer</b> (eventvwr.msc)</td><td>System/Application/Security logs — first stop for crashes, errors, audit trails</td></tr>

<tr><td><b>Device Manager</b> (devmgmt.msc)</td><td>Hardware and drivers — yellow triangle = driver problem; update/roll back/disable</td></tr>
<tr><td><b>Certificate Manager</b> (certmgr.msc)</td><td>View/import/manage certificates</td></tr>
<tr><td><b>Local Users and Groups</b> (lusrmgr.msc)</td><td>Manage local accounts and group membership (Pro+)</td></tr>
<tr><td><b>Performance Monitor</b> (perfmon.msc)</td><td>Long-term counter logging and baselining (vs Task Manager's live view)</td></tr>
<tr><td><b>Group Policy Editor</b> (gpedit.msc)</td><td>Local policy configuration (Pro+)</td></tr>
</table>

<h2>Additional tools</h2>

<tr><th>Tool</th><th>Job</th></tr>
<tr><td><b>msinfo32</b> (System Information)</td><td>Read-only full hardware/software inventory</td></tr>

<div class="callout"><b>Exam pairings:</b> "why did it crash last night?" → Event Viewer. "extend a partition" → Disk Management. "run a script every Monday" → Task Scheduler. "boot into Safe Mode next restart" → msconfig. "which process is thrashing the disk / locking a file?" → Resource Monitor. "record a CPU baseline over a week" → Performance Monitor.</div>

`,
quiz:[
{q:"A server rebooted unexpectedly overnight. Which tool shows what happened and when?", o:["Task Manager","Event Viewer","msconfig","Device Manager"], a:1, e:"Event Viewer's System log records shutdowns, errors, and their sources with timestamps — the first stop for post-incident investigation."},
{q:"A user's new second drive doesn't appear in File Explorer. Which tool initialises it and assigns a letter?", o:["Device Manager","Disk Management","dfrgui","Programs and Features"], a:1, e:"Disk Management handles initialisation, partitioning, formatting, and drive letters. Device Manager only shows the disk as hardware."},

{q:"A device shows a yellow warning triangle. Where is this seen, and what does it mean?", o:["Event Viewer; an audit failure","Device Manager; a driver problem with the device","Task Manager; high CPU","Disk Management; unallocated space"], a:1, e:"The yellow triangle in Device Manager flags driver/resource problems — update, roll back, or reinstall the driver."},
{q:"The technician needs Windows to boot into Safe Mode on the next restart, configured from within Windows. Which tool?", o:["regedit","msconfig (Boot tab → Safe boot)","gpedit","dfrgui"], a:1, e:"msconfig's Boot tab has the Safe boot checkbox — the standard way to force Safe Mode from a running system."},
{q:"Which tool answers 'which process has this file locked, and which process is hammering the disk right now'?", o:["Task Manager's Performance tab","Resource Monitor (resmon)","msinfo32","Performance Monitor"], a:1, e:"Resource Monitor shows per-process file handles, disk I/O, and network activity — deeper than Task Manager's summaries."},
{q:"To establish a week-long baseline of CPU and memory counters for capacity planning, which tool is designed for the job?", o:["Task Manager","Performance Monitor with data collector sets","resmon","Event Viewer"], a:1, e:"Performance Monitor logs counters over time to files for baselining and trend analysis; Task Manager and resmon are live-only."},
