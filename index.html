{
id:"3.3", name:"Given a scenario, select and install storage devices",
notes:`
<h2>Hard disk drives</h2>
<ul>
<li>Spinning magnetic platters, moving heads: cheap capacity, slow access, vulnerable to shock.</li>
<li>Speeds: <b>5,400 / 7,200 / 10,000 / 15,000 RPM</b> — faster spindle = better performance, more heat/noise. 15k = legacy enterprise SAS.</li>
<li>Form factors: <b>3.5"</b> desktop, <b>2.5"</b> laptop.</li>
</ul>

<h2>Solid state drives</h2>
<ul>
<li>Flash memory, no moving parts: fast, silent, shock-proof.</li>
<li><b>Interfaces:</b> SATA (≈600 MB/s ceiling) vs <b>NVMe</b> over PCIe (thousands of MB/s).</li>
<li><b>Form factors:</b> 2.5" (SATA only), <b>M.2</b> (SATA or NVMe — check the slot!), <b>mSATA</b> (legacy).</li>
<li>M.2 sizes like <b>2280</b> = 22 mm wide × 80 mm long.</li>
</ul>

<h2>Removable / flash</h2>
<ul>
<li>USB flash drives; memory cards: <b>SD → miniSD → microSD</b> (cameras, phones, Pi-class devices).</li>
<li>Optical: CD (~700 MB), DVD (4.7/8.5 GB), Blu-ray (25/50 GB).</li>
</ul>

<h2>RAID — memorise the table</h2>
<table>
<tr><th>Level</th><th>Scheme</th><th>Min drives</th><th>Fault tolerance</th><th>Notes</th></tr>
<tr><td><b>RAID 0</b></td><td>Striping</td><td>2</td><td><b>None</b> — one drive dies, all data lost</td><td>Speed/capacity only</td></tr>
<tr><td><b>RAID 1</b></td><td>Mirroring</td><td>2</td><td>Survives 1 drive</td><td>50% capacity efficiency</td></tr>
<tr><td><b>RAID 5</b></td><td>Striping + parity</td><td>3</td><td>Survives 1 drive</td><td>Capacity = n−1 drives</td></tr>
<tr><td><b>RAID 10</b></td><td>Stripe of mirrors</td><td>4</td><td>Survives 1 per mirror pair</td><td>Speed + redundancy, 50% efficiency</td></tr>
</table>

<h2>Scenario pick-list — match storage to the need</h2>
<table>
<tr><th>Scenario</th><th>Best choice</th></tr>
<tr><td>Boot drive — maximum responsiveness on a modern PC</td><td>M.2 NVMe SSD</td></tr>
<tr><td>Bulk archive — cheap terabytes, rarely accessed</td><td>3.5" 7,200 RPM HDD</td></tr>
<tr><td>Laptop in a vehicle / field kit subject to bumps</td><td>SSD (2.5" SATA or M.2)</td></tr>
<tr><td>Two drives, survive one failure, minimum cost</td><td>RAID 1 mirroring</td></tr>
<tr><td>Three 4 TB drives, max capacity + one-drive fault tolerance</td><td>RAID 5 (8 TB usable)</td></tr>
<tr><td>Four drives, video editing speed + redundancy</td><td>RAID 10</td></tr>
<tr><td>Fastest throughput, data loss acceptable (scratch disk)</td><td>RAID 0 striping</td></tr>
<tr><td>Camera/phone expandable storage</td><td>microSD (check speed class / UHS)</td></tr>
</table>

<h2>NVMe vs SATA — exam traps</h2>
<ul>
<li><b>M.2 is a shape, not a protocol</b> — the same slot may wire SATA only, NVMe/PCIe only, or both (check the board spec).</li>
<li>NVMe drive in a SATA-only M.2 slot: physically fits, <b>never detected</b>.</li>
<li>SATA III ceiling ≈ 600 MB/s; NVMe over PCIe 3.0/4.0/5.0 reaches thousands of MB/s.</li>
<li>2.5" SSDs are always SATA; M.2 can be either — read the label (NVMe vs SATA).</li>
<li><b>Hot-swap</b> — enterprise drive bays and some external enclosures allow replacing a drive without powering down; consumer internal SATA usually requires shutdown.</li>
</ul>

<h2>Physical installation — internal drives</h2>
<ol>
<li>Power off, unplug, discharge static.</li>
<li>Mount 3.5"/2.5" drive in bay; connect <b>SATA data</b> (7-pin) to motherboard and <b>SATA power</b> (15-pin) from PSU.</li>
<li>M.2: insert at angle into slot, screw down standoff; confirm slot supports NVMe if installing NVMe.</li>
<li>Boot → BIOS sees drive → OS: initialise (GPT for modern), partition, format, assign letter.</li>
<li>RAID arrays: configure in BIOS/UEFI RAID utility or OS before relying on the volume.</li>
</ol>

<div class="keyfact"><b>RAID ≠ backup:</b> ransomware, accidental delete, and fire destroy every mirror/stripe simultaneously. RAID is for uptime through drive failure — backups are separate.</div>
<div class="callout"><b>Exam angle:</b> RAID is <b>availability, not backup</b> — deletion, ransomware, and fire mirror across the array perfectly. "Fastest, don't care about data loss" → 0. "Two drives, redundancy" → 1. "Three+ drives, efficient redundancy" → 5. "Performance AND redundancy" → 10.</div>
`,
quiz:[
{q:"Which RAID level provides striping with NO fault tolerance?", o:["RAID 0","RAID 1","RAID 5","RAID 10"], a:0, e:"RAID 0 stripes data across drives purely for speed/capacity — any single drive failure destroys the whole array."},
{q:"A server has three 4 TB drives and needs redundancy with maximum usable capacity. Which RAID level and how much usable space?", o:["RAID 1 — 4 TB","RAID 5 — 8 TB","RAID 0 — 12 TB","RAID 10 — 6 TB"], a:1, e:"RAID 5 needs 3+ drives and sacrifices one drive's worth to parity: 3×4 TB − 4 TB = 8 TB usable, surviving one failure. RAID 10 needs four drives."},
{q:"A video editor needs both high performance and drive-failure protection, and has four identical drives. Which RAID level?", o:["RAID 0","RAID 1","RAID 5","RAID 10"], a:3, e:"RAID 10 stripes across mirrored pairs — near-RAID 0 performance with mirror redundancy. Cost: half the raw capacity."},
{q:"Why is RAID 1 NOT a substitute for backups?", o:["Mirrors are read-only","Deletions, corruption, and ransomware are mirrored instantly to both drives","RAID 1 only works with SSDs","Mirrors fail simultaneously by design"], a:1, e:"RAID protects against hardware failure only. Anything that happens to the data — deletion, encryption by ransomware — happens to every copy in the array at once."},
{q:"Which drive would give the BEST performance for a boot volume?", o:["7,200 RPM 3.5\" HDD","2.5\" SATA SSD","M.2 NVMe SSD","10,000 RPM SAS HDD"], a:2, e:"NVMe over PCIe outruns everything on the SATA bus by multiples; all mechanical drives trail far behind."},
{q:"What do the digits in an 'M.2 2280' SSD designation mean?", o:["2280 MB/s speed","22 mm wide, 80 mm long","2280 write cycles","Model year 2280"], a:1, e:"The first two digits are width in mm, the rest length: 22 × 80 mm — the most common M.2 size."},
{q:"A user's M.2 NVMe drive isn't detected in an older laptop's M.2 slot, though it fits physically. What is the likely reason?", o:["The drive needs formatting first","The slot supports M.2 SATA only, not NVMe/PCIe","NVMe requires a 3.5\" bay adapter","The drive needs a Molex connector"], a:1, e:"M.2 is a form factor, not an interface — some slots wire only SATA. An NVMe drive in a SATA-only slot fits but never appears."},
{q:"Which spindle speed is typical for a mainstream desktop hard drive balancing performance and noise?", o:["4,200 RPM","5,400 RPM","7,200 RPM","15,000 RPM"], a:2, e:"7,200 RPM is the standard desktop HDD speed; 5,400 favours quiet/efficiency, 10k/15k were enterprise SAS territory."},
{q:"Which memory card format is used in phones, drones, and single-board computers?", o:["CompactFlash","microSD","xD-Picture","Memory Stick PRO"], a:1, e:"microSD is the ubiquitous tiny card format; full-size SD persists in cameras. The others are legacy formats."},
{q:"Which optical disc holds approximately 25 GB per layer?", o:["CD","DVD","Blu-ray","DVD-DL"], a:2, e:"Blu-ray: 25 GB single layer, 50 GB dual. DVD is 4.7/8.5 GB; CD about 700 MB."}
]
},
/* ---------------- 3.4 ---------------- */
{
id:"3.4", name:"Install and configure motherboards, CPUs, and add-on cards",
notes:`
<h2>Motherboard form factors</h2>
<ul>
<li><b>ATX</b> — full size, most expansion slots. <b>microATX</b> — smaller, fewer slots, fits ATX cases. <b>Mini-ITX / ITX</b> — 17×17 cm compact boards, typically one expansion slot.</li>
</ul>

<h2>Expansion slots</h2>
<ul>
<li><b>PCIe</b> — the modern serial standard. Lane counts: <b>x1, x4, x8, x16</b> (GPUs use x16). Each PCIe generation doubles per-lane bandwidth. Shorter cards fit longer slots.</li>
<li><b>PCI</b> — legacy parallel slot, exam-relevant only as "the old one".</li>
</ul>

<h2>PCIe generations — bandwidth per lane (approx.)</h2>
<table>
<tr><th>Generation</th><th>Per lane</th><th>x16 example</th><th>Notes</th></tr>
<tr><td>PCIe 3.0</td><td>~1 GB/s</td><td>~16 GB/s</td><td>Common on older boards</td></tr>
<tr><td>PCIe 4.0</td><td>~2 GB/s</td><td>~32 GB/s</td><td>Current mainstream</td></tr>
<tr><td>PCIe 5.0</td><td>~4 GB/s</td><td>~64 GB/s</td><td>Newer high-end platforms</td></tr>
</table>
<ul>
<li>A PCIe 4.0 GPU in a PCIe 3.0 x16 slot still works — runs at the slower generation.</li>
<li>Lane splitting: some boards share lanes between M.2 and PCIe slots — installing both may drop GPU to x8.</li>
</ul>

<h2>CPU sockets and installation</h2>
<ul>
<li><b>Intel: LGA</b> (pins in the socket). <b>AMD: traditionally PGA</b> (pins on the chip — AM4), with newer AM5 moving to LGA. Socket must match CPU exactly.</li>
<li>Install: align the marked corner/triangle, zero force, close the retention arm, apply a pea-sized dot of <b>thermal paste</b>, mount the cooler.</li>
</ul>

<h2>CPU architecture concepts</h2>
<ul>
<li><b>x86/x64</b> — desktop/laptop standard (64-bit). <b>ARM</b> — power-efficient architecture in phones, tablets, and increasingly laptops.</li>
<li><b>Multicore</b> — multiple independent cores per chip. <b>Multithreading (SMT/Hyper-Threading)</b> — each core presents two logical threads to the OS.</li>
<li><b>Virtualization support</b> — Intel VT-x / AMD-V: hardware extensions hypervisors need; often must be <b>enabled in BIOS/UEFI</b>.</li>
</ul>

<h2>BIOS/UEFI — settings you must know</h2>
<ul>
<li><b>Boot options/order</b> — which device boots first (change to install an OS from USB).</li>
<li><b>Secure Boot</b> — UEFI verifies boot loader signatures, blocking rootkits/tampered loaders (required by Windows 11).</li>
<li><b>TPM (Trusted Platform Module)</b> — hardware chip (or firmware fTPM) storing crypto keys; underpins BitLocker; required by Windows 11.</li>
<li><b>HSM (Hardware Security Module)</b> — a dedicated, tamper-resistant device (add-in card, USB key, or network appliance) for generating, storing, and processing cryptographic keys at scale — the enterprise/server big sibling of the TPM. Exam tell: TPM = built into the endpoint; HSM = separate dedicated crypto hardware.</li>
<li><b>USB permissions</b> — disable USB ports/boot for security. <b>Fan settings</b> — thermal profiles. <b>BIOS passwords</b> — supervisor/user.</li>
<li><b>CMOS battery (CR2032)</b> — keeps clock/settings; symptoms of failure: <b>time resets, settings lost, boot errors each cold start</b>.</li>
</ul>

<h2>Add-on cards and cooling</h2>
<ul>
<li>Cards: <b>video/GPU</b> (x16, may need PCIe power leads), <b>capture card</b> (recording/streaming HDMI sources), <b>NIC</b>, <b>sound card</b>.</li>
<li>Cooling: case fans (front intake/rear exhaust), <b>heatsinks</b> + thermal paste/pads, <b>liquid/AIO coolers</b> for high-TDP chips. Overheating symptoms: throttling slowdowns, shutdowns under load.</li>
</ul>

<h2>Build checklist — motherboard, CPU, and cards</h2>
<ol>
<li>Verify <b>case ↔ board form factor</b> (standoffs aligned, I/O shield fitted).</li>
<li>Install PSU, route cables; connect 24-pin + EPS before heavy cards block access.</li>
<li>CPU: align triangle/notch, drop in socket (no force), close retention arm; <b>pea-sized thermal paste</b>, mount cooler.</li>
<li>RAM in correct channel slots; M.2 drives before GPU if slot is under the card.</li>
<li>Insert expansion cards until latch clicks; connect any required PCIe power to GPU.</li>
<li>Front-panel headers (power switch, LEDs, USB) per manual — easy to miswire.</li>
<li>First POST: one stick RAM / minimal config if no display; listen for beep codes.</li>
</ol>

<h2>POST and firmware — symptom → likely fix</h2>
<table>
<tr><th>Symptom</th><th>Likely cause</th><th>First action</th></tr>
<tr><td>Time/date wrong every cold boot</td><td>Dead CR2032 CMOS battery</td><td>Replace battery</td></tr>
<tr><td>No POST, no beep, fans spin</td><td>Power, CPU seating, RAM not fully seated</td><td>Reseat RAM/CPU, check EPS power</td></tr>
<tr><td>Hypervisor won't start, VT-x "unavailable"</td><td>Virtualization disabled in BIOS</td><td>Enable Intel VT-x / AMD-V</td></tr>
<tr><td>Windows 11 upgrade blocked</td><td>TPM 2.0 or Secure Boot off</td><td>Enable fTPM/PTT and Secure Boot in UEFI</td></tr>
<tr><td>GPU works but crashes under gaming load</td><td>Missing PCIe power, PSU wattage, overheating</td><td>Connect 6/8-pin leads; check temps and PSU sizing</td></tr>
<tr><td>USB boot install fails on new PC</td><td>Secure Boot or wrong boot order</td><td>Adjust boot order; temporarily disable Secure Boot if media unsigned</td></tr>
</table>

<div class="keyfact"><b>TPM vs HSM:</b> TPM = chip/firmware on the endpoint (BitLocker, Windows 11). HSM = dedicated tamper-resistant crypto appliance for keys at scale. Secure Boot verifies boot loaders; it does not encrypt the drive.</div>
`,
quiz:[
{q:"Which slot does a modern graphics card install into?", o:["PCIe x1","PCIe x16","PCI","AGP"], a:1, e:"GPUs use the full-length PCIe x16 slot for maximum lane bandwidth. AGP and PCI are legacy."},
{q:"Windows 11 installation fails, citing missing platform security requirements. Which TWO firmware features must be enabled?", o:["VT-x and Hyper-Threading","TPM 2.0 and Secure Boot","Legacy boot and CSM","XMP and Resizable BAR"], a:1, e:"Windows 11 mandates TPM 2.0 and Secure Boot. Both live in UEFI settings — often present but disabled on older boards (fTPM/PTT)."},
{q:"A PC forgets the date/time and shows configuration errors on every cold boot. What should be replaced?", o:["The PSU","The CR2032 CMOS battery","The RAM","The BIOS chip"], a:1, e:"The coin-cell battery maintains the real-time clock and (on many boards) settings when powered off. Losing time each boot is its signature failure."},
{q:"A technician cannot enable a virtual machine hypervisor; software reports hardware virtualization is unavailable, though the CPU supports VT-x. Where is the fix?", o:["Windows Update","Enable virtualization support in BIOS/UEFI","Install more RAM","Update the GPU driver"], a:1, e:"VT-x/AMD-V frequently ships disabled in firmware. Enable it in BIOS/UEFI and the hypervisor will detect it."},
{q:"Which statement matches CPU brands to their traditional socket types?", o:["Intel PGA, AMD LGA","Intel LGA, AMD traditionally PGA (AM4)","Both use PGA exclusively","Both use slot-based cartridges"], a:1, e:"Intel has used LGA (pins in socket) for years; AMD's AM4 was PGA (pins on chip), with AM5 moving to LGA. Mixing them up is a classic distractor."},
{q:"What is the purpose of Secure Boot?", o:["Encrypting the system drive","Verifying digital signatures of boot loaders to block tampered/malicious code at startup","Password-protecting the BIOS","Scanning RAM for viruses"], a:1, e:"Secure Boot has UEFI validate the boot chain's signatures, defeating boot-level rootkits. Drive encryption is BitLocker's job (which leans on the TPM)."},
{q:"A streamer wants to record the HDMI output of a games console on their PC. Which add-on card is required?", o:["A sound card","A capture card","A RAID controller","A TV tuner"], a:1, e:"Capture cards ingest external HDMI video for recording/streaming. Tuners receive broadcast TV; neither a sound card nor RAID controller handles video input."},
{q:"Which form factor is a 17 × 17 cm motherboard with a single expansion slot?", o:["ATX","microATX","Mini-ITX","E-ATX"], a:2, e:"Mini-ITX is the compact 170 mm square standard for small builds — usually one PCIe slot."},
{q:"A CPU with 8 cores and SMT/Hyper-Threading presents how many logical processors to the OS?", o:["4","8","16","32"], a:2, e:"Simultaneous multithreading exposes two logical threads per physical core: 8 cores → 16 logical processors."},
{q:"A gaming PC slows dramatically and shuts down during extended sessions; the case is hot to the touch. What is the MOST likely cause?", o:["Failing RAM","CPU/GPU overheating causing throttling and thermal shutdown","A DHCP fault","Secure Boot misconfiguration"], a:1, e:"Slowdowns under sustained load followed by shutdown are the thermal-protection pattern — check fans, dust, heatsink seating, and thermal paste."}
]
},
/* ---------------- 3.5 ---------------- */
{
id:"3.5", name:"Given a scenario, install or replace the appropriate power supply",
notes:`
<h2>Input voltage</h2>
<ul>
<li>Mains power differs by region: <b>~110–120 V</b> (North America) vs <b>~220–240 V</b> (UK/Europe).</li>
<li>Modern PSUs are mostly <b>auto-switching</b> across the full range. Legacy units have a <b>manual red voltage selector</b> — set to 110 V while plugged into 230 V mains, the PSU is destroyed (often with smoke).</li>
</ul>

<h2>Output and connectors</h2>
<ul>
<li>PSUs convert AC mains to DC rails: <b>+12 V</b> (CPU, GPU, drives, fans), <b>+5 V</b>, <b>+3.3 V</b>.</li>
<li><b>20+4-pin</b> main motherboard connector; <b>4/8-pin EPS</b> CPU power; <b>6/8-pin PCIe</b> GPU power; <b>SATA power</b> (15-pin); <b>Molex</b> (legacy 4-pin).</li>
</ul>

<h2>Choosing a PSU</h2>
<ul>
<li><b>Wattage:</b> total all component draw (GPU dominates) and leave headroom — an underpowered PSU causes crashes/restarts <b>under load</b>.</li>
<li><b>Modular</b> PSUs let you attach only the cables you need — cleaner builds, better airflow. Semi-/non-modular have fixed cables.</li>
<li><b>Redundant PSUs</b> — servers run two hot-swappable supplies; one fails, the other carries the load with zero downtime.</li>
<li>Efficiency ratings (80 Plus Bronze→Titanium) indicate how little power is wasted as heat.</li>
</ul>

<h2>Form factors — will it fit the case?</h2>
<ul>
<li><b>ATX</b> — standard desktop PSU (most common).</li>
<li><b>Micro-ATX / SFX</b> — compact cases and small-form-factor builds.</li>
<li><b>TFX</b> — slim desktops (Dell/HP office towers).</li>
<li><b>Redundant / hot-swap</b> — server chassis only; supplies slide out without powering down the server.</li>
</ul>

<h2>Sizing wattage — quick example</h2>
<p>A build with a 65 W CPU, a 250 W GPU, 30 W for drives/fans/RAM, plus ~20% headroom → target at least <b>~400 W</b> (many builders choose 550–650 W for upgrade room). GPU TDP dominates gaming rigs.</p>

<h2>Testing a suspected PSU</h2>
<ul>
<li><b>Paperclip test</b> — jumper the green wire to any black on the 24-pin while unplugged from the board; fan should spin (basic "PSU turns on" check only).</li>
<li><b>PSU tester</b> — reads each rail voltage under load; safer and more informative.</li>
<li><b>Swap test</b> — substitute a known-good PSU of adequate wattage; if crashes stop, the original is suspect.</li>
</ul>
<div class="callout"><b>Exam angle:</b> "PC restarts only when gaming/rendering" → insufficient PSU wattage (or overheating — check both). "Server must survive a PSU failure" → redundant supplies. "Traveller's old PSU released smoke abroad" → manual voltage switch set wrong.</div>
`,
quiz:[
{q:"A PC randomly powers off only during gaming sessions after a powerful new GPU was fitted. The temperatures are normal. What is the MOST likely cause?", o:["Faulty RAM","The PSU wattage is insufficient for the new load","Secure Boot conflicts","A failing CMOS battery"], a:1, e:"Load-dependent shutdowns with healthy temperatures point at a PSU that can't supply peak draw — the classic after-GPU-upgrade failure."},
{q:"A traveller plugs an old PSU with its red selector set to 115 V into UK 230 V mains. What happens?", o:["It runs at half speed","Nothing; PSUs auto-detect","The PSU is likely destroyed by overvoltage","The PC runs but cannot boot USB"], a:2, e:"With the manual switch on 115 V, applying 230 V roughly doubles the expected input and typically kills the supply — sometimes dramatically. Auto-switching units avoid this."},
{q:"Which connector supplies the main power to a modern motherboard?", o:["8-pin EPS only","20+4-pin ATX connector","Molex","6-pin PCIe"], a:1, e:"The 20+4-pin ATX connector is the board's primary feed; the separate 4/8-pin EPS powers the CPU; PCIe leads power graphics cards."},
{q:"A datacentre server must keep running if one power supply fails. What should it have?", o:["A modular PSU","Dual redundant hot-swappable PSUs","An 80 Plus Titanium PSU","A UPS only"], a:1, e:"Redundant supplies share/back up the load; a failed unit can be swapped live with no downtime. Efficiency ratings and modularity don't provide failover."},
{q:"What is the main advantage of a fully modular PSU?", o:["Higher voltage output","Only needed cables are connected, improving tidiness and airflow","It requires no mains earth","It is always more efficient"], a:1, e:"Modularity is about cable management — attach only what the build uses. Efficiency is a separate rating."},
{q:"Which DC rail primarily powers the CPU and graphics card?", o:["+3.3 V","+5 V","+12 V","−12 V"], a:2, e:"The +12 V rail carries the heavy loads: CPU (via EPS), GPU (via PCIe connectors), drives, and fans."},
{q:"Which connector powers a modern SATA hard drive?", o:["4-pin Molex","15-pin SATA power connector","6-pin PCIe","20+4-pin"], a:1, e:"SATA drives use the flat 15-pin SATA power connector. Molex is the legacy 4-pin predecessor (adapters exist)."},
{q:"An 80 Plus Gold rating on a PSU indicates what?", o:["Its maximum wattage","Its efficiency — how little input power is wasted as heat","Gold-plated connectors","A ten-year warranty"], a:1, e:"80 Plus tiers (Bronze→Titanium) certify conversion efficiency at various loads. Higher tiers waste less energy as heat."},
{q:"When sizing a PSU for a new build, which component's power draw typically dominates the calculation?", o:["RAM","The graphics card","Case fans","The NVMe SSD"], a:1, e:"High-end GPUs draw hundreds of watts — far beyond any other component — so PSU sizing revolves around the graphics card plus headroom."},
{q:"What does a power supply actually do?", o:["Converts DC from the wall to AC for components","Converts AC mains to the DC voltages components use","Stores energy for outages","Regulates the CMOS battery"], a:1, e:"The PSU rectifies and converts AC mains into regulated DC rails (+12/+5/+3.3 V). Energy storage for outages is a UPS's job."}
]
},

{
id:"3.6", name:"Deploy and configure multifunction devices/printers and settings",
notes:`
<h2>Connecting and sharing</h2>
<ul>
<li>Connections: <b>USB</b> (direct, one PC), <b>wired/wireless network</b> (many users, the business norm), Bluetooth (personal).</li>
<li><b>Printer sharing:</b> a network printer with its own IP serves everyone directly; alternatively a PC or dedicated <b>print server</b> shares and queues jobs centrally.</li>
<li><b>Public/shared devices:</b> consider who can reach it and what data passes through it.</li>
</ul>

<h2>Drivers — PCL vs PostScript</h2>
<ul>
<li><b>PCL</b> — fast, efficient, output rendered by the printer, can vary slightly between devices. General office standard.</li>
<li><b>PostScript (PS)</b> — device-independent page description: identical output on any PS printer; heavier processing. The choice for <b>graphics/print industry accuracy</b>.</li>
<li>Match driver to OS and to the device — wrong driver = garbage pages of symbols.</li>
</ul>

<h2>Device settings</h2>
<ul>
<li><b>Duplex</b> (double-sided), <b>orientation</b> (portrait/landscape), <b>tray selection</b> (letterhead in tray 2, etc.), <b>print quality/resolution</b> (draft saves toner; high DPI for photos).</li>
</ul>

<h2>Security on shared devices</h2>
<ul>
<li><b>User authentication</b> and <b>badging</b> — jobs release only when the user authenticates/taps their badge at the device (pull printing). Stops sensitive pages sitting in the output tray.</li>
<li><b>Secured prints</b> — job held until a PIN is entered at the panel.</li>
<li><b>Audit logs</b> — who printed/scanned what, when.</li>
</ul>

<h2>Scan services (MFD)</h2>
<ul>
<li><b>Flatbed</b> (single pages, books, fragile items) vs <b>ADF</b> — automatic document feeder for multipage jobs; duplex ADFs scan both sides.</li>
<li>Scan destinations: <b>scan-to-email</b> (needs SMTP settings), <b>scan-to-folder/SMB</b> (needs a share path and credentials), <b>scan-to-cloud</b> services.</li>
</ul>

<h2>Connection methods — compare and choose</h2>
<table>
<tr><th>Method</th><th>Best for</th><th>Limitations</th></tr>
<tr><td><b>USB</b></td><td>Single PC, home desk</td><td>Host PC must be on; one user at a time</td></tr>
<tr><td><b>Wired Ethernet</b></td><td>Office fleet, stable IP</td><td>Cable run to device</td></tr>
<tr><td><b>Wi‑Fi</b></td><td>Flexible placement, no new cable</td><td>Signal/interference; configure SSID/security on panel</td></tr>
<tr><td><b>Bluetooth</b></td><td>Personal mobile printing nearby</td><td>Short range; not typical for 30-user office</td></tr>
<tr><td><b>Shared via PC</b></td><td>Legacy USB-only printer</td><td>Share host must stay powered on — poor reliability</td></tr>
<tr><td><b>Network printer (own IP)</b></td><td>Business default — many users</td><td>Install driver per OS; static/DHCP reservation recommended</td></tr>
</table>

<h2>Scan scenarios — pick the right path</h2>
<table>
<tr><th>Job</th><th>Hardware / setting</th></tr>
<tr><td>60-page double-sided contract</td><td>Duplex ADF</td></tr>
<tr><td>Bound book page, fragile photo</td><td>Flatbed</td></tr>
<tr><td>Invoice stack, one side only</td><td>Simple ADF</td></tr>
<tr><td>Scan to shared finance folder</td><td>Scan-to-SMB (path + credentials on MFD)</td></tr>
<tr><td>Scan to user's inbox after email migration</td><td>Update SMTP settings on device</td></tr>
<tr><td>High-quality colour proof for client</td><td>Flatbed or ADF + high DPI; PostScript driver if colour-critical</td></tr>
</table>

<h2>Deployment checklist — new office printer/MFD</h2>
<ol>
<li>Unbox, remove transit locks/tape (especially laser — drum/fuser shipping locks).</li>
<li>Connect power + network (or USB); assign static IP or DHCP reservation.</li>
<li>Install <b>correct driver</b> for exact model and OS (PCL vs PostScript per workflow).</li>
<li>Configure trays, default duplex, and paper types (letterhead tray mapping).</li>
<li>Enable authentication/badge release if shared; set audit logging if required.</li>
<li>Test print + scan to each destination (email, folder) before go-live.</li>
</ol>

<div class="keyfact"><b>Garbage pages trap:</b> random symbols on every page = wrong or corrupt driver — reinstall the exact model driver. Smudges that wipe off = fuser (3.7). Streaks in one colour = inkjet head cleaning.</div>
`,
quiz:[
{q:"A design studio requires that proofs print identically on every printer in the workflow. Which driver/page-description language should they standardise on?", o:["PCL","PostScript","XPS","Raw text"], a:1, e:"PostScript is device-independent — the page renders identically on any compliant printer, which is why the graphics/print industry uses it. PCL output can vary by device."},
{q:"Confidential HR documents keep being found in the office printer's output tray. Which feature BEST prevents this?", o:["Duplex printing","Badged/authenticated job release (pull printing)","A larger output tray","Draft quality mode"], a:1, e:"Holding jobs until the owner authenticates or taps their badge at the device means pages only print with the person standing there."},
{q:"A 60-page double-sided contract must be scanned quickly. Which hardware feature is needed?", o:["A flatbed scanner","A duplexing automatic document feeder (ADF)","A higher DPI setting","Scan-to-cloud"], a:1, e:"An ADF feeds multipage stacks automatically; a duplexing ADF captures both sides. Flatbeds handle one page at a time."},
{q:"Scan-to-email suddenly stops working on an MFD after the company changes email providers. What MOST likely needs updating on the device?", o:["The PCL driver","The SMTP server settings","The tray configuration","The badge reader firmware"], a:1, e:"Scan-to-email sends via SMTP; new provider means new server address, port, and credentials in the MFD's configuration."},
{q:"Which connection method allows an office of thirty staff to print without any single PC being switched on?", o:["USB to the manager's PC","The printer connected directly to the network with its own IP","Bluetooth pairing per user","Parallel port via adapter"], a:1, e:"A network-attached printer serves all clients independently. Sharing via a PC makes that PC a dependency."},
{q:"Every page from a newly installed printer emerges covered in random symbols and fragments. What is the MOST likely cause?", o:["Low toner","An incorrect or corrupted printer driver","The wrong tray selected","A failing fuser"], a:1, e:"Garbage output — pages of symbols — is the signature of a wrong/corrupt driver rendering data the printer can't interpret. Reinstall the correct driver for the exact model and OS."},
{q:"Company letterhead lives in tray 2, plain paper in tray 1. Users keep printing letters on plain paper. What should be configured?", o:["Duplex defaults","Tray/paper-source settings in the driver or device","Higher print quality","PostScript instead of PCL"], a:1, e:"Tray selection (and paper-type mapping) in the driver/device settings directs letter templates to the letterhead tray."},
{q:"What does enabling audit logging on a shared MFD provide?", o:["Faster spooling","Records of who printed, scanned, or copied what and when","Automatic toner ordering","Colour calibration"], a:1, e:"Audit logs create accountability on shared devices — essential where sensitive documents flow through a communal machine."},
{q:"A user wants a print job held at the device until they type a code at the control panel. Which feature is this?", o:["Draft mode","Secured print (PIN release)","Collated output","Spool priority"], a:1, e:"Secured/PIN printing holds the job in memory until the code is entered at the panel — a lighter-weight cousin of badge release."},
{q:"Which scenario favours a flatbed scan over the ADF?", o:["A 100-page report","A bound book page or a fragile old photograph","Double-sided invoices","A stack of receipts"], a:1, e:"Bound, fragile, or oddly sized originals can't pass through a document feeder — the flatbed handles them without damage."}
]
},
/* ---------------- 3.7 ---------------- */
{
id:"3.7", name:"Given a scenario, install and replace printer consumables",
notes:`
<h2>Laser printers — the 7-step imaging process (MEMORISE THE ORDER)</h2>
<table>
<tr><th>#</th><th>Step</th><th>What happens</th></tr>
<tr><td>1</td><td><b>Processing</b></td><td>The page is rasterised into a bitmap</td></tr>
<tr><td>2</td><td><b>Charging</b></td><td>Drum given a uniform negative charge</td></tr>
<tr><td>3</td><td><b>Exposing</b></td><td>Laser writes the image, discharging those areas of the drum</td></tr>
<tr><td>4</td><td><b>Developing</b></td><td>Toner sticks to the exposed (discharged) areas</td></tr>
<tr><td>5</td><td><b>Transferring</b></td><td>Toner pulled from drum onto the paper</td></tr>
<tr><td>6</td><td><b>Fusing</b></td><td>Heat + pressure rollers melt toner permanently into the paper</td></tr>
<tr><td>7</td><td><b>Cleaning</b></td><td>Residual toner scraped from the drum</td></tr>
</table>
<div class="callout"><b>Mnemonic:</b> <i>People Choose Extra Drinks To Feel Cheerful.</i> Symptom links: smudges that wipe off → <b>fuser</b> not melting toner. Repeating marks down the page → <b>drum</b> defect. Vertical streaks → dirty drum/low toner. Ghost images → cleaning/drum issue.</div>

<h2>Laser symptom → component (quick reference)</h2>
<table>
<tr><th>Symptom</th><th>Most likely component</th></tr>
<tr><td>Toner rubs off when touched; not fused</td><td>Fuser assembly</td></tr>
<tr><td>Same defect repeats at fixed interval down page</td><td>Imaging drum (circumference defect)</td></tr>
<tr><td>Light print, vertical white streak</td><td>Low toner or dirty drum</td></tr>
<tr><td>Pale ghost of previous page</td><td>Cleaning stage / drum not clearing toner</td></tr>
<tr><td>Black lines across page</td><td>Scratch on drum or debris on glass (if scanning)</td></tr>
<tr><td>Paper jams at exit, wrinkled pages</td><td>Worn fuser rollers (maintenance kit)</td></tr>
</table>
<ul>
<li>Consumables: <b>toner cartridge</b>, <b>imaging drum</b> (sometimes combined), <b>fuser assembly</b>, transfer belt/rollers, <b>maintenance kit</b> (rollers, fuser) at set page counts. Laser output is dry and permanent immediately.</li>
</ul>

<h2>Inkjet</h2>
<ul>
<li>Sprays liquid ink; consumables: <b>ink cartridges</b>, sometimes separate <b>print heads</b>.</li>
<li>Maintenance: <b>head cleaning cycles</b> for clogged nozzles (streaky/missing colours), <b>calibration/alignment</b> after cartridge changes for crisp output.</li>
<li>Ink can smear when fresh; nozzles clog if unused for long periods.</li>
</ul>

<h2>Thermal</h2>
<ul>
<li>Prints by heating <b>special heat-sensitive paper</b> — receipts, labels. Consumable is the paper itself; the <b>heating element</b> needs cleaning (isopropyl alcohol); <b>heat and light fade the output</b> over time — and storing the paper somewhere hot ruins it.</li>
</ul>

<h2>Impact (dot matrix)</h2>
<ul>
<li>Pins strike an <b>ink ribbon</b> against the paper — the only type that prints <b>multipart carbon-copy forms</b>. Uses <b>tractor-feed</b> continuous paper. Consumables: ribbon, print head, special paper. Noisy, industrial, alive in warehouses.</li>
</ul>

<h2>3D printers</h2>
<ul>
<li><b>FDM:</b> melts <b>filament</b> (PLA/ABS) layer by layer; keep the <b>print bed</b> level and adhesive. <b>Resin (SLA):</b> cures liquid <b>resin</b> with UV light — finer detail, messier handling.</li>
</ul>
`,
quiz:[
{q:"What is the correct order of the laser printer imaging process?", o:["Charging, processing, developing, exposing, fusing, transferring, cleaning","Processing, charging, exposing, developing, transferring, fusing, cleaning","Processing, exposing, charging, transferring, developing, fusing, cleaning","Charging, exposing, processing, developing, fusing, transferring, cleaning"], a:1, e:"Processing → Charging → Exposing → Developing → Transferring → Fusing → Cleaning. This exact ordering is a near-guaranteed exam question."},
{q:"Printed pages from a laser printer smudge when touched, with toner rubbing off. Which component has failed?", o:["The imaging drum","The transfer roller","The fuser assembly","The toner cartridge"], a:2, e:"The fuser melts toner into the paper with heat and pressure. Un-fused toner sits loose on the surface and wipes away."},
{q:"A defect mark repeats at regular intervals down every laser-printed page. What is the MOST likely cause?", o:["Low toner","A damaged or dirty imaging drum","Wrong driver","A misaligned tray"], a:1, e:"The drum's circumference maps to a repeat interval — a scratch or debris on it prints once per revolution, producing evenly spaced repeating marks."},
{q:"An inkjet printer produces streaky output with one colour missing entirely. What is the FIRST maintenance step?", o:["Replace the fuser","Run the print head cleaning cycle","Recalibrate the bed","Replace the paper"], a:1, e:"Missing/streaky colours point to clogged nozzles. The built-in head cleaning routine flushes them; replacement heads/cartridges come later if cleaning fails."},
{q:"A shop's receipt printer needs no ink or toner at all. How does it print, and what is its main consumable?", o:["Impact pins; ribbon","Heating elements on heat-sensitive paper; the paper itself","Laser on coated paper; drum","Electrostatic spray; ink"], a:1, e:"Thermal printers heat special thermochromic paper — the paper is the consumable. Keep the heating element clean and store paper away from heat."},
{q:"Which printer type MUST be used for multipart carbon-copy forms?", o:["Laser","Inkjet","Thermal","Impact (dot matrix)"], a:3, e:"Only impact printers physically strike the page, pressing through to the carbon layers beneath. Common with tractor-feed continuous paper in warehouses."},
{q:"After replacing inkjet cartridges, text prints with fringed, misaligned edges. What should be run?", o:["A fuser warm-up","Print head alignment/calibration","A firmware downgrade","Duplex test"], a:1, e:"New cartridges/heads sit at fractionally different positions; the calibration/alignment routine re-registers them for clean output."},
{q:"During which laser imaging step does toner move from the drum to the paper?", o:["Developing","Transferring","Fusing","Exposing"], a:1, e:"Developing puts toner on the drum's image; transferring pulls it onto the paper (via the transfer roller/belt); fusing then makes it permanent."},
{q:"A 3D print keeps detaching from the FDM printer partway through jobs. What is the FIRST thing to address?", o:["Use higher-temperature resin","Level the print bed and improve first-layer adhesion","Print faster to finish sooner","Replace the UV lamp"], a:1, e:"FDM adhesion failures almost always trace to bed levelling and first-layer adhesion (surface prep/adhesive). Resin and UV lamps belong to SLA printers."},
{q:"Old receipts from a thermal printer have faded to blank after being stored in a hot car. Why?", o:["The ink evaporated","Thermal paper's image degrades with heat and light over time","The toner was never fused","The ribbon was worn"], a:1, e:"Thermal output is a heat-induced colour change in the paper — further heat and light exposure continue the reaction and fade it. Archive-worthy documents shouldn't live on thermal paper."}
]
}
]
,mock:[
{q:"A 90 m office cable run must reliably carry 10 Gbps. Which is the minimum-spec cable?", o:["Cat 5e","Cat 6","Cat 6a","RG-6"], a:2, e:"Cat 6 only sustains 10 Gbps to about 55 m; at 90 m you need Cat 6a (or fibre)."},
{q:"A campus link of 400 m between buildings suffers interference from nearby high-voltage equipment. Which medium solves both distance and EMI?", o:["STP Cat 6a","Multimode fibre","RG-6 with F connectors","Cat 5e in conduit"], a:1, e:"Copper Ethernet is limited to 100 m regardless of shielding; fibre exceeds the distance easily and is immune to EMI. Multimode suits campus-scale runs."},
{q:"Which connector/cable pairing is INCORRECT?", o:["RJ11 — telephone/DSL","F-type — RG-6 coax","LC — fibre optic","RJ45 — SATA data"], a:3, e:"SATA uses its own 7-pin data connector. RJ45 is the 8P8C Ethernet twisted-pair connector."},
{q:"A user connects an old VGA-only monitor to a laptop with only HDMI out. What do they need?", o:["A passive HDMI-to-VGA cable","An active HDMI-to-VGA converter","A DVI-D coupler","A USB-A adapter"], a:1, e:"HDMI is digital, VGA analogue — conversion between them requires active electronics, not a passive pin adapter."},
{q:"Which DisplayPort capability distinguishes it from HDMI in multi-monitor setups?", o:["Carrying audio","Daisy-chaining monitors via MST","Analogue fallback","PoE support"], a:1, e:"DisplayPort's Multi-Stream Transport allows chaining several monitors from one output — an HDMI can't-do. Both carry audio."},
{q:"A CAD workstation needs 64 GB of RAM with error correction. What must be verified BEFORE buying ECC modules?", o:["The OS licence tier","That the CPU and motherboard support ECC","That the PSU exceeds 800 W","That the case has RGB headers"], a:1, e:"ECC only functions when the memory controller (CPU) and board support it — consumer platforms often don't."},
{q:"A PC with four RAM slots has two matched sticks in slots 1 and 3 as the manual specifies, and reports dual-channel operation. The user adds a third, mismatched stick. What is the LIKELY result?", o:["The PC will not POST","Memory runs, possibly in a slower/asymmetric (flex) mode at the slowest stick's speed","All three run at full dual-channel speed","The new stick is ignored entirely"], a:1, e:"Odd/mismatched configurations usually still work, but drop to the slowest module's speed and lose clean dual-channel interleaving — capacity up, bandwidth compromised."},
{q:"Which upgrade gives the single biggest responsiveness improvement to an ageing PC booting from a 5,400 RPM hard drive?", o:["Doubling the RAM","Replacing the HDD with an SSD","A faster GPU","A 7,200 RPM HDD"], a:1, e:"Mechanical seek times dominate perceived slowness; any SSD eliminates them. It's the classic highest-impact upgrade."},
{q:"An array must survive one drive failure using exactly TWO drives. Which RAID level?", o:["RAID 0","RAID 1","RAID 5","RAID 10"], a:1, e:"With two drives, mirroring (RAID 1) is the only redundant option — RAID 5 needs three, RAID 10 four."},
{q:"A four-drive RAID 10 array of 2 TB disks provides how much usable capacity?", o:["8 TB","6 TB","4 TB","2 TB"], a:2, e:"RAID 10 mirrors then stripes: half of raw capacity is redundancy. 4 × 2 TB = 8 TB raw → 4 TB usable."},
{q:"Which storage technology should be specified for a machine subject to vibration and movement, such as in a vehicle?", o:["15k RPM SAS HDD","3.5\" desktop HDD","Solid-state drive","Optical library"], a:2, e:"SSDs have no moving parts, making them immune to the shock/vibration that destroys spinning drives."},
{q:"A technician installing a CPU notices the motherboard socket contains hundreds of tiny pins. Which platform is this characteristic of?", o:["AMD AM4 (PGA)","Intel LGA","Both AMD and Intel legacy slots","ARM SoCs"], a:1, e:"Pins in the socket = LGA, Intel's long-standing approach (and AMD's newer AM5). AM4 chips carry the pins themselves (PGA)."},
{q:"Which BIOS/UEFI change lets a technician boot from a USB stick to reinstall Windows?", o:["Enabling TPM","Changing the boot order/boot options","Enabling XMP","Setting a supervisor password"], a:1, e:"Boot order determines which device the firmware tries first — set USB above the internal drive (or use the one-time boot menu)."},
{q:"An organisation wants to prevent staff booting PCs from USB drives and block unauthorised firmware changes. Which TWO settings apply?", o:["Secure Boot and XMP","Disable USB boot and set a BIOS supervisor password","Enable TPM and fan control","Fast boot and legacy CSM"], a:1, e:"Removing USB from boot options stops boot-media bypasses, and a supervisor password stops anyone re-enabling it."},
{q:"A small form factor office PC must fit a compact case with one expansion slot. Which board form factor?", o:["ATX","E-ATX","Mini-ITX","microATX"], a:2, e:"Mini-ITX (17×17 cm, typically one PCIe slot) is the compact standard. microATX is mid-sized with several slots."},
{q:"Which CPU architecture dominates phones and tablets due to power efficiency?", o:["x64","ARM","RISC-V","Itanium"], a:1, e:"ARM's efficiency-focused design rules mobile devices and increasingly appears in laptops. x64 remains the desktop/server standard."},
{q:"A new GPU requires two 8-pin PCIe power leads, but the existing PSU has none spare and sits at 450 W. What is the correct action?", o:["Use Molex-to-PCIe adapter chains","Replace the PSU with a higher-wattage unit with native PCIe connectors","Run the GPU without the leads","Undervolt the CPU to compensate"], a:1, e:"A GPU demanding dual 8-pins will exceed a 450 W budget; daisy-chained adapters risk melting. The safe answer is a properly sized PSU with native connectors."},
{q:"A server room PC must continue operating through the failure of a single internal power supply. What hardware provides this?", o:["A UPS","Redundant hot-swap PSUs","An 80 Plus Platinum PSU","A modular PSU"], a:1, e:"Redundant supplies provide internal failover; a UPS protects against mains loss, not PSU failure."},
{q:"Which symptom pattern suggests an underpowered PSU rather than overheating?", o:["Shutdowns under load with high temperatures and loud fans","Instant restarts/power-offs under load while temperatures remain normal","Gradual slowdown over months","Beep codes at POST"], a:1, e:"Both fail under load, but thermal shutdown comes with heat evidence; sudden resets at normal temps point at the supply sagging under peak draw."},
{q:"An accounts office prints invoices onto three-part carbonless forms on continuous tractor-feed paper. Which printer and consumable are involved?", o:["Laser; toner","Inkjet; printhead","Impact dot matrix; ribbon","Thermal; heat-sensitive paper"], a:2, e:"Multipart forms need physical impact through the layers — dot matrix with an ink ribbon, fed by tractor sprockets."},
{q:"Pages from the office laser printer show a pale ghost of the previous page's image. Which stage/component is implicated?", o:["Fusing rollers too hot","The cleaning stage / drum not clearing residual toner","The pickup rollers","The duplex unit"], a:1, e:"Ghosting means leftover toner or residual charge survives on the drum between rotations — a cleaning-blade or drum fault."},
{q:"Which laser printer component is replaced as part of a scheduled maintenance kit at a set page count?", o:["The laser diode","The fuser and feed rollers","The formatter board","The control panel"], a:1, e:"Maintenance kits bundle the wear items — fuser assembly, pickup/transfer rollers — replaced at manufacturer-defined page intervals."},
{q:"An inkjet used once a month produces blank or badly streaked pages each time. What is the cause?", o:["The fuser cooling down","Nozzles clogging with dried ink between uses","Wrong PCL driver","Thermal paper fade"], a:1, e:"Infrequently used inkjets dry out — nozzle clogs are the classic result, needing cleaning cycles (and ideally more regular use)."},
{q:"Which two consumables are specific to resin (SLA) 3D printing rather than FDM?", o:["Filament and a heated nozzle","Liquid resin and a UV light source","PLA and a glass bed","Toner and a drum"], a:1, e:"SLA cures liquid resin with UV light. FDM extrudes melted filament. Knowing which consumable belongs to which process is the exam's angle."},
{q:"A technician replaces a laser printer's toner cartridge, but faint vertical white streaks persist on all prints. What should they do NEXT?", o:["Replace the fuser","Inspect/replace the imaging drum or clean the transfer components","Reinstall the driver","Switch to PostScript"], a:1, e:"With fresh toner ruled out, vertical streaks/voids implicate the drum or transfer path. Drivers cause garbage output, not consistent physical streaks."}
]
},

{
id:"4.1", name:"Summarize cloud-computing concepts",
notes:`
<h2>Service models — who manages what</h2>
<table>
<tr><th>Model</th><th>You get</th><th>Example</th></tr>
<tr><td><b>IaaS</b></td><td>Raw infrastructure — VMs, storage, networks; you manage OS upward</td><td>AWS EC2, Azure VMs</td></tr>
<tr><td><b>PaaS</b></td><td>A managed platform to deploy code onto — no OS admin</td><td>Azure App Service, Heroku</td></tr>
<tr><td><b>SaaS</b></td><td>The finished application, used through a browser/client</td><td>Microsoft 365, Gmail, Salesforce</td></tr>
</table>
<div class="callout"><b>Memory hook:</b> IaaS = they rent you the <i>computer</i>. PaaS = they rent you the <i>platform to build on</i>. SaaS = they rent you the <i>software itself</i>. Control decreases and convenience increases as you go I→P→S.</div>

<h2>Deployment models</h2>
<ul>
<li><b>Public cloud</b> — provider's shared infrastructure, open to anyone (AWS, Azure, GCP).</li>
<li><b>Private cloud</b> — cloud infrastructure dedicated to one organisation (on-prem or hosted). Control and compliance, at cost.</li>
<li><b>Hybrid cloud</b> — private + public combined, workloads moving between them.</li>
<li><b>Community cloud</b> — shared by several organisations with common needs (e.g. NHS trusts, universities) splitting costs.</li>
</ul>

<h2>Cloud characteristics — exam vocabulary</h2>
<ul>
<li><b>Shared resources</b> — pooled hardware serving many tenants (internal = your own datacentre pooling; external = provider's).</li>
<li><b>Rapid elasticity</b> — capacity scales up <i>and down</i> automatically with demand (the Christmas-traffic scenario).</li>
<li><b>Metered utilization</b> — pay-as-you-go billing for exactly what's consumed.</li>
<li><b>High availability</b> — redundancy across hardware/zones keeps services up through failures; expressed in uptime "nines" (99.9%…).</li>
<li><b>File synchronization</b> — cloud file services keeping copies consistent across devices (OneDrive, Dropbox, Google Drive).</li>
</ul>

<h2>Desktop virtualization — VDI</h2>
<ul>
<li><b>VDI (Virtual Desktop Infrastructure)</b> — users' desktops run as VMs on central servers; endpoints are just viewers (thin clients).</li>
<li><b>VDI on premises</b> — hosted in your own datacentre. <b>VDI in the cloud / DaaS</b> — hosted by a provider (e.g. Azure Virtual Desktop, Windows 365).</li>
<li>Benefits: central management/patching, data never leaves the datacentre, any-device access. Trade-off: everything depends on connectivity.</li>
</ul>

<h2>Shared responsibility — who secures what</h2>
<ul>
<li><b>IaaS</b> — provider secures the physical datacentre and hypervisor; <b>you</b> patch the guest OS, apps, and data.</li>
<li><b>PaaS</b> — provider secures platform/runtime; <b>you</b> secure your code and data.</li>
<li><b>SaaS</b> — provider secures the application stack; <b>you</b> manage identities, access, and the data you upload.</li>
</ul>
<div class="keyfact"><b>Exam trap:</b> "The cloud provider handles all security" is false for IaaS/PaaS — customer responsibility always remains for something.</div>

<h2>Shared responsibility — detail view</h2>
<table>
<tr><th>Layer</th><th>IaaS</th><th>PaaS</th><th>SaaS</th></tr>
<tr><td>Physical datacentre / hardware</td><td>Provider</td><td>Provider</td><td>Provider</td></tr>
<tr><td>Hypervisor / host OS</td><td>Provider</td><td>Provider</td><td>Provider</td></tr>
<tr><td>Guest OS / patching</td><td><b>You</b></td><td>Provider</td><td>Provider</td></tr>
<tr><td>Runtime / middleware</td><td><b>You</b></td><td>Provider</td><td>Provider</td></tr>
<tr><td>Application code</td><td><b>You</b></td><td><b>You</b></td><td>Provider</td></tr>
<tr><td>Data + identity/access</td><td><b>You</b></td><td><b>You</b></td><td><b>You</b></td></tr>
</table>

<h2>Characteristic → scenario match</h2>
<table>
<tr><th>Characteristic</th><th>Exam tell</th></tr>
<tr><td><b>Shared resources / pooling</b></td><td>Many tenants on the same underlying hardware</td></tr>
<tr><td><b>Rapid elasticity</b></td><td>Auto scale up for peak AND down afterwards</td></tr>
<tr><td><b>Metered utilization</b></td><td>Bill rises/falls with hours/GB consumed</td></tr>
<tr><td><b>High availability</b></td><td>Uptime nines, multi-zone redundancy</td></tr>
<tr><td><b>File synchronization</b></td><td>Edit on laptop, appears on phone (OneDrive/Drive)</td></tr>
</table>

<h2>Deployment pick-list — match scenario to model</h2>
<table>
<tr><th>Scenario</th><th>Best model</th></tr>
<tr><td>Startup web app, no datacentre staff — push own code</td><td>Public cloud <b>PaaS</b></td></tr>
<tr><td>Use finished CRM through a browser</td><td><b>SaaS</b></td></tr>
<tr><td>Rent VMs and install your own OS/apps</td><td>Public <b>IaaS</b></td></tr>
<tr><td>Hospital records must stay on dedicated infrastructure</td><td><b>Private</b> (or hybrid for mixed)</td></tr>
<tr><td>Universities / NHS trusts sharing a compliant platform</td><td><b>Community</b> cloud</td></tr>
<tr><td>Sensitive on-prem + Christmas overflow to Azure</td><td><b>Hybrid</b></td></tr>
<tr><td>Retail site bursts then goes quiet</td><td>Public + <b>rapid elasticity</b> + metering</td></tr>
<tr><td>Central desktops in Microsoft's cloud, thin clients</td><td>Cloud VDI / <b>DaaS</b></td></tr>
<tr><td>Central desktops in your own datacentre</td><td>On-prem <b>VDI</b></td></tr>
</table>

<div class="keyfact"><b>IaaS → PaaS → SaaS:</b> you manage less each step. Exam wording: "own OS" = IaaS · "own code, not OS" = PaaS · "finished app in browser" = SaaS.</div>
<div class="keyfact"><b>VDI risk:</b> data stays safe (nothing on lost thin clients) but <b>everything depends on connectivity</b> — if the link or farm is down, nobody works.</div>
`,
quiz:[
{q:"A company rents virtual machines and storage from a provider but installs and manages its own operating systems and applications. Which service model is this?", o:["SaaS","PaaS","IaaS","DaaS"], a:2, e:"Infrastructure as a Service supplies the raw compute/storage/network; everything from the OS upward is the customer's responsibility."},
{q:"Developers deploy their code to a managed environment where the provider handles the OS, runtime, and patching. Which model?", o:["IaaS","PaaS","SaaS","Community cloud"], a:1, e:"Platform as a Service abstracts the infrastructure and OS away — developers just push code to the managed platform."},
{q:"Microsoft 365 accessed through a browser is an example of which service model?", o:["IaaS","PaaS","SaaS","VDI"], a:2, e:"Software as a Service delivers the complete finished application over the internet — no infrastructure or platform management at all."},
{q:"A hospital consortium shares cloud infrastructure built around healthcare compliance requirements, splitting the cost between member trusts. Which deployment model is this?", o:["Public cloud","Private cloud","Hybrid cloud","Community cloud"], a:3, e:"A community cloud is shared by multiple organisations with common requirements (regulatory, mission) — costlier than public but cheaper than each running private."},
{q:"An online retailer's site automatically spins up extra server instances during Black Friday and releases them afterwards, paying only for what ran. Which TWO cloud characteristics does this demonstrate?", o:["High availability and file sync","Rapid elasticity and metered utilization","Shared resources and VDI","Private deployment and pooling"], a:1, e:"Scaling capacity with demand is rapid elasticity; being billed for exactly the consumed resources is metered utilization."},
{q:"What distinguishes a private cloud from a public cloud?", o:["Private clouds cannot use virtualization","Private cloud infrastructure is dedicated to a single organisation","Public clouds have no security controls","Private clouds are always cheaper"], a:1, e:"Private cloud resources serve one organisation only (on-prem or provider-hosted), maximising control and compliance at higher cost. Public cloud is shared multi-tenant infrastructure."},
{q:"A business keeps sensitive workloads in its own datacentre cloud but bursts overflow processing to Azure at peak times. Which model is this?", o:["Community","Hybrid","Public only","Multi-region"], a:1, e:"Combining private and public clouds with workloads moving between them is the definition of hybrid cloud."},
{q:"A user edits a document on their laptop and the change appears on their phone moments later via OneDrive. Which cloud concept is at work?", o:["Metered utilization","File synchronization","Rapid elasticity","VDI"], a:1, e:"Cloud file synchronization keeps copies of files consistent across all of a user's devices through a central cloud copy."},
{q:"An organisation wants staff desktops to run centrally in its own datacentre, with users connecting from thin clients so no data lives on endpoints. What is this?", o:["SaaS","On-premises VDI","Public IaaS","File sync"], a:1, e:"Virtual Desktop Infrastructure runs desktops as central VMs; hosting it in your own datacentre makes it on-prem VDI. Cloud-hosted equivalents are DaaS."},
{q:"A service advertised as '99.99% uptime' with redundancy across multiple availability zones is emphasising which characteristic?", o:["Elasticity","High availability","Metered billing","Shared tenancy"], a:1, e:"High availability means the service survives component and site failures — measured in uptime nines and delivered through redundancy."}
]
},

{
id:"4.2", name:"Summarize aspects of client-side virtualization",
notes:`
<h2>What client-side virtualization is</h2>
<ul>
<li>A <b>hypervisor</b> runs <b>virtual machines</b> — complete guest operating systems — on one physical host. Client-side means on a workstation (e.g. VirtualBox, VMware Workstation, Hyper-V) rather than a server farm.</li>
<li>Each VM has virtual CPU, RAM, disk (a file on the host), and network adapters.</li>
</ul>

<h2>Type 1 vs Type 2 hypervisors</h2>
<table>
<tr><th>Type</th><th>Runs on</th><th>Examples</th><th>Typical use</th></tr>
<tr><td><b>Type 1</b> (bare metal)</td><td>Hardware directly</td><td>VMware ESXi, Microsoft Hyper-V (role), Citrix XenServer</td><td>Servers, datacentres, enterprise</td></tr>
<tr><td><b>Type 2</b> (hosted)</td><td>Installed as an app on a host OS</td><td>VirtualBox, VMware Workstation, Parallels</td><td>Desktops, labs, client-side sandboxing</td></tr>
</table>
<div class="callout"><b>Exam angle:</b> client-side virtualization on a technician's laptop = Type 2. Enterprise server farm running many VMs = Type 1.</div>

<h2>Purposes — the exam's favourite scenarios</h2>
<ul>
<li><b>Sandbox</b> — an isolated, disposable environment: open suspicious files/malware safely, then roll back to a snapshot.</li>
<li><b>Test development</b> — trial software, patches, and configurations across many OS versions without risking real machines; snapshots make experiments reversible.</li>
<li><b>Application virtualization — legacy software/OS:</b> run that critical old app that only works on Windows XP inside a VM on modern hardware.</li>
<li><b>Application virtualization — cross-platform:</b> run Windows-only software on a Mac or Linux host (or vice versa) via a VM.</li>
</ul>

<h2>Resource requirements</h2>
<ul>
<li><b>CPU virtualization extensions</b> — Intel VT-x / AMD-V, <b>enabled in BIOS/UEFI</b> (links back to 3.4).</li>
<li><b>RAM</b> — every running VM carves a chunk out of physical RAM; it's usually the first bottleneck.</li>
<li><b>Disk</b> — each VM's virtual disk consumes tens of GB; fast storage (SSD) matters.</li>
<li><b>Network</b> — virtual NICs, commonly bridged (VM appears on the LAN as its own device) or NAT (shares the host's address).</li>
</ul>

<h2>Security requirements</h2>
<ul>
<li>VMs are <b>real computers</b>: they need patching, antivirus, and firewalls like any physical machine.</li>
<li><b>VM escape</b> — the (rare, serious) attack where malware breaks out of a guest into the host/hypervisor; keep the hypervisor patched.</li>
<li><b>VM sprawl</b> — unmanaged proliferation of forgotten VMs, each an unpatched attack surface. Inventory and lifecycle discipline.</li>
<li>Isolate risky guests: no shared folders/clipboard, and host-only or no networking when detonating malware in a sandbox.</li>
</ul>

<h2>Purpose pick-list — match scenario</h2>
<table>
<tr><th>Scenario</th><th>Purpose</th></tr>
<tr><td>Open a suspicious attachment safely, then discard</td><td><b>Sandbox</b> (+ snapshot revert)</td></tr>
<tr><td>Test a Windows patch on a copy of the standard image</td><td><b>Test / development</b></td></tr>
<tr><td>Critical app only runs on Windows XP; hardware dying</td><td><b>Legacy OS / app support</b></td></tr>
<tr><td>Mac user must run one Windows-only program</td><td><b>Cross-platform</b> application virtualization</td></tr>
<tr><td>QA needs Win10, Win11, and three Linux distros on one PC</td><td><b>Test / development</b> (client hypervisor)</td></tr>
</table>

<h2>Virtual network modes</h2>
<table>
<tr><th>Mode</th><th>What the VM gets</th><th>When to use</th></tr>
<tr><td><b>Bridged</b></td><td>Own LAN IP via DHCP — peer on the physical network</td><td>VM needs to be reachable like a real PC</td></tr>
<tr><td><b>NAT</b></td><td>Shares the host's IP; outbound easy, inbound harder</td><td>Default workstation VMs; good everyday isolation</td></tr>
<tr><td><b>Host-only</b></td><td>Talks only to the host (private virtual switch)</td><td>Labs, malware analysis without internet</td></tr>
<tr><td><b>No networking</b></td><td>Fully air-gapped guest</td><td>Highest isolation for detonation / unpatched legacy OS</td></tr>
</table>

<h2>Snapshots and virtual disks</h2>
<ul>
<li>A guest's "hard drive" is a <b>file</b> on the host (VDI/VMDK/VHDX) — easy to copy, move, and back up.</li>
<li>A <b>snapshot</b> freezes VM state (disk + often memory). Revert = discard every change since the snapshot — why sandboxes are disposable.</li>
<li>Take a clean snapshot <b>before</b> risky tests; revert after. Do not treat snapshots as a full backup strategy for production data.</li>
</ul>

<h2>Client VM prep checklist</h2>
<ol>
<li>Confirm CPU supports <b>VT-x / AMD-V</b> and enable it in BIOS/UEFI.</li>
<li>Size <b>RAM</b> so host + all concurrent guests fit (RAM is usually the first bottleneck).</li>
<li>Allocate fast <b>SSD</b> space for virtual disks.</li>
<li>Choose network mode for the purpose (bridged / NAT / host-only / none).</li>
<li>Install guest OS → patches, AV, firewall like a real PC.</li>
<li>For malware/legacy: disable shared folders/clipboard; isolate networking.</li>
</ol>

<div class="keyfact"><b>Type 1 vs Type 2:</b> technician laptop VirtualBox/Workstation = Type 2 (hosted). ESXi / bare-metal Hyper-V farm = Type 1. Client-side exam scenarios almost always mean Type 2.</div>
<div class="keyfact"><b>Sprawl vs escape:</b> forgotten unpatched VMs everywhere = <b>sprawl</b> (governance/inventory). Malware breaks out of guest into host = <b>escape</b> (patch the hypervisor).</div>
`,
quiz:[
{q:"A security analyst wants to open a suspicious email attachment somewhere it can do no harm, then discard the environment. What should they use?", o:["A Docker registry","A sandboxed virtual machine restored from a snapshot afterwards","Safe Mode on their main PC","A second user account"], a:1, e:"An isolated VM sandbox contains any damage; reverting to a clean snapshot erases it. This is the canonical sandbox scenario."},
{q:"Accounting depends on an application that only runs on Windows XP. The old hardware is dying. What is the standard solution?", o:["Rewrite the application","Run XP and the app inside a VM on modern hardware, isolated from the network","Install XP directly on a new laptop","Emulate XP with compatibility mode and hope"], a:1, e:"Legacy OS/application support is a core virtualization purpose — the ancient environment lives on as a guest VM, ideally network-isolated since XP is unpatchable."},
{q:"A Mac user must run one Windows-only application. Which virtualization purpose does this represent?", o:["Sandboxing","Test development","Cross-platform application virtualization","VDI"], a:2, e:"Running software built for a different OS via a guest VM on the host is cross-platform virtualization — Windows in a VM on macOS."},
{q:"A user installs a hypervisor but VMs refuse to start, reporting hardware virtualization is not available. The CPU supports VT-x. What is the fix?", o:["Add more RAM","Enable virtualization extensions in BIOS/UEFI","Reinstall the OS","Use 32-bit guests only"], a:1, e:"VT-x/AMD-V is frequently disabled by default in firmware. Enable it and the hypervisor can create hardware-accelerated VMs."},
{q:"Which resource is typically exhausted FIRST when running several VMs on a workstation?", o:["Disk capacity","Physical RAM","Network bandwidth","USB ports"], a:1, e:"Every running VM reserves real RAM for its guest OS; a handful of VMs can consume a workstation's memory long before disk or network limits bite."},
{q:"Which networking mode makes a VM appear on the physical LAN as its own device with its own DHCP-assigned address?", o:["NAT","Host-only","Bridged","Loopback"], a:2, e:"Bridged mode connects the virtual NIC straight onto the physical network. NAT hides the VM behind the host's address; host-only isolates it with the host."},
{q:"Why do virtual machines still require antivirus and OS patching?", o:["They don't; the hypervisor protects them","Each VM is a complete, independently attackable operating system","Only Linux guests need patching","Snapshots make malware impossible"], a:1, e:"A VM is a full computer on the network — every guest needs the same hardening, patching, and endpoint protection as physical machines."},
{q:"Malware breaking out of a guest VM to compromise the host or hypervisor is called what?", o:["VM sprawl","VM escape","Side-loading","Sandboxing"], a:1, e:"VM escape is the isolation-breaking attack class — rare but severe, mitigated by keeping hypervisors patched."},
{q:"Over two years a department has created dozens of VMs nobody tracks; several run unpatched and forgotten. What is this problem called?", o:["VM escape","Resource ballooning","VM sprawl","Elastic drift"], a:2, e:"VM sprawl is unmanaged VM proliferation — each forgotten guest is an unpatched attack surface. The cure is inventory and lifecycle management."},
{q:"When detonating suspected malware inside a sandbox VM, which precautions are appropriate?", o:["Bridged networking and shared folders for easy analysis","Host-only/no networking and disabled shared folders/clipboard","Maximum RAM allocation","Running the VM as the host administrator"], a:1, e:"Isolation is the point: cut the guest off from the network and disable host-integration channels so the sample can't spread or exfiltrate."}
]
}
]
,mock:[
{q:"A startup wants to run its custom web application without managing servers OR operating systems, but still deploy its own code. Which service model fits?", o:["IaaS","PaaS","SaaS","On-prem VDI"], a:1, e:"Own code + no infrastructure/OS management = PaaS. IaaS would mean managing the OS; SaaS means using someone else's finished app."},
{q:"Which list is ordered from MOST customer control to LEAST?", o:["SaaS, PaaS, IaaS","IaaS, PaaS, SaaS","PaaS, IaaS, SaaS","SaaS, IaaS, PaaS"], a:1, e:"IaaS gives control from the OS up; PaaS surrenders the platform; SaaS surrenders everything but the app's settings."},
{q:"A firm's regulators require certain data never leave infrastructure dedicated solely to the firm, but general workloads can run on AWS. What architecture satisfies this?", o:["Public cloud only","Hybrid cloud (private + public)","Community cloud only","SaaS everywhere"], a:1, e:"Sensitive workloads stay on private/dedicated infrastructure while everything else uses public cloud — the hybrid model."},
{q:"Monthly cloud bills rise and fall with actual compute hours and storage consumed. Which characteristic is this?", o:["High availability","Rapid elasticity","Metered utilization","Resource pooling"], a:2, e:"Pay-for-what-you-use billing is metered utilization. Elasticity is the scaling itself; metering is how it's charged."},
{q:"What is the key difference between rapid elasticity and simply buying a bigger server?", o:["Elasticity only scales storage","Elastic capacity grows AND shrinks automatically with demand; a bigger server is fixed capacity","There is no difference","Elasticity requires VDI"], a:1, e:"Elasticity is dynamic in both directions — resources expand for peaks and release afterwards, so you don't pay for idle capacity."},
{q:"A call centre issues thin clients that connect to Windows desktops running in Microsoft's cloud. Which TWO terms describe this?", o:["On-prem VDI / IaaS","Cloud-hosted VDI / DaaS","SaaS / community cloud","Sandbox / PaaS"], a:1, e:"Desktops as VMs hosted by a cloud provider = cloud VDI, sold as Desktop as a Service (e.g. Azure Virtual Desktop, Windows 365)."},
{q:"Which is a security ADVANTAGE of VDI for a company handling sensitive records?", o:["Endpoints store all data locally for speed","Data remains in the datacentre; a lost thin client holds nothing","VDI removes the need for authentication","Desktops cannot be patched centrally"], a:1, e:"With VDI the desktop and its data live centrally — endpoint loss or theft exposes nothing, and patching happens in one place."},
{q:"What is the main operational risk of VDI that a traditional laptop fleet doesn't share?", o:["Higher per-device theft impact","Total dependence on network connectivity to the datacentre","Inability to run Windows","No central management"], a:1, e:"If connectivity or the central infrastructure fails, every user's desktop is unreachable — the availability trade-off of centralisation."},
{q:"Which scenario BEST matches the 'shared resources' cloud characteristic?", o:["One VM per physical server","Many tenants' workloads pooled across the provider's hardware","A dedicated leased line","RAID mirroring"], a:1, e:"Cloud economics rest on multi-tenant resource pooling — many customers sharing the same underlying hardware efficiently."},
{q:"A QA engineer must verify an installer on Windows 10 and 11 and three Linux distributions using one workstation. What makes this practical?", o:["Dual-booting five OSes","Running each OS as a VM under a client hypervisor, using snapshots","Buying five PCs","Windows compatibility mode"], a:1, e:"Client-side virtualization runs all test targets side-by-side; snapshots reset each environment between test runs — the test/development purpose."},
{q:"Before promising a user their PC can host VMs, which THREE resources should the technician size-check?", o:["GPU, sound card, optical drive","CPU virtualization support, RAM, and disk space/speed","PSU wattage, case fans, RGB","Monitor resolution, USB count, NIC brand"], a:1, e:"VMs need firmware-enabled VT-x/AMD-V, enough physical RAM for each guest, and substantial fast storage for virtual disks."},
{q:"A VM configured with NAT networking differs from bridged mode how?", o:["NAT gives the VM its own LAN IP","NAT shares the host's IP; the VM is hidden behind it, while bridged puts the VM on the LAN directly","NAT disables internet access","Bridged mode works only offline"], a:1, e:"NAT translates the guest's traffic through the host's address (good isolation/default); bridged attaches the guest to the physical network as a peer device."},
{q:"An admin discovers 40 VMs across the company, half unknown to IT and unpatched. Which term and which fix apply?", o:["VM escape; patch the hypervisor","VM sprawl; implement VM inventory and lifecycle management","Elasticity; enable autoscaling","Sandboxing; add snapshots"], a:1, e:"Uncontrolled VM proliferation is sprawl; the remedy is governance — inventory, ownership, patching, and decommissioning processes."},
{q:"Why should the hypervisor itself be kept patched?", o:["To improve guest graphics","To defend against VM escape attacks that break guest isolation","To reduce licensing costs","Hypervisors cannot be patched"], a:1, e:"The hypervisor is the isolation boundary; vulnerabilities in it are what VM escape exploits target."},
{q:"A company's private cloud is BEST described as which of the following?", o:["Any server room with VMs","Cloud-style pooled, self-service, elastic infrastructure dedicated to one organisation","AWS with strong passwords","A community datacentre"], a:1, e:"Private cloud isn't just virtualization — it's cloud characteristics (pooling, elasticity, self-service) delivered on single-organisation infrastructure."},
{q:"Which example is SaaS rather than PaaS?", o:["A managed Kubernetes platform for deploying containers","Salesforce CRM used through a browser","Azure App Service hosting your code","A rented bare VM"], a:1, e:"Salesforce is a finished application consumed as-is — SaaS. Platforms you deploy your own code onto are PaaS; bare VMs are IaaS."},
{q:"During a malware investigation, the analyst reverts the sandbox VM to a snapshot taken before detonation. What does this achieve?", o:["It patches the guest","It returns the VM to its exact pre-infection state, discarding all changes","It exports the malware to the host","It doubles the VM's RAM"], a:1, e:"Snapshots capture full VM state; reverting rolls every change back — the mechanism that makes sandboxes disposable."},
{q:"A legacy XP VM must keep running a critical app. Which additional precaution is MOST important?", o:["Bridged networking for easy access","Isolating the VM from the network as XP receives no security patches","Giving it maximum vCPUs","Enabling clipboard sharing"], a:1, e:"An unpatchable OS is a standing vulnerability; network isolation (host-only/none, or heavy segmentation) contains the risk while the app lives on."},
{q:"Which statement about client hypervisors like VirtualBox or VMware Workstation is TRUE?", o:["They replace the host OS entirely","They run as applications on a host OS and manage guest VMs","They only run Linux guests","They require a server licence"], a:1, e:"Client-side (type 2) hypervisors install as applications on the workstation's OS. Bare-metal (type 1) hypervisors replace the host OS on servers."},
{q:"A cloud provider spreading a customer's service across multiple independent datacentre zones is delivering which characteristic?", o:["Metered utilization","High availability","File synchronization","Sprawl"], a:1, e:"Redundancy across failure zones keeps the service running through outages — high availability."},
{q:"Ten VMs each allocated 4 GB RAM run on a host with 32 GB physical memory. Users report severe slowdowns. What is happening?", o:["VM escape","Memory overcommitment forcing heavy paging","Sprawl","NAT exhaustion"], a:1, e:"40 GB of allocations against 32 GB of physical RAM means the host pages memory to disk under load — the overcommitment penalty."},
{q:"Which purpose of client-side virtualization does 'testing a Windows patch on a copy of the standard desktop image before company-wide rollout' represent?", o:["Sandbox for malware","Test development","Cross-platform support","Legacy OS support"], a:1, e:"Trialling changes in a disposable replica environment before production deployment is the test/development use case."},
{q:"What is a virtual machine's hard drive on the host system?", o:["A hidden partition","A file (virtual disk image) on the host's storage","A RAM disk","A network share by requirement"], a:1, e:"Guest disks are container files (VDI/VMDK/VHDX) on host storage — which is why VMs are easy to copy, move, and snapshot."},
{q:"An organisation evaluating public cloud worries about sharing hardware with unknown tenants. Which deployment model directly addresses this while retaining cloud benefits?", o:["Community cloud","Private cloud","SaaS","Bridged networking"], a:1, e:"Private cloud delivers pooling/elasticity/self-service on infrastructure dedicated to the one organisation — eliminating multi-tenant neighbours."},
{q:"Which pairing of purpose to example is CORRECT?", o:["Sandbox — running Windows apps on macOS","Legacy support — detonating ransomware samples","Cross-platform — running a Windows-only tool in a VM on Linux","Test development — hiding VMs from IT inventory"], a:2, e:"Cross-platform virtualization is running another OS's software via a guest VM. Sandboxing is isolation for risky content; legacy support keeps old OS/apps alive; the last option is just sprawl."}
]
},
{
core:"core1", id:"c1d5", num:"5.0", name:"Hardware & Network Troubleshooting", weight:28,
blurb:"The methodology plus symptom-to-cause mapping for power/boards, storage, displays, mobile devices, printers, and networks. The biggest Core 1 domain.",
subs:[
/* ---------------- 5.1 ---------------- */
{
id:"5.1", name:"Given a scenario, apply the best-practice troubleshooting methodology",
notes:`
<h2>The six steps — MEMORISE IN ORDER</h2>
<table>
<tr><th>#</th><th>Step</th><th>Includes</th></tr>
<tr><td>1</td><td><b>Identify the problem</b></td><td>Gather information from the user; ask what changed (environmental/infrastructure changes); <b>back up data before making changes</b>; review logs</td></tr>
<tr><td>2</td><td><b>Establish a theory of probable cause</b></td><td>Question the obvious first; research symptoms internally/externally if needed</td></tr>
<tr><td>3</td><td><b>Test the theory</b></td><td>Theory confirmed → next step. Not confirmed → new theory, or <b>escalate</b></td></tr>
<tr><td>4</td><td><b>Establish a plan of action</b> and implement the solution</td><td>Refer to vendor instructions; schedule to minimise disruption</td></tr>
<tr><td>5</td><td><b>Verify full system functionality</b></td><td>And implement <b>preventive measures</b> so it doesn't recur</td></tr>
<tr><td>6</td><td><b>Document</b> findings, actions, and outcomes</td><td>Lessons learned, knowledge base</td></tr>
</table>
<div class="callout"><b>Exam angles:</b> the questions test the seams. "User reports X — what do you do FIRST?" → identify/gather info, ask what changed. "You suspect Y — what NEXT?" → test the theory. "Theory disproved and you're out of ideas" → escalate (that's still step 3). "Fix applied — what before closing?" → verify functionality + preventive measures, THEN document. Also: <b>always consider corporate policies and procedures before implementing changes</b>.</div>

<h2>FIRST vs NEXT — how CompTIA words it</h2>
<table>
<tr><th>Question wording</th><th>Methodology step</th><th>Typical action</th></tr>
<tr><td>"What should you do <b>FIRST</b>?"</td><td>1 — Identify</td><td>Question the user, ask what changed, gather symptoms, back up data</td></tr>
<tr><td>"What is the <b>MOST likely cause</b>?"</td><td>2 — Theory</td><td>Form probable cause — question the obvious (cable, power, Fn key)</td></tr>
<tr><td>"What should you do <b>NEXT</b>?"</td><td>3 — Test theory</td><td>Swap cable, ping gateway, run diagnostic — least invasive test</td></tr>
<tr><td>"Theory failed — now what?"</td><td>3 — Escalate or new theory</td><td>Try another theory or hand off to senior/vendor</td></tr>
<tr><td>"Before closing the ticket?"</td><td>5 then 6</td><td>Verify full functionality, preventive measures, then document</td></tr>
</table>

<h2>Escalation — when to stop guessing</h2>
<ul>
<li>Escalation is <b>not failure</b> — it's step 3 when you've exhausted your theories or need access you don't have.</li>
<li>Escalate with <b>full progress notes</b>: symptoms, what's been tried, results. The next tier should not start from zero.</li>
<li>Vendor support, security team, or a specialist engineer are all valid escalation paths.</li>
</ul>

<h2>Change control and corporate policy</h2>
<ul>
<li>Even a correct technical fix can be wrong if it bypasses <b>change management</b> — maintenance windows, approvals, rollback plans.</li>
<li>Read the <b>vendor documentation</b> before applying firmware, BIOS, or driver updates (step 4).</li>
<li><b>Document</b> every ticket with description → progress → resolution so the knowledge base grows.</li>
</ul>

<h2>Scenario pick-list — match the wording to the step</h2>
<table>
<tr><th>Scenario cue</th><th>Step</th><th>Do this</th></tr>
<tr><td>"PC won't start — where do you begin?"</td><td>1 Identify</td><td>Ask what changed; check power/lights; back up if changes follow</td></tr>
<tr><td>"After questioning, you suspect bad RAM"</td><td>2 Theory</td><td>Form the theory — then plan the least invasive test</td></tr>
<tr><td>"You suspect the cable — what NEXT?"</td><td>3 Test</td><td>Swap known-good cable / run diagnostic</td></tr>
<tr><td>"Theory was wrong; no other ideas"</td><td>3 Escalate</td><td>Hand off with notes of what was tried</td></tr>
<tr><td>"Confirmed PSU — server reboot needed"</td><td>4 Plan</td><td>Schedule maintenance window; have spare PSU ready</td></tr>
<tr><td>"Fix worked for the reported app"</td><td>5 Verify</td><td>Test full system + add preventive step (alerts, cleaning)</td></tr>
<tr><td>"Ticket ready to close"</td><td>6 Document</td><td>Write findings, actions, outcome for the KB</td></tr>
</table>

<div class="keyfact"><b>Distractor trap:</b> answers that jump straight to reimaging, replacing hardware, or documenting — before identify/test — are almost always wrong when the question says FIRST or NEXT.</div>
<div class="keyfact"><b>28% of Core 1</b> is troubleshooting — nearly every scenario question maps to this methodology. Learn the six steps in order, then drill FIRST vs NEXT wording.</div>
`,
quiz:[
{q:"A user reports their PC 'stopped working'. According to the methodology, what should the technician do FIRST?", o:["Reimage the machine","Identify the problem — question the user and ask what has changed","Establish a plan of action","Document the issue"], a:1, e:"Step 1 is identifying the problem: gather information, ask about recent changes, review symptoms. Everything else follows from that."},
