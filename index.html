{msg:"PC only fails during games, temps fine. Which is best suspect?",o:["The monitor's feelings","Insufficient or failing PSU under load","Faulty GPU thermal paste under idle load","Corrupted system files in the OS partition"],a:1,e:"Load-only shutdowns with normal temps point to PSU sag — GPUs spike wattage.",react:"Which is best? The power supply. It's always something."},
{msg:"Which is best backup strategy for exam-critical notes?",o:["One USB stick in a puddle","3-2-1 rule: three copies, two media, one off-site","Cloud sync with no second local copy","Email yourself each file once"],a:1,e:"3-2-1 protects against device loss, corruption, and site disasters — operational procedures gold.",react:"Which is best? You! Tea?"}
]},
{id:"fieri", emoji:"🔥", name:"Guy Fieri", title:"Flavortown POS Meltdown", tagline:"The kitchen tickets stopped printing and the register's hotter than a turbo burner.",
opening:"Welcome to Flavortown IT, baby! My point-of-sale is down, the kitchen printer's spewing nonsense, and we're slammin' lunch rush. Help me get this rig back on triple-D duty!",
steps:[
{msg:"Kitchen printer shows 'cannot connect' but ping works. FIRST check?",o:["Replace the deep fryer","Verify correct IP/port; restart print spooler/service","Delete all menu items","Swap the printer cable for a longer patch lead"],a:1,e:"Network printers need the right address/port and a healthy spooler — ping alone doesn't mean printing works.",react:"That's the flavor! Tickets are rollin' again."},
{msg:"POS terminal has 169.254.x.x address. What's wrong?",o:["Static IP misconfigured on the terminal","DHCP failed — APIPA self-assigned address","The default gateway is offline","Needs more donkey sauce"],a:1,e:"169.254.x.x means DHCP didn't assign an address — check DHCP server, scope, and cable.",react:"DHCP's back! We're servin' connectivity hot and fresh."},
{msg:"Grease and steam killed a wall port. Best long-term fix?",o:["Duct tape and dreams","Sealed industrial jack / relocate port away from heat & moisture","Wireless everything with no password","Install another consumer jack in the same wet location"],a:1,e:"Harsh environments need protected cabling and placement — moisture and heat destroy copper contacts.",react:"Out of this world! Ports are protected like a champion burger station."},
{msg:"Credit card reader needs TLS but clock was wrong. Why did payments fail?",o:["Banks hate flavor","Certificate validation fails when system time is wrong","Expired TLS certificate on the payment gateway","Firewall blocking outbound HTTPS"],a:1,e:"TLS certificates are time-sensitive — accurate NTP/time sync is required for payment systems.",react:"Time sync locked in! Money moves smoother than a molten cheese pull."},
{msg:"Closing time backup for today's sales — which type runs fastest after a full weekend backup?",o:["Full only every night","Incremental since last backup of any type","Delete the database","Screenshot the screen"],a:1,e:"Incrementals capture only changes since the last backup — quick for nightly POS closes after a full.",react:"You saved Flavortown IT, baby! This rig's certified money!"}
]},
{
id:"cleopatra", emoji:"👑", name:"Cleopatra", title:"Wi-Fi on the Nile", tagline:"The Queen of Egypt demands flawless wireless coverage across her palace. Fail her at your peril.",
opening:"Attend me, technician. My royal barge streams poorly, my throne room drops connection, and my advisors whisper that the fault is YOURS. You have until sunset to restore my network — or explain yourself to the crocodiles.",
steps:[
{msg:"My devices in the throne room show full signal but the address begins 169.254. The scribes call it 'self-assigned'. What has gone wrong?",o:["Wrong Wi-Fi password on the client","The DHCP server is unreachable, so devices fell back to APIPA","Your Majesty's devices are cursed","DNS server misconfigured on the VLAN"],a:1,e:"A 169.254.x.x address is APIPA — the device connected to Wi-Fi but never got a lease from DHCP. Signal strength is fine; the problem is upstream at the DHCP service, VLAN, or uplink.",react:"So my devices connect to the air but the air leads nowhere. Poetic. My steward has 'restarted the magic box' and DHCP breathes again. But the west wing remains a wasteland of buffering. Proceed."},
{msg:"The west wing is 40 cubits of stone from the access point. My streaming stutters like a nervous courtier. What is the PROPER remedy?",o:["Command the walls to be thinner","Turn the transmit power to maximum and hope","Add another access point or a mesh node to extend coverage","Switch everyone to WEP for speed"],a:2,e:"Thick masonry attenuates Wi-Fi badly. The correct fix for a coverage gap is additional access points or mesh nodes placed for overlap — not blasting power (which creates asymmetric links) and certainly not WEP, which is broken and deprecated.",react:"Another access point has been installed beside the statue of Anubis. He does not object. Yet now my advisors quarrel: the old palace uses the 2.4 GHz band and it is as crowded as a Alexandria market."},
{msg:"Every neighbouring villa broadcasts on 2.4 GHz. Interference everywhere. Which decree shall I issue?",o:["Move capable devices to 5 GHz and pick a non-overlapping 2.4 GHz channel (1, 6 or 11) for the rest","Ban the neighbours from owning routers","Hide the SSID so interference cannot find it","Reduce the DHCP lease time to one hour"],a:0,e:"5 GHz offers many more channels and less congestion; for legacy 2.4 GHz devices, use channels 1, 6 or 11 as they don't overlap. Hiding an SSID does nothing about RF interference, and lease times are unrelated.",react:"It is done. My decree is law and my throughput is glorious. But treachery! A courtier reports a SECOND network bearing my palace's name, demanding passwords from my handmaidens."},
{msg:"An impostor network mimics my SSID and harvests credentials. What is this villainy called, and how do I protect my court?",o:["A honeypot — leave it as a gift","An evil twin attack — train users to verify the network and use certificate-based authentication","A DDoS — increase bandwidth","Bluejacking — disable Bluetooth"],a:1,e:"A rogue AP spoofing a legitimate SSID is an evil twin. Defences include user awareness, WPA3/Enterprise with certificate validation, and wireless intrusion detection. It's not Bluetooth-related and it's not yours, so it's no honeypot.",react:"The impostor's device has been located and its owner is enjoying an extended audience with my guards. One final matter, technician, and your service shall be legend."},
{msg:"I wish my palace network secured for eternity. Which wireless security shall bear my royal seal?",o:["WEP, for tradition","Open network, for hospitality","WPA3 with a strong passphrase, and WPA2 only as legacy fallback","MAC filtering alone, for exclusivity"],a:2,e:"WPA3 is the current strongest standard (SAE handshake resists offline cracking). WEP is trivially broken, open networks expose everything, and MAC filtering is easily spoofed — fine as a layer, useless alone.",react:"WPA3 it is — a cipher worthy of a queen. You have served Egypt well, technician. The crocodiles shall go hungry today. 👑"}
]},
{
id:"sherlock", emoji:"🕵️", name:"Sherlock Holmes", title:"The Case of the Silent Workstation", tagline:"A dead PC at 221B. Watson suspects ghosts. Holmes suspects you know better.",
opening:"Ah, the consulting technician arrives. Watson's workstation has expired — no lights, no fans, nothing. Watson blames a spectre. I blame imprecise thinking. Let us apply method to this mystery, shall we? The game is afoot.",
steps:[
{msg:"Before we theorise wildly like Scotland Yard, what does proper methodology demand we do FIRST?",o:["Replace the motherboard — dramatic and decisive","Identify the problem: question the user and establish what changed","Reinstall the operating system","Declare the case unsolvable"],a:1,e:"Step one of the CompTIA troubleshooting methodology is identifying the problem — gather information, question the user, determine recent changes. Theories of probable cause come second, never first.",react:"Precisely! I questioned Watson and observe: a storm last night, and Mrs Hudson 'tidied' the cables. Two suspects already. You see, but do you observe?"},
{msg:"No lights whatsoever when the power button is pressed. Applying deduction, which should we eliminate FIRST — the simplest explanation?",o:["A failed CPU","Corrupted Windows registry","Power: wall socket, cable seated, PSU switch set to on ('1')","A virus that consumes electricity"],a:2,e:"Completely dead means check the power path first — outlet, kettle lead fully seated, PSU rocker switch. It's the least invasive check and the most common culprit. Software cannot prevent a PSU from receiving mains power.",react:"The PSU switch was flicked to '0' — Mrs Hudson's duster strikes again. Yet the plot thickens: it powers on now but emits three beeps and shows nothing on the screen. Elementary? We shall see."},
{msg:"Three beeps, no display. What are these audible clues, Watson— I mean, technician?",o:["The PC applauding our progress","POST beep codes indicating a hardware fault, commonly memory","The hard drive spinning up","A Windows notification sound"],a:1,e:"Beep codes are emitted by BIOS/UEFI during POST when hardware fails self-test — patterns map to faults, and three beeps commonly indicates RAM. The OS hasn't loaded, so it cannot be a Windows sound.",react:"Memory! The storm, the tidying — or perhaps merely a module unseated by Watson's habit of thumping the desk when he loses at cards. I have reseated the RAM. It boots! But observe the clock: it reads 1st January 2010."},
{msg:"The system clock resets to a date in the distant past on every cold boot. What does this singular clue indicate?",o:["Time travel, obviously","The CMOS battery is dead and needs replacing","The BIOS has been hacked","Windows requires activation"],a:1,e:"The CMOS battery (typically a CR2032) maintains the RTC and firmware settings when powered off. When it dies, the clock and BIOS settings reset each boot. A £2 part and a classic exam question.",react:"A three-pound coin cell — the least glamorous villain of my career. Replaced. Now, the final thread: Watson insists this must never happen again. Prevention, technician. Deduce."},
{msg:"The storm may have contributed. What SHOULD protect Watson's workstation from power events henceforth?",o:["A longer extension lead","A UPS with surge protection for graceful shutdown during outages","Install a basic surge strip with no battery backup","Prayer"],a:1,e:"A UPS provides battery runtime for a clean shutdown plus surge suppression; a basic surge strip protects against spikes but not outages. For a workstation with important data, the UPS is the complete answer.",react:"A UPS is ordered, the case is closed, and Watson's ghost theory is filed under 'H' for Humbug. You have the makings of a fine detective, technician. Elementary. 🕵️"}
]},
{
id:"bobross", emoji:"🎨", name:"Bob Ross", title:"Happy Little Processes", tagline:"There are no computer problems, just happy little accidents. Let's fix his slow PC together.",
opening:"Well hey there, friend. So glad you could join me today. My little computer here has gotten a bit slow — takes about five minutes to start up. And that's okay. We don't make mistakes, we just have happy accidents. Let's see if we can bring some life back into this old canvas, shall we?",
steps:[
{msg:"She takes forever to boot, and once she's up, everything moves like molasses. Where do you think we should look first, friend?",o:["Just paint over the screen with a fresh coat","Check Task Manager's Startup tab and disable unnecessary startup programs","Buy a whole new computer right away","Reinstall Windows without reviewing startup programs"],a:1,e:"Slow boots are most often caused by too many startup programs. Task Manager's Startup tab shows each item's impact and lets you disable them safely. Deleting System32 destroys Windows — never a happy accident.",react:"Would you look at that — thirty little programs all waking up at once, bless their hearts. We'll let a few of them rest. Now she boots quicker, but she still gets awful tired when I open my photo editor."},
{msg:"Task Manager says my memory sits at 95% with just a browser and my paint program open. This old friend has 4GB of RAM. What do you reckon?",o:["Upgrade to a faster CPU instead","The system is memory-starved — adding RAM would give the biggest improvement","Disable virtual memory paging","Memory fills up on purpose in winter"],a:1,e:"Sustained 90%+ memory usage under a normal workload means the system is paging to disk constantly, which feels slow everywhere. A RAM upgrade directly addresses the bottleneck — brightness has nothing to do with memory.",react:"We found her a nice pair of 8GB sticks — now she's got room to breathe, like a big open sky. But you know, when I open my pictures folder, that little drive light just blinks and blinks and grinds away."},
{msg:"She's still got her original spinning hard drive. It grinds and clicks a little when it works hard. What would you do, friend?",o:["Back up the data now, then clone to an SSD — clicking can mean the drive is failing","Oil the drive so it spins smoother","Run chkdsk and continue using the drive normally","Defragment it once an hour forever"],a:0,e:"Clicking or grinding from an HDD is a warning sign of mechanical failure — back up immediately. Migrating to an SSD both rescues the data situation and massively improves performance. Never open or lubricate a drive.",react:"We saved every last happy little photo, and this new SSD — my goodness, she boots in fifteen seconds now. But here's a funny thing: a big scary message popped up saying my computer has 47 viruses and I should call a phone number right away."},
{msg:"This pop-up says 'CALL NOW — 47 VIRUSES FOUND' with a phone number and everything. Should I give those nice folks a ring?",o:["Pay the fee they request to unlock the PC","No — it's a scareware scam. Close the browser, don't call, and run a scan with legitimate antivirus","Forward the pop-up screenshot to IT without closing it","Unplug the monitor so the message can't see you"],a:1,e:"Fake virus pop-ups with phone numbers are tech-support scareware — no real AV asks you to call. Close the browser (Task Manager if needed), clear notifications/extensions, and scan with your actual security software.",react:"Well, we sent those rascals packing, and the real scan came back clean as a fresh canvas. One last thing, friend — all my paintings live on this one computer, and that makes me a little nervous at night."},
{msg:"If this old machine ever has a truly unhappy accident, I'd lose thirty years of paintings. What's the wisest way to protect them?",o:["Copy files to a second partition on the same disk","Follow the 3-2-1 rule: three copies, two different media, one off-site","Email each painting to yourself","Trust the SSD, SSDs are immortal"],a:1,e:"The 3-2-1 backup rule is the exam-standard answer: 3 copies of data, on 2 different media types, with 1 stored off-site (e.g. cloud). No single drive — SSD or otherwise — is a backup strategy.",react:"Three copies, two kinds, one far away — that's a plan as sturdy as an old oak tree. Thank you, friend. From all of us here, happy computing, and God bless. 🎨"}
]},
{
id:"dracula", emoji:"🧛", name:"Count Dracula", title:"Backups at Midnight", tagline:"The Count runs his castle's IT strictly after dark. Tonight, something feeds on his files.",
opening:"Good evening. I am Dracula, and I do not drink... coffee. I administer my castle's servers exclusively by night, as nature intended. But tonight, children of the night, something is wrong. My files... they are being consumed. Enter freely, and lend me your expertise.",
steps:[
{msg:"My documents are renaming themselves with a strange extension, and a note demands payment in cryptocurrency to restore them. What horror stalks my castle network?",o:["A friendly file organiser","Ransomware encrypting your files","Moths in the server room","A Windows feature update"],a:1,e:"Mass file renaming plus a payment demand is the signature of ransomware actively encrypting data. It is not cosmetic and it will spread to anything writable — including network shares.",react:"Ransomware! An appetite even I find distasteful — it feeds without consent. The infected machine sits connected to my entire castle network. Speak quickly, mortal."},
{msg:"The infected server can still reach every share in the castle. What must I do FIRST, before anything else?",o:["Pay the ransom and hope for mercy","Run a quick scan while it keeps encrypting","Disconnect the machine from the network to contain the spread","Turn it off and on again"],a:2,e:"Containment comes first: isolate the machine (pull the cable / disable Wi-Fi) so encryption cannot reach shares and other hosts. Paying is discouraged and no guarantee; scanning while connected lets it keep spreading.",react:"The cable is pulled — the beast is caged. But my treasurer wails that the finance share is already encrypted. Fortunately, I am a creature of ancient habits, and one of those habits is backups."},
{msg:"I possess nightly backups. But which kind of backup captures ALL selected data every time it runs, at the cost of the most storage?",o:["Incremental","Differential","Full","Wishful"],a:2,e:"A full backup copies everything each run — simplest restore, largest storage. Incremental copies only changes since the last backup of any kind; differential copies changes since the last full. Know all three for the exam.",react:"Full backups, taken nightly at 3 a.m. — the witching hour has excellent I/O. My files shall rise from the grave, as is traditional in this castle. Yet I must know how this plague entered my domain."},
{msg:"My minion Igor admits he opened an email attachment titled 'Invoice_URGENT.exe' from an unknown sender. What lesson must my court learn?",o:["Never open unexpected attachments — this was a phishing email carrying a malicious payload","Only open attachments at midnight","Rename all attachments before opening them","Open the attachment inside a sandboxed browser tab"],a:0,e:"Unsolicited emails with urgent language and executable attachments are classic phishing delivery. User training — verify senders, distrust urgency, never run unexpected executables — is a core security control.",react:"Igor shall attend security awareness training for the next three centuries. Now, one final measure, so that no such parasite ever feasts here again. Advise me, and I shall be forever in your debt. Figuratively."},
{msg:"Beyond training and backups, which combination BEST hardens my castle against future ransomware?",o:["Disable all antivirus so it can't be corrupted","Keep systems patched, use reputable endpoint protection, apply least privilege, and test restores regularly","Air-gap every server with no off-site backups","Print all files onto parchment"],a:1,e:"Defence in depth: patching closes exploited vulnerabilities, endpoint protection detects payloads, least privilege limits what malware can touch, and a backup you haven't test-restored is only a theory.",react:"Patched, protected, privileged least, and restores rehearsed. You have saved my castle, mortal. I would offer you a drink, but... you wouldn't like what's in the cellar. Farewell! 🧛"}
]},
{
id:"ada", emoji:"💻", name:"Ada Lovelace", title:"The Analytical Engine Reboots", tagline:"The first programmer returns — and she has OPINIONS about your operating system.",
opening:"Good day. Ada Lovelace — I wrote the first algorithm a century before your 'computers' existed, so kindly spare me condescension. I have acquired a modern Windows machine to see what became of my legacy. I have questions, and I expect precise answers. Poetical science, but science nonetheless.",
steps:[
{msg:"I wish to converse with this machine directly, as I did with the Analytical Engine's punched cards. Which tools give me a command-line interface in Windows?",o:["Paint and WordPad","Command Prompt and PowerShell","The Recycle Bin","Control Panel's clock settings"],a:1,e:"Command Prompt (cmd) provides the classic shell; PowerShell is the more powerful object-based shell for scripting and administration. Both are core Core 2 tools — know their common commands.",react:"PowerShell — a shell of power. Babbage would have wept with joy. I have opened it. Now, I wish to see every file in this directory, including those the machine presumes to hide from me."},
{msg:"Which command lists the contents of the current directory in Windows — and, for my education, its equivalent on Linux?",o:["dir on Windows; ls on Linux","list on Windows; show on Linux","cat on both","format C: — I read it reveals everything"],a:0,e:"dir lists directory contents in Windows; ls is the Linux equivalent. And never run format on a whim — it erases the volume. The exam loves pairing Windows and Linux command equivalents.",react:"dir and ls, noted in my journal. And I shall pretend I did not see that 'format' suggestion — some jests age poorly across centuries. Now, this machine misbehaves: a program has frozen entirely and mocks my authority."},
{msg:"An application has ceased responding and will not close politely. How does one terminate a stubborn process from the command line?",o:["Ask it nicely in a text file","Use taskkill with the process ID or image name","Log off and log back in to refresh the session","Wait until it feels ready"],a:1,e:"taskkill /IM name.exe /F or taskkill /PID <id> /F force-terminates a process; Task Manager's End Task is the GUI equivalent. Cutting power to everything is never the proportionate response.",react:"Terminated with precision. I confess a certain satisfaction. Next: I am told my user account cannot install software, while another account — 'Administrator' — can. Explain this hierarchy to me."},
{msg:"Why should my everyday account be a STANDARD user rather than an administrator, when administrator is plainly more capable?",o:["Standard accounts run faster","The principle of least privilege — if my account is compromised, the damage is limited","Administrators receive security patches first","Standard users get better wallpapers"],a:1,e:"Least privilege means daily work happens with minimal rights, so malware or mistakes can't make system-wide changes. Elevation via UAC is requested only when genuinely needed. Core security doctrine.",react:"Elegant — power granted only at the moment of need, like a well-designed subroutine. One final inquiry. My machine demands to install 'updates' and restart. My instinct is to refuse anything that interrupts my work."},
{msg:"Should I defer these Windows updates indefinitely? Persuade me with reason, not nagging.",o:["Yes — defer all patches until the next hardware refresh cycle","No — updates deliver security patches for known vulnerabilities; schedule active hours so restarts don't interrupt work","Yes — a patched system is a suspicious system","Only install updates released on a Tuesday, discard the rest"],a:1,e:"Updates patch actively exploited vulnerabilities — deferring indefinitely leaves known holes open. The professional answer is timely patching managed sensibly (active hours, maintenance windows), not avoidance.",react:"Then patched it shall be, on a schedule of MY choosing — the machine serves the analyst, never the reverse. You have been a tolerable instructor. From the first programmer to the latest: carry on. 💻"}
]}
];
const MILLIONAIRE_POOL = {
  warmup: [
    {q:"Which port does HTTPS use by default?",o:["80","21","443","3389"],a:2,e:"HTTPS uses TCP 443. Port 80 is unencrypted HTTP, 21 is FTP, and 3389 is RDP.",domain:{core:"core1",num:"2.0"}},
    {q:"Which type of memory loses its contents when the computer is powered off?",o:["SSD","RAM","ROM","Flash storage"],a:1,e:"RAM is volatile — it needs power to hold data. SSDs, ROM and flash are non-volatile and keep data without power.",domain:{core:"core1",num:"3.0"}},
    {q:"What does an OLED display NOT require that an LCD does?",o:["A backlight","A digitiser","A GPU","A refresh rate"],a:0,e:"OLED pixels emit their own light, so no backlight is needed — that's why OLED blacks are true black. LCDs need a backlight layer.",domain:{core:"core1",num:"1.0"}},
    {q:"Which Windows file system supports file-level permissions and encryption?",o:["FAT32","exFAT","NTFS","CDFS"],a:2,e:"NTFS supports ACL permissions, EFS encryption, compression and journaling. FAT32 and exFAT have no file-level security.",domain:{core:"core2",num:"1.0"}},
    {q:"A user logs in with a password and a code from an authenticator app. What is this an example of?",o:["Single sign-on","Multifactor authentication","Least privilege","Password vaulting"],a:1,e:"Two different factors (something you know + something you have) is MFA. SSO is one login for many services — different concept.",domain:{core:"core2",num:"2.0"}},
    {q:"Accessing a fully hosted email application through a browser, with no software to install, is an example of which cloud model?",o:["IaaS","PaaS","SaaS","DaaS"],a:2,e:"SaaS delivers the complete application (e.g. Microsoft 365 webmail). IaaS gives you infrastructure, PaaS a development platform.",domain:{core:"core1",num:"4.0"}},
    {q:"An NVMe M.2 SSD communicates over which bus?",o:["SATA","PCIe","USB","IDE"],a:1,e:"NVMe runs over PCIe lanes, which is why it's far faster than SATA. M.2 is just the form factor — M.2 drives can be SATA or NVMe.",domain:{core:"core1",num:"3.0"}},
    {q:"What is the main purpose of an antistatic wrist strap?",o:["Protect the technician from electric shock","Prevent ESD damage to components","Ground the power supply","Reduce EMI on cables"],a:1,e:"The strap equalises potential between you and the equipment so electrostatic discharge doesn't fry components. It's for the hardware's safety, not yours.",domain:{core:"core2",num:"4.0"}},
    {q:"Which service automatically assigns IP addresses to devices on a network?",o:["DNS","DHCP","NAT","SMTP"],a:1,e:"DHCP hands out IP addresses, subnet masks, gateways and DNS servers. DNS resolves names to addresses — a common distractor pairing.",domain:{core:"core1",num:"2.0"}},
    {q:"Why would a technician boot Windows into Safe Mode?",o:["To speed up gaming performance","To load only essential drivers and services for troubleshooting","To reinstall the operating system","To update the BIOS"],a:1,e:"Safe Mode loads a minimal driver/service set, useful for isolating faulty drivers, startup items or malware. It's diagnostic, not a repair install.",domain:{core:"core2",num:"3.0"}},
    {q:"Which connector type is reversible and used for charging most modern Android phones?",o:["Micro-USB","USB-A","USB-C","Lightning"],a:2,e:"USB-C is reversible and now standard on Android (and post-2023 iPhones). Micro-USB is legacy and only inserts one way.",domain:{core:"core1",num:"1.0"}},
    {q:"An email pretending to be from a bank asks the user to click a link and confirm their password. What is this attack called?",o:["Phishing","Brute force","Denial of service","Zero-day"],a:0,e:"Phishing uses fraudulent messages to trick users into revealing credentials. Brute force guesses passwords; DoS floods services.",domain:{core:"core2",num:"2.0"}},
    {q:"A desktop powers on but gives repeating beeps and no display. What are the beeps most likely indicating?",o:["A POST error code","A Windows update","Low disk space","A network failure"],a:0,e:"Beep codes come from the BIOS/UEFI during POST and usually indicate hardware faults such as RAM or GPU. The OS hasn't even loaded yet.",domain:{core:"core1",num:"5.0"}},
    {q:"Which Windows tool lets you view running processes and end an unresponsive application?",o:["Device Manager","Task Manager","Disk Management","Event Viewer"],a:1,e:"Task Manager shows processes, performance and startup items, and can end tasks. Event Viewer shows logs; Device Manager handles drivers.",domain:{core:"core2",num:"1.0"}},
    {q:"What does SSID stand for in wireless networking?",o:["Secure System Identity Domain","Service Set Identifier","Standard Signal Interference Detector","Subnet Service ID"],a:1,e:"The SSID is the broadcast name of a wireless network. Hiding it is weak security-by-obscurity, another exam favourite.",domain:{core:"core1",num:"2.0"}},
    {q:"Which protocol is connection-oriented and guarantees delivery using a three-way handshake?",o:["TCP","UDP","ICMP","ARP"],a:0,e:"TCP establishes a connection and retransmits lost segments. UDP is connectionless; ICMP and ARP are not transport protocols for application data.",domain:{core:"core1",num:"2.0"}},
    {q:"What is the IPv4 loopback address used to test the local TCP/IP stack?",o:["127.0.0.1","169.254.0.1","10.0.0.1","255.255.255.0"],a:0,e:"127.0.0.1 always refers to the local host. 169.254.x.x is APIPA; 10.0.0.1 might be a gateway on a private LAN.",domain:{core:"core1",num:"2.0"}},
    {q:"What is the primary function of system firmware (BIOS/UEFI) during startup?",o:["Run user applications","Initialise hardware and locate a bootable device","Manage file permissions","Assign DHCP leases"],a:1,e:"Firmware performs POST, detects hardware, and hands off to a bootloader. DHCP and permissions are OS/service roles.",domain:{core:"core1",num:"3.0"}},
    {q:"What is the maximum recommended cable length for a single Cat 6 Ethernet run?",o:["55 meters","100 meters","185 meters","500 meters"],a:1,e:"Copper Ethernet segments are limited to 100 m per TIA/EIA standards. Fibre runs far longer — a common compare-and-contrast question.",domain:{core:"core1",num:"2.0"}},
    {q:"Which TCP port does SMTP use for mail transfer by default?",o:["110","143","25","587"],a:2,e:"SMTP traditionally uses port 25 (submission often 587). 110 is POP3; 143 is IMAP.",domain:{core:"core1",num:"2.0"}},
    {q:"Thermal paste is applied between which two components?",o:["RAM and motherboard","CPU and heat sink","GPU and monitor","PSU and case"],a:1,e:"Paste fills microscopic gaps to conduct heat from the CPU die to the cooler. RAM and PSUs do not use thermal paste in standard desktop builds.",domain:{core:"core1",num:"3.0"}},
    {q:"Bluetooth is best classified as which type of wireless technology?",o:["Personal area network (PAN)","Metropolitan area network (MAN)","Satellite WAN","Mesh backhaul only"],a:0,e:"Bluetooth is short-range PAN technology for peripherals. MAN and satellite are entirely different scales and use cases.",domain:{core:"core1",num:"1.0"}},
    {q:"A fingerprint scan for login is an example of which authentication factor?",o:["Something you know","Something you have","Something you are","Somewhere you are"],a:2,e:"Biometrics are 'something you are'. Passwords are knowledge; tokens are possession.",domain:{core:"core2",num:"2.0"}},
    {q:"A hypervisor that runs directly on bare metal without a host OS is called:",o:["Type 1","Type 2","Paravirtual only","Container runtime"],a:0,e:"Type 1 hypervisors (Hyper-V, ESXi) sit on hardware. Type 2 runs as an application on top of a conventional OS.",domain:{core:"core1",num:"4.0"}},
    {q:"Which RAID level mirrors data across two disks with no striping or parity?",o:["RAID 0","RAID 1","RAID 5","RAID 10"],a:1,e:"RAID 1 writes identical copies to two drives for redundancy. RAID 0 stripes with no fault tolerance; RAID 5 uses parity across three or more disks.",domain:{core:"core1",num:"3.0"}}

const gameSfx = {on:true, ctx:null};
function initGameAudio(){
  if(!gameSfx.ctx) gameSfx.ctx = new (window.AudioContext||window.webkitAudioContext)();
  if(gameSfx.ctx.state==="suspended") gameSfx.ctx.resume();
}
function playGameTone(freq, dur, type, vol){
  if(!gameSfx.on) return;
  try{
    initGameAudio();
    const ctx=gameSfx.ctx, t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||"sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.1,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+dur);
  }catch(e){}
}
function sfxMillionaire(kind){
  if(kind==="select") playGameTone(520,.06,"triangle",.08);
  else if(kind==="final"){ playGameTone(440,.08); setTimeout(()=>playGameTone(880,.22),90); }
  else if(kind==="correct"){ playGameTone(523,.12); setTimeout(()=>playGameTone(659,.12),100); setTimeout(()=>playGameTone(784,.2),200); }
  else if(kind==="wrong") playGameTone(140,.4,"sawtooth",.07);
  else if(kind==="lifeline") playGameTone(330,.05,"square",.06);
  else if(kind==="walk") playGameTone(392,.15);
  else if(kind==="win"){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playGameTone(f,.18),i*110)); }
}
function toggleGameSfx(){ gameSfx.on=!gameSfx.on; if(game?.type==="millionaire") renderGame(); }
function hostBanter(pool){ return pool[Math.floor(Math.random()*pool.length)]; }
function setHostMsg(msg){ if(game && game.type==="millionaire") game.hostMsg=msg; }
function renderMillionaireHost(){
  if(!game?.hostMsg) return "";
  return `<div class="millionaire-host"><div class="avatar">${MILLIONAIRE_HOST.emoji}</div><div><div class="name">${MILLIONAIRE_HOST.name}</div><div class="line">${esc(game.hostMsg)}</div></div></div>`;
}
function formatMillionairePrize(n){
  if(n>=1000000) return "900K pts";
  if(n>=1000) return (n/1000)+"K pts";
  return n+" pts";
}
function prepMillionaireQ(q){
  const opts = q.o.map((t,i)=>({t, correct:i===q.a}));
  return {q:q.q, opts:shuffle(opts), ex:q.e};
}
function pickMillionaireTier(pool, n){
  return shuffle(pool).slice(0, n).map(prepMillionaireQ);
}
function buildMillionaireGame(){
  const qs = [
    ...pickMillionaireTier(MILLIONAIRE_POOL.warmup, 5),
    ...pickMillionaireTier(MILLIONAIRE_POOL.mid, 5),
    ...pickMillionaireTier(MILLIONAIRE_POOL.high, 5)
  ];
  return {id:"millionaire", type:"millionaire", mode:"normal", phase:"play",
    qs, i:0, safePrize:0, finalPrize:0, done:false, lost:false, won:false, walked:false,
    answered:false, picked:null, pending:null, mistakes:0,
    hostMsg:hostBanter(MILLIONAIRE_HOST.question[0]),
    lifelines:{fifty:false, phone:false, audience:false},
    hidden:new Set(), phoneMsg:"", audiencePct:null};
}
function millionaireOffer(idx){ return idx>0 ? MILLIONAIRE_LADDER[idx-1] : 0; }
function millionaireLifeline(kind){
  if(!game || game.answered || game.done || game.type!=="millionaire") return;
  if(game.lifelines[kind]) return;
  const q = game.qs[game.i];
  const correctIdx = q.opts.findIndex(o=>o.correct);
  const wrongIdx = q.opts.map((o,i)=>i).filter(i=>i!==correctIdx);
  if(kind==="fifty"){
    shuffle(wrongIdx).slice(0,2).forEach(i=>game.hidden.add(i));
  } else if(kind==="phone"){
    const pick = Math.random()<0.75 ? correctIdx : wrongIdx[Math.floor(Math.random()*wrongIdx.length)];
    const who = MILLIONAIRE_FRIENDS[Math.floor(Math.random()*MILLIONAIRE_FRIENDS.length)];
    game.phoneMsg = `${who} says: "I'm fairly sure it's… ${q.opts[pick].t}"`;
  } else if(kind==="audience"){
    const pct = [0,0,0,0];
    let rem = 100;
    const correctPct = 38+Math.floor(Math.random()*32);
    pct[correctIdx] = correctPct;
    rem -= correctPct;
    const others = shuffle(wrongIdx.slice());
    others.forEach((idx,n)=>{
      const share = n===others.length-1 ? rem : Math.floor(rem/(others.length-n));
      pct[idx] = share;
      rem -= share;
    });
    game.audiencePct = pct;
  }
  game.lifelines[kind] = true;
  sfxMillionaire("lifeline");
  setHostMsg(hostBanter(MILLIONAIRE_HOST.lifeline[kind]));
  renderGame();
}
function millionaireWalk(){
  if(!game || game.answered || game.done || game.type!=="millionaire" || game.pending!=null) return;
  game.walked = true;

  game.finalPrize = millionaireOffer(game.i);
  setHostMsg(hostBanter(MILLIONAIRE_HOST.walk));
  sfxMillionaire("walk");
  recordScore(gameScoreKey("millionaire"), game.i, game.qs.length);
  renderGame();
}
function millionaireSelect(idx){
  if(!game || game.answered || game.done || game.type!=="millionaire" || game.hidden.has(idx)) return;

function buildPortGame(mode){

  const pairs = unique.slice(0, count);
  const left = shuffle(pairs.map(p=>({id:p.name, text:p.name, match:p.port, hint:p.hint, cat:p.cat})));
  const right = shuffle(pairs.map(p=>({id:p.port, text:p.port, match:p.name})));

}

  const right = shuffle(pairs.map(p=>({id:p.id, text:p.match, match:p.id})));

function rightKey(item){ return game.matchType==="port" ? item.text : item.id; }
function pairOk(leftItem, rightItem){
  return game.matchType==="port" ? leftItem.match===rightItem.text : leftItem.match===rightItem.id;
}
function gameTap(side, itemId){
  if(!game || game.done || game.phase!=="play" || game.type==="sequence" || game.type==="story") return;
  const getRight = (id)=> game.right.find(x=>x.text===id || x.id===id);
  const getLeft = (id)=> game.left.find(x=>x.id===id);
  const isDone = (s,id)=>{
    if(s==="left") return game.matched["L:"+id];
    const it = getRight(id); return it && game.matched["R:"+rightKey(it)];
  };
  if(isDone(side, itemId)) return;
  if(!game.selected){
    game.selected = {side, id:itemId};
    game.toast = "👆 Now tap the match…";
    game.toastKind = "";
    renderGame(); return;
  }
  if(game.selected.side===side){ game.selected = {side, id:itemId}; renderGame(); return; }
  const leftId = game.selected.side==="left" ? game.selected.id : itemId;
  const rightId = game.selected.side==="right" ? game.selected.id : itemId;
  const leftItem = getLeft(leftId);
  const rightItem = getRight(rightId);
  if(pairOk(leftItem, rightItem)){
    game.matched["L:"+leftItem.id] = true;
    game.matched["R:"+rightKey(rightItem)] = true;
    game.lines.push({left:leftItem.id, right:rightKey(rightItem)});
    if(game.matchType==="port" && leftItem.hint){
      game.toast = `🔌 ${leftItem.text} :${leftItem.match} — ${leftItem.hint}`;
    } else {
      game.toast = pickToast("good");
    }
    game.toastKind = "good";
    if(Object.keys(game.matched).length/2 >= game.pairs.length){
      game.done = true;
      recordScore(gameScoreKey(game.id, game.mode), game.pairs.length, game.pairs.length);
    }
  } else {
    game.mistakes++;
    if(game.matchType==="port"){
      game.toast = `${leftItem.text} → port ${leftItem.match}, not ${rightItem.text}`;
    } else {
      game.toast = pickToast("bad");
    }
    game.toastKind = "bad";
    game.flash = {left:leftId, right:rightId};
    setTimeout(()=>{ if(game && !game.done){ game.flash=null; renderGame(); } }, 450);
  }
  game.selected = null;
  renderGame();
}
function gameSeqTap(itemId){
  if(!game || game.done || game.type!=="sequence") return;
  if(game.matched[itemId]) return;
  if(itemId === String(game.next)){
    game.matched[itemId] = true;
    game.next++;
    game.toast = pickToast("seqGood");
    game.toastKind = "good";
    if(game.next >= game.total){
      game.done = true;
      recordScore(gameScoreKey(game.id, game.mode), game.total, game.total);
    }
  } else {
    game.mistakes++;
    game.toast = pickToast("seqBad");
    game.toastKind = "bad";
    game.flashSeq = itemId;
    setTimeout(()=>{ if(game && !game.done){ game.flashSeq=null; renderGame(); } }, 450);
  }
  renderGame();
}
function drawGameCables(){
  const svg = document.getElementById("gameCables");
  const board = document.getElementById("gameBoard");
  if(!svg || !board || !game || game.type!=="match") return;
  svg.innerHTML = "";
  const br = board.getBoundingClientRect();
  for(const ln of game.lines){
    const le = document.querySelector(`[data-game-id="L:${ln.left}"]`);
    const re = document.querySelector(`[data-game-id="R:${ln.right}"]`);
    if(!le || !re) continue;
    const lr = le.getBoundingClientRect(), rr = re.getBoundingClientRect();
    const x1 = lr.right - br.left, y1 = lr.top + lr.height/2 - br.top;
    const x2 = rr.left - br.left, y2 = rr.top + rr.height/2 - br.top;
    const mx = (x1+x2)/2;
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d", `M${x1} ${y1} C${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
    path.setAttribute("fill","none");
    path.setAttribute("stroke","var(--good)");
    path.setAttribute("stroke-width","4");
    svg.appendChild(path);
  }
}

        <div class="row"><button class="btn primary" onclick="storyNext()">${game.step>=game.story.steps.length-1?"Finish story":"Continue story →"}</button></div>`;
    }
    app.innerHTML = `<div class="game-scorebar"><span>${game.story.emoji} ${esc(game.story.name)}</span><span>Beat ${game.step+1} of ${game.story.steps.length}</span></div>
      <div class="story-chat">
        <div class="story-history" id="storyHistory">${bubbles}</div>
        ${picksHtml}
      </div>`;
    requestAnimationFrame(()=>{
      const el = document.getElementById("storyHistory");
      if(el) el.scrollTop = el.scrollHeight;
    });
    return;
  }
  if(game.type==="millionaire" && game.phase==="play"){
    const q = game.qs[game.i];
    const ladder = MILLIONAIRE_LADDER.map((amt,idx)=>{
      let cls = "run";
      if(MILLIONAIRE_SAFE_AT.includes(idx)) cls += " safe";
      if(idx===game.i) cls += " here";
      if(idx<game.i) cls += " done";
      return `<div class="${cls}"><span>Q${idx+1}</span><span>${formatMillionairePrize(amt)}</span></div>`;
    }).reverse().join("");
    const lifelineBtn = (id, label, used)=>`<button type="button" class="btn ${used?"used":""}" ${used?"disabled":""} onclick="millionaireLifeline('${id}')">${label}</button>`;
    const hints = [
      game.phoneMsg ? `<div class="millionaire-hint">📞 ${esc(game.phoneMsg)}</div>` : "",
      game.audiencePct ? `<div class="millionaire-audience">${q.opts.map((o,i)=>`<div class="bar-row"><span>${String.fromCharCode(65+i)}</span><div class="bar"><i style="width:${game.audiencePct[i]}%"></i></div><span>${game.audiencePct[i]}%</span></div>`).join("")}</div>` : ""
    ].join("");
    let optsHtml = q.opts.map((o,idx)=>{
      let cls = "opt";
      if(game.hidden.has(idx)) cls += " hidden-opt";
      if(game.pending===idx && !game.answered) cls += " pending";
      if(game.answered){
        if(o.correct) cls += " correct";
        else if(idx===game.picked) cls += " wrong";
      }
      const disabled = game.answered || (game.pending!=null && game.pending!==idx);
      return `<button type="button" class="${cls}" ${disabled?"disabled":""} onclick="millionaireSelect(${idx})">${String.fromCharCode(65+idx)}. ${esc(o.t)}</button>`;
    }).join("");
    let afterHtml = "";
    if(game.answered){
      const ok = q.opts[game.picked].correct;
      afterHtml = `<div class="explain"><b>${ok?"Correct!":"Not quite."}</b> ${esc(q.ex)}</div>`;
      if(ok && !game.done) afterHtml += `<div class="row"><button class="btn primary" onclick="millionaireNext()">Next question →</button></div>`;
    } else if(game.pending!=null){
      afterHtml = `<div class="millionaire-final-row">
        <button type="button" class="btn final" onclick="millionaireConfirm()">🔒 Final answer</button>
        <button type="button" class="btn" onclick="millionaireClearPending()">Change pick</button>
      </div>`;
    } else {
      afterHtml = `<div class="row" style="margin-top:4px"><button class="btn" onclick="millionaireWalk()">Walk away with ${formatMillionairePrize(millionaireOffer(game.i))}</button></div>`;
    }
    const sfxToggle = `<button type="button" class="millionaire-sfx-toggle btn" onclick="toggleGameSfx()">${gameSfx.on?"🔊 Sound on":"🔇 Sound off"}</button>`;
    app.innerHTML = `<div class="game-scorebar"><span>${meta.icon} Question ${game.i+1} of ${game.qs.length}</span><span>Safe: ${formatMillionairePrize(game.safePrize)} ${sfxToggle}</span></div>
      <div class="millionaire-prize">Playing for ${formatMillionairePrize(MILLIONAIRE_LADDER[game.i])}</div>
      ${renderMillionaireHost()}
      <div class="millionaire-wrap">
        <div>
          <div class="millionaire-lifelines">
            ${lifelineBtn("fifty","50:50",game.lifelines.fifty)}
            ${lifelineBtn("phone","📞 Phone",game.lifelines.phone)}
            ${lifelineBtn("audience","👥 Audience",game.lifelines.audience)}
          </div>
          ${hints}
          <div class="qtext">${esc(q.q)}</div>
          ${optsHtml}
          ${afterHtml}
        </div>
        <div class="millionaire-ladder">${ladder}</div>
      </div>`;
    return;
  }
  if(game.type==="sequence"){
    const items = game.items.map(item=>{
      let cls = "game-item";
      if(game.matched[item.id]) cls += " matched";
      else if(game.flashSeq===item.id) cls += " wrong-shake";
      const n = game.matched[item.id] ? `<span class="step-n">#${+item.id+1}</span>` : "";
      return `<button type="button" class="${cls}" onclick="gameSeqTap('${item.id}')" ${game.matched[item.id]?"disabled":""}>${n}${esc(item.text)}</button>`;
    }).join("");
    app.innerHTML = `<div class="game-scorebar"><span>${meta.icon} ${esc(game.scenario.name)}</span><span>Step ${game.next+1} of ${game.total}</span></div>
      <div class="game-toast ${game.toastKind}">${esc(game.toast||"Tap the FIRST step you would take…")}</div>
      <div class="game-board"><div class="game-seq">${items}</div></div>`;
    return;
  }
  const matched = game.matched, flash = game.flash||{};
  const leftHtml = game.left.map(item=>{
    let cls = "game-item"+(game.shapes?" shape-item":"");
    if(matched["L:"+item.id]) cls += " matched";
    else if(game.selected?.side==="left" && game.selected.id===item.id) cls += " selected";
    else if(flash.left===item.id) cls += " wrong-shake";
    let inner;
    if(item.svg) inner = item.svg;
    else if(game.matchType==="port" && item.cat){
      inner = `<span class="port-svc">${esc(item.text)}</span><span class="port-cat">${esc(PORT_CAT[item.cat]||item.cat)}</span>`;
    } else inner = esc(item.text);
    return `<button type="button" class="${cls}" data-game-id="L:${item.id}" onclick="gameTap('left','${item.id}')" ${matched["L:"+item.id]?"disabled":""}>${inner}</button>`;
  }).join("");
  const rightHtml = game.right.map(item=>{
    const rid = rightKey(item);
    let cls = "game-item"+(game.matchType==="port"?" port-num":"");
    if(matched["R:"+rid]) cls += " matched";
    else if(game.selected?.side==="right" && game.selected.id===rid) cls += " selected";
    else if(flash.right===rid) cls += " wrong-shake";
    return `<button type="button" class="${cls}" data-game-id="R:${rid}" onclick="gameTap('right','${rid}')" ${matched["R:"+rid]?"disabled":""}>${esc(item.text)}</button>`;
  }).join("");
  const colHeadL = game.matchType==="port" ? `<div class="game-col-head">Service</div>` : "";
  const colHeadR = game.matchType==="port" ? `<div class="game-col-head">Port</div>` : "";
  const done = Object.keys(matched).length/2;
  app.innerHTML = `<div class="game-scorebar"><span>${meta.icon} ${esc(meta.name)}${game.mode==="hard"?" · Hard":""}</span><span>${done}/${game.pairs.length} linked</span></div>
    <div class="game-toast ${game.toastKind}">${esc(game.toast||"Tap left, then right — connect the match!")}</div>
    <div class="game-board" id="gameBoard">
      <svg class="game-cables" id="gameCables" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="game-cols">
        <div class="game-col">${colHeadL}${leftHtml}</div>
        <div class="game-hub-icon">${meta.hub||"🔌"}</div>
        <div class="game-col">${colHeadR}${rightHtml}</div>
      </div>
    </div>`;
  requestAnimationFrame(drawGameCables);
}

    html += `<div class="eyebrow">🎮 Revision Games</div>

      <div class="grid" style="margin-bottom:12px">${renderGamesHub("home")}</div>
      <p style="margin:-4px 0 22px"><button class="btn" onclick="go('games')">See all ${GAME_CATALOG.filter(g=>g.ready).length} games →</button></p>`;

    let html = renderDomainHero(view.core, d) + `<div class="grid">`;
    for(const s of d.subs){
      const rm = noteReadMeta(s.notes);

        <h3>${s.id} ${esc(s.name)} ${scorePill(d.id+"_"+s.id, s.quiz.length)}</h3>
        <div class="meta">~${rm.min} min read · ${rm.sections} section${rm.sections===1?"":"s"} · ${s.quiz.length}-question mini mock</div></button>`;
    }

      <p class="sub">${d.mock.length} questions across all of Domain ${d.num}. Fresh questions — nothing recycled from the minis.</p>
      <button class="btn primary" onclick="startQuiz('${view.core}','${d.num}',null)">Start domain mock (${d.mock.length} questions)</button>
    </footer>`;

  }

  if(view.name==="sub"){

      : view.core==="core1" && view.num==="4.0" ? " sheet-hero-cloud"
      : view.core==="core1" && view.num==="5.0" ? " sheet-hero-troubleshoot"
      : view.core==="core2" && view.num==="1.0" ? " sheet-hero-os"
      : view.core==="core2" && view.num==="2.0" ? " sheet-hero-security"
      : view.core==="core2" && view.num==="3.0" ? " sheet-hero-softts"
      : view.core==="core1" ? " sheet-hero-core1"
      : view.core==="core2" ? " sheet-hero-core2" : "";
    crumbs.innerHTML = `<b>${ROSTER[view.core].name}</b> · ${d.num} · ${s.id}`;
    app.innerHTML = `<div class="sheet-hero${sheetHeroCls}">
      <div class="eyebrow">Revision sheet · Domain ${d.num}</div>

        <span>~${sheet.meta.min} min read</span>

    return;
  }

  if(view.name==="game"){ renderGame(); return; }
}

/* ============================================================
   Quiz engine — shuffled questions & options, instant feedback
   ============================================================ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startQuiz(core, num, subId){
  if(hasActiveQuiz()){
    pendingNav = {type:"startQuiz", core, num, subId};
    showLeaveModal();
    return;
  }
  beginQuiz(core, num, subId);
}
function beginQuiz(core, num, subId){
  const d = findDomain(core, num);
  const src = subId ? d.subs.find(x=>x.id===subId).quiz : d.mock;
  const qs = shuffle(src).map(q=>{
    const opts = q.o.map((t,i)=>({t, correct:i===q.a}));
    return {q:q.q, opts:shuffle(opts), ex:q.e};
  });
  quiz = {core, num, subId, qs, i:0, right:0, answered:false, done:false, wrong:[],
    label: subId ? `${subId} mini mock` : `Domain ${num} mock`,
    key: subId ? d.id+"_"+subId : d.id+"_mock"};
  clearQuizProgress();
  const push = view.name !== "quiz";
  navigateTo("quiz", {}, push);
  saveQuizProgress();
}

function renderQuiz(){
  const app = document.getElementById("app");
  const d = findDomain(quiz.core, quiz.num);
  document.getElementById("crumbs").innerHTML = `<b>${quiz.label}</b>`;

  if(quiz.done){
    const total = quiz.qs.length, pct = Math.round(100*quiz.right/total);
    const recorded = recordScore(quiz.key, quiz.right, total);
    clearQuizProgress();
    const bestPct = Math.round(100*recorded.best/total);
    let verdict, col;
    if(pct>=85){verdict="Exam ready on this material."; col="var(--good)";}
    else if(pct>=75){verdict="Pass territory — tighten the weak spots."; col="var(--amber)";}
    else {verdict="Below pass line — re-read the notes and go again."; col="var(--bad)";}
    setSaveStatus("saved", `Best score: ${bestPct}%`);
    const review = (quiz.wrong && quiz.wrong.length) ? `<div class="review">
      <h3>Review ${quiz.wrong.length} missed question${quiz.wrong.length===1?"":"s"}</h3>
      ${quiz.wrong.map(w=>`<div class="review-item">
        <div class="q">${esc(w.q)}</div>
        <div class="bad">Your answer: ${esc(w.picked)}</div>
        <div class="good">Correct: ${esc(w.correct)}</div>
        <div style="margin-top:6px;color:var(--muted)">${esc(w.ex)}</div>
      </div>`).join("")}
    </div>` : "";
    const notesBtn = quiz.subId
      ? `<button class="btn" onclick="go('sub',{core:'${quiz.core}',num:'${quiz.num}',sub:'${quiz.subId}'})">Revision notes</button>`
      : "";
    app.innerHTML = `<div class="result">
      <div class="eyebrow">${quiz.label}</div>
      <div class="big" style="color:${col}">${quiz.right}/${total}</div>
      <div class="verdict" style="color:${col}">${pct}% — ${verdict}</div>
      <p class="sub" style="margin-top:0">Best: ${bestPct}% · Attempt ${recorded.attempts}</p>
      <div class="row">
        <button class="btn primary" onclick="startQuiz('${quiz.core}','${quiz.num}',${quiz.subId?`'${quiz.subId}'`:"null"})">Retake</button>
        ${notesBtn}
        <button class="btn" onclick="abandonQuiz();goBack()">Back</button>
      </div>${review}</div>`;
    return;
  }

  setSaveStatus("saved", `Q ${quiz.i+1}/${quiz.qs.length} · auto-saved`);

  const q = quiz.qs[quiz.i];
  let html = `<div class="qhead"><span>${quiz.label}</span><span>Question ${quiz.i+1} of ${quiz.qs.length} · ${quiz.right} correct</span></div>
    <div class="qbar"><i style="width:${Math.round((quiz.i+(quiz.answered?1:0))/quiz.qs.length*100)}%"></i></div>
    <div class="qtext">${esc(q.q)}</div>`;
  q.opts.forEach((o,idx)=>{
    let cls = "opt";
    if(quiz.answered){
      if(o.correct) cls += " correct";
      else if(idx===quiz.picked) cls += " wrong";
    }
    html += `<button class="${cls}" ${quiz.answered?"disabled":""} onclick="pick(${idx})">${esc(o.t)}</button>`;
  });
  if(quiz.answered){
    html += `<div class="explain"><b>${q.opts[quiz.picked].correct?"Correct.":"Not quite."}</b> ${esc(q.ex)}</div>
      <button class="btn primary" id="nextbtn" onclick="nextQ()">${quiz.i+1===quiz.qs.length?"See result":"Next question"} &rarr;</button>`;
  }
  app.innerHTML = html;
  if(quiz.answered) document.getElementById("nextbtn").focus();
}

function pick(idx){
  if(quiz.answered) return;
  quiz.answered = true;
  quiz.picked = idx;
  const q = quiz.qs[quiz.i];
  const correct = q.opts[idx].correct;
  if(correct) quiz.right++;
  else {
    const ans = q.opts.find(o=>o.correct);
    quiz.wrong.push({q:q.q, picked:q.opts[idx].t, correct:ans.t, ex:q.ex});
  }
  saveQuizProgress();
  renderQuiz();
}
function nextQ(){
  quiz.i++;
  quiz.answered = false;
  quiz.picked = null;
  if(quiz.i>=quiz.qs.length) quiz.done = true;
  else saveQuizProgress();
  renderQuiz();
}

setSaveStatus("ready");
render();
</script>
