<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="CompTIA A+ Core 1 & Core 2 (220-1201 / 220-1202) revision notes, mini mocks, and domain exams.">
<meta name="theme-color" content="#0E7490">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="A+ Study">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A+ Revision Guide — 220-1201 / 220-1202</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6F8; --panel:#FFFFFF; --ink:#122333; --muted:#5B6B7A;
  --line:#DDE4EA; --accent:#0E7490; --accent-ink:#FFFFFF; --accent-soft:#E0F2F7;
  --good:#15803D; --good-soft:#DCFCE7; --bad:#B91C1C; --bad-soft:#FEE2E2;
  --amber:#B45309; --amber-soft:#FEF3C7; --code-bg:#EAEFF3;
  --radius:12px; --maxw:880px;
  --display:'Sora',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
  color-scheme:light dark;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0F1620; --panel:#182230; --ink:#E8EEF4; --muted:#9AABBB;
    --line:#2B3A4A; --accent:#4FC3E8; --accent-ink:#08222E; --accent-soft:#12384A;
    --good:#5BE49B; --good-soft:#123B28; --bad:#FF8B8B; --bad-soft:#43201F;
    --amber:#FFC861; --amber-soft:#3D2E10; --code-bg:#233042;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.6}
.wrap{max-width:var(--maxw);margin:0 auto;padding:20px 16px 80px}
header.app{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line);padding:12px 16px}
header.app .inner{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-family:var(--display);font-weight:800;font-size:1.05rem;letter-spacing:-.01em;cursor:pointer}
.brand span{color:var(--accent)}
.crumbs{font-size:.85rem;color:var(--muted);flex:1;min-width:120px}
.crumbs b{color:var(--ink)}
button{font-family:var(--body);cursor:pointer}
.btn{display:inline-block;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:10px 16px;border-radius:10px;font-weight:600;font-size:.95rem;transition:border-color .15s, background .15s}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.btn.primary:hover{filter:brightness(1.08)}
.btn:focus-visible,.opt:focus-visible,.card:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
h1.page{font-family:var(--display);font-weight:800;font-size:1.7rem;letter-spacing:-.02em;margin:22px 0 4px}
p.sub{color:var(--muted);margin-bottom:22px}
.eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.grid{display:grid;gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;text-align:left;width:100%;transition:border-color .15s, transform .1s}
.card.clickable:hover{border-color:var(--accent);transform:translateY(-1px)}
.card h3{font-family:var(--display);font-weight:700;font-size:1.02rem;margin-bottom:2px}
.card .meta{font-size:.83rem;color:var(--muted)}
.card.locked{opacity:.55}
.card.locked .meta::after{content:" · not added yet"}
.weightbar{height:5px;border-radius:3px;background:var(--line);margin-top:10px;overflow:hidden}
.weightbar i{display:block;height:100%;background:var(--accent)}
.pill{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--accent-soft);color:var(--accent);margin-left:8px;vertical-align:middle}
.pill.score{background:var(--good-soft);color:var(--good)}
.pill.score.low{background:var(--amber-soft);color:var(--amber)}
.notes h2{font-family:var(--display);font-size:1.15rem;font-weight:700;margin:26px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
.notes h2:first-child{border-top:0;margin-top:8px;padding-top:0}
.notes h2[id]{scroll-margin-top:64px}
.notes p{margin:0 0 12px;line-height:1.55}
.notes ul{margin:0 0 14px 20px}
.notes li{margin-bottom:5px;line-height:1.45}
.notes table{width:100%;border-collapse:collapse;margin:0;font-size:.92rem}
.notes th{text-align:left;font-weight:700;border-bottom:2px solid var(--ink);padding:6px 8px;white-space:nowrap}
.notes td{border-bottom:1px solid var(--line);padding:6px 8px;vertical-align:top}
.notes .callout{background:var(--accent-soft);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin:0 0 14px;font-size:.94rem;line-height:1.5}
.notes .callout b:first-child{color:var(--accent)}
.notes code{background:var(--code-bg);border-radius:5px;padding:1px 6px;font-size:.88em}
.notes-sheet{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:4px 16px 10px;margin:0 0 8px}
.notes-meta{display:flex;flex-wrap:wrap;gap:8px 16px;font-size:.84rem;color:var(--muted);font-weight:600;margin:6px 0 14px}
.notes-toc{background:var(--accent-soft);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;margin:0 0 16px}
.notes-toc h3{font-family:var(--display);font-size:.88rem;font-weight:800;margin:0 0 8px;color:var(--accent)}
.notes-toc ul{margin:0;padding-left:18px;font-size:.86rem;line-height:1.6}
.notes-toc a{color:var(--ink);text-decoration:none;font-weight:600}
.notes-toc a:hover{color:var(--accent);text-decoration:underline}
.notes-exam-strip{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px}
.notes-exam-chip{font-size:.74rem;font-weight:700;background:var(--amber-soft);color:var(--amber);padding:5px 10px;border-radius:99px;cursor:help;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notes-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:4px 0 16px;border-radius:8px;border:1px solid var(--line)}
.notes-table-wrap table{margin:0;min-width:280px}
.sub-nav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:16px 0 8px;flex-wrap:wrap}
.sub-nav .sub-nav-btn{font-size:.88rem;padding:8px 12px}
footer.domfoot.notes-mock-footer{position:sticky;bottom:0;background:color-mix(in srgb, var(--bg) 90%, transparent);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--line);margin-top:20px;padding:14px 0 12px;z-index:5}
footer.domfoot.notes-mock-footer .sub{font-size:.88rem}
.core-hero{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:16px;margin:0 0 16px;color:#fff;position:relative;overflow:hidden}
.core-hero::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 100% 0%,rgba(255,255,255,.18),transparent 55%);pointer-events:none}
.core-hero-icon{font-size:2.4rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))}
.core-hero-label{font-family:var(--display);font-weight:800;font-size:1.15rem;letter-spacing:-.02em}
.core-hero-sub{font-size:.88rem;opacity:.92;margin-top:2px}
.core-hero-core1{background:linear-gradient(135deg,#1D4ED8 0%,#0E7490 55%,#0891B2 100%)}
.core-hero-core2{background:linear-gradient(135deg,#0E7490 0%,#15803D 100%)}
.domain-card{position:relative;border-width:2px;overflow:hidden;padding-top:14px}
.domain-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px}
.domain-card-core1::before{background:linear-gradient(90deg,#2563EB,#0E7490)}
.domain-card-core2::before{background:linear-gradient(90deg,#0E7490,#15803D)}
.domain-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.domain-icon{font-size:1.6rem;line-height:1}
.domain-weight{font-family:var(--display);font-weight:800;font-size:.78rem;padding:4px 10px;border-radius:99px;background:var(--accent-soft);color:var(--accent)}
.domain-card-core1 .domain-weight{background:#DBEAFE;color:#1D4ED8}
.domain-card-core2 .domain-weight{background:var(--accent-soft);color:var(--accent)}
.domain-card:hover{box-shadow:0 8px 24px rgba(14,116,144,.12)}
.domain-card-core1:hover{border-color:#2563EB}
.domain-hero{border-radius:16px;padding:20px;margin:0 0 18px;border:2px solid var(--line);background:linear-gradient(135deg,var(--panel) 60%,var(--accent-soft))}
.domain-hero-core1{border-color:#BFDBFE;background:linear-gradient(135deg,var(--panel) 50%,#EFF6FF 100%)}
.domain-hero-hardware{border-color:#FCD34D;background:linear-gradient(135deg,var(--panel) 50%,#FFFBEB 100%)}
.domain-hero-troubleshoot{border-color:#99F6E4;background:linear-gradient(135deg,var(--panel) 50%,#F0FDFA 100%)}
.domain-hero-cloud{border-color:#7DD3FC;background:linear-gradient(135deg,var(--panel) 50%,#ECFEFF 100%)}
.domain-hero-core2{border-color:#99F6E4;background:linear-gradient(135deg,var(--panel) 50%,#F0FDFA 100%)}
.domain-hero-security{border-color:#86EFAC;background:linear-gradient(135deg,var(--panel) 50%,#F0FDF4 100%)}
.domain-hero-os{border-color:#7DD3FC;background:linear-gradient(135deg,var(--panel) 50%,#F0F9FF 100%)}
.domain-hero-softts{border-color:#FDBA74;background:linear-gradient(135deg,var(--panel) 50%,#FFF7ED 100%)}
.domain-hero-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.domain-hero-head .domain-icon{font-size:2.2rem}
.domain-hero h1.page{margin:0;font-size:1.5rem}
.domain-stat-pills{display:flex;flex-wrap:wrap;gap:8px}
.domain-stat-pill{font-size:.76rem;font-weight:700;padding:5px 11px;border-radius:99px;background:var(--bg);border:1px solid var(--line);color:var(--muted)}
.domain-stat-pill strong{color:var(--ink)}
.sheet-hero{border-radius:14px;padding:14px 16px;margin:0 0 14px;border:1px solid var(--line);background:var(--panel)}
.sheet-hero-core1{border-color:#BFDBFE;background:linear-gradient(135deg,#EFF6FF,var(--panel))}
.sheet-hero-hardware{border-color:#FCD34D;background:linear-gradient(135deg,#FFFBEB,var(--panel))}
.sheet-hero-troubleshoot{border-color:#99F6E4;background:linear-gradient(135deg,#F0FDFA,var(--panel))}
.sheet-hero-cloud{border-color:#7DD3FC;background:linear-gradient(135deg,#ECFEFF,var(--panel))}
.sheet-hero-core2{border-color:#99F6E4;background:linear-gradient(135deg,#F0FDFA,var(--panel))}
.sheet-hero-security{border-color:#86EFAC;background:linear-gradient(135deg,#F0FDF4,var(--panel))}
.sheet-hero-os{border-color:#7DD3FC;background:linear-gradient(135deg,#F0F9FF,var(--panel))}
.sheet-hero-softts{border-color:#FDBA74;background:linear-gradient(135deg,#FFF7ED,var(--panel))}
.core1-games-strip{background:linear-gradient(135deg,#EFF6FF,var(--panel));border:2px solid #BFDBFE;border-radius:16px;padding:16px;margin:0 0 22px}
.core1-games-strip h2{font-family:var(--display);font-size:1rem;font-weight:800;margin:0 0 6px;color:#1D4ED8}
.core1-games-strip p{font-size:.86rem;color:var(--muted);margin:0 0 12px}
.notes .keyfact{background:var(--amber-soft);border-left:4px solid var(--amber);border-radius:0 8px 8px 0;padding:10px 14px;margin:0 0 14px;font-size:.94rem;line-height:1.5}
.notes .keyfact b:first-child{color:var(--amber)}
/* quiz */
.qhead{display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px;font-size:.85rem;color:var(--muted);font-weight:600}
.qbar{height:6px;background:var(--line);border-radius:3px;margin-bottom:18px;overflow:hidden}
.qbar i{display:block;height:100%;background:var(--accent);transition:width .2s}
.qtext{font-family:var(--display);font-weight:700;font-size:1.08rem;margin-bottom:16px;line-height:1.45}
.opt{display:block;width:100%;text-align:left;background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:.96rem;line-height:1.45;transition:border-color .12s}
.opt:hover:not(:disabled){border-color:var(--accent)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--good);background:var(--good-soft)}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.explain{border:1px solid var(--line);border-left:4px solid var(--accent);background:var(--panel);border-radius:0 10px 10px 0;padding:12px 14px;margin:6px 0 16px;font-size:.93rem}
.explain b{color:var(--accent)}
.result{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:28px;text-align:center;margin-top:24px}
.result .big{font-family:var(--display);font-weight:800;font-size:2.6rem;letter-spacing:-.02em}
.result .verdict{font-weight:600;margin:6px 0 18px}
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
footer.domfoot{margin-top:30px;padding-top:20px;border-top:1px solid var(--line)}
/* confirm modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,16,22,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px;max-width:360px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.modal h3{font-family:var(--display);font-weight:700;font-size:1.05rem;margin-bottom:8px}
.modal p{color:var(--muted);font-size:.93rem;margin-bottom:18px}
.modal .row{justify-content:flex-end}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
.save-status{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
.save-status i{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
.save-status.saved i{background:var(--good)}
.save-status.unsaved i{background:var(--amber)}
.save-status.error i{background:var(--bad)}
.resume-banner{background:var(--accent-soft);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin:0 0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.resume-banner p{margin:0;font-size:.92rem}
.resume-banner b{color:var(--accent)}
.storage-warn{background:var(--amber-soft);border:1px solid var(--amber);border-radius:8px;padding:8px 12px;font-size:.82rem;color:var(--amber);margin-bottom:16px}
.score-meta{font-size:.72rem;font-weight:600;color:var(--muted);margin-left:4px}
.dashboard{display:grid;gap:12px;margin:0 0 24px}
.dash-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.dash-card h2{font-family:var(--display);font-size:1rem;font-weight:700;margin-bottom:10px}
.dash-row{display:flex;align-items:center;gap:14px}
.dash-ring{--p:0;width:64px;height:64px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--line) 0);display:grid;place-items:center;flex-shrink:0}
.dash-ring span{width:48px;height:48px;border-radius:50%;background:var(--panel);display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:.95rem}
.dash-stats{font-size:.88rem;color:var(--muted);line-height:1.5}
.dash-stats b{color:var(--ink)}
.dash-weak{margin-top:10px;font-size:.84rem;color:var(--muted)}
.dash-weak b{color:var(--amber)}
.dash-games{margin-top:4px}
.dash-games b{color:var(--ink)}
.game-card.featured{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-soft)}
.install-banner{background:var(--panel);border:1px dashed var(--accent);border-radius:var(--radius);padding:14px 16px;margin:0 0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.install-banner p{margin:0;font-size:.9rem}
.review{margin-top:20px;text-align:left}
.review h3{font-family:var(--display);font-size:1rem;font-weight:700;margin:18px 0 10px;text-align:center}
.review-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:.9rem;text-align:left}
.review-item .q{font-weight:600;margin-bottom:6px}
.review-item .bad{color:var(--bad);font-size:.85rem}
.review-item .good{color:var(--good);font-size:.85rem}
/* revision games */
.game-card{background:linear-gradient(135deg,var(--panel) 70%,var(--accent-soft));border:2px solid var(--line);border-radius:16px;padding:18px;text-align:left;width:100%;transition:transform .15s,border-color .15s}
.game-card:hover:not(.locked){border-color:var(--accent);transform:translateY(-2px) rotate(-0.3deg)}
.game-card.locked{opacity:.5;cursor:default}
.game-card .icon{font-size:1.8rem;margin-bottom:6px}
.game-card h3{font-family:var(--display);font-weight:800;font-size:1.05rem}
.game-card .meta{font-size:.83rem;color:var(--muted)}
.game-board{position:relative;background:var(--panel);border:2px dashed var(--accent);border-radius:20px;padding:16px 12px 20px;margin:16px 0}
.game-board h2{font-family:var(--display);font-size:1.1rem;text-align:center;margin-bottom:4px}
.game-hint{text-align:center;font-size:.85rem;color:var(--muted);margin-bottom:14px}
.game-cols{display:grid;grid-template-columns:1fr 36px 1fr;gap:8px;align-items:start}
.game-col{display:flex;flex-direction:column;gap:8px}
.game-seq{display:grid;gap:8px;max-width:480px;margin:0 auto}
.game-seq .game-item{text-align:left;justify-content:flex-start;padding:14px}
.game-seq .game-item .step-n{font-size:.72rem;color:var(--muted);margin-right:8px}
.game-hub-icon{font-size:1.4rem;opacity:.35;padding:8px 0;text-align:center}
.game-item{border:2px solid var(--line);border-radius:12px;padding:12px 10px;font-weight:600;font-size:.9rem;text-align:center;background:var(--bg);cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;min-height:48px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
.game-item:active{transform:scale(.96)}
.game-item.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);animation:pulse-sel .8s ease infinite}
.game-item.matched{border-color:var(--good);background:var(--good-soft);cursor:default;animation:pop-in .35s ease}
.game-item.wrong-shake{animation:shake .4s ease;border-color:var(--bad);background:var(--bad-soft)}
.game-item.shape-item{padding:8px}
.game-item.shape-item svg{width:44px;height:44px}
.game-item.port-num{font-family:var(--display);font-size:1.05rem;font-weight:800}
.game-col-head{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:center;margin-bottom:4px}
.port-svc{display:block;line-height:1.2}
.port-cat{display:block;font-size:.65rem;font-weight:700;color:var(--accent);margin-top:3px;letter-spacing:.02em}
.port-recap{margin-top:18px;text-align:left;max-width:440px;margin-left:auto;margin-right:auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px}
.port-recap h3{font-family:var(--display);font-size:.95rem;text-align:center;margin:0 0 10px}
.port-recap-row{display:grid;grid-template-columns:1fr auto;gap:2px 12px;padding:7px 0;border-bottom:1px solid var(--line);font-size:.85rem}
.port-recap-row:last-child{border-bottom:none}
.port-recap-num{font-family:var(--display);font-weight:800;color:var(--accent)}
.port-recap-hint{grid-column:1/-1;font-size:.76rem;color:var(--muted);line-height:1.35}
.game-toast{text-align:center;font-weight:700;font-size:.92rem;line-height:1.35;min-height:1.6em;margin:10px 0;padding:0 8px;transition:opacity .2s}
.game-toast.good{color:var(--good)}
.game-toast.bad{color:var(--bad)}
.game-mode{display:flex;gap:8px;justify-content:center;margin:14px 0;flex-wrap:wrap}
.mode-chip{border:2px solid var(--line);background:var(--panel);padding:8px 16px;border-radius:99px;font-weight:700;font-size:.88rem;cursor:pointer}
.mode-chip.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.mode-chip.hard.active{border-color:var(--amber);background:var(--amber-soft);color:var(--amber)}
.game-scorebar{display:flex;justify-content:space-between;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:8px}
.game-cables{position:absolute;inset:0;pointer-events:none;z-index:1}
.game-cables line{stroke:var(--accent);stroke-width:3;stroke-linecap:round;opacity:.7}
.game-cables line.good{stroke:var(--good);stroke-width:4;animation:cable-in .4s ease}
@keyframes pulse-sel{0%,100%{box-shadow:0 0 0 3px var(--accent-soft)}50%{box-shadow:0 0 0 6px transparent}}

{
id:"1.1", name:"Install and configure laptop hardware and components",
notes:`
<h2>The golden rules of laptop servicing</h2>
<p>Before opening any laptop: power off, unplug mains, remove or disconnect the battery (internal batteries have a connector on the motherboard, or a firmware "battery disconnect" option), and ground yourself against ESD. Document screw locations — laptop screws vary in length and a wrong screw can pierce the board.</p>
<div class="callout"><b>Exam angle:</b> "What should the technician do FIRST before replacing a laptop component?" — the answer is nearly always disconnect power/battery, or wear an ESD strap.</div>

<h2>Batteries</h2>
<ul>
<li>Modern laptops use <b>lithium-ion (Li-ion)</b> or lithium-polymer packs. No memory effect, but capacity degrades with charge cycles and heat.</li>
<li>A <b>swollen battery</b> is a safety hazard: power down, stop using the device, do not puncture, and dispose via proper battery recycling — never general waste.</li>
<li>Batteries are either externally removable (latch) or internal (bottom cover off, connector unplugged). Always match voltage and connector when replacing.</li>
</ul>

<h2>Keyboards and keys</h2>
<ul>
<li>Laptop keyboards connect via a <b>ribbon cable (ZIF connector)</b> — lift the retaining flap gently, never pull the cable with the flap closed.</li>
<li>The <b>Fn key</b> combines with function keys for hardware toggles: display output, brightness, WiFi/airplane mode, touchpad enable, keyboard backlight. A "dead" wireless or touchpad problem is often just an Fn toggle.</li>
<li>An external USB keyboard is a quick way to prove whether a fault is the internal keyboard or the OS/drivers.</li>
</ul>

<h2>RAM — SODIMM</h2>
<ul>
<li>Laptops use <b>SODIMM</b> modules — physically smaller than desktop DIMMs, same DDR generations (DDR3, DDR4, DDR5). Generations are keyed differently and are <b>not interchangeable</b>.</li>
<li>Insert at roughly a 45° angle into the slot, then press down until the side clips snap in.</li>
<li>Many thin/light machines now use <b>soldered RAM</b> — not upgradeable at all, or only via one spare SODIMM slot. Check specs before promising an upgrade.</li>
</ul>

<h2>Storage: form factors and migration</h2>
<table>
<tr><th>Type</th><th>Form factor</th><th>Interface / speed notes</th></tr>
<tr><td>HDD (magnetic)</td><td>2.5" (laptops), 1.8" (legacy ultraportables)</td><td>SATA. 5,400 or 7,200 RPM. Cheap, slow, fragile when moving.</td></tr>
<tr><td>SATA SSD</td><td>2.5" drive or M.2 SATA</td><td>SATA III tops out ~600 MB/s regardless of shape.</td></tr>
<tr><td>NVMe SSD</td><td>M.2 (commonly 2280)</td><td>Uses PCIe lanes — several times faster than SATA. M.2 slot must support NVMe.</td></tr>
</table>
<ul>
<li><b>M.2 keying:</b> B key, M key, or B+M. NVMe drives are typically M-keyed. A drive that physically fits may still not work if the slot only carries SATA.</li>
<li><b>Migration:</b> clone the old drive to the new one (imaging software) or clean-install and restore data. 2.5" HDD → SSD swap is the classic performance upgrade.</li>
</ul>

<h2>Wireless cards and antennas</h2>
<ul>
<li>WiFi/Bluetooth cards sit in a <b>Mini PCIe</b> (older) or <b>M.2 (A/E key)</b> slot. Two tiny coax antenna leads (main/aux, often white and black) snap onto the card and run up into the screen bezel.</li>
<li>Reconnecting those antenna leads after a screen or card swap is a classic "WiFi has terrible range now" fix.</li>
<li>Some vendors whitelist wireless cards in BIOS/UEFI — a non-approved card can halt boot.</li>
</ul>

<h2>Physical privacy and security components</h2>
<ul>
<li><b>Biometrics:</b> fingerprint readers (in the palm rest or power button) and IR cameras for facial recognition (e.g. Windows Hello).</li>
<li><b>Near-field scanner:</b> NFC reader in the palm rest for contactless smart cards/badges — common on business laptops.</li>
</ul>
`,
quiz:[
{q:"A user's laptop WiFi signal is extremely weak after a screen replacement, though it worked perfectly before. What is the MOST likely cause?", o:["The wireless card was flashed with the wrong firmware","The antenna leads were not reconnected to the wireless card","The screen inverter is interfering with the radio","Airplane mode was enabled during the repair"], a:1, e:"The WiFi antennas run through the display assembly. During a screen replacement the coax antenna leads must be unplugged from the wireless card — forgetting to reconnect them leaves the radio working but with almost no range."},
{q:"Which memory module form factor is used in laptops?", o:["DIMM","SODIMM","SIMM","C-DIMM"], a:1, e:"Laptops use Small Outline DIMMs (SODIMMs) — physically shorter modules that install at an angle and clip down flat. Desktop boards use full-size DIMMs."},
{q:"A technician wants to give the biggest storage performance boost to a laptop with an M.2 slot that supports PCIe. Which drive should they fit?", o:["7,200 RPM 2.5\" HDD","2.5\" SATA SSD","M.2 SATA SSD","M.2 NVMe SSD"], a:3, e:"NVMe drives communicate over PCIe lanes and dramatically outperform anything on the SATA bus. M.2 SATA and 2.5\" SATA SSDs are limited to roughly the same ~600 MB/s ceiling."},
{q:"What should a technician do FIRST before replacing the RAM in a laptop?", o:["Update the BIOS to the latest version","Run a full memory diagnostic","Disconnect the power and remove/disconnect the battery","Remove the CMOS battery"], a:2, e:"Power must be fully removed before internal work — mains lead out and battery removed or disconnected — both for safety and to avoid shorting components. ESD protection comes alongside this."},
{q:"A laptop battery has visibly swollen and is pushing the touchpad upward. What is the correct action?", o:["Discharge it fully, then continue using it","Puncture it to release pressure before disposal","Stop using the device and dispose of the battery at a battery recycling facility","Freeze the battery to stabilise the cells"], a:2, e:"A swollen lithium battery is a fire risk. Power off, stop using it, never puncture or compress it, and dispose via proper battery recycling — never general waste."},
{q:"A user reports their laptop's wireless 'stopped working' but Device Manager shows the adapter as healthy. What should the technician check FIRST?", o:["Whether the Fn-key wireless/airplane-mode toggle has been pressed","Whether the antenna leads are seated","Whether the WLAN card is on the BIOS whitelist","Whether the SSID is hidden"], a:0, e:"The quickest, most common culprit is the Fn hardware toggle (or airplane-mode key) disabling the radio. Check the simple toggle before opening the machine."},
{q:"Which M.2 key is typically used by NVMe SSDs?", o:["A key","B key only","M key","E key"], a:2, e:"NVMe PCIe x4 drives are typically M-keyed (some are B+M). A and E keys are associated with WiFi/Bluetooth cards. Physical fit alone doesn't guarantee the slot supports NVMe."},
{q:"When installing a SODIMM, how should the module be inserted?", o:["Straight down with even pressure on both ends","At roughly a 45-degree angle, then pressed flat until the clips engage","Slid horizontally into the retention bracket","At 90 degrees after releasing the ZIF latch"], a:1, e:"SODIMMs go into the slot at about 45°, then rotate down flat until the side clips snap over the module. ZIF latches relate to ribbon cables, not RAM."},
{q:"A business laptop needs to read employees' contactless ID badges. Which built-in component provides this?", o:["IR camera","Near-field scanner (NFC)","Fingerprint reader","Smart card SIM slot"], a:1, e:"An NFC (near-field) scanner, usually under the palm rest, reads contactless badges and cards at very short range. Biometric components identify the person, not a badge."},
{q:"A replacement laptop keyboard is installed but no keys respond. The ribbon cable appears connected. What is the MOST likely cause?", o:["The keyboard needs new drivers installed","The ZIF connector's retaining flap was not closed over the ribbon cable","The BIOS keyboard whitelist rejected the part","The keyboard requires a firmware pairing process"], a:1, e:"Keyboard ribbon cables seat in ZIF (zero insertion force) connectors — the cable must be fully inserted and the flap locked down. A cable that's resting in place but not clamped makes no contact."}
]

{
id:"1.2", name:"Compare and contrast the display components of mobile devices",
notes:`
<h2>LCD panel technologies</h2>
<table>
<tr><th>Type</th><th>Strengths</th><th>Weaknesses</th></tr>
<tr><td><b>TN</b> (Twisted Nematic)</td><td>Cheapest, fastest response — gaming</td><td>Poor colour and narrow viewing angles</td></tr>
<tr><td><b>IPS</b> (In-Plane Switching)</td><td>Best colour accuracy and wide viewing angles</td><td>Costlier, historically slower response</td></tr>
<tr><td><b>VA</b> (Vertical Alignment)</td><td>Best contrast/deep blacks; middle ground</td><td>Viewing angles and response between TN and IPS</td></tr>
</table>
<div class="callout"><b>Exam angle:</b> match the panel to the need — photographer/designer → IPS; competitive gamer on a budget → TN; deep contrast for media → VA.</div>

<h2>Resolution and native resolution</h2>
<ul>
<li><b>Native resolution</b> is the panel's physical pixel grid (e.g. 1920×1080, 2560×1440, 3840×2160). LCDs are sharpest only at native — other resolutions are scaled and look soft.</li>
<li><b>1080p (FHD)</b> — common on budget laptops; <b>1440p (QHD)</b> — sharper mid-range; <b>4K (UHD)</b> — premium, more GPU load and battery drain.</li>
<li>Windows <b>ClearType</b> and macOS scaling improve text rendering but cannot fix running below native resolution on an LCD.</li>
</ul>
<div class="keyfact"><b>Symptom trap:</b> "Text looks blurry on a new laptop" → check display scaling and that output matches the panel's native resolution.</div>

<h2>Touch technologies</h2>
<table>
<tr><th>Type</th><th>How it works</th><th>Where you'll see it</th></tr>
<tr><td><b>Capacitive</b></td><td>Detects conductive objects (finger, passive stylus tip)</td><td>Modern phones, tablets, touch laptops</td></tr>
<tr><td><b>Resistive</b></td><td>Pressure bends two layers together — works with gloves/stylus pressure</td><td>Legacy industrial/handheld devices; rare on consumer kit now</td></tr>
<tr><td><b>Active stylus</b></td><td>Digitizer detects pen with battery/Bluetooth — pressure, tilt, palm rejection</td><td>Surface Pen, Apple Pencil, Wacom tablets</td></tr>
</table>

<h2>Backlighting: LED vs CCFL — and the inverter</h2>
<ul>
<li>All LCDs need a backlight. Modern panels use <b>LED</b> backlights: efficient, thin, low-voltage DC.</li>
<li>Legacy panels used <b>CCFL</b> (cold cathode fluorescent) tubes, which need high-voltage AC supplied by an <b>inverter</b> board.</li>
<li>Classic symptom: screen goes very dark but a faint image is visible with a torch — the backlight (or on CCFL systems, the inverter) has failed, not the panel.</li>
</ul>

<h2>OLED</h2>
<ul>
<li><b>OLED</b> pixels emit their own light — <b>no backlight at all</b>. Result: perfect blacks (pixels switch fully off), superb contrast, thin and flexible panels.</li>
<li>Drawbacks: cost, and risk of <b>burn-in</b> from static images. Common on premium phones and some high-end laptops.</li>
<li><b>Mini-LED / QLED (marketing)</b> — LCD with many smaller backlight zones for better contrast; still needs a backlight unlike true OLED.</li>
</ul>

<h2>Display settings technicians should know</h2>
<ul>
<li><b>Brightness</b> — software slider or Fn keys; dim backlight saves battery on laptops.</li>
<li><b>Auto-rotate</b> — tablet/2-in-1 uses accelerometer/gyroscope; if rotation stops, check lock rotation setting before replacing hardware.</li>
<li><b>External display</b> — duplicate, extend, or second-screen-only via OS display settings or Fn + monitor key.</li>
<li><b>Colour calibration</b> — important for design/photo work; IPS panels are the usual choice.</li>
</ul>

<h2>Symptom → component — quick diagnosis</h2>
<table>
<tr><th>What the user sees</th><th>Likely failed part</th></tr>
<tr><td>Perfect image, no touch response</td><td>Digitizer / touch layer</td></tr>
<tr><td>Touch registers, image black or corrupted</td><td>LCD panel or video cable</td></tr>
<tr><td>Faint image visible with a torch, very dark screen</td><td>Backlight (LED) or inverter (CCFL)</td></tr>
<tr><td>Lines, flicker, or colour bands at certain hinge angles</td><td>Display cable through the hinge — reseat or replace</td></tr>
<tr><td>WiFi weak after screen repair</td><td>Antenna coax leads not reconnected to wireless card</td></tr>
<tr><td>Webcam/mic dead after board swap</td><td>Hinge-routed camera/mic cables not plugged into motherboard</td></tr>
</table>

<h2>Everything else living in the lid</h2>
<ul>
<li><b>WiFi antennas:</b> routed around the screen bezel for height/reception. Two leads (main + auxiliary) run down through the hinge to the wireless card.</li>
<li><b>Webcam and microphone:</b> in the top bezel, connected by cables through the hinge; many business machines add a physical privacy shutter.</li>
<li><b>Digitizer/touchscreen:</b> the glass layer that converts touch (finger or stylus) into input — a separate layer from the LCD itself. A cracked digitizer can leave the display image perfect while touch fails, and vice versa.</li>
<li><b>Inverter:</b> only present on CCFL-era machines, mounted below the panel.</li>
</ul>
<div class="callout"><b>Exam angle:</b> "Display works but touch doesn't" → digitizer. "Touch works but image is corrupted/black" → LCD panel. "Image present but no illumination" → backlight/inverter. "Fault only when lid is moved" → display cable.</div>
<div class="keyfact"><b>Reassembly reminder:</b> after any lid/screen work, reconnect WiFi antenna leads, webcam/mic cables, and display cable before closing — three common post-repair misses.</div>
`,
quiz:[
{q:"Which display panel type offers the widest viewing angles and best colour reproduction?", o:["TN","VA","IPS","CCFL"], a:2, e:"IPS (In-Plane Switching) leads on colour accuracy and viewing angles, which is why it's specified for design work. CCFL is a backlight technology, not a panel type."},
{q:"A laptop screen is extremely dim, but shining a torch on it reveals the desktop image is present. What has MOST likely failed?", o:["The LCD panel","The backlight or inverter","The digitizer","The GPU"], a:1, e:"A visible-but-unlit image means the panel is still drawing the picture — the illumination has failed. On LED systems that's the backlight; on legacy CCFL systems, suspect the inverter."},
{q:"Which display technology requires no backlight because each pixel emits its own light?", o:["IPS LCD","VA LCD","OLED","Mini-LED LCD"], a:2, e:"OLED pixels are self-emissive, allowing true blacks (pixels turn fully off) and very thin panels. All LCD variants need a separate backlight."},
{q:"What does the inverter in a legacy laptop display do?", o:["Converts the digital video signal to analogue","Supplies high-voltage AC power to the CCFL backlight","Flips the image for tablet/tent modes","Regulates DC power to the LED strip"], a:1, e:"CCFL tubes need high-voltage AC; the inverter converts the laptop's low-voltage DC to drive them. LED backlights don't use an inverter."},
{q:"A tablet's screen shows a perfect image but does not respond to touch anywhere. Which component has failed?", o:["The LCD panel","The digitizer","The backlight","The inverter"], a:1, e:"The digitizer is the touch-sensing layer, separate from the display panel. Image fine + no touch = digitizer; the reverse (touch registers, image broken) points at the panel."},
{q:"Where are a laptop's WiFi antennas typically located, and why?", o:["Next to the wireless card to minimise cable loss","Around the display bezel, for elevation and reception","Under the palm rest near the NFC coil","Inside the hinge barrel"], a:1, e:"Antennas are routed around the screen bezel because height and distance from the metal-dense base improve reception. Leads run through the hinge to the card."},
{q:"A budget-conscious competitive gamer wants the fastest response time above all else. Which panel type fits?", o:["IPS","VA","TN","OLED"], a:2, e:"TN panels are the cheapest and historically the fastest-responding, at the cost of colour and viewing angles — the classic budget esports pick."},
{q:"Which drawback is specifically associated with OLED displays?", o:["Poor contrast ratio","Burn-in from static images","Requirement for an inverter","Narrow viewing angles"], a:1, e:"Because OLED pixels age with use, persistent static elements (taskbars, HUDs) can permanently ghost into the panel — burn-in. Contrast and viewing angles are OLED strengths."},
{q:"Which panel type is known for the deepest blacks and highest contrast among LCD technologies?", o:["TN","VA","IPS","QLED"], a:1, e:"VA (vertical alignment) panels sit between TN and IPS overall but win on native contrast among LCDs. (OLED beats all LCDs, but it isn't an LCD technology.)"},
{q:"After a motherboard replacement, a laptop's webcam and microphone no longer work. Where should the technician check connections?", o:["The cables routed through the hinge from the display assembly","The USB header on the docking station","The M.2 wireless card","The ZIF connector under the keyboard"], a:0, e:"The webcam and mic live in the top bezel of the lid; their cables run through the hinge to motherboard connectors, which are easy to miss when reassembling after board work."}
]
},

{
id:"1.3", name:"Set up and configure accessories and ports of mobile devices",
notes:`
<h2>Connection types — wired</h2>
<table>
<tr><th>Port/connector</th><th>Key facts</th></tr>
<tr><td><b>USB-C</b></td><td>Reversible, universal. Can carry USB 3.x/USB4 data, DisplayPort video (alt mode), and Power Delivery for charging. The modern do-everything port.</td></tr>
<tr><td><b>Thunderbolt 3/4</b></td><td>Uses USB-C shape; adds PCIe tunneling, higher bandwidth, daisy-chaining. Often marked with a lightning bolt. Docks and eGPU enclosures use TB.</td></tr>
<tr><td><b>microUSB / miniUSB</b></td><td>Legacy small USB connectors — miniUSB (older cameras/peripherals) predates microUSB (pre-USB-C Android phones). Not reversible.</td></tr>
<tr><td><b>Lightning</b></td><td>Apple's proprietary reversible connector (iPhone/older iPads). Being displaced by USB-C.</td></tr>
<tr><td><b>MagSafe</b></td><td>Magnetic charging — original MagSafe on MacBooks (pre-USB-C); iPhone MagSafe adds magnetic wireless/Qi alignment for chargers and accessories.</td></tr>
<tr><td><b>Serial (RS-232)</b></td><td>Legacy 9-pin interface — still used to console into switches/routers and industrial kit, often via a USB-to-serial adapter.</td></tr>
</table>
<div class="keyfact"><b>USB-C ≠ always Thunderbolt:</b> same port shape, but Thunderbolt adds PCIe and higher specs. A USB-C dock may not drive three monitors if the laptop port isn't Thunderbolt-capable.</div>

<h2>USB generations — speed at a glance</h2>
<table>
<tr><th>Standard</th><th>Typical speed</th><th>Exam note</th></tr>
<tr><td>USB 2.0</td><td>480 Mbps</td><td>Black/internal header ports on older boards; fine for keyboard/mouse</td></tr>
<tr><td>USB 3.0 / 3.1 Gen 1</td><td>5 Gbps</td><td>Often blue port or SS logo</td></tr>
<tr><td>USB 3.1 Gen 2 / 3.2</td><td>10 Gbps</td><td>External SSDs, fast docks</td></tr>
<tr><td>USB4 / Thunderbolt 4</td><td>40 Gbps</td><td>Single-cable multi-monitor + charge scenarios</td></tr>
</table>

<h2>Connection types — wireless</h2>
<ul>
<li><b>NFC (near-field communication):</b> very short range (~4 cm). Contactless payments (Google/Apple Pay), badge taps, quick Bluetooth pairing handoffs.</li>
<li><b>Bluetooth:</b> short-range PAN (~10 m class 2) for headsets, keyboards, mice. Devices must be paired (see 1.4 for the procedure).</li>
<li><b>Hotspot/tethering:</b> the phone shares its cellular data — over WiFi (hotspot), USB, or Bluetooth.</li>
<li><b>WiFi Direct / Miracast</b> — device-to-device wireless without a router (screen casting, direct file transfer on some devices).</li>
</ul>

<h2>Audio jacks — TRS vs TRRS</h2>
<ul>
<li><b>TRS (3.5 mm)</b> — stereo audio only (tip-ring-sleeve), no mic channel.</li>
<li><b>TRRS</b> — adds a mic contact on the same plug; standard for phone/laptop combo headset jacks.</li>
<li><b>USB / Bluetooth headsets</b> — bypass the analogue jack; often preferred for noise cancellation and unified mic control.</li>
</ul>

<h2>Accessories</h2>
<ul>
<li><b>Touch pens / styluses:</b> passive capacitive (dumb conductive tip) vs active styluses (battery/Bluetooth, pressure sensitivity, palm rejection — e.g. drawing on a tablet).</li>
<li><b>Headsets:</b> wired 3.5 mm TRRS (audio + mic on one plug), USB, or Bluetooth.</li>
<li><b>Speakers, webcams:</b> USB or Bluetooth; webcams are USB and may include their own mic.</li>
<li><b>Trackpad / drawing pad:</b> external input devices, typically USB or Bluetooth; drawing pads pair with active pens for graphics work.</li>
<li><b>Card readers / adapters:</b> USB-C dongles for HDMI, Ethernet, SD cards — know when a simple adapter vs a full dock is needed.</li>
</ul>

<h2>Docking station vs port replicator vs USB hub</h2>
<table>
<tr><th>Device</th><th>What it does</th><th>Typical exam scenario</th></tr>
<tr><td><b>USB hub</b></td><td>Splits one USB port into several — data/power only, no new video outputs beyond passthrough alt mode limits</td><td>"Need more USB ports" — hub</td></tr>
<tr><td><b>Port replicator</b></td><td>One cable to existing laptop ports — convenience pass-through</td><td>"One cable instead of four" — replicator</td></tr>
<tr><td><b>Docking station</b></td><td>Adds capability the laptop lacks — multiple monitors, Ethernet, charging, sometimes drive bays</td><td>"Two monitors + Ethernet + charge on one USB-C" — dock</td></tr>
<tr><td><b>KVM switch</b></td><td>One keyboard/monitor/mouse shared between multiple PCs — not a laptop dock</td><td>"Switch one monitor between two desktops" — KVM, not dock</td></tr>
</table>
<div class="callout"><b>Exam angle:</b> if the scenario needs functionality the laptop lacks (e.g. driving three external monitors), it's a docking station. If it's just "plug one cable instead of six", either works but a port replicator is the minimal answer.</div>

<h2>Scenario pick-list — match need to accessory</h2>
<ul>
<li><b>Contactless payment at a terminal</b> → NFC on the phone.</li>
<li><b>Console into a network switch</b> → USB-to-serial adapter + rollover/console cable.</li>
<li><b>Sketching with pressure sensitivity</b> → active stylus + compatible digitizer.</li>
<li><b>Laptop online via phone with no WiFi</b> → hotspot/tethering (WiFi, USB, or Bluetooth).</li>
<li><b>One USB-C port, dual monitors + charge</b> → Thunderbolt/USB-C docking station (not a basic hub).</li>
<li><b>Wireless headphones in the office</b> → Bluetooth pairing (see 1.4 for pairing steps).</li>
</ul>
<div class="keyfact"><b>Legacy connectors:</b> microUSB = pre-USB-C Android; Lightning = Apple (pre-USB-C iPhone); miniUSB = older cameras/peripherals. Exam loves "which came before USB-C on Android?" → microUSB.</div>
`,
quiz:[
{q:"Which connector is reversible, and can simultaneously carry data, DisplayPort video, and charging power?", o:["microUSB","USB-A","USB-C","eSATA"], a:2, e:"USB-C supports high-speed data, DisplayPort alt mode for video, and USB Power Delivery for charging — all through one reversible connector."},
{q:"A user wants to make contactless payments with their phone at a shop terminal. Which technology does this use?", o:["Bluetooth","NFC","IR blaster","RFID at 900 MHz"], a:1, e:"Tap-to-pay uses NFC — near-field communication with a working range of only a few centimetres, which is part of its security."},
{q:"Which connector is Apple's proprietary connector found on iPhones prior to the move to USB-C?", o:["Thunderbolt 2","30-pin dock","Lightning","MagSafe"], a:2, e:"Lightning is Apple's reversible proprietary connector used on iPhones and older iPads before Apple's transition to USB-C."},
{q:"A network technician needs to connect a laptop to a switch's console port for initial configuration. The laptop has no legacy ports. What do they need?", o:["A USB-to-serial (RS-232) adapter","An NFC bridge","A Lightning-to-Ethernet dongle","A port replicator"], a:0, e:"Console ports use serial RS-232 communication. Modern laptops lack serial ports, so a USB-to-serial adapter (plus console cable) is the standard kit."},
{q:"An architect wants pressure sensitivity and palm rejection when sketching on a tablet. Which accessory is required?", o:["A capacitive-tip passive stylus","An active stylus","A trackball","A resistive overlay"], a:1, e:"Active styluses contain electronics (battery/Bluetooth) enabling pressure levels, tilt, and palm rejection. A passive capacitive stylus just mimics a fingertip."},
{q:"What distinguishes a docking station from a port replicator?", o:["A docking station only works with USB-C","A port replicator charges the laptop; a docking station cannot","A docking station adds capabilities the laptop doesn't natively have; a replicator only extends existing ports","There is no difference; the terms are interchangeable"], a:2, e:"A replicator passes through the laptop's own ports for one-cable convenience. A docking station adds functionality — e.g. additional display outputs, extra ports, drive bays."},
{q:"A user with no WiFi available needs to get their laptop online using their phone's mobile data. Which feature do they enable on the phone?", o:["NFC beaming","Hotspot/tethering","Bluetooth LE broadcasting","WiFi Direct"], a:1, e:"Tethering/hotspot shares the phone's cellular data connection with other devices — over WiFi, USB cable, or Bluetooth."},

{q:"A single 3.5 mm plug on a headset carries both stereo audio and microphone input. What connector standard is this?", o:["TRS","TRRS","TOSLINK","XLR"], a:1, e:"TRRS (tip-ring-ring-sleeve) adds a fourth contact to carry the mic signal alongside stereo audio — the standard for combined headset jacks."},
{q:"A user's laptop has one USB-C port. They need to run two external monitors, wired Ethernet, and charge the laptop through a single cable. What should you recommend?", o:["A USB hub","A port replicator","A USB-C/Thunderbolt docking station","A KVM switch"], a:2, e:"Driving multiple displays plus Ethernet plus Power Delivery charging through one connector is exactly what a USB-C/Thunderbolt docking station provides — beyond what a simple hub or replicator offers."}

/* ---------------- 1.4 ---------------- */
{
id:"1.4", name:"Configure basic mobile-device network connectivity and application support",
notes:`
<h2>Cellular basics</h2>
<ul>
<li><b>2G/3G/4G/5G:</b> generations of cellular. 4G LTE is the data workhorse; 5G adds higher speeds/lower latency. 2G/3G are largely switched off in the UK.</li>
<li><b>GSM vs CDMA:</b> the two legacy network families. <b>GSM</b> (global standard, SIM-based — swap the SIM, keep the phone). <b>CDMA</b> (US carriers like Verizon/Sprint historically, handset tied to carrier). 4G/5G converged on SIM-based standards.</li>
<li><b>PRL updates (Preferred Roaming List):</b> a carrier-pushed update — mainly on CDMA networks — telling the phone which towers/partners to prefer when roaming. Symptom of a stale PRL: poor roaming connectivity.</li>
<li><b>APN (Access Point Name):</b> carrier settings that tell the phone how to reach the mobile data network. Wrong or missing APN → mobile data works on WiFi but not on cellular, or MMS fails.</li>
<li><b>IMEI</b> — unique handset identifier; carriers use it for activation and blocking stolen devices (not the same as a SIM).</li>
</ul>

<h2>Cellular generations — what each is for</h2>
<table>
<tr><th>Generation</th><th>Typical use</th><th>Exam note</th></tr>
<tr><td><b>4G LTE</b></td><td>Current mobile broadband standard — browsing, streaming, tethering</td><td>Default data network on modern phones</td></tr>
<tr><td><b>5G</b></td><td>Higher throughput, lower latency</td><td>Better for dense areas and real-time apps; not always available everywhere</td></tr>
<tr><td><b>2G/3G</b></td><td>Legacy voice/data</td><td>Largely retired in the UK — know they existed, not current deploy</td></tr>
</table>

<h2>Sharing mobile data — hotspot vs tethering</h2>
<table>
<tr><th>Method</th><th>How</th><th>Best for</th></tr>
<tr><td><b>WiFi hotspot</b></td><td>Phone broadcasts a WiFi network other devices join</td><td>Multiple devices, quick setup; uses more phone battery</td></tr>
<tr><td><b>USB tethering</b></td><td>Phone connected by cable to laptop</td><td>Stable link, charges phone, single device — field engineer favourite</td></tr>
<tr><td><b>Bluetooth tethering</b></td><td>Phone shares data over paired Bluetooth</td><td>Low power, slow — backup when WiFi/USB unavailable</td></tr>
</table>
<div class="keyfact"><b>Data cap trap:</b> large app updates, cloud photo sync, and video over cellular burn through monthly allowances — configure warnings/limits and prefer WiFi for heavy sync.</div>

<h2>WiFi on mobile devices</h2>
<ul>
<li><b>Open vs secured</b> — WPA2/WPA3 personal for home; <b>WPA2-Enterprise</b> (802.1X + RADIUS) for office WiFi — username/password or certificate.</li>
<li><b>Captive portal</b> — hotel/café WiFi that opens a login page in the browser before granting internet access.</li>
<li><b>Airplane mode</b> — disables cellular, WiFi, and Bluetooth radios; WiFi/Bluetooth can often be re-enabled individually while cellular stays off.</li>
<li><b>Forget network</b> — first fix for saved WiFi that won't connect after a password change.</li>
</ul>

<h2>Bluetooth pairing — know the sequence</h2>
<div class="callout"><b>Learn this order:</b> 1) Enable Bluetooth → 2) Put the accessory in pairing/discoverable mode → 3) Search/select the device on the phone → 4) Enter or confirm the PIN code → 5) Test connectivity.</div>
<ul>
<li>If pairing fails: toggle Bluetooth off/on, forget the device and re-pair, confirm the accessory isn't already bonded to another host.</li>
<li><b>Bluetooth LE</b> — low-energy variant for wearables, beacons, and some keyboards; still requires pairing for trusted connections.</li>
</ul>

<h2>Location services</h2>
<ul>
<li>Devices locate via <b>GPS</b> (satellite) plus <b>cellular tower triangulation</b> and WiFi positioning. GPS is accurate but slow to lock and weak indoors; cellular/WiFi assistance speeds it up (A-GPS).</li>
<li>Location can be granted or denied per app — a privacy and battery consideration.</li>
</ul>

<h2>MDM and MAM</h2>
<ul>
<li><b>MDM (Mobile Device Management):</b> corporate control of the <b>whole device</b> — enforce passcodes and encryption, push profiles/apps, remote lock and wipe.</li>
<li><b>MAM (Mobile Application Management):</b> control of <b>corporate apps and their data only</b> — ideal for BYOD, where the company can wipe its container without touching personal photos.</li>
<li><b>Two-factor authentication (2FA):</b> something you know + something you have/are — authenticator apps, SMS codes, biometrics — standard for corporate account enrolment.</li>
<li><b>Work profile (Android) / managed apps (iOS)</b> — separates corporate data from personal apps on BYOD; pairs with MAM rather than wiping the whole phone.</li>
<li><b>Corporate VPN profile</b> — pushed via MDM so remote users reach internal resources securely over cellular or public WiFi.</li>
</ul>
<div class="keyfact"><b>MDM vs MAM:</b> company-owned phone, full remote wipe → MDM. Personal phone, wipe only work email/apps → MAM or work profile.</div>

<h2>Email configuration — the port table</h2>
<table>
<tr><th>Protocol</th><th>Job</th><th>Standard port</th><th>Secure (SSL/TLS) port</th></tr>
<tr><td><b>POP3</b></td><td>Download mail (typically removes from server)</td><td>110</td><td>995</td></tr>
<tr><td><b>IMAP</b></td><td>Sync mail, leaves it on the server, multi-device</td><td>143</td><td>993</td></tr>
<tr><td><b>SMTP</b></td><td>Send mail</td><td>25</td><td>587 (submission/STARTTLS) or 465</td></tr>
</table>
<ul>
<li><b>Exchange / Microsoft 365, Gmail, iCloud:</b> commercial providers usually auto-configure — just email + password (+2FA). Corporate Exchange (ActiveSync) syncs mail, contacts and calendar together.</li>
<li><b>S/MIME:</b> certificate-based <b>signing and encryption of email</b> — proves the sender and protects content. Requires certificates installed on the device.</li>
<li><b>ActiveSync</b> — Microsoft protocol syncing mail, contacts, and calendar in one account; common on Exchange and Microsoft 365 mobile setup.</li>
</ul>

<h2>POP3 vs IMAP vs SMTP — pick the right protocol</h2>
<table>
<tr><th>Need</th><th>Protocol</th><th>Why</th></tr>
<tr><td>Mail on phone, laptop, and tablet — all stay in sync</td><td><b>IMAP</b> (993)</td><td>Server holds the mailbox; devices mirror folders</td></tr>
<tr><td>Download mail to one device and remove from server</td><td><b>POP3</b> (995 secure)</td><td>Single-device, offline archive style</td></tr>
<tr><td>Send outbound mail from the phone</td><td><b>SMTP</b> (587 STARTTLS or 465 SSL)</td><td>Submission to the mail server — not for retrieval</td></tr>
</table>
<div class="callout"><b>Port trap pairs:</b> POP3 = 110/995 · IMAP = 143/993 · SMTP = 25/587/465. Exams love swapping 995 and 993.</div>

<h2>Data synchronisation</h2>
<ul>
<li>Sync targets: <b>to the cloud</b> (contacts, calendar, photos, app data — Google/iCloud/M365), <b>to the desktop</b> (e.g. device backups), and <b>to the car</b> (Android Auto/CarPlay contact and media sync).</li>
<li>What syncs via corporate accounts (ActiveSync/Exchange): <b>mail, contacts, calendar</b> together — one account entry populates all three, and a replacement phone restores them by signing in.</li>
<li><b>Data caps:</b> cellular plans meter usage — configure devices to warn/limit at thresholds, prefer WiFi for large syncs and updates, and watch for background sync burning through an allowance (a symptom that doubles as a malware indicator, see 5.5).</li>
</ul>

<h2>Mobile connectivity — symptom to first fix</h2>
<table>
<tr><th>Symptom</th><th>Check first</th></tr>
<tr><td>No cellular data, WiFi works</td><td>Mobile data toggle, APN settings, aeroplane mode, account/plan active</td></tr>
<tr><td>No service / no bars</td><td>SIM seated, aeroplane mode off, carrier outage, PRL update (CDMA roaming)</td></tr>
<tr><td>WiFi connects but no internet</td><td>Captive portal login, wrong password → forget network, DNS/gateway on corporate WiFi</td></tr>
<tr><td>Bluetooth won't pair</td><td>Enable Bluetooth, pairing mode on accessory, forget old pairing, PIN step</td></tr>
<tr><td>Mail sends but won't receive</td><td>IMAP/POP3 server and port (993 vs 995), not SMTP settings alone</td></tr>
<tr><td>Contacts/calendar missing on new phone</td><td>Sign into same cloud/Exchange account — sync is account-based</td></tr>
</table>

<h2>Scenario pick-list</h2>
<ul>
<li><b>Field laptop needs stable 5G via phone, save battery</b> → USB tethering.</li>
<li><b>BYOD — wipe work email only if employee leaves</b> → MAM or work profile, not full MDM wipe.</li>
<li><b>Company phone lost — locate and erase everything</b> → MDM remote wipe.</li>
<li><b>Solicitor must prove email authenticity</b> → S/MIME signing certificate.</li>
<li><b>Roaming CDMA phone picks wrong towers</b> → PRL update from carrier.</li>
<li><b>New phone, same mail on three devices</b> → IMAP on 993, not POP3.</li>
</ul>
`,
quiz:[
{q:"Which port does IMAP use when secured with SSL/TLS?", o:["110","995","143","993"], a:3, e:"IMAP uses 143 unencrypted and 993 over SSL/TLS. POP3 is 110/995. Mixing these pairs up is the classic exam trap."},
{q:"What is the FIRST step when connecting a new Bluetooth headset to a phone?", o:["Enter the PIN code","Enable Bluetooth on the phone","Test connectivity","Put the headset in pairing mode"], a:1, e:"The sequence is: enable Bluetooth → put the accessory in pairing mode → find/select the device → enter/confirm PIN → test. Nothing can happen until the radio is on."},
{q:"A company allows employees to use personal phones but must be able to wipe corporate email and files without touching personal data. Which solution fits?", o:["MDM full-device enrolment","MAM","S/MIME","Remote desktop"], a:1, e:"MAM (Mobile Application Management) manages only the corporate apps and their data container — the right fit for BYOD. Full MDM controls (and can wipe) the entire device."},
{q:"Which legacy cellular standard identifies the subscriber with a removable SIM card and allows changing handsets by moving the SIM?", o:["CDMA","GSM","TDMA","iDEN"], a:1, e:"GSM is SIM-based — identity lives on the card, so users can swap handsets freely. Legacy CDMA tied the subscription to the handset via the carrier."},
{q:"A CDMA-network phone gets poor service when travelling outside its home coverage area. Which carrier-provided update is designed to address this?", o:["Baseband firmware update","PRL update","APN reset","IMEI refresh"], a:1, e:"The Preferred Roaming List tells the phone which towers and partner networks to use when roaming; carriers push PRL updates to improve roaming behaviour."},
{q:"Which protocol should be configured on port 587 with STARTTLS?", o:["IMAP","POP3","SMTP","LDAP"], a:2, e:"SMTP sends mail: port 25 unencrypted (server-to-server), 587 for authenticated client submission with STARTTLS (465 for implicit SSL). IMAP/POP3 are retrieval protocols."},
{q:"A solicitor must digitally sign and encrypt emails so recipients can verify the sender and content confidentiality. What should be configured on their phone?", o:["ActiveSync","S/MIME certificates","IMAP over SSL","A VPN profile"], a:1, e:"S/MIME uses certificates to sign (authenticity/integrity) and encrypt (confidentiality) email content itself. IMAP over SSL only protects mail in transit to the server."},
{q:"A user wants email accessible and consistent across their phone, laptop, and tablet, with messages remaining on the server. Which retrieval protocol fits?", o:["POP3","IMAP","SMTP","SNMP"], a:1, e:"IMAP synchronises mailbox state with the server, so all devices see the same mail. POP3 traditionally downloads and removes mail — poor for multi-device use."},
{q:"Which two technologies do phones combine so location can be fixed faster and work better indoors than satellite alone?", o:["GPS with cellular/WiFi positioning","NFC with Bluetooth beacons","GPS with FM radio","Cellular with infrared"], a:0, e:"Assisted GPS supplements satellite fixes with cellular tower and WiFi positioning data, giving faster locks and workable indoor accuracy."},
{q:"An employee enrols a corporate-owned phone. IT enforces a passcode, encrypts storage, and retains the ability to remotely wipe the entire handset. What is managing the device?", o:["MAM","MDM","ActiveSync","A RADIUS server"], a:1, e:"Full-device policy enforcement — passcodes, encryption, remote lock/wipe, app pushing — is Mobile Device Management (MDM), appropriate for corporate-owned hardware."}
]
}
]
,mock:[
{q:"A laptop's battery drains rapidly and the chassis feels warm even when idle. The battery is three years old with heavy cycle use. What is the BEST course of action?", o:["Recalibrate the battery in BIOS","Replace the battery with a matching-spec unit","Enable hibernation instead of sleep","Undervolt the CPU"], a:1, e:"Li-ion capacity degrades permanently with age and charge cycles; a heavily cycled three-year-old battery that runs hot and drains fast should simply be replaced with a matching-voltage, matching-connector part."},
{q:"A technician installs a known-good DDR5 SODIMM into a laptop that shipped with DDR4. The module will not seat. Why?", o:["The clips need replacing","DDR generations are keyed differently and are not interchangeable","DDR5 SODIMMs only fit desktop boards","The module must be inserted vertically"], a:1, e:"Each DDR generation has a different notch position — physically preventing installation of the wrong generation. The board's memory generation cannot be upgraded by swapping modules."},
{q:"A user upgrades from a 2.5\" HDD to a 2.5\" SATA SSD and wants their exact Windows installation, apps, and files on the new drive. What should the technician do?", o:["Copy the user profile folder to the SSD","Clone/image the HDD to the SSD","Format the SSD as exFAT and drag the files over","Use Windows Reset with 'keep my files'"], a:1, e:"Disk cloning/imaging copies the full drive — OS, boot configuration, applications, and data — producing a bootable duplicate. File copying alone cannot transfer a working OS."},
{q:"After fitting a third-party WiFi card, a business laptop refuses to boot and displays an 'unauthorized wireless network card' error. What is the cause?", o:["The antenna leads are swapped","The BIOS/UEFI whitelists approved wireless cards","The card is DDR-incompatible","The card needs pairing over NFC"], a:1, e:"Some vendors (notably in business lines) whitelist wireless cards in firmware; a non-approved card halts POST. The fix is an approved card or (where offered) a firmware update."},
{q:"A user signs into their laptop by looking at the screen. Which hardware enables this?", o:["A standard 720p webcam","An IR camera with facial recognition","An NFC scanner","An ambient light sensor"], a:1, e:"Facial sign-in (e.g. Windows Hello) requires an infrared camera that maps the face in a way a normal webcam can't — it also works in the dark and resists photo spoofing."},
{q:"Which storage option would be found in a very old ultraportable laptop with a magnetic drive smaller than 2.5 inches?", o:["1.8\" HDD","mSATA SSD","M.2 2242","CFexpress"], a:0, e:"1.8\" HDDs were the compact magnetic option in legacy ultraportables and early media players. The other options are solid-state form factors."},
{q:"A graphic designer complains that colours on their budget laptop shift badly when the screen is viewed slightly off-centre. Which panel type is the machine MOST likely using?", o:["IPS","OLED","TN","VA"], a:2, e:"Severe colour/contrast shift with viewing angle is the signature weakness of TN panels — common in budget machines. IPS is the fix for colour-critical work."},
{q:"On a CCFL-backlit laptop, the display flickers pink and then goes dark, though an external monitor works perfectly. Which TWO components are the likely suspects?", o:["GPU or system RAM","Backlight tube or inverter","Digitizer or webcam cable","Display cable or CMOS battery"], a:1, e:"Pink/red tinting then darkness is the classic dying CCFL tube or failing inverter. External output working rules out the GPU."},
{q:"A convertible laptop registers phantom touches along one edge of the screen even when nothing is touching it. The displayed image is flawless. What should be replaced?", o:["The LCD panel","The digitizer/touch layer","The display cable","The inverter"], a:1, e:"Ghost/phantom touch with a perfect image indicates the digitizer layer is faulty. The panel draws the image; the digitizer senses touch — they fail independently."},
{q:"Why does OLED achieve 'true black' where LCD cannot?", o:["OLED uses a stronger polariser","OLED pixels switch off entirely, emitting no light; LCDs always have backlight bleed","OLED refreshes at a higher rate","OLED uses quantum dots to absorb light"], a:1, e:"LCD pixels block a constantly lit backlight, so some light always leaks. OLED pixels emit their own light and can turn completely off, giving infinite contrast."},
{q:"A user's laptop shows full WiFi signal next to the router but drops to one bar across the room. This began after the lid/display assembly was replaced. What is the MOST likely fault?", o:["Wrong wireless driver","Only one of the two antenna leads was reconnected","The new bezel blocks 5 GHz","Airplane mode is scheduled"], a:1, e:"With only the auxiliary or main antenna connected (or one lead damaged in the hinge), the radio works at close range but range/performance collapses — a classic post-lid-repair fault."},
{q:"Which capability requires a docking station rather than a simple port replicator?", o:["Connecting a wired keyboard and mouse","Passing through the laptop's HDMI output","Adding display outputs beyond what the laptop natively supports","Providing a Kensington lock slot"], a:2, e:"Port replicators only extend the laptop's existing ports. Adding capability the laptop doesn't have — such as extra independent monitor outputs — is what defines a docking station."},
{q:"A technician needs to configure a router with no network connectivity available. Which port type on the router is used for direct local management?", o:["NFC","Serial console (RS-232)","Lightning","Thunderbolt"], a:1, e:"Network devices expose a serial console port for out-of-band local management — accessed from a modern laptop via a USB-to-serial adapter and terminal software."},
{q:"Which wireless technology has an effective range of only a few centimetres by design?", o:["Bluetooth LE","NFC","WiFi Direct","Zigbee"], a:1, e:"NFC operates at roughly 4 cm. The tiny range is a feature — it makes payment taps and badge reads hard to intercept at a distance."},
{q:"A user reports their phone charges from some cables but not others, and data transfer never works. The connector is oblong, non-reversible, and frustration involves 'plugging it in the right way up'. Which connector is this?", o:["USB-C","Lightning","microUSB","miniUSB"], a:2, e:"Non-reversible with the classic 'wrong way up' problem points to microUSB, the pre-USB-C Android standard. USB-C and Lightning are both reversible."},
{q:"An office wants employees to join meetings with one USB device that provides both audio out and a microphone. What is the simplest recommendation?", o:["A USB headset","A TRS splitter with two adapters","A Bluetooth transmitter dongle","A conference bridge licence"], a:0, e:"A USB headset presents speakers and microphone through one plug-and-play connection — the minimal, most reliable single-device answer."},
{q:"When pairing a Bluetooth keyboard, at what point in the process is the PIN code entered?", o:["Before enabling Bluetooth","Immediately after enabling pairing mode on the keyboard","After finding and selecting the device on the host","Only when the connection later drops"], a:2, e:"Order: enable Bluetooth → pairing mode on the accessory → search/select the device → then enter/confirm the PIN → test. The PIN exchange happens once the two devices have found each other."},

{
id:"2.1", name:"Compare and contrast TCP/UDP ports, protocols, and their purposes",
notes:`
<h2>TCP vs UDP</h2>
<ul>
<li><b>TCP</b> — connection-oriented: three-way handshake (SYN → SYN/ACK → ACK), guaranteed ordered delivery, retransmission. Used where accuracy matters (web, mail, file transfer, remote desktop).</li>
<li><b>UDP</b> — connectionless: no handshake, no delivery guarantee, minimal overhead. Used where speed matters and losses are tolerable (streaming, DNS queries, DHCP, VoIP).</li>
</ul>
<div class="keyfact"><b>TCP vs UDP on the exam:</b> file transfer, web pages, email, RDP → TCP. Live voice/video, DNS lookups, DHCP, SNMP traps → UDP. If the question says "guaranteed delivery" or "three-way handshake", it's TCP.</div>

<h2>ICMP, ARP, and what is NOT a port question</h2>
<ul>
<li><b>ICMP</b> (ping, traceroute) — network diagnostics at layer 3, not TCP/UDP application ports. "Ping uses port 443" is always wrong.</li>
<li><b>ARP</b> — resolves IP addresses to MAC addresses on the local subnet. No well-known TCP/UDP port.</li>
<li>Exam traps pair protocols correctly: DHCP is UDP 67/68, DNS is mostly UDP 53, LDAP is TCP 389.</li>
</ul>

<h2>Secure variants — the mail and directory traps</h2>
<table>
<tr><th>Plain</th><th>Port</th><th>Secure</th><th>Port</th></tr>
<tr><td>HTTP</td><td>80</td><td>HTTPS</td><td>443</td></tr>
<tr><td>Telnet</td><td>23</td><td>SSH</td><td>22</td></tr>
<tr><td>SMTP</td><td>25</td><td>SMTP submit (STARTTLS)</td><td>587</td></tr>
<tr><td>SMTP (legacy SSL)</td><td>—</td><td>SMTPS</td><td>465</td></tr>
<tr><td>POP3</td><td>110</td><td>POP3S</td><td>995</td></tr>
<tr><td>IMAP</td><td>143</td><td>IMAPS</td><td>993</td></tr>
<tr><td>LDAP</td><td>389</td><td>LDAPS</td><td>636</td></tr>
<tr><td>FTP</td><td>21</td><td>FTPS</td><td>990</td></tr>
</table>

<h2>Firewall scenarios — which ports to open</h2>
<ul>
<li><b>Web server only</b> — inbound TCP 80 and/or 443.</li>
<li><b>Remote admin (secure)</b> — SSH 22 (Linux) or RDP 3389 (Windows) — never Telnet 23 externally.</li>
<li><b>Mail server receiving internet mail</b> — SMTP 25 (often restricted to known relays).</li>
<li><b>Internal file share</b> — SMB 445 within the LAN; block from the internet.</li>
<li><b>Monitoring</b> — SNMP 161 from the manager to devices; traps outbound on 162.</li>
</ul>

<h2>The port table — memorise cold</h2>
<table>
<tr><th>Port</th><th>Protocol</th><th>Purpose</th></tr>
<tr><td>20/21</td><td>FTP</td><td>File transfer (20 data, 21 control)</td></tr>
<tr><td>22</td><td>SSH</td><td>Secure remote shell (also secures SFTP/SCP)</td></tr>
<tr><td>23</td><td>Telnet</td><td>Legacy remote shell — plaintext, insecure</td></tr>
<tr><td>25</td><td>SMTP</td><td>Sending / relaying mail</td></tr>
<tr><td>53</td><td>DNS</td><td>Name resolution (UDP queries; TCP for large transfers)</td></tr>
<tr><td>67/68</td><td>DHCP</td><td>Automatic IP addressing (UDP; 67 server, 68 client)</td></tr>
<tr><td>80</td><td>HTTP</td><td>Web, unencrypted</td></tr>
<tr><td>110</td><td>POP3</td><td>Mail retrieval (download-and-delete)</td></tr>
<tr><td>137–139</td><td>NetBIOS/NetBT</td><td>Legacy Windows name/session services</td></tr>
<tr><td>143</td><td>IMAP</td><td>Mail retrieval (server-side sync)</td></tr>
<tr><td>161/162</td><td>SNMP</td><td>Device monitoring (161 agent queries, 162 traps)</td></tr>
<tr><td>389</td><td>LDAP</td><td>Directory services (e.g. Active Directory queries)</td></tr>
<tr><td>443</td><td>HTTPS</td><td>Web over TLS</td></tr>
<tr><td>445</td><td>SMB/CIFS</td><td>Windows file and printer sharing</td></tr>
<tr><td>3389</td><td>RDP</td><td>Remote Desktop Protocol</td></tr>
</table>
<div class="callout"><b>Exam angle:</b> secure/insecure pairs — Telnet 23 → SSH 22; HTTP 80 → HTTPS 443. And from 1.4: POP3 110→995, IMAP 143→993, SMTP 25→587/465.</div>

<h2>Extra ports worth knowing</h2>
<table>
<tr><th>Port</th><th>Service</th><th>Note</th></tr>
<tr><td>88</td><td>Kerberos</td><td>Domain auth — time sync matters</td></tr>
<tr><td>123</td><td>NTP</td><td>Clock sync</td></tr>
<tr><td>636</td><td>LDAPS</td><td>LDAP over TLS</td></tr>
<tr><td>990</td><td>FTPS</td><td>FTP over implicit TLS</td></tr>
<tr><td>1812</td><td>RADIUS</td><td>WiFi/VPN authentication</td></tr>
</table>

<h2>Scenario pick-list — which port?</h2>
<ul>
<li><b>Block all cleartext remote admin externally</b> — allow 22, deny 23.</li>
<li><b>User can ping IP but not open websites by name</b> — check DNS (53), not 80/443 alone.</li>
<li><b>Windows share over LAN</b> — SMB 445.</li>
<li><b>VoIP quality issues</b> — UDP prioritised; don't confuse with TCP mail ports.</li>
<li><b>Mail client sends but can't receive</b> — SMTP vs IMAP/POP3 ports (587 vs 993/995).</li>
</ul>
`,
quiz:[
{q:"Which port must be open on a firewall to allow technicians to use Remote Desktop to a Windows server?", o:["22","443","3389","445"], a:2, e:"RDP uses TCP 3389. Port 22 is SSH, 443 HTTPS, 445 SMB file sharing."},
{q:"Which protocol establishes a connection using a three-way handshake?", o:["UDP","TCP","ICMP","ARP"], a:1, e:"TCP's SYN → SYN/ACK → ACK handshake sets up a reliable, ordered connection. UDP just sends — no handshake, no guarantees."},
{q:"A legacy device can only be managed over Telnet. Which port does this use, and what is the security concern?", o:["Port 22; weak encryption","Port 23; all traffic including passwords is plaintext","Port 25; open relay risk","Port 161; default community strings"], a:1, e:"Telnet uses TCP 23 and transmits everything — credentials included — in cleartext. SSH on 22 is its secure replacement."},
{q:"Which ports does DHCP use?", o:["UDP 67 and 68","TCP 53 and 54","UDP 137 and 138","TCP 20 and 21"], a:0, e:"DHCP runs over UDP — servers listen on 67, clients on 68. Port 53 is DNS; 20/21 FTP; 137/138 NetBIOS."},
{q:"Windows machines share files with each other directly across the LAN. Which port carries this traffic?", o:["139 only","443","445","389"], a:2, e:"Modern SMB/CIFS file and printer sharing runs directly over TCP 445 (legacy NetBIOS-over-TCP used 137–139). 389 is LDAP."},
{q:"A monitoring server collects statistics from switches and receives alerts they send. Which protocol and ports are involved?", o:["SNMP — UDP 161 for queries, 162 for traps","Syslog — UDP 514 both ways","LDAP — TCP 389 for polls, 390 for alerts","SMTP — TCP 25"], a:0, e:"SNMP polls device agents on UDP 161; devices send unsolicited traps to the manager on UDP 162."},
{q:"Which protocol would a client use on TCP 389?", o:["Querying a directory service such as Active Directory","Transferring files to an FTP server","Synchronising mail","Resolving hostnames"], a:0, e:"LDAP (Lightweight Directory Access Protocol) on 389 queries directory services — user lookups, authentication directory reads, etc."},
{q:"Why is UDP chosen over TCP for live voice and video streams?", o:["It encrypts by default","Its lack of handshakes and retransmissions gives lower latency, and lost packets aren't worth resending","It guarantees packet order","It supports larger packets"], a:1, e:"Real-time media prefers speed over perfection: a retransmitted voice packet would arrive too late to be useful, so UDP's low overhead wins."},
{q:"FTP uses two ports. Which does what?", o:["20 control, 21 data","21 control, 20 data","22 control, 23 data","80 control, 81 data"], a:1, e:"FTP signalling (commands) runs on TCP 21; the actual file data flows on TCP 20 in active mode. Easy to reverse under exam pressure — control is 21."},
{q:"Which port pair represents an insecure protocol and its secure replacement?", o:["23 and 22","80 and 8080","110 and 143","20 and 21"], a:0, e:"Telnet (23) is replaced by SSH (22). Note 80→443 is the web equivalent. 110/143 are two different retrieval protocols, not a secure pairing."}
]
},
